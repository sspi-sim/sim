<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SSPI Simulations</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
</style>
</head>
<body>
<img id="allBg" src="nucleus/images/TitleFull.png" alt=""
     style="position:fixed;inset:0;width:100%;height:100%;object-fit:fill;display:block;">
<div id="allTitleContainer" style="position:fixed;inset:80px;">
  <img id="allTitle" src="nucleus/images/TitleText.jpg" alt="SSPI Simulations"
       style="width:100%;height:100%;object-fit:contain;display:block;">
  <div id="allHotspots" style="position:absolute;pointer-events:none;">
    <a href="/nucleus/"           style="position:absolute;pointer-events:all;cursor:pointer;top:34.3%;left:17.9%;width:66.9%;height:8.5%"></a>
    <a href="/nucleus/#stability" style="position:absolute;pointer-events:all;cursor:pointer;top:44.4%;left:17.9%;width:66.9%;height:8.4%"></a>
    <a href="/fission/"           style="position:absolute;pointer-events:all;cursor:pointer;top:54.4%;left:17.9%;width:66.9%;height:8.6%"></a>
    <a href="/chain-reaction/"    style="position:absolute;pointer-events:all;cursor:pointer;top:64.6%;left:17.9%;width:66.9%;height:8.7%"></a>
    <a href="/fusion/"            style="position:absolute;pointer-events:all;cursor:pointer;top:74.5%;left:17.9%;width:66.9%;height:8.4%"></a>
    <a href="/fusion/#fusion"     style="position:absolute;pointer-events:all;cursor:pointer;top:84.5%;left:17.9%;width:66.9%;height:8.5%"></a>
  </div>
</div>

<script>
(function() {
  const IMG_W = 1150, IMG_H = 820;
  function positionHotspots() {
    const container = document.getElementById('allTitleContainer');
    const hotspots  = document.getElementById('allHotspots');
    if (!container || !hotspots) return;
    const cw = container.clientWidth, ch = container.clientHeight;
    const scale = Math.min(cw / IMG_W, ch / IMG_H);
    const dw = IMG_W * scale, dh = IMG_H * scale;
    const dx = (cw - dw) / 2, dy = (ch - dh) / 2;
    hotspots.style.left   = dx + 'px';
    hotspots.style.top    = dy + 'px';
    hotspots.style.width  = dw + 'px';
    hotspots.style.height = dh + 'px';
  }
  document.getElementById('allTitle').addEventListener('load', positionHotspots);
  window.addEventListener('resize', positionHotspots);
  positionHotspots();
})();
</script>
</body>
</html>
