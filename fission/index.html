function neutronTick(now) {
  if (neutronState !== 'flying') return;
  const dt    = neutronLast ? now - neutronLast : 16;
  neutronLast = now;
  const speed = parseFloat(document.getElementById('neutronSpeed').value);
  neutronX   += speed * 0.25 * dt;

  const nf = Math.max(0, Math.min(1, (neutronX - (PARTICLE_RADIUS + 60)) /
                                     (neutronImpactX() - (PARTICLE_RADIUS + 60))));
  currentScrubFrac = nf * NEUTRON_FRAC;
  document.getElementById('scrubSlider').value = scrubVal(currentScrubFrac);
  document.getElementById('scrubPct').textContent = scrubPct(currentScrubFrac);

  if (neutronX + PARTICLE_RADIUS >= animParent.cx - animParent.sphereR) {
    // Top 10% of speed slider → bounce off the nucleus (fission tab only)
    const speedVal = parseFloat(document.getElementById('neutronSpeed').value);
    const bounceThreshold = 0.2 + 0.9 * (8.0 - 0.2); // = 7.22
    if (speedVal > bounceThreshold) {
      // Too fast for fission — neutron passes straight through the nucleus.
      neutronX = animParent.cx - animParent.sphereR - PARTICLE_RADIUS;
      neutronY = animParent.cy;
      currentScrubFrac = 0;
      resetPrerender();
      neutronState = 'passing';
      neutronLast  = null;
      neutronRAF   = requestAnimationFrame(passTick);
      return;
    }
    staticNeutronIX  = animParent.cx - animParent.sphereR * 0.85;
    staticNeutronIY  = animParent.cy;
    // Pick the fission axis here — at impact — so the force viz panel doesn't
    // reveal the chosen direction during the neutron's flight.
    staticFissAngle  = isFirstFission
      ? (Math.random() - 0.5) * 2 * (Math.PI / 18)   // ±10° — horizontal-ish first run
      : (Math.random() - 0.5) * Math.PI;
    fissionBranch    = Math.floor(Math.random() * 2);
    consecutiveBounces = 0;
    document.getElementById('neutronSpeedWrap').classList.remove('bounce-warn');
    neutronState     = 'fission';
    staticFissStart  = now;
    wobbleMode     = selectedNucleusKey !== 'u235' ? 'stable' : (isFirstFission ? 'dip1' : pickWobbleMode());
    isFirstFission = false;
    SHAKE_DURATION = (5 + Math.random() * 10) * 100;   // 500–1500 ms (1 unit = 100 ms)
    if (wobbleMode === 'stable') SHAKE_DURATION *= 1.5;  // stable wobbles run 1.5× slower
    // For stable (failed) reactions the timeline ends at frame 700 — resize slider and graph to match
    const stableEnd = wobbleMode === 'stable' ? 0.70 : 1.0;
    document.getElementById('scrubSlider').max = Math.round(stableEnd * 1000);
    egZoomStart = 0; egZoomEnd = stableEnd;
    resetExcitedSpots();
    staticFissT      = PH1_END;
    currentScrubFrac = NEUTRON_FRAC;
    document.getElementById('scrubSlider').value = scrubVal(NEUTRON_FRAC);
    document.getElementById('scrubPct').textContent = scrubPct(NEUTRON_FRAC);
    neutronRAF = requestAnimationFrame(fissionTick);
    return;
  }

  updateParticleJitter(animParent.particles.length, 1, true);
  syncForceVizVisibility();
  renderAtFrac(currentScrubFrac); drawForceViz();
  neutronRAF = requestAnimationFrame(neutronTick);
}

function bounceTick(now) {
  if (neutronState !== 'bouncing') return;
  const dt    = neutronLast ? now - neutronLast : 16;
  neutronLast = now;
  const speed = parseFloat(document.getElementById('neutronSpeed').value);
  const step  = speed * 0.25 * dt;
  neutronX   += bounceVX * step;
  neutronY   += bounceVY * step;

  const W = canvas.width, H = canvas.height;
  const offscreen = neutronX < -PARTICLE_RADIUS - 5 || neutronX > W + PARTICLE_RADIUS
                 || neutronY < -PARTICLE_RADIUS      || neutronY > H + PARTICLE_RADIUS;
  if (offscreen) {
    neutronRAF = null;
    consecutiveBounces++;

    const gbtn = document.getElementById('goBtn');

    gbtn.classList.remove('running');

function passTick(now) {
  if (neutronState !== 'passing') return;
  const dt    = neutronLast ? now - neutronLast : 16;

  const speed = parseFloat(document.getElementById('neutronSpeed').value);

function fissionTick(now) {
  if (neutronState !== 'fission') return;
  updateParticleJitter(animParent.particles.length);
  const playbackSpeed = parseFloat(document.getElementById('playbackSpeed').value);
  const elapsed = (now - staticFissStart) * playbackSpeed;
  if (elapsed < SHAKE_DURATION) {
    staticFissT = PH1_END + (elapsed / SHAKE_DURATION) * (PH2_END - PH1_END);
  } else {
    staticFissT = Math.min(FISS_STOP_T, PH2_END + ((elapsed - SHAKE_DURATION) / NORMAL_DURATION) * (ANIM_T_END - PH2_END));
  }
  const ff = (staticFissT - PH1_END) / (FISS_STOP_T - PH1_END);
  currentScrubFrac = NEUTRON_FRAC + Math.min(1, ff) * (1 - NEUTRON_FRAC);
  document.getElementById('scrubSlider').value = scrubVal(currentScrubFrac);
  document.getElementById('scrubPct').textContent = scrubPct(currentScrubFrac);
  syncForceVizVisibility();
  renderAtFrac(currentScrubFrac); drawForceViz();
  const stableDone = wobbleMode === 'stable' && currentScrubFrac >= 0.70;
  if (staticFissT < FISS_STOP_T && !stableDone) {
    neutronRAF = requestAnimationFrame(fissionTick);
  } else {
    neutronState = 'done';
    document.getElementById('goBtn').textContent = '▶ GO';
    document.getElementById('goBtn').classList.remove('running');
    document.getElementById('replayBtn').disabled = false;
    document.getElementById('scrubReplayBtn').disabled = false;
    markPrerenderDone();
  }
}

function drawSpeedLines() {
  const canvas = document.getElementById('speedLinesCanvas');
  if (!canvas) return;
  const c = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  const slider = document.getElementById('neutronSpeed');
  const min = parseFloat(slider.min), max = parseFloat(slider.max);
  const t   = (parseFloat(slider.value) - min) / (max - min);  // 0..1

  c.clearRect(0, 0, w, h);

  // 3 right-aligned horizontal lines; lengths scale with slider
  const maxLen  = w - 2;
  const scales  = [0.65, 1.0, 0.80];
  const ys      = [h * 0.25, h * 0.5, h * 0.75];

  scales.forEach((scale, i) => {
    const tFloor = 0.18 + 0.82 * t;  // minimum ~18% even at slider min
    const len = tFloor * maxLen * scale;
    const x = w - len;
    const y = Math.round(ys[i]);

    // outer glow
    c.save();
    c.strokeStyle = 'rgba(180,180,210,0.25)';
    c.lineWidth = 4;
    c.beginPath(); c.moveTo(x, y); c.lineTo(w, y); c.stroke();

    // core
    c.strokeStyle = 'rgba(210,210,230,0.85)';
    c.lineWidth = 1.5;
    c.beginPath(); c.moveTo(x, y); c.lineTo(w, y); c.stroke();
    c.restore();
  });
}

// ─── Nucleus button icon (New button) ─────────────────────────────────────────
// Sphere-packed particles for the NEW button icon canvas.
// Same gradient+shadowBlur style as drawParticles().
function buildNucleusIconParticles(nP, nN, seed) {
  const ICON_R  = 4;   // particle radius in icon px
  const nTotal  = nP + nN;
  const packFrac = 0.62;
  const vol    = nTotal * (4/3 * Math.PI * ICON_R ** 3) / packFrac;
  const sphR   = Math.cbrt(vol * 3 / (4 * Math.PI)) * 1.05;
  const minD2  = (ICON_R * 2.05) ** 2;

  let s = seed >>> 0;
  const rand = () => { s = (s * 1664525 + 1013904223) & 0xffffffff; return (s >>> 0) / 0xffffffff; };

  const pts = [];
  let tries = 0;
  while (pts.length < nTotal && tries < nTotal * 300) {
    tries++;
    const r3 = rand(), th = Math.acos(2 * rand() - 1), ph = rand() * 2 * Math.PI;
    const r  = sphR * Math.cbrt(r3);
    const ox = r * Math.sin(th) * Math.cos(ph);
    const oy = r * Math.sin(th) * Math.sin(ph);
    const oz = r * Math.cos(th);
    let ok = true;
    for (const q of pts) {
      if ((ox-q.ox)**2 + (oy-q.oy)**2 + (oz-q.oz)**2 < minD2) { ok = false; break; }
    }
    if (ok) pts.push({ ox, oy, oz, type: pts.length < nP ? 'proton' : 'neutron', jx: 0, jy: 0 });
  }
  return pts.sort((a, b) => a.oz - b.oz);  // back-to-front
}
// Precompute particle arrays for all nucleus options
const nucleusIconParticlesMap = {};
for (const [key, nd] of Object.entries(NUCLEUS_DEFS)) {
  nucleusIconParticlesMap[key] = buildNucleusIconParticles(nd.iconNP, nd.iconNN, nd.iconSeed);
}

// drawNucleusIcon: draws `particles` into `canvas` at the given draw scale.
// scale < 1 shrinks both the particle positions and their rendered radius.
function drawNucleusIcon(canvas, particles, scale = 1.0) {
  if (!canvas) return;
  const c = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  const cx = w / 2, cy = h / 2;
  const R = 4 * scale;

  c.clearRect(0, 0, w, h);

  for (const p of particles) {
    const px = cx + (p.ox + p.jx) * scale;
    const py = cy + (p.oy + p.jy) * scale;
    const isProton = p.type === 'proton';
    const mid  = isProton ? '#ff1a65' : '#70707f';
    const core = isProton ? '#ff80b0' : '#b0b0c4';

    const baseGrad = c.createRadialGradient(px, py, 0, px, py, R * 1.1);
    baseGrad.addColorStop(0,    mid);
    baseGrad.addColorStop(0.82, mid);
    baseGrad.addColorStop(1,    'rgba(0,0,0,0)');
    c.fillStyle = baseGrad;
    c.beginPath(); c.arc(px, py, R * 1.1, 0, Math.PI * 2); c.fill();

    const innerGlow = c.createRadialGradient(px, py, 0, px, py, R);
    innerGlow.addColorStop(0,   core);
    innerGlow.addColorStop(0.5, core);
    innerGlow.addColorStop(1,   'rgba(0,0,0,0)');
    c.save();
    c.shadowColor = core;
    c.shadowBlur  = 4 * scale;
    c.globalAlpha = 0.82;
    c.fillStyle = innerGlow;
    c.beginPath(); c.arc(px, py, R, 0, Math.PI * 2); c.fill();
    c.restore();
    c.globalAlpha = 1;
  }
}

function drawOutlineIcon() {
  const ic = document.getElementById('outlineModeIcon');
  if (!ic) return;
  const c = ic.getContext('2d');
  const w = ic.width, h = ic.height;
  const cx = w / 2, cy = h / 2;
  const sR = Math.min(w, h) * 0.36;
  const R  = 2.5;
  const N  = Math.max(5, Math.round(2 * Math.PI * sR / (R * 1.5)));
  const centers = Array.from({ length: N }, (_, k) => {
    const a = k * 2 * Math.PI / N;
    return { x: cx + sR * Math.cos(a), y: cy + sR * Math.sin(a) };
  });
  // outerIntersection equivalent for the icon ctx
  function iconOuterIntersect(c1, c2) {
    const dx = c2.x - c1.x, dy = c2.y - c1.y;
    const d  = Math.sqrt(dx * dx + dy * dy);
    const h2 = Math.sqrt(Math.max(0, R * R - (d / 2) ** 2));
    const mx = (c1.x + c2.x) / 2, my = (c1.y + c2.y) / 2;
    const px = -dy / d * h2, py = dx / d * h2;
    const p1 = { x: mx + px, y: my + py }, p2 = { x: mx - px, y: my - py };
    const d1 = (p1.x - cx)**2 + (p1.y - cy)**2;
    const d2 = (p2.x - cx)**2 + (p2.y - cy)**2;
    return d1 > d2 ? p1 : p2;
  }
  const arcs = centers.map((pt, k) => {
    const prev = centers[(k - 1 + N) % N], next = centers[(k + 1) % N];
    const sp = iconOuterIntersect(pt, prev);
    const ep = iconOuterIntersect(pt, next);
    return { cx: pt.x, cy: pt.y, startAngle: Math.atan2(sp.y - pt.y, sp.x - pt.x), endAngle: Math.atan2(ep.y - pt.y, ep.x - pt.x) };
  });
  c.clearRect(0, 0, w, h);
  c.save();
  c.shadowColor = 'rgba(80,160,255,0.9)'; c.shadowBlur = 4;
  c.strokeStyle = 'rgba(160,215,255,1)'; c.lineWidth = 1;
  c.beginPath();
  c.moveTo(arcs[0].cx + R * Math.cos(arcs[0].startAngle), arcs[0].cy + R * Math.sin(arcs[0].startAngle));
  for (const arc of arcs) c.arc(arc.cx, arc.cy, R, arc.startAngle, arc.endAngle, false);
  c.closePath(); c.stroke(); c.restore();
}

// ─── Controls ─────────────────────────────────────────────────────────────────
// ─── Pre-render + smooth playback ─────────────────────────────────────────────
let isFirstFission   = true;  // first run always uses dip1 mode
let prerenderFrames  = [];   // ImageBitmap[]
let prerenderFracs   = [];   // currentScrubFrac at each frame
let prerenderTimes   = [];   // performance.now() at capture
let prerenderActive  = false;
let prerenderPending = 0;
let prerenderAllDone = false;
let prerenderSlot    = 0;
let _prerenderGen    = 0;    // incremented on reset; invalidates in-flight captures
let playbackRAF      = null;
let playbackStartT   = 0;
let playbackStartRealT     = 0;
let pausedInPrerender      = false;   // paused during prerender playback
let pausedPlaybackElapsed  = 0;       // raw ms elapsed when paused
let _prerenderPauseOffset  = 0;       // cumulative ms spent paused during live recording
let _prerenderPauseStart   = 0;       // wall time when current pause began (0 = not paused)

function captureFrame() {
  if (!prerenderActive) return;
  const slot = prerenderSlot++;
  const gen  = _prerenderGen;
  prerenderFrames.push(null);
  prerenderFracs.push(currentScrubFrac);
  prerenderTimes.push(performance.now() - _prerenderPauseOffset);
  prerenderPending++;
  createImageBitmap(canvas).then(bmp => {
    if (gen !== _prerenderGen) { bmp.close(); prerenderPending--; return; }
    prerenderFrames[slot] = bmp;
    prerenderPending--;
    if (prerenderAllDone && prerenderPending === 0) startPlayback();
  });
}

function markPrerenderDone() {
  if (!prerenderActive || prerenderAllDone) return;
  prerenderAllDone = true;
  if (prerenderPending === 0) startPlayback();
}

function startPlayback() {
  prerenderActive = false;
}

function playbackLoop(now) {
  const n = prerenderFrames.length;
  if (!n) return;

  const speed   = parseFloat(document.getElementById('playbackSpeed').value);
  // Slider is an absolute control: default (1.0) = 1:1 real-time. No floor — fissionTick()
  // (live play) uses the raw slider value, so replay must match it exactly.
  const elapsed = (now - playbackStartRealT) * speed;
  const animEnd = prerenderTimes[n - 1] - prerenderTimes[0];

  // Binary search for the frame whose capture time <= elapsed
  let lo = 0, hi = n - 1;
  while (lo < hi) {
    const mid = (lo + hi + 1) >> 1;
    if (prerenderTimes[mid] - prerenderTimes[0] <= elapsed) lo = mid; else hi = mid - 1;
  }
  const idx = lo;

  if (prerenderFracs[idx] !== undefined) {
    currentScrubFrac = prerenderFracs[idx];
    document.getElementById('scrubSlider').value = scrubVal(currentScrubFrac);
    document.getElementById('scrubPct').textContent = scrubPct(currentScrubFrac);
    renderAtFrac(currentScrubFrac); drawForceViz();
  }

  if (elapsed < animEnd) {
    playbackRAF = requestAnimationFrame(playbackLoop);
  } else {
    // Hold last frame, mark done
    playbackRAF = null;
    document.getElementById('goBtn').textContent = '▶ GO';
    document.getElementById('goBtn').classList.remove('running');
    document.getElementById('replayBtn').disabled = false;
    document.getElementById('scrubReplayBtn').disabled = false;
  }
}

function resetPrerender() {
  _prerenderGen++;  // invalidate any in-flight createImageBitmap promises
  if (playbackRAF) { cancelAnimationFrame(playbackRAF); playbackRAF = null; }
  for (const bmp of prerenderFrames) { if (bmp) bmp.close(); }
  prerenderFrames = []; prerenderFracs = []; prerenderTimes = [];
  prerenderActive = false; prerenderAllDone = false;
  prerenderPending = 0; prerenderSlot = 0;
  pausedInPrerender = false;
  _prerenderPauseOffset = 0; _prerenderPauseStart = 0;
  _hmXfadeStartFrac = -1;
}

document.getElementById('goBtn').addEventListener('click', () => {
  const btn = document.getElementById('goBtn');

  // ── PAUSE: freeze everything in place ────────────────────────────────────
  if (btn.textContent === '❙ ❙') {
    logAction('Paused');
    if (neutronRAF) { cancelAnimationFrame(neutronRAF); neutronRAF = null; }
    if (playbackRAF) {
      pausedPlaybackElapsed = performance.now() - playbackStartRealT;
      pausedInPrerender = true;
      cancelAnimationFrame(playbackRAF);
      playbackRAF = null;
    } else {
      pausedInPrerender = false;
      // Track wall time so we can subtract the pause gap from captured timestamps
      if (prerenderActive) _prerenderPauseStart = performance.now();
    }
    btn.textContent = '▶ GO';
    btn.classList.remove('running');
    return;
  }

  // ── GO: resume from exact pause point, or start fresh ────────────────────

  // Resume prerender playback
  if (pausedInPrerender) {
    pausedInPrerender  = false;
    playbackStartRealT = performance.now() - pausedPlaybackElapsed;
    btn.textContent = '❙ ❙';
    btn.classList.add('running');
    playbackRAF = requestAnimationFrame(playbackLoop);
    return;
  }

  // Resume main fission animation (paused mid-flight)
  if (neutronState === 'flying' || neutronState === 'fission') {
    const frac = currentScrubFrac;
    const now  = performance.now();
    // Accumulate pause duration so captured timestamps stay gapless
    if (_prerenderPauseStart > 0) {
      _prerenderPauseOffset += now - _prerenderPauseStart;
      _prerenderPauseStart = 0;
    }
    if (frac < NEUTRON_FRAC) {
      const nf = frac / NEUTRON_FRAC;
      neutronX    = (PARTICLE_RADIUS + 60) + nf * (neutronImpactX() - (PARTICLE_RADIUS + 60));
      neutronY    = animParent.cy;
      neutronLast = 0;
    } else {
      const ff = (frac - NEUTRON_FRAC) / (1 - NEUTRON_FRAC);
      // Use FISS_STOP_T (not ANIM_T_END) — matches the frac→t mapping in renderAtFrac.
      // Using ANIM_T_END here over-computes staticFissT past FISS_STOP_T for frac > ~0.74,
      // causing fissionTick to immediately fire its completion branch on the first tick.
      staticFissT = Math.min(FISS_STOP_T, PH1_END + ff * (FISS_STOP_T - PH1_END));
      let elapsedAtPos;
      if (staticFissT <= PH2_END) {
        elapsedAtPos = (staticFissT - PH1_END) / (PH2_END - PH1_END) * SHAKE_DURATION;
      } else {
        elapsedAtPos = SHAKE_DURATION + (staticFissT - PH2_END) / (ANIM_T_END - PH2_END) * NORMAL_DURATION;
      }
      const pbSpeed = parseFloat(document.getElementById('playbackSpeed').value);
      staticFissStart = now - elapsedAtPos / pbSpeed;
    }
    btn.textContent = '❙ ❙';
    btn.classList.add('running');
    neutronRAF = requestAnimationFrame(frac < NEUTRON_FRAC ? neutronTick : fissionTick);
    return;
  }

  // Fresh start — choose fission axis before wobble so elongation and split
  // always go in the same direction.
  if (neutronRAF) { cancelAnimationFrame(neutronRAF); neutronRAF = null; }
  resetPrerender();
  prerenderActive  = true;
  prerenderAllDone = false;

  logAction('Pressed Go (FISSION)');
  heatmapDirty    = true;
  // Reset the fission axis so the force viz panel shows a neutral horizontal
  // pair of arrows during the neutron's flight — the actual axis is chosen
  // when the neutron impacts the nucleus (in neutronTick).
  staticFissAngle = 0;
  genFissionNeutrons();
  neutronState = 'flying';
  neutronX     = PARTICLE_RADIUS + 60;
  neutronY     = animParent.cy;
  neutronLast  = 0;
  egCtx.clearRect(0, 0, egCanvas.width, egCanvas.height);
  maxRevealedFrac = 0;
  updatePhaseTimeline();
  egZoomStart = 0; egZoomEnd = 1;  // will be narrowed to 0.70 if stable, once wobbleMode is known at impact
  document.getElementById('scrubSlider').max = 1000;
  document.getElementById('scrubSlider').disabled = false;
  document.getElementById('scrubBar').classList.add('visible');
  document.getElementById('scrubSlider').value = 0;
  document.getElementById('scrubPct').textContent = '0';
  document.getElementById('replayBtn').disabled = false;
  document.getElementById('scrubReplayBtn').disabled = false;
  document.getElementById('nucleusWheel').classList.add('locked');
  btn.textContent = '❙ ❙';
  btn.classList.add('running');
  neutronRAF = requestAnimationFrame(neutronTick);
});

// ─── Nucleus rotation ────────────────────────────────────────────────────────
// Click + drag the parent nucleus while idle to rotate it. Horizontal drag
// rotates around the vertical axis (left/right swing); vertical drag rotates
// around the horizontal axis (top/bottom tilt). Trackball convention — the
// surface follows the cursor. As particles' z flips sign, drawParticles'
// z-sort swaps them between the front and back of the rendered nucleus.
let nucleusDrag    = null;  // { lastX, lastY } during an active fission-tab rotate

function clientToWorld(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  const sx = clientX - rect.left, sy = clientY - rect.top;
  const W = canvas.width, H = canvas.height;
  return { x: (sx - W/2) / viewZoom + W/2, y: (sy - H/2) / viewZoom + H/2 };
}

function moveAnimParent(newCx, newCy) {
  const dx = newCx - animParent.cx;
  const dy = newCy - animParent.cy;
  animParent.cx = newCx;
  animParent.cy = newCy;
  for (const p of animParent.particles) { p.x += dx; p.y += dy; }
}

// Accumulated rotation during an active nucleus drag — used by the force viz
// panel to rotate its arrow pair in real time. Reset to 0 on mouseup so the
// panel snaps back to a horizontal axis when the user releases the nucleus.
let dragRotY = 0, dragRotX = 0;

function pickNucleus(clientX, clientY) {
  if (!animParent) return false;
  const rect = canvas.getBoundingClientRect();
  const sx = clientX - rect.left, sy = clientY - rect.top;
  const W = canvas.width, H = canvas.height;
  // Inverse of renderAtFrac's canvas transform (translate, scale, translate).
  const fvShift = (arrowMode > 0)
    ? -(forceVizPanelEl.offsetWidth + 20) / 2
    : 0;
  const _tbH  = document.getElementById('toolbar').offsetHeight;
  const _sbEl = document.getElementById('scrubBar');
  const _sbH  = _sbEl.classList.contains('visible') ? _sbEl.offsetHeight : 0;
  const _centerY = (_tbH + H - _sbH) / 2;
  const wx = (sx - W/2 - fvShift) / viewZoom + W/2;
  const wy = (sy - _centerY) / viewZoom + H/2;
  const dx = wx - animParent.cx, dy = wy - animParent.cy;
  return dx*dx + dy*dy <= animParent.sphereR * animParent.sphereR;
}

function rotateNucleusY(deltaTheta) {
  if (!animParent) return;
  const cx = animParent.cx;
  const c = Math.cos(deltaTheta), s = Math.sin(deltaTheta);
  for (const p of animParent.particles) {
    const lx = p.x - cx;
    const lz = p.z;
    p.x = cx + lx * c + lz * s;
    p.z = -lx * s + lz * c;
  }
}

function rotateNucleusX(deltaTheta) {
  if (!animParent) return;
  const cy = animParent.cy;
  const c = Math.cos(deltaTheta), s = Math.sin(deltaTheta);
  for (const p of animParent.particles) {
    const ly = p.y - cy;
    const lz = p.z;
    p.y = cy + ly * c + lz * s;
    p.z = -ly * s + lz * c;
  }
}

function canRotateNucleus() {
  return neutronState === 'idle' && !!animParent;
}

canvas.addEventListener('mousedown', (e) => {
  // Fission tab: rotate nucleus
  if (!canRotateNucleus()) return;
  if (!pickNucleus(e.clientX, e.clientY)) return;
  nucleusDrag = { lastX: e.clientX, lastY: e.clientY };
  canvas.style.cursor = 'grabbing';
  e.preventDefault();
});

canvas.addEventListener('mousemove', (e) => {
  if (nucleusDrag) return;  // window listener handles the drag
  canvas.style.cursor = (canRotateNucleus() && pickNucleus(e.clientX, e.clientY))
    ? 'grab'
    : '';
});

window.addEventListener('mousemove', (e) => {
  if (!nucleusDrag) return;
  const dx = e.clientX - nucleusDrag.lastX;
  const dy = e.clientY - nucleusDrag.lastY;
  nucleusDrag.lastX = e.clientX;
  nucleusDrag.lastY = e.clientY;
  const radPerPx = (Math.PI * 2) / 600;  // ~600 px per full turn, both axes
  if (dx) rotateNucleusY(dx * radPerPx);
  if (dy) rotateNucleusX(dy * radPerPx);
  // Track the drag's accumulated rotation so the force viz panel can mirror
  // it. Reset to 0 on mouseup (below) so the arrows snap back to horizontal.
  dragRotY += dx * radPerPx;
  dragRotX += dy * radPerPx;
  drawStaticFrame();
  drawForceViz();
});

window.addEventListener('mouseup', () => {
  if (!nucleusDrag) return;
  nucleusDrag = null;
  dragRotY = 0;
  dragRotX = 0;
  canvas.style.cursor = '';
  drawForceViz();   // snap arrows back to horizontal
});

// ─── Energy model ─────────────────────────────────────────────────────────────
// NO sharp changes anywhere — every transition is cosine-smooth.
//   BEFORE                    : KE flat 0.62, EIE flat 0.38
//   Neutron hit               : +0.006 KE step (very tiny, intentional)
//   DURING  (wobbleSignal)    : KE oscillates keHigh↔keLow per mode
//   AFTER fission             : symmetric S-curve KE 0.15 → 0.72
//   AFTER stable (no fission) : smooth return KE → 0.62
function computeEnergy(frac) {
  if (frac < NEUTRON_FRAC) return { ke: 0.45, eie: 0.55 };

  const ff = (frac - NEUTRON_FRAC) / (1 - NEUTRON_FRAC);
  const t  = PH1_END + ff * (ANIM_T_END - PH1_END);

  // Energy-only phase boundary: stretches the wobble descent so KE minimum
  // falls at frac ≈ 0.580 (frame 580) instead of the animation's PH2_END ≈ 0.553.
  const E_PH2 = 0.381;

  if (t <= E_PH2) {
    const ph2        = (t - PH1_END) / (E_PH2 - PH1_END);
    const normWobble = wobbleSignal(ph2, wobbleMode);
    // keHigh: circular baseline drifts down gently (0.45 → 0.39)
    // keLow:  oblong floor (0.45 → 0.15).  Polynomial f = 2ph2−ph2² has f(0)=0, f(1)=1,
    //         f'(1)=0 — so the descent flattens to zero slope right at the minimum,
    //         rounding the bottom of the dip.
    const keHigh = 0.45 - 0.06 * ph2;
    // stable: per-cycle amplitude table — step at cycle boundaries is invisible because
    // normWobble=0 there (keLow has no effect when the nucleus is at rest between cycles).
    const stableAmps = [0.20, 0.40, 0.20];  // cycle 1: small, cycle 2: large, cycle 3: small
    const stableCycle = ph2 < 0.2 ? 0 : ph2 < 0.4 ? 1 : 2;
    const keLow  = wobbleMode === 'stable'
                   ? 0.45 - stableAmps[stableCycle]
                   : 0.45 - 0.30 * (2 * ph2 - ph2 * ph2);            // fission: → 0.15, zero slope at ph2=1
    const t01 = (1 - Math.cos(normWobble * Math.PI)) / 2;
    const ke  = keHigh - (keHigh - keLow) * t01;
    return { ke, eie: 1 - ke };
  }

  const ph3 = (t - E_PH2) / (ANIM_T_END - E_PH2);
  if (wobbleMode === 'stable') {
    // Flat after the 3rd wobble ends — nucleus at rest, no energy change
    return { ke: 0.39, eie: 0.61 };
  }
  // Fission: KE stays flat at 0.15 until frame 680, then Coulomb ramp begins.
  // Daughters are created at ANIM_T_END but fly apart — KE only rises visibly
  // once they've cleared the strong-force well (~frame 680).
  const KE_RAMP_START = 0.580;
  if (frac < KE_RAMP_START) return { ke: 0.15, eie: 0.85 };
  const rph = (frac - KE_RAMP_START) / (1.0 - KE_RAMP_START);
  const s  = 1 - Math.exp(-rph * rph * 6.0);
  const ke = 0.15 + 0.65 * s;       // 0.15 → ~0.80, smooth U-shaped rise
  return { ke, eie: Math.max(0.05, 1 - ke) };
}


function drawEnergyGraph() {
  const W = egCanvas.width, H = egCanvas.height;
  const PAD = 8;
  const gH  = H - PAD * 2;
  const zs = egZoomStart, ze = egZoomEnd, zLen = ze - zs;

  egCtx.clearRect(0, 0, W, H);

  const LIGHT = document.body.classList.contains('screenshot-mode');
  const _gridCol  = LIGHT ? 'rgba(0,0,0,0.10)' : 'rgba(255,255,255,0.06)';
  const _phaseCol = LIGHT ? 'rgba(0,0,0,0.25)' : 'rgba(255,200,50,0.25)';
  const _axisCol  = LIGHT ? 'rgba(0,0,0,0.55)' : 'rgba(0,200,255,0.35)';
  const _axisGlow = LIGHT ? 'rgba(0,0,0,0)'    : 'rgba(0,200,255,0.5)';
  const _ieCol    = LIGHT ? '#777'             : '#7b6fff';
  const _ieGlow   = LIGHT ? 'rgba(0,0,0,0)'    : 'rgba(120,100,255,0.9)';
  const _keCol    = LIGHT ? '#000'             : '#ff3a6e';
  const _keGlow   = LIGHT ? 'rgba(0,0,0,0)'    : 'rgba(255,45,100,0.9)';
  const _selFill  = LIGHT ? 'rgba(0,0,0,0.08)' : 'rgba(120,100,255,0.12)';
  const _selStk   = LIGHT ? 'rgba(0,0,0,0.4)'  : 'rgba(120,100,255,0.6)';

  // Faint horizontal grid at 25 / 50 / 75%
  egCtx.strokeStyle = _gridCol;
  egCtx.lineWidth = 1;
  for (let i = 1; i <= 3; i++) {
    const y = PAD + gH * (1 - i / 4);
    egCtx.beginPath(); egCtx.moveTo(0, y); egCtx.lineTo(W, y); egCtx.stroke();
  }

  // Dashed phase-boundary markers mapped into zoom window
  const ph2EndFrac = NEUTRON_FRAC +
    ((PH2_END - PH1_END) / (ANIM_T_END - PH1_END)) * (1 - NEUTRON_FRAC);
  const DURING_END_FRAC = 0.742;  // daughters created + KE starts ramping (frame 742)
  egCtx.setLineDash([2, 4]);
  egCtx.strokeStyle = _phaseCol;
  egCtx.lineWidth = 1;
  for (const fx of [NEUTRON_FRAC, ph2EndFrac, DURING_END_FRAC]) {
    if (fx < zs || fx > ze) continue;
    const x = ((fx - zs) / zLen) * W;
    egCtx.beginPath(); egCtx.moveTo(x, PAD); egCtx.lineTo(x, H - PAD); egCtx.stroke();
  }
  egCtx.setLineDash([]);

  // Advance high-water mark then compute reveal and cursor pixels
  maxRevealedFrac = Math.max(maxRevealedFrac, currentScrubFrac);
  const revealFrac = Math.max(zs, Math.min(ze, maxRevealedFrac));
  const revealPx   = Math.round((revealFrac - zs) / zLen * (W - 1));
  const curFrac = Math.max(zs, Math.min(ze, currentScrubFrac));
  const curPx   = Math.round((curFrac - zs) / zLen * (W - 1));

  // Bottom axis — always visible
  egCtx.save();
  egCtx.shadowBlur  = LIGHT ? 0 : 6;
  egCtx.shadowColor = _axisGlow;
  egCtx.strokeStyle = _axisCol;
  egCtx.lineWidth   = 1;
  egCtx.beginPath(); egCtx.moveTo(0, H - PAD); egCtx.lineTo(W, H - PAD); egCtx.stroke();
  egCtx.restore();

  // Neon line: full graph always shown, cursor marks current position
  function plotLine(color, glowColor, getVal, dash = []) {
    const ys = new Float32Array(W);
    for (let px = 0; px < W; px++) {
      const frac = zs + (px / (W - 1)) * zLen;
      ys[px] = PAD + gH * (1 - getVal(computeEnergy(frac)));
    }
    function strokeSeg(fromPx, toPx, lw, blur, alpha) {
      if (fromPx > toPx) return;
      egCtx.save();
      egCtx.setLineDash(dash);
      egCtx.globalAlpha = alpha;
      egCtx.shadowBlur  = blur;
      egCtx.shadowColor = glowColor;
      egCtx.strokeStyle = color;
      egCtx.lineWidth   = lw;
      egCtx.beginPath();
      for (let px = fromPx; px <= toPx; px++) {
        if (px === fromPx) egCtx.moveTo(px, ys[px]); else egCtx.lineTo(px, ys[px]);
      }
      egCtx.stroke();
      egCtx.restore();
    }
    // Draw up to the high-water mark — traces live, stays drawn after scrub
    strokeSeg(0, revealPx, 8,  28, 0.25);
    strokeSeg(0, revealPx, 3,  10, 0.55);
    strokeSeg(0, revealPx, 1.5, 0, 1.00);
  }

  plotLine(_ieCol, _ieGlow, e => e.eie, [5, 4]);  // Energy in Fields
  plotLine(_keCol, _keGlow, e => e.ke);            // Energy of Motion

  // Drag-to-zoom selection overlay
  if (egDragStartPx !== null && egDragCurPx !== null) {
    const x0 = Math.min(egDragStartPx, egDragCurPx);
    const x1 = Math.max(egDragStartPx, egDragCurPx);
    egCtx.fillStyle   = _selFill;
    egCtx.fillRect(x0, 0, x1 - x0, H);
    egCtx.strokeStyle = _selStk;
    egCtx.lineWidth   = 1;
    egCtx.strokeRect(x0, 0, x1 - x0, H);
  }

  // Cursor — neon white with glow (black in light mode)
  const cx = curPx;
  egCtx.save();
  egCtx.shadowBlur  = LIGHT ? 0 : 8;
  egCtx.shadowColor = LIGHT ? 'rgba(0,0,0,0)' : 'rgba(255,255,255,0.7)';
  egCtx.strokeStyle = LIGHT ? 'rgba(0,0,0,0.75)' : 'rgba(255,255,255,0.85)';
  egCtx.lineWidth   = 1;
  egCtx.beginPath(); egCtx.moveTo(cx, 0); egCtx.lineTo(cx, H); egCtx.stroke();
  egCtx.restore();
}

// ─── Energy graph drag-to-zoom ────────────────────────────────────────────────
egCanvas.addEventListener('mousedown', e => {
  egDragStartPx = e.offsetX;
  egDragCurPx   = e.offsetX;
  e.preventDefault();
});
egCanvas.addEventListener('mousemove', e => {
  if (egDragStartPx === null) return;
  egDragCurPx = e.offsetX;
  drawEnergyGraph();
});
egCanvas.addEventListener('mouseup', e => {
  if (egDragStartPx === null) return;
  const x0 = Math.min(egDragStartPx, e.offsetX);
  const x1 = Math.max(egDragStartPx, e.offsetX);
  egDragStartPx = null; egDragCurPx = null;
  const W = egCanvas.width;
  if (x1 - x0 < 4) { drawEnergyGraph(); return; }  // too small — ignore
  const prevStart = egZoomStart, zLen = egZoomEnd - egZoomStart;
  egZoomStart = prevStart + (x0 / W) * zLen;
  egZoomEnd   = prevStart + (x1 / W) * zLen;
  drawEnergyGraph();
  updateGraphBtn();
});
egCanvas.addEventListener('mouseleave', e => {
  if (egDragStartPx !== null) { egDragStartPx = null; egDragCurPx = null; drawEnergyGraph(); }
});
egCanvas.addEventListener('dblclick', () => {
  egZoomStart = 0; egZoomEnd = 1;
  drawEnergyGraph();
  updateGraphBtn();
});

// ─── Tab switching ────────────────────────────────────────────────────────────
document.querySelectorAll('.tab-btn[data-tab]').forEach(btn => {
  btn.addEventListener('click', () => applyTab(btn.dataset.tab));
});

// ─── Themes ───────────────────────────────────────────────────────────────────
const THEMES = {
  A: {
    accent1:'#ff2d78', accent1dim:'rgba(255,45,120,0.25)', accent1glow:'rgba(255,45,120,0.55)',
    accent2:'#1a6eff', accent2dim:'rgba(26,110,255,0.18)',  accent2glow:'rgba(26,110,255,0.45)',
    uibg:'rgba(8,6,24,0.38)', uiborder:'rgba(255,255,255,0.07)',
    textdim:'rgba(220,215,255,0.55)', textbright:'rgba(240,235,255,0.92)',
    bg:'#05040f',
  },
  B: {
    accent1:'#ff2d78', accent1dim:'rgba(255,45,120,0.22)', accent1glow:'rgba(255,45,120,0.5)',
    accent2:'#bd00ff', accent2dim:'rgba(189,0,255,0.18)',  accent2glow:'rgba(189,0,255,0.42)',
    uibg:'rgba(8,4,22,0.42)', uiborder:'rgba(189,0,255,0.14)',
    textdim:'rgba(230,200,255,0.52)', textbright:'rgba(248,232,255,0.92)',
    bg:'#05030f',
  },
  C: {
    accent1:'#ff2d78', accent1dim:'rgba(255,45,120,0.22)', accent1glow:'rgba(255,45,120,0.5)',
    accent2:'#00f5e0', accent2dim:'rgba(0,245,224,0.15)',  accent2glow:'rgba(0,245,224,0.4)',
    uibg:'rgba(6,4,20,0.40)', uiborder:'rgba(255,45,120,0.12)',
    textdim:'rgba(220,210,255,0.52)', textbright:'rgba(245,235,255,0.92)',
    bg:'#04030e',
  },
};

function applyTheme(key) {
  const t = THEMES[key];
  const r = document.documentElement.style;
  r.setProperty('--accent1',      t.accent1);
  r.setProperty('--accent1-dim',  t.accent1dim);
  r.setProperty('--accent1-glow', t.accent1glow);
  r.setProperty('--accent2',      t.accent2);
  r.setProperty('--accent2-dim',  t.accent2dim);
  r.setProperty('--accent2-glow', t.accent2glow);
  r.setProperty('--ui-bg',        t.uibg);
  r.setProperty('--ui-border',    t.uiborder);
  r.setProperty('--text-dim',     t.textdim);
  r.setProperty('--text-bright',  t.textbright);
  document.body.style.background = t.bg;
  document.body.classList.remove('screenshot-mode');
  document.getElementById('themeLight').classList.remove('active');
  document.querySelectorAll('.theme-btn:not(#themeLight):not([data-theme="L"])').forEach(b => b.classList.remove('active'));
  document.getElementById('theme'+key).classList.add('active');
  drawStaticFrame();
  drawForceViz();
}
document.getElementById('themeA').addEventListener('click', () => applyTheme('A'));
document.getElementById('themeB').addEventListener('click', () => applyTheme('B'));
document.getElementById('themeC').addEventListener('click', () => applyTheme('C'));
function getBgColor() { return document.getElementById('bgColorPicker').value; }
document.getElementById('bgColorPicker').addEventListener('input', function() {
  document.documentElement.style.setProperty('--bg-color', this.value);
  drawStaticFrame(); drawForceViz();
});
document.getElementById('themeLight').addEventListener('click', () => {
  const on = document.body.classList.toggle('screenshot-mode');
  document.getElementById('themeLight').classList.toggle('active', on);
  drawStaticFrame();
  drawForceViz();
});
applyTheme('A');

// ─── Init ─────────────────────────────────────────────────────────────────────
setParticleWheelActive(document.querySelector('.awheel-item[data-pmode="particles"]'));
drawSpeedLines();
applyTab('fission');
initNuclei();

// Startup benchmark — measure actual gradient render cost and set initial quality.
// Thresholds are per 100 particles; the full nucleus is ~220 so multiply by ~2.2
// to project real frame cost.
//   < 3ms / 100p → hi-res   (< ~7ms projected — fine at 60fps)
//   3–6ms / 100p → detailed (~7–13ms projected — reduced effects)
//   > 6ms / 100p → simple   (> ~13ms projected — minimal rendering)
(function _startupBenchmark() {
  const ms = _runPerfBenchmark();
  if (ms > 6) {
    const hiOpt = document.querySelector('#qualitySelect option[value="hi-res"]');
    if (hiOpt) hiOpt.remove();
    _applyQuality('simple');
  } else if (ms > 3) {
    _applyQuality('detailed');
  }
  // else stays 'hi-res' (default)
}());

drawStaticFrame();
if (showParticles && !idleParticleRAF) idleParticleLoop();

// ── Dev recording menu (right-click replay button) ───────────────────────────
(function() {
  const menu = document.createElement('div');
  menu.style.cssText = 'position:fixed;display:none;z-index:9999;background:#1a1a2e;border:1px solid rgba(255,255,255,0.2);border-radius:8px;padding:4px 0;min-width:160px;box-shadow:0 4px 16px rgba(0,0,0,0.6);font-family:Lexend,sans-serif;font-size:13px;';
  document.body.appendChild(menu);

  function menuItem(label) {
    const el = document.createElement('div');
    el.textContent = label;
    el.style.cssText = 'padding:8px 16px;cursor:pointer;color:rgba(255,255,255,0.85);white-space:nowrap;';
    el.addEventListener('mouseenter', () => el.style.background = 'rgba(255,255,255,0.08)');
    el.addEventListener('mouseleave', () => el.style.background = '');
    menu.appendChild(el);
    return el;
  }

  const recItem = menuItem('⏺  Export Replay');

  recItem.addEventListener('click', () => {
    menu.style.display = 'none';
    if (!prerenderFrames.length) return;
    const chunks = [];
    const stream = canvas.captureStream(30);
    const recorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
    recorder.ondataavailable = e => { if (e.data.size) chunks.push(e.data); };
    recorder.onstop = () => {
      const url = URL.createObjectURL(new Blob(chunks, { type: 'video/webm' }));
      const a = document.createElement('a'); a.href = url; a.download = 'replay.webm'; a.click();
      URL.revokeObjectURL(url);
    };
    recorder.start();
    doReplay();
    // Poll until playbackRAF goes null (replay ended)
    requestAnimationFrame(function poll() {
      if (playbackRAF !== null) { requestAnimationFrame(poll); return; }
      setTimeout(() => recorder.stop(), 200);
    });
  });

  document.getElementById('replayBtn').addEventListener('contextmenu', e => {
    e.preventDefault();
    menu.style.display = 'block';
    menu.style.left = e.clientX + 'px';
    menu.style.top  = e.clientY + 'px';
  });
  document.addEventListener('click', () => menu.style.display = 'none');
})();

// ── Bug report button ─────────────────────────────────────────────────────
function getBugState() {
  return {
    sim:          'v13',
    tab:          currentTab,
    neutronState,
    wobbleMode,
    staticFissAngle: +staticFissAngle.toFixed(4),
    dragRotY:     +dragRotY.toFixed(4),
    dragRotX:     +dragRotX.toFixed(4),
    actionLog:    actionLog.slice(),
  };
}
document.getElementById('bugReportBtn').addEventListener('click', e => {
  e.preventDefault();
  const state = encodeURIComponent(JSON.stringify(getBugState()));
  const url   = `https://ghostoutfit.github.io/protons/dev/bug-report.html?sim=fission&sourceUrl=${encodeURIComponent(location.href)}&state=${state}`;
  document.getElementById('bugModalFrame').src = url;
  document.getElementById('bugModal').style.display = 'flex';
});
function closeBugModal() {
  document.getElementById('bugModal').style.display = 'none';
  document.getElementById('bugModalFrame').src = 'about:blank';
}
document.getElementById('bugModal').addEventListener('click', e => {
  if (e.target === document.getElementById('bugModal')) closeBugModal();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && document.getElementById('bugModal').style.display === 'flex') closeBugModal();
});
</script>
