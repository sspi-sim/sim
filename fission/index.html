<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fission Digital Model</title>
<link rel="icon" type="image/png" href="images/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ── Variables ─────────────────────────────────────────────────────────── */
  :root {
    --accent1:      #ff2d78;
    --accent1-dim:  rgba(255,45,120,0.22);
    --accent1-glow: rgba(255,45,120,0.55);
    --accent2:      #1a6eff;
    --accent2-dim:  rgba(26,110,255,0.18);
    --accent2-glow: rgba(26,110,255,0.45);
    --ui-bg:        rgba(8,6,24,0.42);
    --ui-border:    rgba(255,255,255,0.07);
    --text-dim:     rgba(220,215,255,0.55);
    --text-bright:  rgba(240,235,255,0.92);
  }

  /* ── Reset & base ──────────────────────────────────────────────────────── */
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #05040f;
    color: var(--text-bright);
    font-family: 'Lexend', sans-serif;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
  }
  button, input, select {
    font-family: 'Lexend', sans-serif;
  }

  /* ── Full-viewport canvas ──────────────────────────────────────────────── */
  #canvas {
    position: fixed;
    top: 0; left: 0;
    display: block;
    z-index: 0;
  }

  /* ── Toolbar — floating glass overlay ─────────────────────────────────── */
  #toolbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 10;
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 10px 20px 10px;
    background: var(--ui-bg);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    box-shadow: 0 4px 24px rgba(0,0,0,0.55);
  }

  .toolbar-row {
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }

  /* ── Tab bar ───────────────────────────────────────────────────────────── */
  #tabBar {
    display: flex;
    gap: 8px;
    padding-bottom: 2px;
  }
  .tab-btn {
    padding: 4px 14px;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 8px;
    color: rgba(255,255,255,0.18);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: none;
    text-shadow: none;
    font-family: inherit;
  }
  /* Navigation tabs (links to other sims) inherit tab-btn appearance */
  a.tab-btn { text-decoration: none; cursor: pointer; }

  .tab-btn:hover {
    color: rgba(255,255,255,0.38);
    border-color: rgba(255,255,255,0.12);
  }
  .tab-btn.active {
    color: #e8e4ff;
    border-color: #7b6fff;
    background: rgba(123,111,255,0.12);
    box-shadow:
      inset 0 0 6px rgba(123,111,255,0.15),
      0 0 2px #7b6fff,
      0 0 8px #7b6fff,
      0 0 18px rgba(123,111,255,0.45),
      0 0 40px rgba(123,111,255,0.15),
      0 0 70px rgba(123,111,255,0.08);
    text-shadow:
      0 0 4px #e8e4ff,
      0 0 10px #7b6fff,
      0 0 22px rgba(123,111,255,0.6),
      0 0 44px rgba(123,111,255,0.25);
  }

  /* ── Buttons ───────────────────────────────────────────────────────────── */
  .btn {
    padding: 4px 14px;
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 8px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    background: transparent;
    color: rgba(255,255,255,0.18);
    box-shadow: none;
    text-shadow: none;
    white-space: nowrap;
    font-family: inherit;
  }
  .btn:hover {
    color: rgba(255,255,255,0.38);
    border-color: rgba(255,255,255,0.12);
  }

  /* Go idle (▶) — accent2 themed */
  #goBtn {
    border-color: var(--accent2);
    color: rgba(255,255,255,0.5);
    background: var(--accent2-dim);
    box-shadow:
      inset 0 0 6px var(--accent2-dim),
      0 0 2px var(--accent2),
      0 0 8px var(--accent2),
      0 0 18px var(--accent2-glow),
      0 0 40px var(--accent2-dim),
      0 0 70px var(--accent2-dim);
    text-shadow:
      0 0 4px rgba(255,255,255,0.5),
      0 0 10px var(--accent2),
      0 0 22px var(--accent2-glow),
      0 0 44px var(--accent2-dim);
    display: flex; align-items: center; justify-content: center;
  }
  #goBtn:hover { background: var(--accent2-glow); }
  /* Go running (❙ ❙) — red */
  #goBtn.running {
    border-color: #ff4040;
    color: rgba(255,255,255,0.5);
    background: rgba(255,40,40,0.15);
    box-shadow:
      inset 0 0 6px rgba(255,40,40,0.2),
      0 0 2px #ff4040,
      0 0 8px #ff4040,
      0 0 18px rgba(255,40,40,0.5),
      0 0 40px rgba(255,40,40,0.2);
    text-shadow: 0 0 4px rgba(255,255,255,0.5), 0 0 10px #ff4040, 0 0 22px rgba(255,80,80,0.6);
  }
  #goBtn.running:hover { background: rgba(255,40,40,0.3); }

  /* Clear — accent2 themed */
  #clearBtn {
    border-color: var(--accent2);
    color: rgba(255,255,255,0.5);
    background: var(--accent2-dim);
    box-shadow:
      inset 0 0 6px var(--accent2-dim),
      0 0 2px var(--accent2),
      0 0 8px var(--accent2),
      0 0 18px var(--accent2-glow),
      0 0 40px var(--accent2-dim);
    text-shadow:
      0 0 4px rgba(255,255,255,0.5),
      0 0 10px var(--accent2),
      0 0 22px var(--accent2-glow);
  }
  #clearBtn:hover { background: var(--accent2-glow); }

  /* Go / Replay / New — squished symbol buttons */
  #goBtn, #replayBtn, #newBtn { padding: 8px 28px; font-size: 22px; letter-spacing: 2px; }
  #goBtn, #replayBtn { font-size: 24px; letter-spacing: 0; padding: 7px 0; width: 90px; line-height: 1; }

  /* Replay — same red as Stop */
  #replayBtn {
    border-color: #ff4040;
    color: rgba(255,255,255,0.5);
    background: rgba(255,40,40,0.15);
    box-shadow:
      inset 0 0 6px rgba(255,40,40,0.2),
      0 0 2px #ff4040,
      0 0 8px #ff4040,
      0 0 18px rgba(255,40,40,0.5),
      0 0 40px rgba(255,40,40,0.2);
    text-shadow: 0 0 4px rgba(255,255,255,0.5), 0 0 10px #ff4040, 0 0 22px rgba(255,80,80,0.6);
  }
  #replayBtn:hover { background: rgba(255,40,40,0.3); }

  /* Mini replay in scrub bar — same red, default small size */
  #scrubReplayBtn {
    font-size: 32px;
    border-color: #ff4040;
    color: rgba(255,255,255,0.5);
    background: rgba(255,40,40,0.15);
    box-shadow:
      inset 0 0 4px rgba(255,40,40,0.2),
      0 0 2px #ff4040,
      0 0 6px #ff4040,
      0 0 14px rgba(255,40,40,0.4);
    text-shadow: 0 0 4px rgba(255,255,255,0.5), 0 0 8px #ff4040;
  }
  #scrubReplayBtn:hover { background: rgba(255,40,40,0.3); }
  #scrubReplayBtn:disabled {
    background: transparent;
    border-color: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.18);
    box-shadow: none;
    text-shadow: none;
    cursor: not-allowed;
  }

  #replayBtn:disabled {
    background: transparent;
    border-color: rgba(255,255,255,0.07);
    color: rgba(255,255,255,0.18);
    box-shadow: none;
    text-shadow: none;
    cursor: not-allowed;
  }

  /* ========================================
     BUTTON GROUPS — stacked option pickers
     ======================================== */
  .awheel-item {
    display: block;
    padding: 2px 12px;
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 5px;
    background: transparent;
    color: rgba(255,255,255,0.15);
    font-size: 10px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    text-align: left;
    white-space: nowrap;
    letter-spacing: 0.5px;
    transition: color 0.15s, border-color 0.15s, background 0.15s,
                box-shadow 0.15s, text-shadow 0.15s,
                opacity 0.18s ease, transform 0.22s ease;
  }
  .awheel-item:hover:not(.active) {
    color: var(--accent2);
    border-color: var(--accent2);
    background: var(--accent2-dim);
    box-shadow:
      0 0 4px var(--accent2),
      0 0 12px var(--accent2-glow),
      0 0 26px var(--accent2-dim);
    text-shadow:
      0 0 6px var(--accent2),
      0 0 14px var(--accent2-glow);
  }
  .awheel-item.active {
    color: var(--accent2);
    border-color: var(--accent2);
    background: var(--accent2-dim);
    box-shadow:
      0 0 3px var(--accent2),
      0 0 9px var(--accent2-glow),
      0 0 20px var(--accent2-dim);
    text-shadow:
      0 0 5px var(--accent2),
      0 0 12px var(--accent2-glow);
  }

  /* New — neon pink, matches Go */
  #newBtn {
    border-color: var(--accent1);
    color: rgba(255,255,255,0.5);
    background: var(--accent1-dim);
    box-shadow:
      inset 0 0 6px var(--accent1-dim),
      0 0 2px var(--accent1),
      0 0 8px var(--accent1),
      0 0 18px var(--accent1-glow),
      0 0 40px var(--accent1-dim),
      0 0 70px var(--accent1-dim);
    text-shadow:
      0 0 4px rgba(255,255,255,0.5),
      0 0 10px var(--accent1),
      0 0 22px var(--accent1-glow),
      0 0 44px var(--accent1-dim);
  }
  #newBtn:hover {
    background: var(--accent1-glow);
    box-shadow:
      inset 0 0 10px var(--accent1-glow),
      0 0 4px var(--accent1),
      0 0 14px var(--accent1),
      0 0 28px var(--accent1-glow),
      0 0 60px var(--accent1-dim),
      0 0 100px var(--accent1-dim);
  }

  /* ── Sliders ───────────────────────────────────────────────────────────── */
  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    height: 4px;
    border-radius: 3px;
    background: rgba(255,255,255,0.10);
    box-shadow:
      0 0 4px var(--accent2),
      0 0 12px var(--accent2-glow),
      0 0 28px var(--accent2-dim);
    outline: none;
    cursor: pointer;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 10px;
    height: 24px;
    border-radius: 3px;
    background: var(--accent2);
    border: none;
    box-shadow:
      0 0 3px var(--accent2),
      0 0 10px var(--accent2-glow),
      0 0 24px var(--accent2-dim),
      0 0 44px var(--accent2-dim);
    cursor: grab;
    transition: box-shadow 0.15s;
  }
  input[type="range"]::-webkit-slider-thumb:active {
    cursor: grabbing;
    box-shadow:
      0 0 4px var(--accent2),
      0 0 18px var(--accent2-glow),
      0 0 40px var(--accent2-dim),
      0 0 70px var(--accent2-dim);
  }
  input[type="range"]::-moz-range-thumb {
    width: 10px; height: 24px;
    border-radius: 3px;
    background: var(--accent2);
    border: none;
    box-shadow: 0 0 3px var(--accent2), 0 0 10px var(--accent2-glow);
    cursor: grab;
  }

  .slider-group {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* ── Neutron speed bounce warning ────────────────────────────────────── */
  #neutronSpeedWrap { position: relative; display: flex; align-items: center; }
  #neutronSpeedWrap.bounce-warn::before {
    content: '←';
    position: absolute;
    top: -24px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 20px;
    font-weight: 700;
    color: #ff2626;
    text-shadow:
      0 0 6px #ff2626,
      0 0 16px rgba(255,38,38,0.9),
      0 0 32px rgba(255,38,38,0.6);
    pointer-events: none;
    animation: neutronWarnPulse 0.75s ease-in-out infinite;
    white-space: nowrap;
    line-height: 1;
  }
  #neutronSpeedWrap.bounce-warn::after {
    content: '';
    position: absolute;
    inset: -10px;
    background: rgba(255, 38, 38, 0.72);
    border-radius: 10px;
    filter: blur(18px);
    z-index: -1;
    pointer-events: none;
    animation: neutronWarnPulse 0.75s ease-in-out infinite;
  }
  @keyframes neutronWarnPulse {
    0%, 100% { opacity: 0.3; }
    50%       { opacity: 1.0; }
  }

  /* ── Control boxes ─────────────────────────────────────────────────────── */
  .ctrl-box-pink {
    display: flex;
    align-items: center;
    align-self: stretch;
    gap: 14px;
    background: rgba(255,45,120,0.07);
    border: 1px solid rgba(255,45,120,0.22);
    border-radius: 12px;
    padding: 10px 16px;
    position: relative;
  }
  .ctrl-box-pink input[type="range"] { width: 120px; }
  .ctrl-box-label {
    position: absolute;
    bottom: 100%;
    margin-bottom: 3px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    line-height: 1;
    pointer-events: none;
  }
  .ctrl-box-label-pink {
    right: 14px;
    color: rgba(255,45,120,0.8);
    text-shadow: 0 0 6px rgba(255,45,120,0.6), 0 0 16px rgba(255,45,120,0.3);
  }
  .ctrl-box-label-blue {
    left: 14px;
    color: var(--accent2);
    opacity: 0.8;
    text-shadow: 0 0 6px var(--accent2-glow), 0 0 16px var(--accent2-dim);
  }

  /* ── NEW button nucleus wheel (pwheel-style hover dropdown) ────────────────── */
  .pwheel { position: relative; display: flex; flex-direction: column; align-self: stretch; }
  .pwheel-drop {
    position: absolute;
    top: calc(100% + 5px);
    left: 0;
    transform: translateY(-4px);
    display: flex;
    flex-direction: row;
    gap: 6px;
    padding: 8px;
    background: rgba(8,6,24,0.97);
    border: 1px solid rgba(255,45,120,0.28);
    border-radius: 12px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s, transform 0.15s;
    z-index: 200;
  }
  .pwheel.open .pwheel-drop { opacity: 1; pointer-events: auto; transform: translateY(0); }
  .pwheel.locked { opacity: 0.35; pointer-events: none; }
  .nucleus-opt {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 6px 8px;
    border-radius: 8px;
    border: 1px solid transparent;
    cursor: pointer;
    transition: border-color 0.1s, background 0.1s;
  }
  .nucleus-opt:hover { border-color: rgba(255,45,120,0.35); background: rgba(255,45,120,0.08); }
  .nucleus-opt.selected { border-color: rgba(255,45,120,0.65); background: rgba(255,45,120,0.15); }
  .nucleus-opt-label { font-size: 10px; font-weight: 700; letter-spacing: 0.5px; color: rgba(255,255,255,0.75); font-family: inherit; }

  .ctrl-box-blue {
    display: flex;
    align-items: center;
    align-self: stretch;
    gap: 18px;
    background: var(--accent2-dim);
    border: 1px solid var(--accent2);
    border-radius: 12px;
    padding: 10px 16px;
    position: relative;
  }
  .ctrl-box-blue input[type="range"] { width: 150px; }
  .ctrl-box-blue .slider-icon { font-size: 28px; }
  .ctrl-box-blue .toggle-label { font-size: 13px; gap: 6px; }
  .ctrl-box-blue .field-label-electric { font-size: 13px; }
  .ctrl-box-blue .awheel-item { font-size: 14px; padding: 5px 14px; }
  .slider-group label {
    font-size: 10px;
    color: var(--text-dim);
    white-space: nowrap;
    letter-spacing: 0.5px;
  }
  .slider-group label span {
    display: inline-block;
    min-width: 3em;
    text-align: right;
    color: var(--accent2);
    text-shadow: 0 0 5px var(--accent2-glow);
  }
  .slider-group input[type="range"] { width: 80px; }

  .slider-icon {
    font-size: 18px;
    line-height: 1;
    user-select: none;
    filter:
      brightness(0) invert(1)
      blur(0.5px)
      opacity(0.65)
      drop-shadow(0 0 4px var(--accent2))
      drop-shadow(0 0 12px var(--accent2))
      drop-shadow(0 0 24px var(--accent2-glow));
  }

  /* ── Toggle labels ─────────────────────────────────────────────────────── */
  .toggle-label {
    font-size: 10px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 5px;
    cursor: pointer;
    white-space: nowrap;
    user-select: none;
  }
  .toggle-label input[type="checkbox"] { accent-color: var(--accent1); }

  .field-label-electric {
    color: #46a5ff;
    text-shadow:
      0 0 4px #46a5ff,
      0 0 10px rgba(70,165,255,0.5),
      0 0 22px rgba(70,165,255,0.2);
  }

  /* ── Scrub bar — floating glass at bottom ──────────────────────────────── */
  #scrubBar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 10;
    display: none;
    flex-direction: row;
    background: var(--ui-bg);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border-top: 1px solid var(--ui-border);
    box-shadow: 0 -1px 0 var(--accent1-dim), 0 -4px 20px rgba(0,0,0,0.5);
  }
  #scrubBar.visible { display: flex; }
  /* Left panel: key labels + replay/clock controls */
  #scrubLeftPanel {
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    flex-shrink: 0;
    width: 112px;
    border-right: 1px solid var(--ui-border);
  }
  #scrubGraphKey {
    display: none;
    flex-direction: column;
    gap: 6px;
    flex: 1;
    justify-content: center;
    padding: 0 8px;
    font-size: 14px;
    font-weight: 700;
    line-height: 1.25;
    letter-spacing: 0.02em;
  }
  #scrubGraphKey.visible { display: flex; }
  #scrubControls {
    display: flex;
    align-items: center;
    gap: 8px;
    height: 80px;
    padding: 0 8px;
    flex-shrink: 0;
  }
  #scrubReplayBtn { padding: 4px 8px; }
  /* Right panel: energyMain (graph+slider) + scrubRowRight (pct+toggle) */
  #scrubRightPanel {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: row;
  }
  #energyMain {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 4px;
    padding: 6px 0;
  }
  #phaseTimeline {
    display: flex; align-items: stretch;
    height: 18px; margin: 0;
    border-radius: 0; overflow: hidden; gap: 0;
  }
  #phaseTimeline .phase-seg {
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 800; letter-spacing: 0.08em;
    overflow: hidden; white-space: nowrap; min-width: 0; transition: opacity 0.15s;
    text-shadow: 0 0 8px currentColor;
  }
  #egZoomHint {
    font-size: 12px;
    color: rgba(220,215,255,0.45);
    text-align: center;
    letter-spacing: 0.02em;
    margin-top: 4px;
  }
  #scrubRowRight {
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    width: 270px;
  }
  #scrubButtons {
    display: flex;
    align-items: center;
    gap: 8px;
    height: 80px;
    padding: 0 12px;
    flex-shrink: 0;
    margin-top: auto;
  }
  #energyGraphBox {
    display: none;
    flex-direction: column;
    border-bottom: 1px solid rgba(26,110,255,0.25);
    background: rgba(26,110,255,0.04);
  }
  #energyGraphBox.visible { display: flex; }
  #scrubPercents {
    display: none;
    flex: 1;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    padding: 8px 12px;
    font-size: 22px;
    font-weight: 700;
    line-height: 1;
  }
  #scrubPercents.visible { display: flex; }
  #energyPctNums {
    display: flex;
    gap: 10px;
  }
  #energyPctNote {
    font-size: 12px;
    color: #ff3a6e;
    text-align: center;
    letter-spacing: 0.02em;
    line-height: 1.3;
  }
  #energyGraphToggle {
    border: 1px solid var(--accent2);
    border-radius: 8px;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    background: var(--accent2-dim);
    color: rgba(255,255,255,0.5);
    font-family: inherit;
    flex: 1;
    line-height: 1.25;
    padding: 6px 10px;
    text-align: center;
    white-space: normal;
    box-shadow:
      inset 0 0 6px var(--accent2-dim),
      0 0 2px var(--accent2), 0 0 8px var(--accent2),
      0 0 18px var(--accent2-glow), 0 0 40px var(--accent2-dim);
    text-shadow: 0 0 4px rgba(255,255,255,0.5), 0 0 10px var(--accent2);
    transition: all 0.2s;
  }

<script>
// ─── Constants ────────────────────────────────────────────────────────────────
const PARTICLE_RADIUS = 10;
const coulombStrength = 150;

// ─── Canvas ───────────────────────────────────────────────────────────────────
const canvas   = document.getElementById('canvas');
const ctx      = canvas.getContext('2d');
const egCanvas = document.getElementById('energyGraph');
const egCtx    = egCanvas.getContext('2d');

// ─── Heatmap buffers ──────────────────────────────────────────────────────────
const hmCanvas    = document.createElement('canvas');
const hmCtx       = hmCanvas.getContext('2d');
const hmComposite = document.createElement('canvas');
const hmcCtx      = hmComposite.getContext('2d');
const hmSnap      = document.createElement('canvas');  // pre-transition snapshot for crossfade
const hmSnapCtx   = hmSnap.getContext('2d');

let hmW = 0, hmH = 0;
let hmDataElec = null;
let hmImgElec  = null;
let heatmapDirty    = true;
let hmFrameCounter  = 0;
let _hmXfadeStartFrac = -1;   // frac at which phase-3 crossfade began; -1 = inactive
const HM_XFADE_DURATION = 0.04;  // crossfade window in frac units (~200ms at normal speed)

// ── Quality selector ──────────────────────────────────────────────────────────
let _quality = 'hi-res';  // 'hi-res' | 'detailed' | 'simple'

// ── Dev perf toggles (driven by _applyQuality) ────────────────────────────────
let _flatFill = true;

function _applyQuality(level) {
  _quality = level;
  const el = document.getElementById('qualitySelect');
  if (el) el.value = level;
  _flatFill = true;
}

// Draws 100 gradient+shadowBlur particles to an offscreen canvas and returns ms.
// getImageData() at the end forces a GPU sync so the time is real.
// A 15-particle warm-up pass runs first to settle JIT and GPU init cost.
function _runPerfBenchmark() {
  const oc = document.createElement('canvas');
  oc.width = 300; oc.height = 300;
  const dc = oc.getContext('2d');
  const R = PARTICLE_RADIUS;
  for (let i = 0; i < 15; i++) {
    const x = 15 + (i % 5) * 40, y = 15 + Math.floor(i / 5) * 40;
    const g = dc.createRadialGradient(x, y, 0, x, y, R);
    g.addColorStop(0, '#ff1a65'); g.addColorStop(1, 'rgba(0,0,0,0)');
    dc.fillStyle = g; dc.beginPath(); dc.arc(x, y, R, 0, Math.PI * 2); dc.fill();
  }
  const t0 = performance.now();
  for (let i = 0; i < 100; i++) {
    const x = 15 + (i % 10) * 27, y = 15 + Math.floor(i / 10) * 27;
    const g1 = dc.createRadialGradient(x, y, 0, x, y, R * 1.1);
    g1.addColorStop(0, '#ff1a65'); g1.addColorStop(0.82, '#ff1a65'); g1.addColorStop(1, 'rgba(0,0,0,0)');
    dc.fillStyle = g1; dc.beginPath(); dc.arc(x, y, R * 1.1, 0, Math.PI * 2); dc.fill();
    const g2 = dc.createRadialGradient(x, y, 0, x, y, R);
    g2.addColorStop(0, '#ff80b0'); g2.addColorStop(0.5, '#ff80b0'); g2.addColorStop(1, 'rgba(0,0,0,0)');
    dc.save(); dc.shadowColor = '#ff80b0'; dc.shadowBlur = 8; dc.globalAlpha = 0.82;
    dc.fillStyle = g2; dc.beginPath(); dc.arc(x, y, R, 0, Math.PI * 2); dc.fill();
    dc.restore(); dc.globalAlpha = 1;
  }
  dc.getImageData(0, 0, 1, 1); // force GPU flush so timing is real
  return performance.now() - t0;
}

function ensureHmBuffers(w, h) {
  if (hmW === w && hmH === h) return;
  hmW = w; hmH = h;
  hmCanvas.width    = w; hmCanvas.height = h;
  hmDataElec = new Uint8ClampedArray(w * h * 4);
  hmImgElec  = new ImageData(hmDataElec, w, h);
}

// ─── Colormaps ────────────────────────────────────────────────────────────────
function buildColorstops(stops, out) {
  for (let i = 0; i < 256; i++) {
    const t = i / 255;
    let s0 = stops[0], s1 = stops[1];
    for (let s = 0; s < stops.length - 1; s++) {
      if (t >= stops[s].t && t <= stops[s+1].t) { s0 = stops[s]; s1 = stops[s+1]; break; }
    }
    const f   = (s1.t === s0.t) ? 0 : (t - s0.t) / (s1.t - s0.t);
    const idx = i * 4;
    out[idx]   = s0.r + (s1.r - s0.r) * f;
    out[idx+1] = s0.g + (s1.g - s0.g) * f;
    out[idx+2] = s0.b + (s1.b - s0.b) * f;
    out[idx+3] = s0.a + (s1.a - s0.a) * f;
  }
}

const COLORMAP = new Uint8Array(256 * 4);
buildColorstops([
  { t: 0.0,  r: 0,   g: 0,   b: 0,   a: 0   },
  { t: 0.12, r: 10,  g: 35,  b: 170, a: 140 },
  { t: 0.4,  r: 25,  g: 85,  b: 235, a: 210 },
  { t: 0.7,  r: 70,  g: 165, b: 255, a: 245 },
  { t: 1.0,  r: 210, g: 238, b: 255, a: 255 },
], COLORMAP);

// ─── Particle generation — 3D sphere packing ──────────────────────────────────
function generateNucleus(nProtons, nNeutrons, cx, cy, seed) {
  // Seeded LCG so the same seed always produces the same layout
  let s = (seed >>> 0) || 1;
  const rand = () => { s = (s * 1664525 + 1013904223) & 0xffffffff; return (s >>> 0) / 0xffffffff; };

  const nTotal = nProtons + nNeutrons;

  const packFrac = 0.62;
  const vol      = nTotal * (4/3 * Math.PI * PARTICLE_RADIUS ** 3) / packFrac;
  const sphereR  = Math.cbrt(vol * 3 / (4 * Math.PI)) * 1.05;

  const minDist   = PARTICLE_RADIUS * 2.08;
  const minDistSq = minDist * minDist;

  const pts = [];
  for (let i = 0; i < nTotal; i++) {
    let placed = false;
    for (let attempt = 0; attempt < 8000; attempt++) {
      const r   = sphereR * Math.cbrt(rand());
      const th  = Math.acos(2 * rand() - 1);
      const phi = 2 * Math.PI * rand();
      const lx  = r * Math.sin(th) * Math.cos(phi);
      const ly  = r * Math.sin(th) * Math.sin(phi);
      const lz  = r * Math.cos(th);
      let ok = true;
      for (const p of pts) {
        const dx = p.lx-lx, dy = p.ly-ly, dz = p.lz-lz;
        if (dx*dx + dy*dy + dz*dz < minDistSq) { ok = false; break; }
      }
      if (ok) { pts.push({ lx, ly, lz }); placed = true; break; }
    }
    if (!placed) {
      // Force-place at a random spot rather than stacking at center
      const r   = sphereR * 0.6 * rand();
      const th  = Math.acos(2 * rand() - 1);
      const phi = 2 * Math.PI * rand();
      pts.push({ lx: r*Math.sin(th)*Math.cos(phi), ly: r*Math.sin(th)*Math.sin(phi), lz: r*Math.cos(th) });
    }
  }

  const adjThresh2 = (PARTICLE_RADIUS * 2.9) ** 2;
  const adj = Array.from({ length: nTotal }, () => []);
  for (let i = 0; i < nTotal; i++) {
    for (let j = i+1; j < nTotal; j++) {
      const dx = pts[i].lx-pts[j].lx, dy = pts[i].ly-pts[j].ly, dz = pts[i].lz-pts[j].lz;
      if (dx*dx + dy*dy + dz*dz < adjThresh2) { adj[i].push(j); adj[j].push(i); }
    }
  }

  const types         = new Array(nTotal).fill('neutron');
  const protonNbCount = new Array(nTotal).fill(0);
  const order         = Array.from({ length: nTotal }, (_, i) => i).sort(() => rand() - 0.5);
  let placed = 0;
  for (let priority = 0; priority <= 6 && placed < nProtons; priority++) {
    for (const i of order) {
      if (placed >= nProtons) break;
      if (types[i] === 'proton' || protonNbCount[i] !== priority) continue;
      types[i] = 'proton';
      placed++;
      for (const nb of adj[i]) protonNbCount[nb]++;
    }
  }

  const particles = pts.map((p, i) => ({
    x: cx + p.lx, y: cy + p.ly, z: p.lz, type: types[i], i,
  }));

  return { particles, sphereR, cx, cy };
}

// ─── Electric field heatmap ───────────────────────────────────────────────────
// masks: [{cx, cy, r}] — soft radial clipping; alpha fades to 0 at r + PARTICLE_RADIUS*2
function drawElectricHeatmap(particleList, sampleFrac = 0.5, sigmaScale = 1.0, masks = null, boundsExpand = 50, destCtx = ctx, _forceRender = false) {
  const fullW = canvas.width, fullH = canvas.height;

  const _hmSizeMatch = hmComposite.width === fullW && hmComposite.height === fullH;
  if (!_forceRender && !heatmapDirty && _hmSizeMatch) {
    destCtx.drawImage(hmComposite, 0, 0);
    return;
  }
  const scale    = _quality === 'simple' ? 0.08 : _quality === 'detailed' ? 0.15 : 0.25;
  const w        = Math.ceil(fullW * scale);
  const h        = Math.ceil(fullH * scale);
  const invScale = 1 / scale;

  let protons = particleList.filter(p =>
    p.type === 'proton' &&
    p.x > -boundsExpand && p.x < fullW + boundsExpand &&
    p.y > -boundsExpand && p.y < fullH + boundsExpand
  );
  if (sampleFrac < 1.0) {
    protons = protons.filter((_, i) => i % Math.round(1 / sampleFrac) === 0);
  }

  const refEnergy = coulombStrength / (PARTICLE_RADIUS * 2);
  const logRef    = Math.log(2);
  const elecPairs = [];
  for (let i = 0; i < protons.length; i++) {
    for (let j = i+1; j < protons.length; j++) {
      const a = protons[i], b = protons[j];
      const dx = b.x - a.x, dy = b.y - a.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 0.01) continue;
      const energy   = coulombStrength / dist;
      const sigma    = Math.max(3.5, 28 / Math.sqrt(dist)) * sigmaScale;
      const distFade = Math.exp(-dist / 350);
      const mag      = Math.min(1, Math.log(1 + energy / refEnergy) / logRef) * distFade;
      const cullSq   = 16 * (sigma*2) * (sigma*2);
      elecPairs.push({ ax: a.x, ay: a.y, ux: dx/dist, uy: dy/dist, dist, sigma, mag, cullSq });
    }
  }
  elecPairs.sort((a, b) => b.mag - a.mag);
  if (elecPairs.length === 0) return;

  ensureHmBuffers(w, h);
  hmDataElec.fill(0);

  // Clamp pixel loop to the bounding box of active protons — skips the large
  // empty canvas area around the nucleus, which is typically 90%+ of pixels.
  let bxMin = w, bxMax = 0, byMin = h, byMax = 0;
  for (const p of protons) {
    const sx = (p.x * scale) | 0, sy = (p.y * scale) | 0;
    if (sx < bxMin) bxMin = sx; if (sx > bxMax) bxMax = sx;
    if (sy < byMin) byMin = sy; if (sy > byMax) byMax = sy;
  }
  const bMarg = Math.ceil(50 * scale);  // max pair influence radius in world px
  bxMin = Math.max(0, bxMin - bMarg);  bxMax = Math.min(w - 1, bxMax + bMarg);
  byMin = Math.max(0, byMin - bMarg);  byMax = Math.min(h - 1, byMax + bMarg);

  for (let py = byMin; py <= byMax; py++) {
    const worldY = py * invScale;
    for (let px = bxMin; px <= bxMax; px++) {
      const worldX = px * invScale;
      let total = 0;
      for (let k = 0; k < elecPairs.length; k++) {
        const p    = elecPairs[k];
        const rx   = worldX - p.ax, ry = worldY - p.ay;
        const para = rx*p.ux + ry*p.uy;
        const e1   = para > 0 ? Math.min(1, para/8) : 0;
        const e2   = para < p.dist ? Math.min(1, (p.dist-para)/8) : 0;
        const ef   = e1 * e2;
        if (ef <= 0) continue;
        const perpSq = Math.max(0, rx*rx + ry*ry - para*para);
        if (perpSq > p.cullSq) continue;
        const t      = para / p.dist;
        const sigmaT = p.sigma * (1 + Math.sin(Math.PI * t));
        total += p.mag * Math.exp(-perpSq / (2*sigmaT*sigmaT)) * ef;
        if (total >= 1/3) break;
      }
      if (total > 0.002) {
        // Soft radial mask — clamp heatmap to nucleus boundary.
        // Supports two mask types:
        //   circle  { cx, cy, r, bleed }
        //   capsule { type:'capsule', cx1,cy1,r1, cx2,cy2,r2, bleed }
        //     — tapered hull between two spheres; fills the gap with no dark seam.
        let maskAlpha = 1;
        if (masks) {
          maskAlpha = 0;
          const defaultBleed = PARTICLE_RADIUS * 2;
          for (const m of masks) {
            if (maskAlpha >= 1) break;
            const bleed = m.bleed !== undefined ? m.bleed : defaultBleed;
            if (m.type === 'capsule') {
              // Project pixel onto the segment cx1→cx2, interpolate radius
              const sdx = m.cx2 - m.cx1, sdy = m.cy2 - m.cy1;
              const lenSq = sdx*sdx + sdy*sdy;
              const st = lenSq > 0
                ? Math.max(0, Math.min(1, ((worldX-m.cx1)*sdx + (worldY-m.cy1)*sdy) / lenSq))
                : 0;
              const projX = m.cx1 + st*sdx, projY = m.cy1 + st*sdy;
              const perpDist = Math.sqrt((worldX-projX)**2 + (worldY-projY)**2);
              const capsR = m.r1 + (m.r2 - m.r1) * st;
              if (perpDist <= capsR) { maskAlpha = 1; break; }
              const mt = (perpDist - capsR) / bleed;
              maskAlpha = Math.max(maskAlpha, mt < 1 ? 1 - mt : 0);
            } else {
              const mdx = worldX - m.cx, mdy = worldY - m.cy;
              const mdist = Math.sqrt(mdx*mdx + mdy*mdy);
              if (mdist <= m.r) { maskAlpha = 1; break; }
              const mt = (mdist - m.r) / bleed;
              maskAlpha = Math.max(maskAlpha, mt < 1 ? 1 - mt : 0);
            }
          }
        }
        if (maskAlpha > 0) {
          const ci = Math.min(255, (total * 3.0 * 255)|0);
          const c4 = ci * 4;
          const di = (py * w + px) * 4;
          hmDataElec[di]   = COLORMAP[c4];   hmDataElec[di+1] = COLORMAP[c4+1];
          hmDataElec[di+2] = COLORMAP[c4+2];
          hmDataElec[di+3] = (COLORMAP[c4+3] * maskAlpha + 0.5) | 0;
        }
      }
    }
  }

  if (hmComposite.width !== fullW || hmComposite.height !== fullH) {
    hmComposite.width = fullW; hmComposite.height = fullH;
  }
  hmcCtx.clearRect(0, 0, fullW, fullH);
  hmcCtx.imageSmoothingEnabled = true;
  hmcCtx.imageSmoothingQuality = 'low';
  hmCtx.putImageData(hmImgElec, 0, 0);
  hmcCtx.drawImage(hmCanvas, 0, 0, fullW, fullH);
  destCtx.drawImage(hmComposite, 0, 0);
  if (destCtx === ctx) {
    heatmapDirty = false;
  }
}

// ─── Cloud outline — evenly-spaced scallop circles on a ring ─────────────────
function outerIntersection(c1, c2, R, ncx, ncy) {
  const dx = c2.x - c1.x, dy = c2.y - c1.y;
  const d  = Math.sqrt(dx * dx + dy * dy);
  const h  = Math.sqrt(Math.max(0, R * R - (d / 2) * (d / 2)));
  const mx = (c1.x + c2.x) / 2, my = (c1.y + c2.y) / 2;
  const px = -dy / d * h,  py =  dx / d * h;
  const p1 = { x: mx + px, y: my + py };
  const p2 = { x: mx - px, y: my - py };
  const d1 = (p1.x - ncx) ** 2 + (p1.y - ncy) ** 2;
  const d2 = (p2.x - ncx) ** 2 + (p2.y - ncy) ** 2;
  return d1 > d2 ? p1 : p2;
}

function drawCloudOutline(cx, cy, sphereR, c = ctx) {
  const R = PARTICLE_RADIUS;
  const N = Math.max(6, Math.round(2 * Math.PI * sphereR / (R * 1.5)));

  const centers = Array.from({ length: N }, (_, k) => {
    const a = k * 2 * Math.PI / N;
    return { x: cx + sphereR * Math.cos(a), y: cy + sphereR * Math.sin(a) };
  });

  const arcs = centers.map((cent, k) => {
    const prev = centers[(k - 1 + N) % N];
    const next = centers[(k + 1)     % N];
    const sp   = outerIntersection(cent, prev, R, cx, cy);
    const ep   = outerIntersection(cent, next, R, cx, cy);
    return {
      cx: cent.x, cy: cent.y,
      startAngle: Math.atan2(sp.y - cent.y, sp.x - cent.x),
      endAngle:   Math.atan2(ep.y - cent.y, ep.x - cent.x),
    };
  });

  const LIGHT = document.body.classList.contains('screenshot-mode');
  c.save();
  c.shadowColor = LIGHT ? 'rgba(0,0,0,0)' : 'rgba(80,160,255,0.9)';
  c.shadowBlur  = LIGHT ? 0 : 22;
  c.strokeStyle = LIGHT ? '#333' : 'rgba(160,215,255,1)';
  c.lineWidth   = LIGHT ? 2.5 : 4;
  c.beginPath();

  c.moveTo(arcs[0].cx + R * Math.cos(arcs[0].startAngle),
           arcs[0].cy + R * Math.sin(arcs[0].startAngle));

  for (const arc of arcs) {
    c.arc(arc.cx, arc.cy, R, arc.startAngle, arc.endAngle, false);
  }

  c.closePath();
  c.stroke();
  c.restore();
}

// ─── Fission outline — union-of-two-circles scalloped boundary ───────────────
function sampleUnionBoundary(cx1, cy1, r1, cx2, cy2, r2) {
  const R = PARTICLE_RADIUS;
  const ddx = cx2 - cx1, ddy = cy2 - cy1;
  const d = Math.sqrt(ddx * ddx + ddy * ddy);
  const frame = Math.atan2(ddy, ddx);

  if (d < 1) {
    const avgR = (r1 + r2) / 2;
    const N = Math.max(6, Math.round(2 * Math.PI * avgR / (R * 1.5)));
    return Array.from({ length: N }, (_, k) => {
      const a = k * 2 * Math.PI / N;
      return { x: cx1 + avgR * Math.cos(a), y: cy1 + avgR * Math.sin(a),
               refCx: cx1, refCy: cy1 };
    });
  }

  const a = (r1 * r1 - r2 * r2 + d * d) / (2 * d);
  const h = Math.sqrt(Math.max(0, r1 * r1 - a * a));
  if (h < 1) return null;

  const r1bot = Math.atan2(-h, a); const r1top = Math.atan2(h, a);
  const span1 = 2 * Math.PI - (r1top - r1bot);
  const start1 = r1top;

  const r2top = Math.atan2(h, a - d); const r2bot = Math.atan2(-h, a - d);
  const span2 = r2top - r2bot;
  const start2 = r2bot;

  const len1 = span1 * r1, len2 = span2 * r2;
  const n1 = Math.max(3, Math.round(len1 / (R * 1.5)));
  const n2 = Math.max(3, Math.round(len2 / (R * 1.5)));

  const pts = [];
  for (let k = 0; k < n1; k++) {
    const wa = frame + start1 + (k / n1) * span1;
    pts.push({ x: cx1 + r1 * Math.cos(wa), y: cy1 + r1 * Math.sin(wa), refCx: cx1, refCy: cy1 });
  }
  for (let k = 0; k < n2; k++) {
    const wa = frame + start2 + (k / n2) * span2;
    pts.push({ x: cx2 + r2 * Math.cos(wa), y: cy2 + r2 * Math.sin(wa), refCx: cx2, refCy: cy2 });
  }
  return pts;
}

function drawFissionOutline(cx1, cy1, r1, cx2, cy2, r2, c = ctx) {
  const R = PARTICLE_RADIUS;
  const d = Math.sqrt((cx2-cx1)**2 + (cy2-cy1)**2);

  if (d >= r1 + r2) {
    drawCloudOutline(cx1, cy1, r1, c);
    drawCloudOutline(cx2, cy2, r2, c);
    return;
  }

  const pts = sampleUnionBoundary(cx1, cy1, r1, cx2, cy2, r2);
  if (!pts) { drawCloudOutline(cx1, cy1, r1, c); drawCloudOutline(cx2, cy2, r2, c); return; }
  const N = pts.length;

  const arcs = pts.map((cent, k) => {
    const prev = pts[(k - 1 + N) % N];
    const next = pts[(k + 1)     % N];
    const sp   = outerIntersection(cent, prev, R, cent.refCx, cent.refCy);
    const ep   = outerIntersection(cent, next, R, cent.refCx, cent.refCy);
    return {
      cx: cent.x, cy: cent.y,
      startAngle: Math.atan2(sp.y - cent.y, sp.x - cent.x),
      endAngle:   Math.atan2(ep.y - cent.y, ep.x - cent.x),
    };
  });

  const LIGHT = document.body.classList.contains('screenshot-mode');
  c.save();
  c.shadowColor = LIGHT ? 'rgba(0,0,0,0)' : 'rgba(80,160,255,0.9)';
  c.shadowBlur  = LIGHT ? 0 : 22;
  c.strokeStyle = LIGHT ? '#333' : 'rgba(160,215,255,1)';
  c.lineWidth   = LIGHT ? 2.5 : 4;
  c.beginPath();

  c.moveTo(arcs[0].cx + R * Math.cos(arcs[0].startAngle),
           arcs[0].cy + R * Math.sin(arcs[0].startAngle));
  for (const arc of arcs) {
    c.arc(arc.cx, arc.cy, R, arc.startAngle, arc.endAngle, false);
  }

  c.closePath();
  c.stroke();
  c.restore();
}

// ─── Neutron — plain circle outline matching the cloud border style ───────────
function drawNeutronOutline(x, y) {
  const R = PARTICLE_RADIUS;
  const LIGHT = document.body.classList.contains('screenshot-mode');
  ctx.save();
  ctx.shadowColor = LIGHT ? 'rgba(0,0,0,0)' : 'rgba(80,160,255,0.9)';
  ctx.shadowBlur  = LIGHT ? 0 : 22;
  ctx.strokeStyle = LIGHT ? '#333' : 'rgba(160,215,255,1)';
  ctx.lineWidth   = LIGHT ? 2.5 : 4;
  ctx.beginPath();
  ctx.arc(x, y, R, 0, Math.PI * 2);
  ctx.stroke();
  ctx.restore();
}

function drawNeutron(x, y) {
  if (showParticles) {
    // Full particle viz — same style as drawParticles for neutrons
    const R = PARTICLE_RADIUS;
    const baseGrad = ctx.createRadialGradient(x, y, 0, x, y, R * 1.1);
    baseGrad.addColorStop(0, '#70707f'); baseGrad.addColorStop(0.82, '#70707f'); baseGrad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = baseGrad;
    ctx.beginPath(); ctx.arc(x, y, R * 1.1, 0, Math.PI * 2); ctx.fill();
    const innerGlow = ctx.createRadialGradient(x, y, 0, x, y, R);
    innerGlow.addColorStop(0, '#b0b0c4'); innerGlow.addColorStop(0.5, '#b0b0c4'); innerGlow.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.save(); ctx.shadowColor = '#b0b0c4'; ctx.shadowBlur = 8; ctx.globalAlpha = 0.82;
    ctx.fillStyle = innerGlow; ctx.beginPath(); ctx.arc(x, y, R, 0, Math.PI * 2); ctx.fill();
    ctx.restore(); ctx.globalAlpha = 1;
  } else {
    drawNeutronOutline(x, y);
  }
}

// ─── v11-style particle renderer — stochastic jitter + fuzzy glow ────────────
const particleJitter = [];
// slow=false (default): step=1.8, decay=0.72 — σ≈1.83px, autocorr ~3.6 frames (used during fission/daughters)
// slow=true:            step=1.1, decay=0.90 — σ≈1.78px (same magnitude), autocorr ~10 frames (pre-neutron)
function updateParticleJitter(count, strength = 1, slow = false) {
  const step  = slow ? 1.1 : 1.8;
  const decay = slow ? 0.90 : 0.72;
  while (particleJitter.length < count) particleJitter.push({ x: 0, y: 0 });
  for (let i = 0; i < count; i++) {
    particleJitter[i].x += (Math.random() - 0.5) * step * strength;
    particleJitter[i].y += (Math.random() - 0.5) * step * strength;
    particleJitter[i].x *= decay;
    particleJitter[i].y *= decay;
  }
}

function drawParticles(particles, jitterScale = 1, radiusScale = 1, drawCtx = ctx) {
  const dc = drawCtx;
  const R = PARTICLE_RADIUS * radiusScale;
  // z ascending = back to front; protons after neutrons at same depth
  const sorted = [...particles].sort((a, b) =>
    ((a.z || 0) - (b.z || 0)) || ((a.type === 'proton') - (b.type === 'proton'))
  );
  for (const p of sorted) {
    const j  = (p.i != null && particleJitter[p.i]) ? particleJitter[p.i] : { x: 0, y: 0 };
    const px = p.x + j.x * jitterScale, py = p.y + j.y * jitterScale;
    const isProton = p.type === 'proton';
    const mid  = isProton ? '#ff1a65' : '#70707f';
    const core = isProton ? '#ff80b0' : '#b0b0c4';

    if (_flatFill) {
      if (_quality !== 'simple') {
        // Hi-res / Detailed: layered rings matching v11 particle appearance
        // Draw back-to-front using filled circles so rings never bleed inside
        const cW = 4;   // colored mid-ring width (world px — scales with zoom)
        const wW = 1;   // dark gray outline width (world px — scales with zoom)
        const R1 = R * 1.1;
        // Outermost: dark gray ring
        dc.fillStyle = 'rgba(40,40,40,0.85)';
        dc.beginPath(); dc.arc(px, py, R1, 0, Math.PI * 2); dc.fill();
        // Middle: mid color ring (matches v11 outer gradient color)
        dc.fillStyle = mid;
        dc.beginPath(); dc.arc(px, py, R1 - wW, 0, Math.PI * 2); dc.fill();
        // Inner: core (lighter) fill — matches v11 bright center
        dc.fillStyle = core;
        dc.beginPath(); dc.arc(px, py, R1 - wW - cW, 0, Math.PI * 2); dc.fill();
      } else {
        // Simple: thin white stroke over mid fill (original appearance)
        dc.fillStyle = mid;
        dc.beginPath(); dc.arc(px, py, R, 0, Math.PI * 2); dc.fill();
        dc.strokeStyle = 'rgba(255,255,255,0.45)';
        dc.lineWidth = 1;
        dc.stroke();
      }
    } else {
      // Base fill — soft edge fade
      const baseGrad = dc.createRadialGradient(px, py, 0, px, py, R * 1.1);
      baseGrad.addColorStop(0,    mid);
      baseGrad.addColorStop(0.82, mid);
      baseGrad.addColorStop(1,    'rgba(0,0,0,0)');
      dc.fillStyle = baseGrad;
      dc.beginPath(); dc.arc(px, py, R * 1.1, 0, Math.PI * 2); dc.fill();

      // Inner glow with shadowBlur for fuzzy halo
      const innerGlow = dc.createRadialGradient(px, py, 0, px, py, R);
      innerGlow.addColorStop(0,   core);
      innerGlow.addColorStop(0.5, core);
      innerGlow.addColorStop(1,   'rgba(0,0,0,0)');
      dc.save();
      dc.shadowColor = core;
      dc.shadowBlur  = 8;
      dc.globalAlpha = 0.82;
      dc.fillStyle = innerGlow;
      dc.beginPath(); dc.arc(px, py, R, 0, Math.PI * 2); dc.fill();
      dc.restore();
      dc.globalAlpha = 1;
    }

    // + label on protons
    if (isProton) {
      dc.fillStyle = 'rgba(255,255,255,0.88)';
      dc.font = `bold ${Math.max(6, Math.round(11 * radiusScale))}px Lexend, sans-serif`;
      dc.textAlign = 'center';
      dc.textBaseline = 'middle';
      dc.fillText('+', px, py + 1 * radiusScale);
    }
  }
}

// ─── Excited nucleus glow ─────────────────────────────────────────────────────
// 30 stable pseudo-random positions inside the nucleus, seeded once.
// Each spot fires continuously — each cycle is 0.1–0.8s, chosen fresh each time.
const EXCITED_SPOTS = (() => {
  const spots = [];
  let s = 0xdeadbeef;
  const rand = () => { s = (s * 1664525 + 1013904223) & 0xffffffff; return (s >>> 0) / 0xffffffff; };
  for (let i = 0; i < 30; i++) {
    spots.push({
      angle:  rand() * Math.PI * 2,
      radius: Math.sqrt(rand()) * 0.82,
      cycleStart: null,
      cycleDur:   null,
    });
  }
  return spots;
})();

function resetExcitedSpots() {
  for (const sp of EXCITED_SPOTS) { sp.cycleStart = null; sp.cycleDur = null; }
}

function drawExcitedGlow(cx, cy, sphereR, intensity) {
  if (intensity <= 0) return;
  const now = performance.now();
  ctx.save();
  ctx.globalCompositeOperation = 'screen';
  const glowRadius = PARTICLE_RADIUS * 2.8;
  for (const sp of EXCITED_SPOTS) {
    // Initialise with a random stagger so they don't all peak at once
    if (sp.cycleStart === null) {
      sp.cycleDur   = 100 + Math.random() * 700;
      sp.cycleStart = now - Math.random() * sp.cycleDur;  // start mid-cycle
    }

    let elapsed = now - sp.cycleStart;
    // Roll over into the next cycle whenever one finishes
    while (elapsed >= sp.cycleDur) {
      elapsed      -= sp.cycleDur;
      sp.cycleStart = now - elapsed;
      sp.cycleDur   = 100 + Math.random() * 700;
    }

    const flashT = elapsed / sp.cycleDur;
    const pulse  = Math.sin(flashT * Math.PI);
    const alpha  = Math.min(1, (0.5 + pulse * 0.7) * intensity);
    const sx = cx + Math.cos(sp.angle) * sp.radius * sphereR;
    const sy = cy + Math.sin(sp.angle) * sp.radius * sphereR;
    const r  = glowRadius * (0.8 + pulse * 0.7);
    const g  = ctx.createRadialGradient(sx, sy, 0, sx, sy, r);
    g.addColorStop(0,   `rgba(255,100,40,${Math.min(1, alpha)})`);
    g.addColorStop(0.5, `rgba(255,40,0,${Math.min(1, alpha * 0.6)})`);
    g.addColorStop(1,   'rgba(255,0,0,0)');
    ctx.beginPath();
    ctx.arc(sx, sy, r, 0, Math.PI * 2);
    ctx.fillStyle = g;
    ctx.fill();
  }
  ctx.restore();
}

// Wobble mode, picked randomly each time a nucleus is hit:
//   'dip1'   50% — 1 KE dip  : nucleus elongates once then fissions
//   'dip2'   20% — 2 KE dips : one full wobble back to circular, then elongates and fissions
//   'dip3'   15% — 3 KE dips : two full wobbles, then elongates and fissions
//   'stable' 15% — 3 KE dips : three full wobbles, nucleus returns to circular (no fission)
let wobbleMode = 'dip1';
let fissionBranch = 0;   // 0 = Xe-140 + Sr-94, 1 = Ba-144 + Kr-90

function pickWobbleMode() {
  const r = Math.random();
  if (r < 0.80) return 'dip1';
  if (r < 0.90) return 'dip2';
  return 'dip3';
}

// General wobble signal — ph2 ∈ [0,1], returns normWobble ∈ [0,1].
// Continuously differentiable everywhere (zero derivative at all segment joins).
//
//   dip1:   [0,1]       half-cosine 0→1 (pure elongation, 1 minimum at end)
//   dip2:   [0,½]       full cycle 0→1→0  +  [½,1] half-cosine 0→1
//   dip3:   [0,⅓][⅓,⅔] two full cycles  +  [⅔,1]  half-cosine 0→1
//   stable: [0,⅓][⅓,⅔][⅔,1] three full cycles (ends at 0 → no fission)
function wobbleSignal(ph2, mode) {
  if (mode === 'dip1') {
    return (1 - Math.cos(Math.PI * ph2)) / 2;
  }
  if (mode === 'stable') {
    // Three full cycles: cycles 1+2 each take 1/5 of ph2, cycle 3 takes 3/5 (3× slower)
    const segs = [0, 0.2, 0.4, 1.0];
    const i = ph2 < segs[1] ? 0 : ph2 < segs[2] ? 1 : 2;
    const p = (ph2 - segs[i]) / (segs[i + 1] - segs[i]);
    return (1 - Math.cos(2 * Math.PI * p)) / 2;
  }
  const nFull = mode === 'dip2' ? 1 : 2;
  const nSegs = nFull + 1;
  const T = 1 / nSegs;
  if (ph2 > nFull * T) {
    const p = (ph2 - nFull * T) / T;
    return (1 - Math.cos(Math.PI * p)) / 2;
  }
  const i = Math.min(nSegs - 1, Math.floor(ph2 / T));
  const p = (ph2 - i * T) / T;
  return (1 - Math.cos(2 * Math.PI * p)) / 2;
}

function initNuclei() {
  const W = canvas.width, H = canvas.height;
  const cx = W / 2, cy = H / 2;

  const nd = NUCLEUS_DEFS[selectedNucleusKey];
  animParent = generateNucleus(nd.animZ, nd.animN, cx, cy, currentSeed);
  // Visual-only display scale: shrink particle positions relative to nucleus center
  if (nd.displayScale !== 1.0) {
    const ds = nd.displayScale;
    for (const p of animParent.particles) {
      p.x = cx + (p.x - cx) * ds;
      p.y = cy + (p.y - cy) * ds;
    }
    animParent.sphereR *= ds;
  }
  animProd1  = generateNucleus(nd.prod1.Z, nd.prod1.N, cx, cy, currentSeed * 1001 + 7);
  animProd2  = generateNucleus(nd.prod2.Z, nd.prod2.N, cx, cy, currentSeed * 1003 + 13);

  // Daughter radii are fixed — no shrinking as they fly
  prod1R = animProd1.sphereR * 0.7;
  prod2R = animProd2.sphereR * 0.7;

  const byX = (type) => animParent.particles
    .map((p, i) => ({ i, x: p.x }))
    .filter(({i}) => animParent.particles[i].type === type)
    .sort((a, b) => a.x - b.x);

  const toIdx = (prod, type) => prod.particles
    .map((p, i) => ({ i, x: p.x }))
    .filter(({i}) => prod.particles[i].type === type)
    .sort((a, b) => a.x - b.x)
    .map(({i}) => i);

  const parentP = byX('proton');
  const parentN = byX('neutron');
  const p1P = toIdx(animProd1, 'proton');
  const p1N = toIdx(animProd1, 'neutron');
  const p2P = toIdx(animProd2, 'proton');
  const p2N = toIdx(animProd2, 'neutron');

  const z1 = nd.prod1.Z, z2 = nd.prod2.Z;
  const n1 = nd.prod1.N, n2 = nd.prod2.N;
  animMap = [];
  for (let k = 0; k < z1; k++)  animMap.push({ fromIdx: parentP[k].i,      prod: 1, toIdx: p1P[k] });
  for (let k = 0; k < z2; k++)  animMap.push({ fromIdx: parentP[z1+k].i,   prod: 2, toIdx: p2P[k] });
  for (let k = 0; k < n1; k++)  animMap.push({ fromIdx: parentN[k].i,      prod: 1, toIdx: p1N[k] });
  for (let k = 0; k < n2; k++)  animMap.push({ fromIdx: parentN[n1+k].i,   prod: 2, toIdx: p2N[k] });

  const agDef = NUCLEUS_DEFS['ag107'];
  animControl = generateNucleus(agDef.animZ, agDef.animN, cx, cy, 0x4a5b6c7d);
  if (agDef.displayScale !== 1.0) {
    const ds = agDef.displayScale;
    for (const p of animControl.particles) {
      p.x = cx + (p.x - cx) * ds;
      p.y = cy + (p.y - cy) * ds;
    }
    animControl.sphereR *= ds;
  }
  buildNucleusImages();
}

// Pre-render a nucleus to an offscreen canvas using the full gradient renderer.
// The result is a square canvas with the nucleus centered; draw with drawImage scaled to
// (cx - halfDraw, cy - halfDraw, halfDraw*2, halfDraw*2) where
// halfDraw = (_NUCLEUS_IMG_PAD + nucleus.sphereR) * (displayR / nucleus.sphereR).
const _NUCLEUS_IMG_PAD = PARTICLE_RADIUS * 2 + 2;
function _prerenderNucleus(nucleus) {
  const r    = nucleus.sphereR;
  const size = Math.ceil((r + _NUCLEUS_IMG_PAD) * 2);
  const oc   = document.createElement('canvas');
  oc.width = oc.height = size;
  oc._natR = r;
  const ocCtx = oc.getContext('2d');
  const dx = size / 2 - nucleus.cx, dy = size / 2 - nucleus.cy;
  const pts = nucleus.particles.map(p => ({ ...p, x: p.x + dx, y: p.y + dy }));
  const savedFlat = _flatFill;
  _flatFill = false;  // always render with full gradient quality
  drawParticles(pts, 0, 1, ocCtx);
  _flatFill = savedFlat;
  return oc;
}

function buildNucleusImages() {
  _imgParent  = _prerenderNucleus(animParent);
  _imgProd1   = _prerenderNucleus(animProd1);
  _imgProd2   = _prerenderNucleus(animProd2);
  _imgControl = _prerenderNucleus(animControl);
}



// ─── Frame content renderer — called inside renderAtFrac's zoom transform ─────
function drawAnimContent(t) {
  const showElec = document.getElementById('showElectric').checked;
  const parentMask = [{ cx: animParent.cx, cy: animParent.cy, r: animParent.sphereR + PARTICLE_RADIUS * 3.5 }];

  // Phase 1: still
  if (t <= PH1_END) {
    _hmXfadeStartFrac = -1;
    if (showElec) drawElectricHeatmap(animParent.particles, 0.5, 1.0, parentMask);
    if (!showParticles) drawCloudOutline(animParent.cx, animParent.cy, animParent.sphereR);
    if (showParticles) drawParticles(animParent.particles, 0.5);   // 2x jitter in static scene
    return;
  }

  // Phase 2: excited state
  if (t <= PH2_END) {
    _hmXfadeStartFrac = -1;
    if (showElec) drawElectricHeatmap(animParent.particles, 0.5, 1.0, parentMask);

    // Energy-driven deformation: read the same values the graph displays so
    // the animation always matches the bar chart exactly, for any nucleus/outcome.
    //   eie above baseline → how oblong (field energy stored as deformation)
    //   ke relative to baseline → how jittery (KE = particle motion)
    const { ke, eie } = computeEnergy(currentScrubFrac);  // currentScrubFrac is the global; frac not in scope here
    const EIE_BASE   = 0.55;   // pre-neutron field energy
    const EIE_RANGE  = 0.30;   // 0.85 − 0.55 = full fission swing
    const DEFORM_MAX = 0.15;
    const stableMult = wobbleMode === 'stable' ? 0.70 : 1.0;

    const normWobble = Math.max(0, (eie - EIE_BASE) / EIE_RANGE);  // 0=circular, 1=fully oblong
    const wobble     = DEFORM_MAX * normWobble * stableMult;
    const scaleAlong = 1 + wobble;
    const scalePerp  = 1 / (1 + wobble * 0.7);
    const jitterS    = 0.95 * Math.min(1, ke / 0.45);  // jitter tracks KE exactly

    // ph2Frac only for the nucleus-center outAmp ramp at the very start of phase 2
    const ph2Frac = (t - PH1_END) / (PH2_END - PH1_END);
    const outAmp = PARTICLE_RADIUS * 0.035 * Math.min(1, ph2Frac / 0.12);
    const jx = outAmp * Math.sin(t * 180);
    const jy = outAmp * Math.cos(t * 150);

    const glowIntensity = normWobble;

    const ncx = animParent.cx, ncy = animParent.cy;
    const cosA = Math.cos(staticFissAngle), sinA = Math.sin(staticFissAngle);

    if (!showParticles) {
      // Outline: ctx.scale to deform the scalloped circle into an ellipse
      ctx.save();
      ctx.translate(jx, jy);
      ctx.translate(ncx, ncy);
      ctx.rotate(staticFissAngle);
      ctx.scale(scaleAlong, scalePerp);
      ctx.rotate(-staticFissAngle);
      ctx.translate(-ncx, -ncy);
      drawCloudOutline(ncx, ncy, animParent.sphereR);
      ctx.restore();
    } else {
      // Particles: actually move each one along the deformation axis + modulated jitter
      const deformed = animParent.particles.map(p => {
        const rx = p.x - ncx, ry = p.y - ncy;
        const along = rx * cosA + ry * sinA;
        const perp  = -rx * sinA + ry * cosA;
        return { ...p,
          x: ncx + along * scaleAlong * cosA - perp * scalePerp * sinA + jx,
          y: ncy + along * scaleAlong * sinA + perp * scalePerp * cosA + jy,
        };
      });
      drawParticles(deformed, jitterS);
    }
    return;
  }

  // Phase 3: separation (skipped for stable mode — nucleus returned to circular)
  if (wobbleMode === 'stable') {
    if (!showParticles) drawCloudOutline(animParent.cx, animParent.cy, animParent.sphereR);
    if (showParticles)  drawParticles(animParent.particles, 0.5);
    return;
  }
  const W = canvas.width, H = canvas.height;
  const cx = W / 2, cy = H / 2;
  const sepT      = (t - PH2_END) / (1.0 - PH2_END);
  const shootT    = Math.min(1, sepT / 0.075);
  const shootEase = Math.min(1, 3 * shootT * shootT * shootT);  // s = 3t³
  const rearT     = Math.min(1, sepT / 0.05);
  const rearEase  = rearT * rearT * (3 - 2 * rearT);

  const cosA = Math.cos(staticFissAngle), sinA = Math.sin(staticFissAngle);
  // Scale shoot distance so daughters exit the visible area at any zoom level
  const exitDiag = Math.sqrt(W * W + H * H);
  const base1 = Math.max(cx + prod1R + PARTICLE_RADIUS + 60 + W * 0.2,
                         exitDiag / (2 * viewZoom) + prod1R + PARTICLE_RADIUS + 60);
  const base2 = Math.max(cx + prod2R + PARTICLE_RADIUS + 60 + W * 0.2,
                         exitDiag / (2 * viewZoom) + prod2R + PARTICLE_RADIUS + 60);
  const sh1dx = -cosA * base1, sh1dy = -sinA * base1;
  const sh2dx =  cosA * base2, sh2dy =  sinA * base2;

  const grp1cx = cx + sh1dx * shootEase;
  const grp1cy = cy + sh1dy * shootEase;
  const grp2cx = cx + sh2dx * shootEase;
  const grp2cy = cy + sh2dy * shootEase;

  const radiusT    = Math.min(1, sepT / 0.0075);
  const radiusEase = radiusT * radiusT * (3 - 2 * radiusT);
  const r1 = animParent.sphereR + (prod1R - animParent.sphereR) * radiusEase;
  const r2 = animParent.sphereR + (prod2R - animParent.sphereR) * radiusEase;

  const pos1 = [], pos2 = [];
  for (const m of animMap) {
    const from = animParent.particles[m.fromIdx];
    const to   = m.prod === 1 ? animProd1.particles[m.toIdx] : animProd2.particles[m.toIdx];
    const sdx  = m.prod === 1 ? sh1dx : sh2dx;
    const sdy  = m.prod === 1 ? sh1dy : sh2dy;
    let x = from.x + (to.x - from.x) * rearEase + sdx * shootEase;
    let y = from.y + (to.y - from.y) * rearEase + sdy * shootEase;
    const residualAmp = PARTICLE_RADIUS * 0.275 * Math.max(0, 1 - sepT / 0.15);
    if (residualAmp > 0) {
      const i = m.fromIdx;
      x += residualAmp * (Math.sin(t*157+i*1.73)*0.45 + Math.sin(t*241+i*3.07)*0.35 + Math.sin(t*389+i*5.31)*0.20);
      y += residualAmp * (Math.sin(t*179+i*2.39)*0.45 + Math.sin(t*263+i*4.13)*0.35 + Math.sin(t*421+i*6.71)*0.20);
    }
    const toZ = (m.prod === 1 ? animProd1 : animProd2).particles[m.toIdx].z;
    const z   = from.z + (toZ - from.z) * rearEase;
    (m.prod === 1 ? pos1 : pos2).push({ x, y, z, type: from.type, i: m.fromIdx });
  }

  if (showElec && shootEase < 1) {
    // Snapshot the parent heatmap (still in hmComposite from phase 2) on first entry
    if (_quality !== 'simple' && _hmXfadeStartFrac < 0 &&
        hmComposite.width === canvas.width && hmComposite.height === canvas.height) {
      _hmXfadeStartFrac = currentScrubFrac;
      hmSnap.width  = canvas.width;
      hmSnap.height = canvas.height;
      hmSnapCtx.clearRect(0, 0, hmSnap.width, hmSnap.height);
      hmSnapCtx.drawImage(hmComposite, 0, 0);
    }

    const sh1x = cx - grp1cx, sh1y = cy - grp1cy;
    const pos1c = pos1.map(p => ({ ...p, x: p.x + sh1x, y: p.y + sh1y }));
    const mask1 = [{ cx, cy, r: r1 + PARTICLE_RADIUS * 3.5, bleed: PARTICLE_RADIUS * 2.5 }];
    heatmapDirty = true;
    ctx.save(); ctx.translate(-sh1x, -sh1y);
    drawElectricHeatmap(pos1c, 0.5, 1.0, mask1);
    ctx.restore();

    const sh2x = cx - grp2cx, sh2y = cy - grp2cy;
    const pos2c = pos2.map(p => ({ ...p, x: p.x + sh2x, y: p.y + sh2y }));
    const mask2 = [{ cx, cy, r: r2 + PARTICLE_RADIUS * 3.5, bleed: PARTICLE_RADIUS * 2.5 }];
    heatmapDirty = true;
    ctx.save(); ctx.translate(-sh2x, -sh2y);
    drawElectricHeatmap(pos2c, 0.5, 1.0, mask2);
    ctx.restore();

    heatmapDirty = true;
    ctx.save();
    ctx.globalCompositeOperation = 'screen';
    drawElectricHeatmap([...pos1, ...pos2], 0.5, 1.0, [{
      type: 'capsule',
      cx1: grp1cx, cy1: grp1cy, r1: r1 + PARTICLE_RADIUS * 2,
      cx2: grp2cx, cy2: grp2cy, r2: r2 + PARTICLE_RADIUS * 2,
      bleed: PARTICLE_RADIUS * 5
    }], canvas.width);
    ctx.restore();

    // Crossfade: fade out the pre-transition parent heatmap over the daughters heatmap
    if (_quality !== 'simple' && _hmXfadeStartFrac >= 0) {
      const xfadeAlpha = 1 - (currentScrubFrac - _hmXfadeStartFrac) / HM_XFADE_DURATION;
      if (xfadeAlpha > 0) {
        ctx.save();
        ctx.globalAlpha = Math.min(1, xfadeAlpha);
        ctx.drawImage(hmSnap, 0, 0);
        ctx.restore();
      }
    }
  }

  if (!showParticles) drawFissionOutline(grp1cx, grp1cy, r1, grp2cx, grp2cy, r2);
  if (showParticles) drawParticles([...pos1, ...pos2]);

  const PHASE3_MAX_SEPT = (ANIM_T_END - PH2_END) / (1.0 - PH2_END);
  const neutronFrac = sepT / PHASE3_MAX_SEPT;
  const screenDiag  = Math.max(canvas.width, canvas.height);
  for (const n of fissionNeutrons) {
    if (n.absorbed) continue;
    const dist = neutronFrac * n.speed * screenDiag;
    const nx = cx + Math.cos(n.angle) * dist;
    const ny = cy + Math.sin(n.angle) * dist;
    const margin = PARTICLE_RADIUS * 2;
    const halfVW = canvas.width  / (2 * viewZoom);
    const halfVH = canvas.height / (2 * viewZoom);
    if (nx > cx - halfVW - margin && nx < cx + halfVW + margin &&
        ny > cy - halfVH - margin && ny < cy + halfVH + margin) {
      drawNeutron(nx, ny);
    }
  }
}

// ─── Canonical renderer — single source of truth for any scrub position ───────
function renderAtFrac(frac) {
  ctx.fillStyle = document.body.classList.contains('screenshot-mode') ? getBgColor() : '#05040f';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  if (!animParent) { drawEnergyGraph(); return; }

  ctx.save();
  const _W = canvas.width, _H = canvas.height;
  const fvShift = (arrowMode > 0)
    ? -(forceVizPanelEl.offsetWidth + 20) / 2
    : 0;
  const _tbH = document.getElementById('toolbar').offsetHeight;
  const _sbEl = document.getElementById('scrubBar');
  const _sbH  = _sbEl.classList.contains('visible') ? _sbEl.offsetHeight : 0;
  const _centerY = (_tbH + _H - _sbH) / 2;
  ctx.translate(_W / 2 + fvShift, _centerY);
  ctx.scale(viewZoom, viewZoom);
  ctx.translate(-_W / 2, -_H / 2);

  const showElec = document.getElementById('showElectric').checked;
  const parentMask = [{ cx: animParent.cx, cy: animParent.cy, r: animParent.sphereR + PARTICLE_RADIUS * 3.5 }];

  if (frac < NEUTRON_FRAC) {
    // Neutron flying zone
    if (showElec) drawElectricHeatmap(animParent.particles, 0.5, 1.0, parentMask);
    if (!showParticles) drawCloudOutline(animParent.cx, animParent.cy, animParent.sphereR);
    if (neutronState === 'passing') {
      // Pass-through: nucleus particles first so the neutron renders in front of them
      if (showParticles) drawParticles(animParent.particles, 0.85);
      drawNeutron(neutronX, neutronY);
    } else {
      if (neutronState === 'bouncing') {
        drawNeutron(neutronX, neutronY);
      } else if (neutronState === 'idle') {
        drawNeutron(PARTICLE_RADIUS + 60, animParent.cy);
      } else {
        const nf = frac / NEUTRON_FRAC;
        const nx = (PARTICLE_RADIUS + 60) + nf * (neutronImpactX() - (PARTICLE_RADIUS + 60));
        drawNeutron(nx, animParent.cy);
      }
      if (showParticles) drawParticles(animParent.particles, 0.85);
    }
  } else {
    // Fission zone
    const ff = (frac - NEUTRON_FRAC) / (1 - NEUTRON_FRAC);
    const t = PH1_END + ff * (FISS_STOP_T - PH1_END);
    drawAnimContent(t);
  }

  ctx.restore();
  drawEnergyGraph();
  updateParticleCounters();
  captureFrame();
}

// ─── Particle counter ─────────────────────────────────────────────────────────
function updateParticleCounters() {
  const p1P   = document.getElementById('p1Protons');
  const p1N   = document.getElementById('p1Neutrons');
  const p2El  = document.getElementById('p2Counter');
  const p2P   = document.getElementById('p2Protons');
  const p2N   = document.getElementById('p2Neutrons');
  if (!p1P) return;
  const showP2 = v => { p2El.style.visibility = v ? '' : 'hidden'; };
  const nd = NUCLEUS_DEFS[selectedNucleusKey];
  const f = currentScrubFrac;
  if (f < NEUTRON_FRAC) {
    // Before impact: parent nucleus + free neutron
    p1P.textContent = nd.Z; p1N.textContent = nd.N;
    showP2(true); p2P.textContent = 0; p2N.textContent = 1;
  } else if (wobbleMode === 'stable' || f < 0.742) {
    // Absorbed but not yet split (or failed fission, or still During): Z, N+1
    p1P.textContent = nd.Z; p1N.textContent = nd.N + 1;
    showP2(false);
  } else {
    // Daughters ejected
    showP2(true);
    if (fissionBranch === 0) {
      // Xe-140 (54p, 86n) + Sr-94 (38p, 56n)
      p1P.textContent = 54; p1N.textContent = 86;
      p2P.textContent = 38; p2N.textContent = 56;
    } else {
      // Ba-141 (56p, 85n) + Kr-92 (36p, 56n)
      p1P.textContent = 56; p1N.textContent = 85;
      p2P.textContent = 36; p2N.textContent = 56;
    }
  }
}

// ─── Prompt fission neutrons ──────────────────────────────────────────────────
let fissionNeutrons = [];  // [{angle, speed}] — generated fresh each Go press

function genFissionNeutrons() {
  // Branch 0 (Xe+Sr): 2 prompt neutrons; Branch 1 (Ba+Kr): 3 prompt neutrons
  const count = fissionBranch === 0 ? 2 : 3;
  fissionNeutrons = [];
  for (let i = 0; i < count; i++) {
    fissionNeutrons.push({
      angle: Math.random() * Math.PI * 2,
      speed: 2.5 + Math.random() * 1.5,   // 2.5–4.0× normalized, off-screen in first ~25–40%
      absorbed: false,
    });
  }
}

// ─── Neutron state machine ────────────────────────────────────────────────────
let neutronState      = 'idle';
let neutronX          = 0;
let neutronY          = 0;
let neutronLast       = 0;
let neutronRAF        = null;
let bounceVX          = -1;   // unit direction for bouncing neutron
let bounceVY          = 0;
let consecutiveBounces = 0;   // consecutive high-speed bounces without fission
let staticFissStart = 0;
let staticFissT     = 0;
let staticFissAngle = 0;
let staticNeutronIX = 0;
let staticNeutronIY = 0;

const NEUTRON_FRAC = 0.2;
// scrubFrac at which drawAnimContent enters Phase 3 (t = PH2_END, daughters start separating)




function neutronImpactX() {
  return animParent.cx - animParent.sphereR - PARTICLE_RADIUS;
}

// ─── Force visualization panel (fission tab) ──────────────────────────────────
const forceVizPanelEl = document.getElementById('forceVizPanel');
const forceVizCv      = document.getElementById('forceVizCanvas');
const FV_ELEC_COLOR   = 'rgba(70,165,255,0.88)';
const FV_STRONG_COLOR = 'rgba(255,185,70,0.88)';

// Arrow drawing matching v11's quadratic-curve + glow style
function fvArrowOnCtx(c, fromX, fromY, nx, ny, len, color, lw, headLen) {
  if (len < 1) return;
  const HEAD = headLen !== undefined ? headLen : Math.max(5, len * 0.234);
  const midX = fromX + nx * len * 0.5, midY = fromY + ny * len * 0.5;
  const tipX = fromX + nx * len,       tipY = fromY + ny * len;
  const perpX = -ny, perpY = nx;
  const baseX = tipX - nx * HEAD, baseY = tipY - ny * HEAD;
  c.strokeStyle = color; c.fillStyle = color;
  c.save();
  c.shadowColor = color; c.shadowBlur = 8;
  c.lineWidth = lw; c.globalAlpha = 1.0; c.lineCap = 'round';
  c.beginPath(); c.moveTo(fromX, fromY);
  c.quadraticCurveTo(midX, midY, baseX, baseY);
  c.stroke();
  const hw = lw * 1.44;
  c.beginPath();
  c.moveTo(tipX, tipY);
  c.lineTo(baseX + perpX * hw, baseY + perpY * hw);
  c.lineTo(baseX - perpX * hw, baseY - perpY * hw);
  c.closePath(); c.fill();
  c.restore();
}

// Draw a single proton or neutron in the force panel (v11 gradient style)
function fvDrawParticle(c, px, py, r, type) {
  const isP = type === 'proton';
  const baseGrad = c.createRadialGradient(px, py, 0, px, py, r * 1.1);
  if (isP) {
    baseGrad.addColorStop(0, '#ff1a65'); baseGrad.addColorStop(0.82, '#ff1a65'); baseGrad.addColorStop(1, 'rgba(0,0,0,0)');
  } else {
    baseGrad.addColorStop(0, '#70707f'); baseGrad.addColorStop(0.82, '#70707f'); baseGrad.addColorStop(1, 'rgba(0,0,0,0)');
  }
  c.beginPath(); c.arc(px, py, r * 1.1, 0, Math.PI * 2);
  c.fillStyle = baseGrad; c.fill();
  const coreGrad = c.createRadialGradient(px, py, 0, px, py, r);
  const core = isP ? '#ff80b0' : '#b0b0c4';
  coreGrad.addColorStop(0, core); coreGrad.addColorStop(0.5, core); coreGrad.addColorStop(1, 'rgba(0,0,0,0)');
  c.globalAlpha = 0.82;
  c.beginPath(); c.arc(px, py, r, 0, Math.PI * 2);
  c.fillStyle = coreGrad; c.fill();
  c.globalAlpha = 1;
  if (isP) {
    c.fillStyle = 'rgba(255,255,255,0.88)';
    c.font = `bold ${Math.max(8, r * 1.1)}px Lexend, sans-serif`;
    c.textAlign = 'center'; c.textBaseline = 'middle';
    c.fillText('+', px, py + 1);
  }
}

// Draw a group of particles scaled from world space into a panel region
// worldParticles: [{x,y,type}] in world coords, worldCx/Cy = world centroid
// panelCx/Cy = destination centre in panel, panelR = destination radius
function fvDrawParticleGroup(c, worldParticles, worldCx, worldCy, worldSphereR, panelCx, panelCy, panelR) {
  const scale = panelR / worldSphereR;
  const PR = Math.max(2, PARTICLE_RADIUS * scale * 0.85);
  // Sort back-to-front by z so front particles overdraw rear ones
  const sorted = [...worldParticles].sort((a, b) => (a.z || 0) - (b.z || 0));
  for (const p of sorted) {
    const px = panelCx + (p.x - worldCx) * scale;
    const py = panelCy + (p.y - worldCy) * scale;
    fvDrawParticle(c, px, py, PR, p.type);
  }
}

// Draw the real scallop cloud outline onto any context, with optional deformation transform.
// scaleAlong/scalePerp applied along fissAngle axis. Pass c=fvc to draw in force panel.
function fvCloudOutline(c, panelCx, panelCy, panelR, worldSphereR, scaleAlong, scalePerp, fissAngle) {
  const pscale = panelR / worldSphereR;
  c.save();
  c.translate(panelCx, panelCy);
  c.rotate(fissAngle);
  c.scale(scaleAlong * pscale, scalePerp * pscale);
  c.rotate(-fissAngle);
  c.translate(-panelCx, -panelCy);
  drawCloudOutline(panelCx, panelCy, worldSphereR, c);
  c.restore();
}

function drawForceViz() {
  if (arrowMode === 0) return;

  const fvc = forceVizCv.getContext('2d');
  const W = forceVizCv.width, H = forceVizCv.height;
  fvc.clearRect(0, 0, W, H);

  const cx = W / 2, cy = H / 2;
  const panelR = animParent ? animParent.sphereR * 0.8 : 40;

  const frac = currentScrubFrac;
  // Pre-impact: the panel shows a horizontal pair of arrows by default. While
  // the user is actively rotating the nucleus, the arrows mirror the rotation
  // in 2D (dragRotY → clockwise/counter spin in the panel) and a vertical
  // squash communicates the forward/backward tilt (dragRotX → cos squash on Y).
  // Post-impact, `staticFissAngle` drives the viz.
  const preImpact = frac < NEUTRON_FRAC;
  const fissAngle = preImpact ? (nucleusDrag ? dragRotY : 0) : staticFissAngle;
  const pitchScale = (preImpact && nucleusDrag) ? Math.cos(dragRotX) : 1;
  const cosF = Math.cos(fissAngle), sinF = Math.sin(fissAngle);

  // Fixed arrowhead size (based on max arrow length) — only stem shortens
  const fixedHead = panelR * 1.17 * 0.234;

  // Arrow wrapper: start at (fromX,fromY), direction (nx,ny), length len
  // hl = head length override; undefined = proportional to len (whole arrow scales)
  function arrow(fromX, fromY, nx, ny, len, color, hl = fixedHead) {
    fvArrowOnCtx(fvc, fromX, fromY, nx, ny, len, color, 9, hl);
  }

  // Perpendicular to fission axis (used to offset parallel arrows)
  const perpX = -sinF, perpY = cosF;
  const sep = 12;  // px separation between paired arrows

  // Draw arrow centered at (hcx, hcy), pointing in (dx, dy), offset perp by perpOff
  function centeredArrow(hcx, hcy, dx, dy, len, color, perpOff, hl = fixedHead) {
    const fx = hcx - dx * len / 2 + perpX * perpOff;
    const fy = hcy - dy * len / 2 + perpY * perpOff;
    arrow(fx, fy, dx, dy, len, color, hl);
  }

  // Draw nucleus outline or particles for a given deformation
  function drawNucleus(panelCx, panelCy, pR, sAlong, sPerp, particles) {
    if (showParticles && particles) {
      fvDrawParticleGroup(fvc, particles.pts, particles.wcx, particles.wcy, particles.wsR, panelCx, panelCy, pR);
    } else if (animParent) {
      fvCloudOutline(fvc, panelCx, panelCy, pR, animParent.sphereR, sAlong, sPerp, fissAngle);
    }
  }

  // ── Balanced stable nucleus (before + during neutron approach) ───────────
  // Always show balanced forces; they change once wobble starts
  const maxBalanced = panelR * 1.08;
  const stableParticles = animParent ? { pts: animParent.particles, wcx: animParent.cx, wcy: animParent.cy, wsR: animParent.sphereR } : null;

  if (preImpact) {
    // Nucleus is drawn unsquashed — its particles are already in their
    // rotated positions (animParent.particles is mutated by the drag), so
    // the panel mirrors the main canvas exactly.
    drawNucleus(cx, cy, panelR, 1, 1, stableParticles);
    // Arrows alone get the vertical squash (pitch cue) so the user sees the
    // axis tilting forward/backward without distorting the nucleus drawing.
    if (pitchScale !== 1) {
      fvc.save();
      fvc.translate(cx, cy);
      fvc.scale(1, pitchScale);
      fvc.translate(-cx, -cy);
    }
    // Balanced: electric outward = strong inward, equal length — centered on each half, parallel
    const halfOff = panelR * 1.0;
    const rhcx = cx + cosF * halfOff, rhcy = cy + sinF * halfOff;
    const lhcx = cx - cosF * halfOff, lhcy = cy - sinF * halfOff;
    centeredArrow(rhcx, rhcy,  cosF,  sinF, maxBalanced, FV_ELEC_COLOR,    sep);
    centeredArrow(rhcx, rhcy, -cosF, -sinF, maxBalanced, FV_STRONG_COLOR, -sep);
    centeredArrow(lhcx, lhcy, -cosF, -sinF, maxBalanced, FV_ELEC_COLOR,    sep);
    centeredArrow(lhcx, lhcy,  cosF,  sinF, maxBalanced, FV_STRONG_COLOR, -sep);
    if (pitchScale !== 1) fvc.restore();
    return;
  }

  // ── Fission zone ─────────────────────────────────────────────────────────
  const ff = (frac - NEUTRON_FRAC) / (1 - NEUTRON_FRAC);
  const t  = PH1_END + ff * (FISS_STOP_T - PH1_END);

  if (t <= PH2_END) {
    // Phase 2: wobble — energy-driven, same source as the bar chart
    const { ke: _ke, eie } = computeEnergy(frac);
    const EIE_BASE   = 0.38;
    const EIE_RANGE  = 0.47;
    const DEFORM_MAX = 0.15;
    const stableMult = wobbleMode === 'stable' ? 0.70 : 1.0;
    const normWobble = Math.max(0, (eie - EIE_BASE) / EIE_RANGE);
    const wobble     = DEFORM_MAX * normWobble * stableMult;
    const scaleAlong = 1 + wobble;
    const scalePerp  = 1 / (1 + wobble * 0.7);
    const deformFrac = normWobble * stableMult;  // 0=spherical → 1=max elongation; drives strong arrow

    let ph2Particles = null;
    if (showParticles && animParent) {
      const ncx = animParent.cx, ncy = animParent.cy;
      const cosA = Math.cos(fissAngle), sinA = Math.sin(fissAngle);
      const deformed = animParent.particles.map(p => {
        const rx = p.x - ncx, ry = p.y - ncy;
        const along = rx * cosA + ry * sinA;
        const perp  = -rx * sinA + ry * cosA;
        return { ...p,
          x: ncx + along * scaleAlong * cosA - perp * scalePerp * sinA,
          y: ncy + along * scaleAlong * sinA + perp * scalePerp * cosA,
        };
      });
      ph2Particles = { pts: deformed, wcx: ncx, wcy: ncy, wsR: animParent.sphereR };
    }
    drawNucleus(cx, cy, panelR, scaleAlong, scalePerp, ph2Particles);

    const maxE = panelR * 1.17;
    const maxS = panelR * 1.08;
    const electricLen = maxE;
    // Strong weakens as nucleus elongates: full when round, 50% of electric at max oblong
    const strongLen = maxS + deformFrac * (0.5 * maxE - maxS);

    // Centered on each deformed half, parallel arrows
    const halfOff2 = panelR * scaleAlong * 1.0;
    const rhcx = cx + cosF * halfOff2, rhcy = cy + sinF * halfOff2;
    const lhcx = cx - cosF * halfOff2, lhcy = cy - sinF * halfOff2;
    centeredArrow(rhcx, rhcy,  cosF,  sinF, electricLen, FV_ELEC_COLOR,    sep);
    centeredArrow(lhcx, lhcy, -cosF, -sinF, electricLen, FV_ELEC_COLOR,    sep);
    centeredArrow(rhcx, rhcy, -cosF, -sinF, strongLen,   FV_STRONG_COLOR, -sep);
    centeredArrow(lhcx, lhcy,  cosF,  sinF, strongLen,   FV_STRONG_COLOR, -sep);

  } else {
    // Phase 3: camera follows f2; f1 shoots off using main-canvas shoot timing (4× speed)
    const sepT      = (t - PH2_END) / (1.0 - PH2_END);
    const shootT    = Math.min(1, sepT / 0.075);
    const shootEase = Math.min(1, 3 * shootT * shootT * shootT);

    const fragR2 = panelR * 0.58;
    const fragR1 = panelR * 0.65;
    const maxE   = panelR * 1.17;

    // f2 stays centered; f1 shoots off at 4× the previous speed
    const f2x = cx, f2y = cy;
    const f1sep = (panelR + fragR1) * (0.05 + shootEase * 16);
    const f1x = cx - cosF * f1sep, f1y = cy - sinF * f1sep;

    // Draw using union outline (peanut while overlapping, separate when apart)
    if (showParticles && animProd1 && animProd2) {
      fvDrawParticleGroup(fvc, animProd1.particles, animProd1.cx, animProd1.cy, animProd1.sphereR, f1x, f1y, fragR1);
      fvDrawParticleGroup(fvc, animProd2.particles, animProd2.cx, animProd2.cy, animProd2.sphereR, f2x, f2y, fragR2);
    } else {
      drawFissionOutline(f1x, f1y, fragR1, f2x, f2y, fragR2, fvc);
    }

    // Electric arrows fade quickly: 20% of max by frame 900 (sepT ≈ 0.0384)
    const sepT900 = (PH1_END + 0.875 * (FISS_STOP_T - PH1_END) - PH2_END) / (1.0 - PH2_END);
    const electricLen = maxE * Math.pow(0.20, sepT / sepT900);

    // From frame 830 onward, whole arrow (including head) shrinks; before that, fixed head
    const sepT830 = (PH1_END + 0.7875 * (FISS_STOP_T - PH1_END) - PH2_END) / (1.0 - PH2_END);
    const hl = sepT < sepT830 ? fixedHead : undefined;

    // f2: base anchored at surface, tip retracts as arrow shortens
    arrow(f2x + cosF * fragR2, f2y + sinF * fragR2, cosF, sinF, electricLen, FV_ELEC_COLOR, hl);
    // f1: base anchored at surface, pointing outward (away from f2), only while visible
    if (f1x > -fragR1 - electricLen && f1x < W + fragR1 + electricLen) {
      arrow(f1x - cosF * fragR1, f1y - sinF * fragR1, -cosF, -sinF, electricLen, FV_ELEC_COLOR, hl);
    }
  }
}

function syncForceVizVisibility() {
  const show = arrowMode > 0;
  forceVizPanelEl.style.display = show ? 'block' : 'none';
}

function updateEnergyPct() {
  const { ke, eie } = computeEnergy(currentScrubFrac);
  document.getElementById('energyPctKE').textContent = Math.round(ke  * 100) + '%';
  document.getElementById('energyPctIE').textContent = Math.round(eie * 100) + '%';
}

function updatePhaseTimeline() {
  const tl = document.getElementById('phaseTimeline');
  if (tl) tl.style.display = wobbleMode === 'stable' ? 'none' : '';
  const f   = currentScrubFrac;                      // current position (for highlight)
  const rev = Math.max(f, maxRevealedFrac);           // how far playback has ever reached
  const before = document.getElementById('phaseSeg-before');
  const during = document.getElementById('phaseSeg-during');
  const after  = document.getElementById('phaseSeg-after');
  if (!before) return;
  const phase = f < NEUTRON_FRAC ? 'before' : f < 0.742 ? 'during' : 'after';
  // Reveal: segment appears once playback has reached it; stays visible when scrubbing back
  during.style.display = rev >= NEUTRON_FRAC ? '' : 'none';
  after.style.display  = rev >= 0.742        ? '' : 'none';
  // Before label only shows once the full timeline is built
  before.style.fontSize = rev >= 0.742 ? '' : '0px';
  // Highlight: skip opacity changes during replay so the labels don't flicker
  if (!playbackRAF) {
    before.style.opacity = phase === 'before' ? '1' : '0.35';
    during.style.opacity = phase === 'during' ? '1' : '0.35';
    after.style.opacity  = phase === 'after'  ? '1' : '0.35';
  }
}

function drawStaticFrame() {
  syncForceVizVisibility();   // set display before renderAtFrac reads offsetWidth
  syncForceVizVisibility();
  renderAtFrac(currentScrubFrac);
  drawForceViz();
  updateEnergyPct();

function scrubPct(frac) { return Math.round(frac * 1000); }

const _scrubSliderEl = document.getElementById('scrubSlider');
new MutationObserver(() => {

  else if (playing)    frameCounterEl.textContent = `${v}`;

  else                 frameCounterEl.textContent = `${v} / ${tot}`;
