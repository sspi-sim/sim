// Wobble mode, picked randomly each time a nucleus is hit:
//   'dip1'   50% — 1 KE dip  : nucleus elongates once then fissions
//   'dip2'   20% — 2 KE dips : one full wobble back to circular, then elongates and fissions
//   'dip3'   15% — 3 KE dips : two full wobbles, then elongates and fissions
//   'stable' 15% — 3 KE dips : three full wobbles, nucleus returns to circular (no fission)
let wobbleMode = 'dip1';
let fissionBranch = 0;   // 0 = Xe-140 + Sr-94, 1 = Ba-144 + Kr-90

function pickWobbleMode() {
  const r = Math.random();
  if (currentTab === 'fission') {
    if (r < 0.80) return 'dip1';
    if (r < 0.90) return 'dip2';
    return 'dip3';
  }
  // chain tab
  if (r < 0.50) return 'dip1';
  if (r < 0.70) return 'dip2';
  if (r < 0.85) return 'dip3';
  return 'stable';
}

// General wobble signal — ph2 ∈ [0,1], returns normWobble ∈ [0,1].
// Continuously differentiable everywhere (zero derivative at all segment joins).
//
//   dip1:   [0,1]       half-cosine 0→1 (pure elongation, 1 minimum at end)
//   dip2:   [0,½]       full cycle 0→1→0  +  [½,1] half-cosine 0→1
//   dip3:   [0,⅓][⅓,⅔] two full cycles  +  [⅔,1]  half-cosine 0→1
//   stable: [0,⅓][⅓,⅔][⅔,1] three full cycles (ends at 0 → no fission)
function wobbleSignal(ph2, mode) {
  if (mode === 'dip1') {
    return (1 - Math.cos(Math.PI * ph2)) / 2;
  }
  if (mode === 'stable') {
    // Three full cycles: cycles 1+2 each take 1/5 of ph2, cycle 3 takes 3/5 (3× slower)
    const segs = [0, 0.2, 0.4, 1.0];
    const i = ph2 < segs[1] ? 0 : ph2 < segs[2] ? 1 : 2;
    const p = (ph2 - segs[i]) / (segs[i + 1] - segs[i]);
    return (1 - Math.cos(2 * Math.PI * p)) / 2;
  }
  const nFull = mode === 'dip2' ? 1 : 2;
  const nSegs = nFull + 1;
  const T = 1 / nSegs;
  if (ph2 > nFull * T) {
    const p = (ph2 - nFull * T) / T;
    return (1 - Math.cos(Math.PI * p)) / 2;
  }
  const i = Math.min(nSegs - 1, Math.floor(ph2 / T));
  const p = (ph2 - i * T) / T;
  return (1 - Math.cos(2 * Math.PI * p)) / 2;
}

function initNuclei() {
  const W = canvas.width, H = canvas.height;
  const cx = W / 2, cy = H / 2;

  const nd = NUCLEUS_DEFS[selectedNucleusKey];
  animParent = generateNucleus(nd.animZ, nd.animN, cx, cy, currentSeed);
  // Visual-only display scale: shrink particle positions relative to nucleus center
  if (nd.displayScale !== 1.0) {
    const ds = nd.displayScale;
    for (const p of animParent.particles) {
      p.x = cx + (p.x - cx) * ds;
      p.y = cy + (p.y - cy) * ds;
    }
    animParent.sphereR *= ds;
  }
  animProd1  = generateNucleus(nd.prod1.Z, nd.prod1.N, cx, cy, currentSeed * 1001 + 7);
  animProd2  = generateNucleus(nd.prod2.Z, nd.prod2.N, cx, cy, currentSeed * 1003 + 13);

  // Daughter radii are fixed — no shrinking as they fly
  prod1R = animProd1.sphereR * 0.7;
  prod2R = animProd2.sphereR * 0.7;

  const byX = (type) => animParent.particles
    .map((p, i) => ({ i, x: p.x }))
    .filter(({i}) => animParent.particles[i].type === type)
    .sort((a, b) => a.x - b.x);

  const toIdx = (prod, type) => prod.particles
    .map((p, i) => ({ i, x: p.x }))
    .filter(({i}) => prod.particles[i].type === type)
    .sort((a, b) => a.x - b.x)
    .map(({i}) => i);

  const parentP = byX('proton');
  const parentN = byX('neutron');
  const p1P = toIdx(animProd1, 'proton');
  const p1N = toIdx(animProd1, 'neutron');
  const p2P = toIdx(animProd2, 'proton');
  const p2N = toIdx(animProd2, 'neutron');

  const z1 = nd.prod1.Z, z2 = nd.prod2.Z;
  const n1 = nd.prod1.N, n2 = nd.prod2.N;
  animMap = [];
  for (let k = 0; k < z1; k++)  animMap.push({ fromIdx: parentP[k].i,      prod: 1, toIdx: p1P[k] });
  for (let k = 0; k < z2; k++)  animMap.push({ fromIdx: parentP[z1+k].i,   prod: 2, toIdx: p2P[k] });
  for (let k = 0; k < n1; k++)  animMap.push({ fromIdx: parentN[k].i,      prod: 1, toIdx: p1N[k] });
  for (let k = 0; k < n2; k++)  animMap.push({ fromIdx: parentN[n1+k].i,   prod: 2, toIdx: p2N[k] });

  const agDef = NUCLEUS_DEFS['ag107'];
  animControl = generateNucleus(agDef.animZ, agDef.animN, cx, cy, 0x4a5b6c7d);
  if (agDef.displayScale !== 1.0) {
    const ds = agDef.displayScale;
    for (const p of animControl.particles) {
      p.x = cx + (p.x - cx) * ds;
      p.y = cy + (p.y - cy) * ds;
    }
    animControl.sphereR *= ds;
  }
  buildNucleusImages();
}

// Pre-render a nucleus to an offscreen canvas using the full gradient renderer.
// The result is a square canvas with the nucleus centered; draw with drawImage scaled to
// (cx - halfDraw, cy - halfDraw, halfDraw*2, halfDraw*2) where
// halfDraw = (_NUCLEUS_IMG_PAD + nucleus.sphereR) * (displayR / nucleus.sphereR).
const _NUCLEUS_IMG_PAD = PARTICLE_RADIUS * 2 + 2;
function _prerenderNucleus(nucleus) {
  const r    = nucleus.sphereR;
  const size = Math.ceil((r + _NUCLEUS_IMG_PAD) * 2);
  const oc   = document.createElement('canvas');
  oc.width = oc.height = size;
  oc._natR = r;
  const ocCtx = oc.getContext('2d');
  const dx = size / 2 - nucleus.cx, dy = size / 2 - nucleus.cy;
  const pts = nucleus.particles.map(p => ({ ...p, x: p.x + dx, y: p.y + dy }));
  const savedFlat = _flatFill;
  _flatFill = false;  // always render with full gradient quality
  drawParticles(pts, 0, 1, ocCtx);
  _flatFill = savedFlat;
  return oc;
}

function buildNucleusImages() {
  _imgParent  = _prerenderNucleus(animParent);
  _imgProd1   = _prerenderNucleus(animProd1);
  _imgProd2   = _prerenderNucleus(animProd2);
  _imgControl = _prerenderNucleus(animControl);
}



// ─── Frame content renderer — called inside renderAtFrac's zoom transform ─────
function drawAnimContent(t) {
  const showElec = false;  // electric field disabled on chain tab
  const parentMask = [{ cx: animParent.cx, cy: animParent.cy, r: animParent.sphereR + PARTICLE_RADIUS * 3.5 }];

  // Phase 1: still
  if (t <= PH1_END) {
    if (showElec) drawElectricHeatmap(animParent.particles, 0.5, 1.0, parentMask);
    if (!showParticles) drawCloudOutline(animParent.cx, animParent.cy, animParent.sphereR);
    if (showParticles) drawParticles(animParent.particles, 0.5);   // 2x jitter in static scene
    return;
  }

  // Phase 2: excited state
  if (t <= PH2_END) {
    if (showElec) drawElectricHeatmap(animParent.particles, 0.5, 1.0, parentMask);

    // Energy-driven deformation: compute eie/ke inline for wobble animation
    const _frac = currentScrubFrac;
    let ke, eie;
    if (_frac < NEUTRON_FRAC) { ke = 0.45; eie = 0.55; }
    else {
      const _ff = (_frac - NEUTRON_FRAC) / (1 - NEUTRON_FRAC);
      const _t  = PH1_END + _ff * (ANIM_T_END - PH1_END);
      const E_PH2 = 0.381;
      if (_t <= E_PH2) {
        const ph2 = (_t - PH1_END) / (E_PH2 - PH1_END);
        const normW = wobbleSignal(ph2, wobbleMode);
        const keHigh = 0.45 - 0.06 * ph2;
        const stableAmps = [0.20, 0.40, 0.20];
        const stableCycle = ph2 < 0.2 ? 0 : ph2 < 0.4 ? 1 : 2;
        const keLow = wobbleMode === 'stable'
          ? 0.45 - stableAmps[stableCycle]
          : 0.45 - 0.30 * (2 * ph2 - ph2 * ph2);
        const t01 = (1 - Math.cos(normW * Math.PI)) / 2;
        ke = keHigh - (keHigh - keLow) * t01;
        eie = 1 - ke;
      } else {
        const KE_RAMP_START = 0.580;
        if (_frac < KE_RAMP_START) { ke = 0.15; eie = 0.85; }
        else {
          const rph = (_frac - KE_RAMP_START) / (1.0 - KE_RAMP_START);
          const s = 1 - Math.exp(-rph * rph * 6.0);
          ke = 0.15 + 0.65 * s;
          eie = Math.max(0.05, 1 - ke);
        }
      }
    }
    const EIE_BASE   = 0.55;   // pre-neutron field energy
    const EIE_RANGE  = 0.30;   // 0.85 − 0.55 = full fission swing
    const DEFORM_MAX = 0.15;
    const stableMult = wobbleMode === 'stable' ? 0.70 : 1.0;

    const normWobble = Math.max(0, (eie - EIE_BASE) / EIE_RANGE);  // 0=circular, 1=fully oblong
    const wobble     = DEFORM_MAX * normWobble * stableMult;
    const scaleAlong = 1 + wobble;
    const scalePerp  = 1 / (1 + wobble * 0.7);
    const jitterS    = 0.85 * Math.min(1, ke / 0.45);  // jitter tracks KE exactly

    // ph2Frac only for the nucleus-center outAmp ramp at the very start of phase 2
    const ph2Frac = (t - PH1_END) / (PH2_END - PH1_END);
    const outAmp = PARTICLE_RADIUS * 0.035 * Math.min(1, ph2Frac / 0.12);
    const jx = outAmp * Math.sin(t * 180);
    const jy = outAmp * Math.cos(t * 150);

    const glowIntensity = normWobble;

    const ncx = animParent.cx, ncy = animParent.cy;
    const cosA = Math.cos(staticFissAngle), sinA = Math.sin(staticFissAngle);

    if (!showParticles) {
      // Outline: ctx.scale to deform the scalloped circle into an ellipse
      ctx.save();
      ctx.translate(jx, jy);
      ctx.translate(ncx, ncy);
      ctx.rotate(staticFissAngle);
      ctx.scale(scaleAlong, scalePerp);
      ctx.rotate(-staticFissAngle);
      ctx.translate(-ncx, -ncy);
      drawCloudOutline(ncx, ncy, animParent.sphereR);
      ctx.restore();
    } else {
      // Particles: actually move each one along the deformation axis + modulated jitter
      const deformed = animParent.particles.map(p => {
        const rx = p.x - ncx, ry = p.y - ncy;
        const along = rx * cosA + ry * sinA;
        const perp  = -rx * sinA + ry * cosA;
        return { ...p,
          x: ncx + along * scaleAlong * cosA - perp * scalePerp * sinA + jx,
          y: ncy + along * scaleAlong * sinA + perp * scalePerp * cosA + jy,
        };
      });
      drawParticles(deformed, jitterS);
    }
    return;
  }

  // Phase 3: separation (skipped for stable mode — nucleus returned to circular)
  if (wobbleMode === 'stable') {
    if (!showParticles) drawCloudOutline(animParent.cx, animParent.cy, animParent.sphereR);
    if (showParticles)  drawParticles(animParent.particles, 0.5);
    return;
  }
  const W = canvas.width, H = canvas.height;
  const cx = W / 2, cy = H / 2;
  const sepT      = (t - PH2_END) / (1.0 - PH2_END);
  const shootT    = Math.min(1, sepT / 0.075);
  const shootEase = Math.min(1, 3 * shootT * shootT * shootT);  // s = 3t³
  const rearT     = Math.min(1, sepT / 0.05);
  const rearEase  = rearT * rearT * (3 - 2 * rearT);

  const cosA = Math.cos(staticFissAngle), sinA = Math.sin(staticFissAngle);
  // Scale shoot distance so daughters exit the visible area at any zoom level
  const exitDiag = Math.sqrt(W * W + H * H);
  const base1 = Math.max(cx + prod1R + PARTICLE_RADIUS + 60 + W * 0.2,
                         exitDiag / (2 * viewZoom) + prod1R + PARTICLE_RADIUS + 60);
  const base2 = Math.max(cx + prod2R + PARTICLE_RADIUS + 60 + W * 0.2,
                         exitDiag / (2 * viewZoom) + prod2R + PARTICLE_RADIUS + 60);
  const sh1dx = -cosA * base1, sh1dy = -sinA * base1;
  const sh2dx =  cosA * base2, sh2dy =  sinA * base2;

  const grp1cx = cx + sh1dx * shootEase;
  const grp1cy = cy + sh1dy * shootEase;
  const grp2cx = cx + sh2dx * shootEase;
  const grp2cy = cy + sh2dy * shootEase;

  const radiusT    = Math.min(1, sepT / 0.0075);
  const radiusEase = radiusT * radiusT * (3 - 2 * radiusT);
  const r1 = animParent.sphereR + (prod1R - animParent.sphereR) * radiusEase;
  const r2 = animParent.sphereR + (prod2R - animParent.sphereR) * radiusEase;

  const pos1 = [], pos2 = [];
  for (const m of animMap) {
    const from = animParent.particles[m.fromIdx];
    const to   = m.prod === 1 ? animProd1.particles[m.toIdx] : animProd2.particles[m.toIdx];
    const sdx  = m.prod === 1 ? sh1dx : sh2dx;
    const sdy  = m.prod === 1 ? sh1dy : sh2dy;
    let x = from.x + (to.x - from.x) * rearEase + sdx * shootEase;
    let y = from.y + (to.y - from.y) * rearEase + sdy * shootEase;
    const residualAmp = PARTICLE_RADIUS * 0.275 * Math.max(0, 1 - sepT / 0.15);
    if (residualAmp > 0) {
      const i = m.fromIdx;
      x += residualAmp * (Math.sin(t*157+i*1.73)*0.45 + Math.sin(t*241+i*3.07)*0.35 + Math.sin(t*389+i*5.31)*0.20);
      y += residualAmp * (Math.sin(t*179+i*2.39)*0.45 + Math.sin(t*263+i*4.13)*0.35 + Math.sin(t*421+i*6.71)*0.20);
    }
    const toZ = (m.prod === 1 ? animProd1 : animProd2).particles[m.toIdx].z;
    const z   = from.z + (toZ - from.z) * rearEase;
    (m.prod === 1 ? pos1 : pos2).push({ x, y, z, type: from.type, i: m.fromIdx });
  }

  if (showElec && shootEase < 1) {
    const sh1x = cx - grp1cx, sh1y = cy - grp1cy;
    const pos1c = pos1.map(p => ({ ...p, x: p.x + sh1x, y: p.y + sh1y }));
    const mask1 = [{ cx, cy, r: r1 + PARTICLE_RADIUS * 3.5, bleed: PARTICLE_RADIUS * 2.5 }];
    heatmapDirty = true;
    ctx.save(); ctx.translate(-sh1x, -sh1y);
    drawElectricHeatmap(pos1c, 0.5, 1.0, mask1);
    ctx.restore();

    const sh2x = cx - grp2cx, sh2y = cy - grp2cy;
    const pos2c = pos2.map(p => ({ ...p, x: p.x + sh2x, y: p.y + sh2y }));
    const mask2 = [{ cx, cy, r: r2 + PARTICLE_RADIUS * 3.5, bleed: PARTICLE_RADIUS * 2.5 }];
    heatmapDirty = true;
    ctx.save(); ctx.translate(-sh2x, -sh2y);
    drawElectricHeatmap(pos2c, 0.5, 1.0, mask2);
    ctx.restore();

    heatmapDirty = true;
    ctx.save();
    ctx.globalCompositeOperation = 'screen';
    drawElectricHeatmap([...pos1, ...pos2], 0.5, 1.0, [{
      type: 'capsule',
      cx1: grp1cx, cy1: grp1cy, r1: r1 + PARTICLE_RADIUS * 2,
      cx2: grp2cx, cy2: grp2cy, r2: r2 + PARTICLE_RADIUS * 2,
      bleed: PARTICLE_RADIUS * 5
    }], canvas.width);
    ctx.restore();
  }

  // On chain tab, mainDaughters objects take over drawing after the split
  if (!(currentTab === 'chain' && mainDaughters)) {
    if (!showParticles) drawFissionOutline(grp1cx, grp1cy, r1, grp2cx, grp2cy, r2);
    if (showParticles) drawParticles([...pos1, ...pos2]);
  }

  const PHASE3_MAX_SEPT = (ANIM_T_END - PH2_END) / (1.0 - PH2_END);
  const neutronFrac = sepT / PHASE3_MAX_SEPT;
  const screenDiag  = Math.max(canvas.width, canvas.height);
  for (const n of fissionNeutrons) {
    if (n.absorbed) continue;
    const dist = neutronFrac * n.speed * screenDiag;
    const nx = cx + Math.cos(n.angle) * dist;
    const ny = cy + Math.sin(n.angle) * dist;
    const margin = PARTICLE_RADIUS * 2;
    const halfVW = canvas.width  / (2 * viewZoom);
    const halfVH = canvas.height / (2 * viewZoom);
    if (nx > cx - halfVW - margin && nx < cx + halfVW + margin &&
        ny > cy - halfVH - margin && ny < cy + halfVH + margin) {
      drawNeutron(nx, ny);
    }
  }
}

// ─── Canonical renderer ───────────────────────────────────────────────────────
function renderAtFrac(frac) {
  ctx.fillStyle = document.body.classList.contains('screenshot-mode') ? getBgColor() : '#05040f';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  if (!animParent) { drawChainBarChart(); return; }

  ctx.save();
  const _W = canvas.width, _H = canvas.height;
  const _tbH = document.getElementById('toolbar').offsetHeight;
  const _centerY = (_tbH + _H) / 2;
  ctx.translate(_W / 2, _centerY);
  ctx.scale(viewZoom, viewZoom);
  ctx.translate(-_W / 2, -_H / 2);

  // Chain tab: draw the main nucleus + fission animation (when active), then chain overlay
  if (frac < NEUTRON_FRAC) {
    if (!showParticles) drawCloudOutline(animParent.cx, animParent.cy, animParent.sphereR);
    if (showParticles) drawParticles(animParent.particles, 0.85);
    if (neutronState === 'idle') {
      drawNeutron(PARTICLE_RADIUS + 60, animParent.cy);
    } else {
      drawNeutron(neutronX, neutronY);
    }
  } else {
    const ff = (frac - NEUTRON_FRAC) / (1 - NEUTRON_FRAC);
    const t = PH1_END + ff * (FISS_STOP_T - PH1_END);
    drawAnimContent(t);
  }

  drawChainOverlay();
  ctx.restore();
  drawChainBarChart();
  captureFrame();
}


// ─── Prompt fission neutrons ──────────────────────────────────────────────────
let fissionNeutrons = [];  // [{angle, speed}] — generated fresh each Go press

function genFissionNeutrons() {
  // Branch 0 (Xe+Sr): 2 prompt neutrons; Branch 1 (Ba+Kr): 3 prompt neutrons
  const count = fissionBranch === 0 ? 2 : 3;
  fissionNeutrons = [];
  for (let i = 0; i < count; i++) {
    fissionNeutrons.push({
      angle: Math.random() * Math.PI * 2,
      speed: 2.5 + Math.random() * 1.5,   // 2.5–4.0× normalized, off-screen in first ~25–40%
      absorbed: false,
    });
  }
}

// ─── Neutron state machine ────────────────────────────────────────────────────
let neutronState      = 'idle';
let neutronX          = 0;
let neutronY          = 0;
let neutronLast       = 0;
let neutronRAF        = null;
let staticFissStart = 0;
let staticFissT     = 0;
let staticFissAngle = 0;
let staticNeutronIX = 0;
let staticNeutronIY = 0;

const NEUTRON_FRAC = 0.2;
// scrubFrac at which drawAnimContent enters Phase 3 (t = PH2_END, daughters start separating)

const ENRICH_ZOOM_SHOW = 0.6;  // show Enrich button at this zoom or below

// ─── Enrich / chain-reaction system ──────────────────────────────────────────
let enrichSites   = [];    // [{cx,cy,state,fissStart,fissT,angle,shakeDur,neutronsEmitted}]
let controlRodsActive   = false;
let controlRodPositions = []; // [{x,y}] world coords

function generateControlRods() {
  if (!animControl) return;
  const agR = animControl.sphereR;
  const b = chainContainerBounds();
  // ~5 rods on a full-width screen; fewer on smaller screens
  const numRods = Math.max(1, Math.round(6.5 * canvas.width / 1440));
  const spacing = b.w / numRods;
  controlRodPositions = [];
  for (let col = 0; col < numRods; col++) {
    const wx = b.x + spacing * (col + 0.5);
    for (let wy = b.y + agR; wy <= b.y + b.h - agR + 0.1; wy += agR * 2) {
      controlRodPositions.push({ x: wx, y: wy });
    }
  }
}
let chainNeutrons = [];    // [{x,y,vx,vy}]
let chainRAF      = null;
let lastChainTime = null;
let daughterFuelCollide    = false;  // daughters bounce off fuel sites
let neutronAbsorb          = false;  // neutrons absorbed on contact with non-fuel particles
let isFirstChainFission   = true;   // first chain trigger always uses dip1 (guaranteed fission)
let mainNeutronsEmitted    = false;
let mainEnergyTransferred  = false;
let mainDaughters          = null;   // [{x,y,vx,vy,r,bounced}] — main fission products (chain tab)
let totalFuelAdded  = 0;  // cumulative units of fuel ever added
let energyInFields  = 0;  // fuel energy not yet released
let energyInMotion  = 0;  // energy released by completed fissions

const CHAIN_BAR_PANEL_W  = 240;   // width of the energy bar chart panel (right side)
const CHAIN_ENERGY_MAX   = 100;   // fixed chart scale: 25% above 40-nucleus baseline, fits 60 total
const CONTROL_SITE_SCALE = 0.60;  // Ag-107 radius relative to U-235 sphere — 40% smaller diameter
let fixedContainerBounds = null; // set once at default zoom; stays fixed even when user zooms

// Compute container bounds from current viewZoom (call once, then cache in fixedContainerBounds)
function computeContainerBounds() {
  const W = canvas.width, H = canvas.height;
  const toolbarH = document.getElementById('toolbar').offsetHeight;
  const edge = 20;  // screen-px margin
  // renderAtFrac maps world (W/2, H/2) → screen (W/2, _centerY) where
  // _centerY = (toolbarH + H) / 2 (scrubBar is hidden on chain tab).
  // Inverse: worldY = H/2 + (screenY - _centerY) / viewZoom
  const _centerY = (toolbarH + H) / 2;
  const left  = W/2 + (edge                          - W/2)     / viewZoom;
  const right = W/2 + (W - CHAIN_BAR_PANEL_W - edge  - W/2)     / viewZoom;
  const top   = H/2 + (toolbarH + edge               - _centerY) / viewZoom;
  const bot   = H/2 + (H - edge                      - _centerY) / viewZoom;
  return { x: left, y: top, w: right - left, h: bot - top };
}

function chainContainerBounds() {
  return fixedContainerBounds || computeContainerBounds();
}

function emitChainNeutrons(cx, cy, branch) {
  // Branch 0 (Xe+Sr): 2 prompt neutrons; Branch 1 (Ba+Kr): 3 prompt neutrons
  const count = branch === 0 ? 2 : 3;
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 0.25 + Math.random() * 0.25;  // world px/ms
    chainNeutrons.push({ x: cx, y: cy, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed });
  }
  ensureChainLoop();
}

function triggerEnrichSite(site) {
  site.state          = 'fission';
  site.fissStart      = performance.now();
  site.angle          = Math.random() * Math.PI * 2;
  site.wobbleMode     = isFirstChainFission ? 'dip1' : pickWobbleMode();
  site.fissionBranch  = Math.floor(Math.random() * 2);  // 0=Xe+Sr+2n, 1=Ba+Kr+3n
  isFirstChainFission = false;
  site.shakeDur        = (5 + Math.random() * 10) * 100;
  site.fissT           = PH1_END;
  site.neutronsEmitted = false;
}

function updateChain(now) {
  const sphereR  = animParent ? animParent.sphereR : 40;
  const captureR = sphereR + PARTICLE_RADIUS * 2;
  const playbackSpeed = 1.0;
  const dt = lastChainTime ? now - lastChainTime : 0;
  lastChainTime = now;

  const b = chainContainerBounds();

  // Update neutron positions + bounce off container walls + check collisions
  for (let i = chainNeutrons.length - 1; i >= 0; i--) {
    const n = chainNeutrons[i];

    n.x += n.vx * dt;
    n.y += n.vy * dt;

    // Bounce off container walls
    if (n.x - PARTICLE_RADIUS < b.x)         { n.x = b.x + PARTICLE_RADIUS;         n.vx =  Math.abs(n.vx); n.bounced = true; }
    if (n.x + PARTICLE_RADIUS > b.x + b.w)   { n.x = b.x + b.w - PARTICLE_RADIUS;   n.vx = -Math.abs(n.vx); n.bounced = true; }
    if (n.y - PARTICLE_RADIUS < b.y)         { n.y = b.y + PARTICLE_RADIUS;         n.vy =  Math.abs(n.vy); n.bounced = true; }
    if (n.y + PARTICLE_RADIUS > b.y + b.h)   { n.y = b.y + b.h - PARTICLE_RADIUS;   n.vy = -Math.abs(n.vy); n.bounced = true; }

    // Check collision with idle enriched sites
    let absorbed = false;
    for (const site of enrichSites) {
      if (site.state !== 'idle') continue;
      const siteCaptureR = site.sphereR + PARTICLE_RADIUS * 2;
      if (Math.hypot(n.x - site.cx, n.y - site.cy) < siteCaptureR) {
        if (!site.isControl) triggerEnrichSite(site);
        // Control material absorbs the neutron silently; fuel triggers fission
        chainNeutrons.splice(i, 1);
        absorbed = true;
        break;
      }
    }
    if (absorbed) continue;
    // Control rods absorb neutrons
    if (controlRodsActive) {
      const agR = animControl ? animControl.sphereR : 30;
      const captureR = agR + PARTICLE_RADIUS;
      for (const rod of controlRodPositions) {
        if (Math.hypot(n.x - rod.x, n.y - rod.y) < captureR) {
          chainNeutrons.splice(i, 1);
          absorbed = true;
          break;
        }
      }
    }
    if (absorbed) continue;
  }

  // Advance enriched site fission animations
  for (const site of enrichSites) {
    if (site.state !== 'fission') continue;
    const elapsed = (now - site.fissStart) * playbackSpeed;
    if (elapsed < site.shakeDur) {
      site.fissT = PH1_END + (elapsed / site.shakeDur) * (PH2_END - PH1_END);
    } else {
      site.fissT = PH2_END + Math.min(1, (elapsed - site.shakeDur) / CHAIN_NORMAL_DURATION)
                           * (ANIM_T_END - PH2_END);
    }
    if (site.wobbleMode === 'stable') {
      // No fission — wobble completes, nucleus stabilises, no chain neutrons emitted
      if (site.fissT >= ANIM_T_END) site.state = 'done';
    } else {
      if (!site.neutronsEmitted && site.fissT >= PH2_END) {
        site.neutronsEmitted = true;
        emitChainNeutrons(site.cx, site.cy, site.fissionBranch);
        // Transfer energy: Fields → Motion
        energyInFields  = Math.max(0, energyInFields  - 1);
        energyInMotion += 1;
        // Spawn bouncing daughter fragments
        const spd = 0.55 + Math.random() * 0.20;
        const a = site.angle;
        site.daughters = [
          { x: site.cx, y: site.cy, vx:  Math.cos(a) * spd, vy:  Math.sin(a) * spd, r: site.sphereR * 0.7, viewAngle: Math.random() * Math.PI * 2, img: _imgProd1 },
          { x: site.cx, y: site.cy, vx: -Math.cos(a) * spd, vy: -Math.sin(a) * spd, r: site.sphereR * 0.6, viewAngle: Math.random() * Math.PI * 2, img: _imgProd2 },
        ];
      }
      if (site.fissT >= ANIM_T_END) site.state = 'done';
    }
  }

  // Advance daughter fragment positions + bounce off container walls
  for (const site of enrichSites) {
    if (!site.daughters) continue;
    for (const d of site.daughters) {
      d.x += d.vx * dt;
      d.y += d.vy * dt;
      if (d.x - d.r < b.x)       { d.x = b.x + d.r;       d.vx =  Math.abs(d.vx); d.bounced = true; }
      if (d.x + d.r > b.x + b.w) { d.x = b.x + b.w - d.r; d.vx = -Math.abs(d.vx); d.bounced = true; }
      if (d.y - d.r < b.y)       { d.y = b.y + d.r;        d.vy =  Math.abs(d.vy); d.bounced = true; }
      if (d.y + d.r > b.y + b.h) { d.y = b.y + b.h - d.r;  d.vy = -Math.abs(d.vy); d.bounced = true; }
    }
  }

  // Advance main fission daughter positions + bounce off container walls
  if (mainDaughters) {
    for (const d of mainDaughters) {
      d.x += d.vx * dt;
      d.y += d.vy * dt;
      if (d.x - d.r < b.x)       { d.x = b.x + d.r;       d.vx =  Math.abs(d.vx); d.bounced = true; }
      if (d.x + d.r > b.x + b.w) { d.x = b.x + b.w - d.r; d.vx = -Math.abs(d.vx); d.bounced = true; }
      if (d.y - d.r < b.y)       { d.y = b.y + d.r;        d.vy =  Math.abs(d.vy); d.bounced = true; }
      if (d.y + d.r > b.y + b.h) { d.y = b.y + b.h - d.r;  d.vy = -Math.abs(d.vy); d.bounced = true; }
    }
  }

  // Advance failed (done+stable) site positions + bounce off container walls
  for (const site of enrichSites) {
    if (!(site.state === 'done' && site.wobbleMode === 'stable')) continue;
    if (site.vx === undefined) { site.vx = 0; site.vy = 0; }
    site.cx += site.vx * dt;
    site.cy += site.vy * dt;
    if (site.cx - site.sphereR < b.x)       { site.cx = b.x + site.sphereR;       site.vx =  Math.abs(site.vx); }
    if (site.cx + site.sphereR > b.x + b.w) { site.cx = b.x + b.w - site.sphereR; site.vx = -Math.abs(site.vx); }
    if (site.cy - site.sphereR < b.y)       { site.cy = b.y + site.sphereR;       site.vy =  Math.abs(site.vy); }
    if (site.cy + site.sphereR > b.y + b.h) { site.cy = b.y + b.h - site.sphereR; site.vy = -Math.abs(site.vy); }
  }

  // ── KMT elastic collisions ────────────────────────────────────────────────────
  // Collect all moving particles; mass 1 for neutrons, area-proportional for daughters.
  const movables = [];
  for (const n of chainNeutrons) {
    movables.push({ p: n, r: PARTICLE_RADIUS, m: 1 });
  }
  const allDaughters = [];
  if (mainDaughters) for (const d of mainDaughters) allDaughters.push(d);
  for (const site of enrichSites) if (site.daughters) for (const d of site.daughters) allDaughters.push(d);
  for (const d of allDaughters) movables.push({ p: d, r: d.r, m: 120 }); // ~120 nucleons vs 1 for neutron
  // Failed (done+stable) nuclei join KMT as heavy movable objects (m=235 nucleons)
  for (const site of enrichSites) {
    if (!(site.state === 'done' && site.wobbleMode === 'stable')) continue;
    if (site.vx === undefined) { site.vx = 0; site.vy = 0; }
    const proxy = { x: site.cx, y: site.cy, vx: site.vx, vy: site.vy };
    movables.push({ p: proxy, r: site.sphereR, m: 235, _site: site });
  }

  // Pairwise elastic collisions between all movables (neutron–neutron, neutron–daughter, daughter–daughter)
  for (let i = 0; i < movables.length; i++) {
    for (let j = i + 1; j < movables.length; j++) {
      const a = movables[i], b2 = movables[j];
      // When toggle is off, a daughter must have wall-bounced before it interacts with anything
      if (!daughterFuelCollide) {
        const aDaughter = a.m === 120, bDaughter = b2.m === 120;
        if ((aDaughter && !a.p.bounced) || (bDaughter && !b2.p.bounced)) continue;
      }
      const dx = b2.p.x - a.p.x, dy = b2.p.y - a.p.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const minD = a.r + b2.r;
      if (dist >= minD || dist < 0.001) continue;
      // Neutron absorption: neutron touching a heavy particle disappears silently
      if (neutronAbsorb && (a.m === 1) !== (b2.m === 1)) {
        const neutronRef = a.m === 1 ? a.p : b2.p;
        neutronRef._absorb = true;
        continue;
      }
      const nx = dx / dist, ny = dy / dist;
      const totalM = a.m + b2.m;
      // Push apart proportional to mass
      const overlap = minD - dist;
      a.p.x -= nx * overlap * b2.m / totalM;  a.p.y -= ny * overlap * b2.m / totalM;
      b2.p.x += nx * overlap * a.m  / totalM;  b2.p.y += ny * overlap * a.m  / totalM;
      // Elastic velocity exchange along normal
      const dvx = b2.p.vx - a.p.vx, dvy = b2.p.vy - a.p.vy;
      const dot = dvx * nx + dvy * ny;
      if (dot < 0) {
        const imp = 2 * dot / totalM;
        a.p.vx  += imp * b2.m * nx;  a.p.vy  += imp * b2.m * ny;
        b2.p.vx -= imp * a.m  * nx;  b2.p.vy -= imp * a.m  * ny;
      }
    }
  }
  // Sync failed-site proxies back
  for (const mv of movables) {
    if (!mv._site) continue;
    mv._site.cx = mv.p.x; mv._site.cy = mv.p.y;
    mv._site.vx = mv.p.vx; mv._site.vy = mv.p.vy;
  }

  // Daughters bounce off active fuel sites (immovable wall).
  // Failed sites are handled by KMT above.
  // Toggle on = all daughters interact freely. Toggle off = only wall-bounced daughters interact.
  for (const site of enrichSites) {
    if (site.state === 'done') continue; // failed sites handled by KMT
    if (!daughterFuelCollide) continue;
    for (const d of allDaughters) {
      if (!daughterFuelCollide && !d.bounced) continue;
      const dx = d.x - site.cx, dy = d.y - site.cy;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const minD = d.r + site.sphereR;
      if (dist >= minD || dist < 0.001) continue;
      const nx = dx / dist, ny = dy / dist;
      d.x = site.cx + nx * minD;  d.y = site.cy + ny * minD;
      const dot = d.vx * nx + d.vy * ny;
      if (dot < 0) { d.vx -= 2 * dot * nx;  d.vy -= 2 * dot * ny; }
    }
  }

  // Neutrons bounce off (or are absorbed by) non-idle, non-failed fuel sites
  for (const site of enrichSites) {
    if (site.state === 'idle') continue;
    if (site.state === 'done' && site.wobbleMode === 'stable') continue;
    for (const n of chainNeutrons) {
      if (neutronAbsorb && n._absorb) continue;
      const dx = n.x - site.cx, dy = n.y - site.cy;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const minD = PARTICLE_RADIUS + site.sphereR;
      if (dist >= minD || dist < 0.001) continue;
      if (neutronAbsorb) { n._absorb = true; continue; }
      const nx = dx / dist, ny = dy / dist;
      n.x = site.cx + nx * minD;  n.y = site.cy + ny * minD;
      const dot = n.vx * nx + n.vy * ny;
      if (dot < 0) { n.vx -= 2 * dot * nx;  n.vy -= 2 * dot * ny; }
    }
  }
  // Remove neutrons flagged for absorption this tick
  if (neutronAbsorb) {
    for (let i = chainNeutrons.length - 1; i >= 0; i--) {
      if (chainNeutrons[i]._absorb) chainNeutrons.splice(i, 1);
    }
  }
}

function drawChainOverlay() {
  const sphereR = animParent ? animParent.sphereR : 40;

  // Draw containment vessel (chain tab only)
  if (currentTab === 'chain') {
    const b = chainContainerBounds();
    const lw = 3 / viewZoom;
    ctx.save();
    ctx.lineWidth   = lw;
    ctx.strokeStyle = 'rgba(255, 190, 60, 0.55)';
    ctx.shadowBlur  = 18 / viewZoom;
    ctx.shadowColor = 'rgba(255, 180, 50, 0.7)';
    ctx.strokeRect(b.x, b.y, b.w, b.h);
    ctx.restore();
  }

  // Control rods — drawn first (underneath everything)
  if (controlRodsActive && controlRodPositions.length > 0) {
    const agR = animControl ? animControl.sphereR : 30;
    for (const rod of controlRodPositions) {
      if (showParticles) drawChainSiteBlob(rod.x, rod.y, agR, _imgControl, 0);
      else drawCloudOutline(rod.x, rod.y, agR);
    }
  }

  // Helper: draw wobbling fission animation for a site in fission state pre-split
  function drawFissionWobble(site) {
    const t = site.fissT, cx = site.cx, cy = site.cy;
    const ph2 = (t - PH1_END) / (PH2_END - PH1_END);
    const deformAmp  = 0.15 * Math.min(1, ph2 / 0.10);
    const wobble     = deformAmp * wobbleSignal(ph2, site.wobbleMode || 'dip1');
    const scaleAlong = 1 + wobble;
    const scalePerp  = 1 / (1 + wobble * 0.7);
    ctx.save();
    ctx.translate(cx, cy); ctx.rotate(site.angle);
    ctx.scale(scaleAlong, scalePerp); ctx.rotate(-site.angle); ctx.translate(-cx, -cy);
    if (showParticles) drawChainSiteBlob(cx, cy, site.sphereR, site.img, site.viewAngle || 0);
    else               drawCloudOutline(cx, cy, site.sphereR);
    ctx.restore();
    // Excited glow ring
    const _LIGHT = document.body.classList.contains('screenshot-mode');
    ctx.save();
    ctx.translate(cx, cy); ctx.rotate(site.angle);
    ctx.scale(scaleAlong, scalePerp); ctx.rotate(-site.angle); ctx.translate(-cx, -cy);
    ctx.beginPath(); ctx.arc(cx, cy, site.sphereR * (1 + ph2 * 0.08), 0, Math.PI * 2);
    ctx.strokeStyle = _LIGHT ? `rgba(40,40,40,${0.3 + ph2 * 0.5})` : `rgba(255,45,120,${0.3 + ph2 * 0.5})`;
    ctx.lineWidth = 3 + ph2 * 5;
    ctx.shadowBlur  = _LIGHT ? 0 : 18 * ph2;
    ctx.shadowColor = _LIGHT ? 'rgba(0,0,0,0)' : '#ff2d78';
    ctx.stroke();
    ctx.restore();
  }

  // Helper: draw one nucleus (fuel or daughter) — outline wins; blob replaces particles only
  function drawChainNucleus(cx, cy, r, rot = 0, img = null) {
    if (!showParticles) drawCloudOutline(cx, cy, r);
    else                drawChainSiteBlob(cx, cy, r, img, rot);
  }
  function drawChainDaughters(d0, d1) {
    if (!showParticles) {
      drawFissionOutline(d0.x, d0.y, d0.r, d1.x, d1.y, d1.r);
    } else {
      drawChainSiteBlob(d0.x, d0.y, d0.r, d0.img, d0.viewAngle || 0);
      drawChainSiteBlob(d1.x, d1.y, d1.r, d1.img, d1.viewAngle || 0);
    }
  }
  function drawChainDaughter(d) {
    if (!showParticles) drawCloudOutline(d.x, d.y, d.r);
    else                drawChainSiteBlob(d.x, d.y, d.r, d.img, d.viewAngle || 0);
  }

  // Control sites (Ag-107) render at 75% the radius of fuel sites
  const siteR = (site) => site.sphereR;

  // ── BACKGROUND LAYER: stable (failed) sites, bounced daughters, bounced neutrons ──
  // Outline mode: fade with globalAlpha. Particle mode: draw full-bright then overlay a grey circle.
  const _PART = showParticles;
  const _LIGHT = document.body.classList.contains('screenshot-mode');
  const dimCol = _LIGHT ? getBgColor() : '#05040f';
  if (!_PART) { ctx.save(); ctx.globalAlpha = 0.3; }
  for (const site of enrichSites) {
    if (site.state === 'done' && site.wobbleMode === 'stable') {
      drawChainNucleus(site.cx, site.cy, siteR(site), site.viewAngle, site.img);
    }
    if (site.daughters) {
      if (site.state === 'done') {
        drawChainDaughters(site.daughters[0], site.daughters[1]);
      } else {
        for (const d of site.daughters) { if (d.bounced) drawChainDaughter(d); }
      }
    }
  }
  if (mainDaughters) {
    for (const d of mainDaughters) { if (d.bounced) drawChainDaughter(d); }
  }
  for (const n of chainNeutrons) { if (n.bounced) drawNeutron(n.x, n.y); }
  if (!_PART) { ctx.restore(); }
  // Particle mode: overlay grey circles on dimmed items (background color at 0.4 alpha)
  if (_PART) {
    ctx.save();
    ctx.globalAlpha = 0.4;
    ctx.fillStyle = dimCol;
    for (const site of enrichSites) {
      if (site.state === 'done' && site.wobbleMode === 'stable') {
        ctx.beginPath(); ctx.arc(site.cx, site.cy, siteR(site) + PARTICLE_RADIUS, 0, Math.PI * 2); ctx.fill();
      }
      if (site.daughters) {
        const ds = site.state === 'done' ? site.daughters : site.daughters.filter(d => d.bounced);
        for (const d of ds) { ctx.beginPath(); ctx.arc(d.x, d.y, d.r + PARTICLE_RADIUS, 0, Math.PI * 2); ctx.fill(); }
      }
    }
    if (mainDaughters) {
      for (const d of mainDaughters) {
        if (d.bounced) { ctx.beginPath(); ctx.arc(d.x, d.y, d.r + PARTICLE_RADIUS, 0, Math.PI * 2); ctx.fill(); }
      }
    }
    for (const n of chainNeutrons) {
      if (n.bounced) { ctx.beginPath(); ctx.arc(n.x, n.y, PARTICLE_RADIUS * 1.3, 0, Math.PI * 2); ctx.fill(); }
    }
    ctx.restore();
  }

  // ── FOREGROUND LAYER: idle fuel, actively fissioning sites, fresh neutrons ──
  for (const site of enrichSites) {
    if (site.state === 'idle') {
      drawChainNucleus(site.cx, site.cy, siteR(site), site.viewAngle, site.img);
    } else if (site.state === 'fission') {
      const t = site.fissT;
      if (t <= PH2_END) {
        drawFissionWobble(site);
      } else if (site.wobbleMode === 'stable') {
        drawChainNucleus(site.cx, site.cy, site.sphereR, site.viewAngle, site.img);
      } else if (site.daughters) {
        // Draw each daughter in foreground only until it bounces
        for (const d of site.daughters) { if (!d.bounced) drawChainDaughter(d); }
      }
    }
  }
  // Main fission daughters: each stays in foreground until its own first bounce
  if (mainDaughters) {
    for (const d of mainDaughters) { if (!d.bounced) drawChainDaughter(d); }
  }
  for (const n of chainNeutrons) { if (!n.bounced) drawNeutron(n.x, n.y); }
}

function ensureChainLoop() {
  if (chainRAF || (neutronState === 'flying' || neutronState === 'fission' || neutronState === 'bouncing')) return;
  lastChainTime = null;  // reset so first tick dt = 0
  function chainTick(now) {
    updateChain(now);
    drawStaticFrame();
    const stillActive = chainNeutrons.length > 0 ||
                        enrichSites.some(s => s.state === 'fission' || s.daughters) ||
                        mainDaughters !== null;
    chainRAF = stillActive ? requestAnimationFrame(chainTick) : null;
    if (!chainRAF) markPrerenderDone();
  }
  chainRAF = requestAnimationFrame(chainTick);
}

function neutronImpactX() {
  return animParent.cx - animParent.sphereR - PARTICLE_RADIUS;
}


function drawStaticFrame() {
  renderAtFrac(currentScrubFrac);
}



function neutronTick(now) {
  if (neutronState !== 'flying') return;
  const dt    = neutronLast ? now - neutronLast : 16;
  neutronLast = now;
  const speed = parseFloat(document.getElementById('neutronSpeed').value);
  neutronX   += speed * 0.25 * dt;

  const nf = Math.max(0, Math.min(1, (neutronX - (PARTICLE_RADIUS + 60)) /
                                     (neutronImpactX() - (PARTICLE_RADIUS + 60))));
  currentScrubFrac = nf * NEUTRON_FRAC;

  if (neutronX + PARTICLE_RADIUS >= animParent.cx - animParent.sphereR) {
    staticFissAngle  = (Math.random() - 0.5) * Math.PI;
    fissionBranch    = Math.floor(Math.random() * 2);
    neutronState     = 'fission';
    staticFissStart  = now;
    wobbleMode     = selectedNucleusKey !== 'u235' ? 'stable' : (isFirstFission ? 'dip1' : pickWobbleMode());
    isFirstFission = false;
    SHAKE_DURATION = (5 + Math.random() * 10) * 100;   // 500–1500 ms (1 unit = 100 ms)
    if (wobbleMode === 'stable') SHAKE_DURATION *= 1.5;
    resetExcitedSpots();
    staticFissT      = PH1_END;
    currentScrubFrac = NEUTRON_FRAC;
    genFissionNeutrons();
    neutronRAF = requestAnimationFrame(fissionTick);
    return;
  }

  renderAtFrac(currentScrubFrac);
  neutronRAF = requestAnimationFrame(neutronTick);
}


function fissionTick(now) {
  if (neutronState !== 'fission') return;
  const elapsed = (now - staticFissStart);
  if (elapsed < SHAKE_DURATION) {
    staticFissT = PH1_END + (elapsed / SHAKE_DURATION) * (PH2_END - PH1_END);
  } else {
    staticFissT = Math.min(FISS_STOP_T, PH2_END + ((elapsed - SHAKE_DURATION) / NORMAL_DURATION) * (ANIM_T_END - PH2_END));
  }
  // Transfer energy for main fission split
  if (staticFissT > PH2_END && !mainEnergyTransferred) {
    mainEnergyTransferred = true;
    if (wobbleMode !== 'stable') {
      energyInFields = Math.max(0, energyInFields - 1);
      energyInMotion += 1;
      // Spawn bouncing daughter fragments for the main fission nucleus
      const spd = 0.55 + Math.random() * 0.20;
      const a = staticFissAngle;
      mainDaughters = [
        { x: animParent.cx, y: animParent.cy, vx: -Math.cos(a) * spd, vy: -Math.sin(a) * spd, r: prod1R, viewAngle: Math.random() * Math.PI * 2, img: _imgProd1 },
        { x: animParent.cx, y: animParent.cy, vx:  Math.cos(a) * spd, vy:  Math.sin(a) * spd, r: prod2R, viewAngle: Math.random() * Math.PI * 2, img: _imgProd2 },
      ];
      // Convert unabsorbed fission neutrons to physics-based chain neutrons so they bounce off walls
      for (const n of fissionNeutrons) {
        if (n.absorbed) continue;
        const nspd = 0.25 + Math.random() * 0.25;
        chainNeutrons.push({ x: animParent.cx, y: animParent.cy, vx: Math.cos(n.angle) * nspd, vy: Math.sin(n.angle) * nspd });
        n.absorbed = true;  // suppress scripted drawing
      }
    }
  }
  // Check fission neutron collisions with enriched sites every frame after split
  if (staticFissT > PH2_END) {
    const sepT2 = (staticFissT - PH2_END) / (1.0 - PH2_END);
    const PMAX  = (ANIM_T_END - PH2_END) / (1.0 - PH2_END);
    const nFrac = Math.min(1, sepT2 / PMAX);
    const ncx   = canvas.width / 2, ncy = canvas.height / 2;
    const nDiag = Math.max(canvas.width, canvas.height);
    const sphR  = animParent.sphereR;
    const capR  = sphR + PARTICLE_RADIUS * 2;
    for (const n of fissionNeutrons) {
      if (n.absorbed) continue;
      const dist = nFrac * n.speed * nDiag;
      const nx = ncx + Math.cos(n.angle) * dist;
      const ny = ncy + Math.sin(n.angle) * dist;
      for (const site of enrichSites) {
        if (site.state !== 'idle') continue;
        if (Math.hypot(nx - site.cx, ny - site.cy) < capR) {
          n.absorbed = true;
          triggerEnrichSite(site);
          break;
        }
      }
    }
  }
  updateChain(now);
  const ff = (staticFissT - PH1_END) / (FISS_STOP_T - PH1_END);
  currentScrubFrac = NEUTRON_FRAC + Math.min(1, ff) * (1 - NEUTRON_FRAC);
  renderAtFrac(currentScrubFrac);
  if (staticFissT < FISS_STOP_T) {
    neutronRAF = requestAnimationFrame(fissionTick);
  } else {
    neutronState = 'done';
    ensureChainLoop();
  }
}

// ─── Speed lines (neutron speed indicator) ────────────────────────────────────
function drawSpeedLines() {
  const canvas = document.getElementById('speedLinesCanvas');
  if (!canvas) return;
  const c = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  const slider = document.getElementById('neutronSpeed');
  const min = parseFloat(slider.min), max = parseFloat(slider.max);
  const t   = (parseFloat(slider.value) - min) / (max - min);  // 0..1

  c.clearRect(0, 0, w, h);

  // 3 right-aligned horizontal lines; lengths scale with slider
  const maxLen  = w - 2;
  const scales  = [0.65, 1.0, 0.80];
  const ys      = [h * 0.25, h * 0.5, h * 0.75];

  scales.forEach((scale, i) => {
    const tFloor = 0.18 + 0.82 * t;  // minimum ~18% even at slider min
    const len = tFloor * maxLen * scale;
    const x = w - len;
    const y = Math.round(ys[i]);

    // outer glow
    c.save();
    c.strokeStyle = 'rgba(180,180,210,0.25)';
    c.lineWidth = 4;
    c.beginPath(); c.moveTo(x, y); c.lineTo(w, y); c.stroke();

    // core
    c.strokeStyle = 'rgba(210,210,230,0.85)';
    c.lineWidth = 1.5;
    c.beginPath(); c.moveTo(x, y); c.lineTo(w, y); c.stroke();
    c.restore();
  });
}

// ─── Neutron icon ─────────────────────────────────────────────────────────────
const neutronIconJitter = { x: 0, y: 0 };

function drawNeutronIconToCanvas(canvas) {
  if (!canvas) return;
  const c = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;

// ─── Nucleus button icon (New button) ─────────────────────────────────────────
// Sphere-packed particles for the NEW button icon canvas.
// Same gradient+shadowBlur style as drawParticles().
function buildNucleusIconParticles(nP, nN, seed) {
  const ICON_R  = 4;   // particle radius in icon px
  const nTotal  = nP + nN;
  const packFrac = 0.62;
  const vol    = nTotal * (4/3 * Math.PI * ICON_R ** 3) / packFrac;
  const sphR   = Math.cbrt(vol * 3 / (4 * Math.PI)) * 1.05;
  const minD2  = (ICON_R * 2.05) ** 2;

  let s = seed >>> 0;
  const rand = () => { s = (s * 1664525 + 1013904223) & 0xffffffff; return (s >>> 0) / 0xffffffff; };

  const pts = [];
  let tries = 0;
  while (pts.length < nTotal && tries < nTotal * 300) {
    tries++;
    const r3 = rand(), th = Math.acos(2 * rand() - 1), ph = rand() * 2 * Math.PI;
    const r  = sphR * Math.cbrt(r3);
    const ox = r * Math.sin(th) * Math.cos(ph);
    const oy = r * Math.sin(th) * Math.sin(ph);
    const oz = r * Math.cos(th);
    let ok = true;
    for (const q of pts) {
      if ((ox-q.ox)**2 + (oy-q.oy)**2 + (oz-q.oz)**2 < minD2) { ok = false; break; }
    }
    if (ok) pts.push({ ox, oy, oz, type: pts.length < nP ? 'proton' : 'neutron', jx: 0, jy: 0 });
  }
  return pts.sort((a, b) => a.oz - b.oz);  // back-to-front
}
// Precompute particle arrays for all nucleus options
const nucleusIconParticlesMap = {};
for (const [key, nd] of Object.entries(NUCLEUS_DEFS)) {
  nucleusIconParticlesMap[key] = buildNucleusIconParticles(nd.iconNP, nd.iconNN, nd.iconSeed);
}

// drawNucleusIcon: draws `particles` into `canvas` at the given draw scale.
// scale < 1 shrinks both the particle positions and their rendered radius.
function drawNucleusIcon(canvas, particles, scale = 1.0) {
  if (!canvas) return;
  const c = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  const cx = w / 2, cy = h / 2;
  const R = 4 * scale;

  c.clearRect(0, 0, w, h);

  for (const p of particles) {
    const px = cx + (p.ox + p.jx) * scale;
    const py = cy + (p.oy + p.jy) * scale;
    const isProton = p.type === 'proton';
    const mid  = isProton ? '#ff1a65' : '#70707f';
    const core = isProton ? '#ff80b0' : '#b0b0c4';

    const baseGrad = c.createRadialGradient(px, py, 0, px, py, R * 1.1);
    baseGrad.addColorStop(0,    mid);
    baseGrad.addColorStop(0.82, mid);
    baseGrad.addColorStop(1,    'rgba(0,0,0,0)');
    c.fillStyle = baseGrad;
    c.beginPath(); c.arc(px, py, R * 1.1, 0, Math.PI * 2); c.fill();

    const innerGlow = c.createRadialGradient(px, py, 0, px, py, R);
    innerGlow.addColorStop(0,   core);
    innerGlow.addColorStop(0.5, core);
    innerGlow.addColorStop(1,   'rgba(0,0,0,0)');
    c.save();
    c.shadowColor = core;
    c.shadowBlur  = 4 * scale;
    c.globalAlpha = 0.82;
    c.fillStyle = innerGlow;
    c.beginPath(); c.arc(px, py, R, 0, Math.PI * 2); c.fill();
    c.restore();
    c.globalAlpha = 1;
  }
}

    c.fillStyle = baseGrad; c.beginPath(); c.arc(px, py, R * 1.1, 0, Math.PI * 2); c.fill();

function drawOutlineIcon() {
  const ic = document.getElementById('outlineModeIcon');
  if (!ic) return;
  const c = ic.getContext('2d');
  const w = ic.width, h = ic.height;
  const cx = w / 2, cy = h / 2;
  const sR = Math.min(w, h) * 0.36;
  const R  = 2.5;
  const N  = Math.max(5, Math.round(2 * Math.PI * sR / (R * 1.5)));
  const centers = Array.from({ length: N }, (_, k) => {
    const a = k * 2 * Math.PI / N;
    return { x: cx + sR * Math.cos(a), y: cy + sR * Math.sin(a) };
  });
  // outerIntersection equivalent for the icon ctx
  function iconOuterIntersect(c1, c2) {
    const dx = c2.x - c1.x, dy = c2.y - c1.y;
    const d  = Math.sqrt(dx * dx + dy * dy);
    const h2 = Math.sqrt(Math.max(0, R * R - (d / 2) ** 2));
    const mx = (c1.x + c2.x) / 2, my = (c1.y + c2.y) / 2;
    const px = -dy / d * h2, py = dx / d * h2;
    const p1 = { x: mx + px, y: my + py }, p2 = { x: mx - px, y: my - py };
    const d1 = (p1.x - cx)**2 + (p1.y - cy)**2;
    const d2 = (p2.x - cx)**2 + (p2.y - cy)**2;
    return d1 > d2 ? p1 : p2;
  }
  const arcs = centers.map((pt, k) => {
    const prev = centers[(k - 1 + N) % N], next = centers[(k + 1) % N];
    const sp = iconOuterIntersect(pt, prev);
    const ep = iconOuterIntersect(pt, next);
    return { cx: pt.x, cy: pt.y, startAngle: Math.atan2(sp.y - pt.y, sp.x - pt.x), endAngle: Math.atan2(ep.y - pt.y, ep.x - pt.x) };
  });
  c.clearRect(0, 0, w, h);
  c.save();
  c.shadowColor = 'rgba(80,160,255,0.9)'; c.shadowBlur = 4;
  c.strokeStyle = 'rgba(160,215,255,1)'; c.lineWidth = 1;
  c.beginPath();
  c.moveTo(arcs[0].cx + R * Math.cos(arcs[0].startAngle), arcs[0].cy + R * Math.sin(arcs[0].startAngle));
  for (const arc of arcs) c.arc(arc.cx, arc.cy, R, arc.startAngle, arc.endAngle, false);
  c.closePath(); c.stroke(); c.restore();
}

document.getElementById('goBtn').addEventListener('click', () => {
  const btn = document.getElementById('goBtn');

  // ── PAUSE: freeze everything in place ────────────────────────────────────────
  if (btn.textContent === '❙ ❙') {
    logAction('Paused');
    if (neutronRAF) { cancelAnimationFrame(neutronRAF); neutronRAF = null; }
    if (chainRAF)   { cancelAnimationFrame(chainRAF);   chainRAF   = null; chainPaused = true; }
    btn.textContent = '▶ GO';
    btn.classList.remove('running');
    return;
  }

  // ── GO: resume from exact pause point, or start fresh ────────────────────

  // Resume chain reaction (paused mid-chain)
  if (chainPaused) {
    chainPaused = false;
    lastChainTime = null;   // prevents dt spike from pause duration
    btn.textContent = '❙ ❙';
    btn.classList.add('running');
    ensureChainLoop();
    return;
  }

  // Resume main fission animation (paused mid-flight)
  if (neutronState === 'flying' || neutronState === 'fission') {
    const frac = currentScrubFrac;
    const now  = performance.now();
    if (frac < NEUTRON_FRAC) {
      const nf = frac / NEUTRON_FRAC;
      neutronX    = (PARTICLE_RADIUS + 60) + nf * (neutronImpactX() - (PARTICLE_RADIUS + 60));
      neutronY    = animParent.cy;
      neutronLast = 0;
    } else {
      const ff = (frac - NEUTRON_FRAC) / (1 - NEUTRON_FRAC);
      staticFissT = PH1_END + ff * (ANIM_T_END - PH1_END);
      let elapsedAtPos;
      if (staticFissT <= PH2_END) {
        elapsedAtPos = (staticFissT - PH1_END) / (PH2_END - PH1_END) * SHAKE_DURATION;
      } else {
        elapsedAtPos = SHAKE_DURATION + (staticFissT - PH2_END) / (ANIM_T_END - PH2_END) * NORMAL_DURATION;
      }
      staticFissStart = now - elapsedAtPos;
    }
    btn.textContent = '❙ ❙';
    btn.classList.add('running');
    neutronRAF = requestAnimationFrame(frac < NEUTRON_FRAC ? neutronTick : fissionTick);
    return;
  }

  // Fresh start
  if (neutronRAF) { cancelAnimationFrame(neutronRAF); neutronRAF = null; }
  logAction('Pressed Go (CHAIN REACTION)');
  mainNeutronsEmitted = false; mainEnergyTransferred = false; mainDaughters = null;
  chainNeutrons       = []; lastChainTime = null;
  isFirstFission = true; isFirstChainFission = true;
  for (const s of enrichSites) s.state = 'idle';
  heatmapDirty    = true;
  staticFissAngle = 0;
  genFissionNeutrons();
  neutronState = 'flying';
  neutronX     = PARTICLE_RADIUS + 60;
  neutronY     = animParent.cy;
  neutronLast  = 0;
  document.getElementById('chainLogoBar').classList.add('visible');
  btn.textContent = '❙ ❙';
  btn.classList.add('running');
  neutronRAF = requestAnimationFrame(neutronTick);
});

document.getElementById('enrichBtn').addEventListener('click', () => {
  if (!animParent) return;
  const b = chainContainerBounds();
  const sphereR = animParent.sphereR || 50;
  const minDist = sphereR * 3.5;
  const sitePad = sphereR * 1.2;  // keep nucleus visually inside container walls
  // Try to place 5 nuclei; skip any candidate that lands too close to existing sites
  for (let n = 0; n < 5; n++) {
    let cx, cy, attempts = 0;
    do {
      cx = b.x + sitePad + Math.random() * (b.w - sitePad * 2);
      cy = b.y + sitePad + Math.random() * (b.h - sitePad * 2);
      attempts++;
    } while (attempts < 60 && (
      Math.hypot(cx - animParent.cx, cy - animParent.cy) < minDist ||
      enrichSites.some(s => Math.hypot(cx - s.cx, cy - s.cy) < minDist)
    ));
    if (attempts < 60) {
      const isCtrl = selectedNucleusKey === 'ag107';
      enrichSites.push({ cx, cy, vx: 0, vy: 0, state: 'idle', fissStart: 0, fissT: PH1_END,

                         sphereR: isCtrl ? animControl.sphereR : animParent.sphereR,
                         img: isCtrl ? _imgControl : _imgParent });

// ─── Site dragging (chain tab) ──────────────────────────────────────────────────────────
let chainSiteDrag  = null;  // { target, offX, offY } during chain-tab site drag

function clientToWorld(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  const sx = clientX - rect.left, sy = clientY - rect.top;
  const W = canvas.width, H = canvas.height;
  const toolbarH = document.getElementById('toolbar').offsetHeight;
  const _centerY = (toolbarH + H) / 2;
  return { x: (sx - W/2) / viewZoom + W/2, y: (sy - _centerY) / viewZoom + H/2 };
}

function moveAnimParent(newCx, newCy) {
  const dx = newCx - animParent.cx;
  const dy = newCy - animParent.cy;
  animParent.cx = newCx;
  animParent.cy = newCy;
  for (const p of animParent.particles) { p.x += dx; p.y += dy; }
  chainParticleOffsets = null;  // invalidate cached offsets
}

function pickChainSite(clientX, clientY) {
  const { x: wx, y: wy } = clientToWorld(clientX, clientY);
  const r = animParent ? animParent.sphereR : 50;
  // Hit-test main nucleus first
  if (animParent) {
    const dx = wx - animParent.cx, dy = wy - animParent.cy;
    if (dx*dx + dy*dy <= r*r) return { target: animParent, isParent: true, offX: animParent.cx - wx, offY: animParent.cy - wy };
  }
  for (const site of enrichSites) {
    const sr = site.sphereR;
    const dx = wx - site.cx, dy = wy - site.cy;
    if (dx*dx + dy*dy <= sr*sr) return { target: site, offX: site.cx - wx, offY: site.cy - wy };
  }
  return null;
}

canvas.addEventListener('mousedown', (e) => {
  if (neutronState !== 'idle') return;  // disable drag once reaction starts
  const hit = pickChainSite(e.clientX, e.clientY);
  if (hit) {
    chainSiteDrag = hit;
    canvas.style.cursor = 'grabbing';
    e.preventDefault();
  }
});

canvas.addEventListener('mousemove', (e) => {
  if (chainSiteDrag) return;  // window listener handles the drag
  canvas.style.cursor = (neutronState === 'idle' && pickChainSite(e.clientX, e.clientY)) ? 'grab' : '';
});

window.addEventListener('mousemove', (e) => {
  if (!chainSiteDrag) return;
  const { x: wx, y: wy } = clientToWorld(e.clientX, e.clientY);
  const newCx = wx + chainSiteDrag.offX;
  const newCy = wy + chainSiteDrag.offY;
  if (chainSiteDrag.isParent) {
    moveAnimParent(newCx, newCy);
  } else {
    chainSiteDrag.target.cx = newCx;
    chainSiteDrag.target.cy = newCy;
  }
  drawStaticFrame();
});

window.addEventListener('mouseup', () => {
  if (chainSiteDrag) {
    chainSiteDrag = null;
    canvas.style.cursor = '';
  }
});

// ─── Chain Reaction energy bar chart ─────────────────────────────────────────
function drawChainBarChart() {
  const PW = CHAIN_BAR_PANEL_W;
  const LOGO_H = 80;              // reserved for #chainLogoBar at bottom
  const toolbarH = document.getElementById('toolbar').offsetHeight;
  const gy = toolbarH;
  const PH = canvas.height - toolbarH - LOGO_H;
  const gx = canvas.width - PW;

  const LIGHT = document.body.classList.contains('screenshot-mode');

  ctx.save();

  // Panel background
  ctx.fillStyle = LIGHT ? 'rgba(255,255,255,0.96)' : 'rgba(8,6,30,0.94)';
  ctx.fillRect(gx, gy, PW, PH);

  // Left and bottom border glow
  ctx.save();
  ctx.shadowColor = LIGHT ? 'rgba(0,0,0,0)' : 'rgba(0,200,255,0.7)'; ctx.shadowBlur = LIGHT ? 0 : 18;
  ctx.strokeStyle = LIGHT ? 'rgba(0,0,0,0.20)' : 'rgba(0,180,255,0.65)'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(gx, gy); ctx.lineTo(gx, gy + PH); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(gx, gy + PH); ctx.lineTo(gx + PW, gy + PH); ctx.stroke();
  ctx.restore();

  const bars = LIGHT
    ? [
        { label: 'Energy of Motion', value: energyInMotion, color: '#222', glow: 'rgba(0,0,0,0)' },
        { label: 'Energy in Fields', value: energyInFields, color: '#666', glow: 'rgba(0,0,0,0)' },
      ]
    : [
        { label: 'Energy of Motion', value: energyInMotion, color: '#ff2060', glow: 'rgba(255,20,80,0.9)'   },
        { label: 'Energy in Fields', value: energyInFields, color: '#7b6fff', glow: 'rgba(120,100,255,0.9)' },
      ];

  const labelH  = 62;
  const titleH  = 0;
  const chartH  = PH - labelH - titleH;
  const baseline = gy + PH - labelH;
  const padL = 10, padR = 10;
  const chartX  = gx + padL;
  const chartW  = PW - padL - padR;

  // Baseline
  ctx.save();
  ctx.shadowColor = LIGHT ? 'rgba(0,0,0,0)' : 'rgba(0,200,255,0.5)'; ctx.shadowBlur = LIGHT ? 0 : 4;
  ctx.strokeStyle = LIGHT ? 'rgba(0,0,0,0.55)' : 'rgba(0,200,255,0.35)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(gx, baseline); ctx.lineTo(gx + PW, baseline); ctx.stroke();
  ctx.restore();

  const barW = chartW / bars.length;
  ctx.textAlign = 'center';

  bars.forEach((bar, i) => {
    const frac  = bar.value / CHAIN_ENERGY_MAX;
    const barPx = Math.max(4, frac * chartH);
    const x     = chartX + i * barW + barW * 0.1;
    const bw    = barW * 0.8;
    const barTop = baseline - barPx;

    if (barPx > 1) {
      const r = Math.min(6, bw / 2, barPx / 2);

      ctx.save();
      ctx.fillStyle = bar.color; ctx.globalAlpha = 0.22;
      ctx.beginPath(); ctx.roundRect(x, barTop, bw, barPx, [r, r, 2, 2]); ctx.fill();
      ctx.restore();

      ctx.save();
      ctx.shadowColor = bar.glow; ctx.shadowBlur = 22;
      ctx.strokeStyle = bar.color; ctx.lineWidth = 3; ctx.globalAlpha = 0.5;
      ctx.beginPath(); ctx.roundRect(x, barTop, bw, barPx, [r, r, 2, 2]); ctx.stroke();
      ctx.restore();

      ctx.save();
      ctx.shadowColor = bar.glow; ctx.shadowBlur = 6;
      ctx.strokeStyle = bar.color; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.roundRect(x, barTop, bw, barPx, [r, r, 2, 2]); ctx.stroke();
      ctx.restore();
    }

    // Label below baseline
    ctx.save();
    ctx.shadowColor = bar.glow; ctx.shadowBlur = 6;
    ctx.fillStyle = bar.color;
    ctx.font = 'bold 18px Lexend, sans-serif';
    const words = bar.label.split(' ');
    ctx.fillText(words.slice(0, 2).join(' '), x + bw / 2, baseline + 22);
    ctx.fillText(words[2] || '',              x + bw / 2, baseline + 39);
    ctx.restore();
  });

  ctx.restore();
}

function applyTheme(key) {
  const t = THEMES[key];
  const r = document.documentElement.style;
  r.setProperty('--accent1',      t.accent1);
  r.setProperty('--accent1-dim',  t.accent1dim);
  r.setProperty('--accent1-glow', t.accent1glow);
  r.setProperty('--accent2',      t.accent2);
  r.setProperty('--accent2-dim',  t.accent2dim);
  r.setProperty('--accent2-glow', t.accent2glow);
  r.setProperty('--ui-bg',        t.uibg);
  r.setProperty('--ui-border',    t.uiborder);
  r.setProperty('--text-dim',     t.textdim);
  r.setProperty('--text-bright',  t.textbright);
  document.body.style.background = t.bg;
  document.body.classList.remove('screenshot-mode');
  document.getElementById('themeLight').classList.remove('active');
  document.querySelectorAll('.theme-btn:not(#themeLight):not([data-theme="L"])').forEach(b => b.classList.remove('active'));
  document.getElementById('theme'+key).classList.add('active');
  drawStaticFrame();
}

// Startup benchmark — measure actual gradient render cost and set initial quality.
// Thresholds are per 100 particles; the full nucleus is ~220 so multiply by ~2.2
// to project real frame cost.
//   < 3ms / 100p → hi-res   (< ~7ms projected — fine at 60fps)
//   3–6ms / 100p → detailed (~7–13ms projected — reduced effects)
//   > 6ms / 100p → simple   (> ~13ms projected — minimal rendering)
(function _startupBenchmark() {
  const ms = _runPerfBenchmark();
  if (ms > 6) {
    const hiOpt = document.querySelector('#qualitySelect option[value="hi-res"]');
    if (hiOpt) hiOpt.remove();
    _applyQuality('simple');
  } else if (ms > 3) {
    _applyQuality('detailed');
  }
  // else stays 'hi-res' (default)
}());

drawStaticFrame();
if (showParticles && !idleParticleRAF) idleParticleLoop();
