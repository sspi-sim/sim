<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="pg" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ff80b0"/>
      <stop offset="50%"  stop-color="#ff80b0" stop-opacity="0.82"/>
      <stop offset="82%"  stop-color="#ff1a65"/>
      <stop offset="100%" stop-color="#ff1a65"  stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ng" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#b0b0c4"/>
      <stop offset="50%"  stop-color="#b0b0c4" stop-opacity="0.82"/>
      <stop offset="82%"  stop-color="#70707f"/>
      <stop offset="100%" stop-color="#70707f"  stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="5" fill="#05040f"/>

  <!-- Proton top-left -->
  <circle cx="11" cy="11" r="9" fill="url(#pg)"/>
  <!-- Neutron top-right -->
  <circle cx="21" cy="11" r="9" fill="url(#ng)"/>
  <!-- Neutron bottom-left -->
  <circle cx="11" cy="21" r="9" fill="url(#ng)"/>
  <!-- Proton bottom-right -->
  <circle cx="21" cy="21" r="9" fill="url(#pg)"/>

  <!-- + on top-left proton (arm≈2.9, thick≈1.8) -->
  <rect x="8.1"  y="10.1" width="5.8" height="1.8" fill="white" fill-opacity="0.88"/>
  <rect x="10.1" y="8.1"  width="1.8" height="5.8" fill="white" fill-opacity="0.88"/>
  <!-- + on bottom-right proton -->
  <rect x="18.1" y="20.1" width="5.8" height="1.8" fill="white" fill-opacity="0.88"/>
  <rect x="20.1" y="18.1" width="1.8" height="5.8" fill="white" fill-opacity="0.88"/>
</svg>
