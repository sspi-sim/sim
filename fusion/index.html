// ============================================================
//  ANIMATION LOOP
// ============================================================
// v12-style damped random walk jitter — updates _jx/_jy on all live particles
// and on CLUSTER_DEFS entries (for icon canvases). Called every frame.
function updateJitter() {
  // Main canvas particles
  for (const p of particles) {
    if (p.type === 'gamma') continue;
    if (p._jx === undefined) { p._jx = 0; p._jy = 0; }
    p._jx += (Math.random() - 0.5) * 0.7;
    p._jy += (Math.random() - 0.5) * 0.7;
    p._jx *= 0.78;
    p._jy *= 0.78;
  }
  // Icon particles (CLUSTER_DEFS entries shared across all canvases)
  for (const def of Object.values(CLUSTER_DEFS)) {
    for (const p of def) {
      if (p._jx === undefined) { p._jx = 0; p._jy = 0; }
      p._jx += (Math.random() - 0.5) * 0.7;
      p._jy += (Math.random() - 0.5) * 0.7;
      p._jx *= 0.78;
      p._jy *= 0.78;
    }
  }
}

// Always-on jitter loop — redraws when sim is idle so particles never freeze.
// Skips redraw when scrubbing (scrubFrame >= 0) so the historical frame isn't overwritten.
// Only redraws on the fusion tab — the temp tab manages its own canvas, and calling
// fusion's draw() while on the temp tab would clobber the temp UI (including while paused).
let _idleDrawSkip = 0;
(function idleJitter() {
  updateJitter(); // always update every RAF so jitter state stays smooth
  // Throttle idle redraws to ~15 fps (every 4th RAF).
  // Jitter position updates still run every RAF above; only the canvas repaint is gated.
  _idleDrawSkip = (_idleDrawSkip + 1) % 4;
  if (currentTab === 'temp' && !tempRunning && !tempPaused) {
    for (const p of tempProtons) {
      if (p._jx === undefined) { p._jx = 0; p._jy = 0; }
      p._jx += (Math.random() - 0.5) * 0.7; p._jx *= 0.78;
      p._jy += (Math.random() - 0.5) * 0.7; p._jy *= 0.78;
    }
    if (_idleDrawSkip === 0) drawTemp();
  }
  if (currentTab === 'fusion' && !running && _idleDrawSkip === 0) {
    if (scrubFrame >= 0) {
      renderFrame(scrubFrame); // keep showing the scrubbed frame with fresh jitter
    } else {
      draw();
    }
  }
  requestAnimationFrame(idleJitter);
})();

function frameSpeed() { return FRAME_SPEED * (0.1 + (simSpeed - 1) * (1.4 / 9)); }
// Scale a base frame count so that collision/escape phases stay proportional
// to the approach phase as simSpeed changes.  At the default simSpeed=7 the
// ratio is 1 (no change).
function effectiveFrames(base) {
  const defaultFs = FRAME_SPEED * (0.1 + (7 - 1) * (1.4 / 9));
  return Math.max(1, Math.round(base * defaultFs / frameSpeed()));
}

function loop(now) {
  if (!running) return;

  // ── Delta-time scale: normalise to 60 fps so physics speed is device-independent ──
  const _dtMs   = (_lastLoopT > 0) ? Math.min(now - _lastLoopT, 50) : (1000 / 60);
  _lastLoopT    = now;
  const dtScale = _dtMs / (1000 / 60);   // 1.0 at 60 fps, 2.0 at 30 fps, etc.

  if (scrubFrame >= 0) {
    timeLabelEl.textContent = `${scrubFrame + 1} / ${phLen()}`;
    updateFrameCounter(scrubFrame + 1, phLen());
    renderFrame(scrubFrame);
    animId = requestAnimationFrame(loop);
    return;
  }

  // ── D+D→T+p live Coulomb display update (escapeAnim + escape) ──
  // Called after positions are updated each frame so EIE drains into KE as T and p fly apart.
  function updateDDToTPDisplay() {
    if (!ddToTPEscape || ddTPEscapeDistRef <= 0) return;
    const _ds = scaledEnergy ? 1 : 0.2;
    let _tcx = 0, _tcy = 0;
    for (let _i = 0; _i < leftClusterSize; _i++) { _tcx += particles[_i].x; _tcy += particles[_i].y; }
    _tcx /= leftClusterSize; _tcy /= leftClusterSize;
    const _pdx = particles[leftClusterSize].x - _tcx;
    const _pdy = particles[leftClusterSize].y - _tcy;
    const _d   = Math.sqrt(_pdx * _pdx + _pdy * _pdy);
    // EIE decays as 1/r from the snap reference: starts at ddTPEscapeEIE0, drains to 0.
    // Clamped so it never exceeds the starting value (particles can only fly apart).
    const _eie = Math.max(0, ddTPEscapeEIE0 * ddTPEscapeDistRef / Math.max(_d, ddTPEscapeDistRef));
    collisionDisplayEIE = _eie;
    collisionDisplayKE  = (ddTPEscapeTotal - _eie) / _ds;
  }

  // ── ESCAPE ANIMATION  (lerp positions + cluster velocities) ───
  if (collisionPhase === 'escapeAnim') {
    const escFrames = effectiveFrames(ESCAPE_ANIM_FRAMES);
    // Cat2 physics assist: boost Coulomb + shrink strong range for first 8 frames of AFTER
    if (isCategory2()) {
      const assist = cat2EscapeFrame < effectiveFrames(8);
      strongRangeMult = assist ? 0.8 : 1.0;
      coulombMult     = assist ? 2.0 : 1.0;
    }
    cat2EscapeFrame += dtScale;
    escapeAnimFrame += dtScale;
    // Cat2 and chargedNuclearEscape: skip the lerp entirely — snap to escape geometry in
    // one frame, then coast at constant velocity.  The smoothstep lerp creates a visible
    // slow-fast artifact during live play that doesn't appear in scrub/replay.
    if (chargedNuclearEscape || isCategory2()) escapeAnimFrame = escFrames;
    const t    = escapeAnimFrame / escFrames;
    const ease = t * t * (3 - 2 * t); // smoothstep (Cat1/Cat3 only after above)
    const n    = particles.length;
    const lSz  = leftClusterSize;

    // Lerp positions toward snapped/teleported geometry
    for (let i = 0; i < n; i++) {
      const s   = escapeAnimStartPos[i];
      const tgt = escapeAnimTargetPos[i];
      particles[i].x = s.x + (tgt.x - s.x) * ease;
      particles[i].y = s.y + (tgt.y - s.y) * ease;
    }

    // Lerp velocities — per-particle mode (e.g. T+T 3-body) or cluster mode.
    if (escapeAnimStartVel.perParticle) {
      for (let i = 0; i < n; i++) {
        const sv = escapeAnimStartVel.perParticle[i];
        const tv = escapeAnimTargetVel.perParticle[i];
        particles[i].vx = sv.vx + (tv.vx - sv.vx) * ease;
        particles[i].vy = sv.vy + (tv.vy - sv.vy) * ease;
      }
    } else {
      const sl = escapeAnimStartVel.lv,  tl = escapeAnimTargetVel.lv;
      const sr = escapeAnimStartVel.rv,  tr = escapeAnimTargetVel.rv;
      const lerpLvx = sl.vx + (tl.vx - sl.vx) * ease;
      const lerpLvy = sl.vy + (tl.vy - sl.vy) * ease;
      const lerpRvx = sr.vx + (tr.vx - sr.vx) * ease;
      const lerpRvy = sr.vy + (tr.vy - sr.vy) * ease;
      for (let i = 0;   i < lSz; i++) { particles[i].vx = lerpLvx; particles[i].vy = lerpLvy; }
      for (let i = lSz; i < n;   i++) { particles[i].vx = lerpRvx; particles[i].vy = lerpRvy; }
    }

    updateDDToTPDisplay();
    updateCamera();
    if (escapeAnimFrame >= escFrames) {
      // Snap to exact final state
      for (let i = 0; i < n; i++) {
        particles[i].x = escapeAnimTargetPos[i].x;
        particles[i].y = escapeAnimTargetPos[i].y;
      }
      if (escapeAnimTargetVel.perParticle) {
        for (let i = 0; i < n; i++) {
          particles[i].vx = escapeAnimTargetVel.perParticle[i].vx;
          particles[i].vy = escapeAnimTargetVel.perParticle[i].vy;
        }
      } else {
        for (let i = 0;   i < lSz; i++) { particles[i].vx = escapeAnimTargetVel.lv.vx; particles[i].vy = escapeAnimTargetVel.lv.vy; }
        for (let i = lSz; i < n;   i++) { particles[i].vx = escapeAnimTargetVel.rv.vx; particles[i].vy = escapeAnimTargetVel.rv.vy; }
      }
      collisionPhase = 'escape';
    }

  // ── ESCAPE  (coast for nuclear products; physics for Coulomb scatter) ───
  } else if (collisionPhase === 'escape') {
    // Continue Cat2 physics assist into escape phase until 8 AFTER frames elapsed.
    // Not applied when coulombScatterEscape is true — real Coulomb runs at 1× there.
    if (isCategory2() && !coulombScatterEscape) {
      const assist = cat2EscapeFrame < effectiveFrames(8);
      strongRangeMult = assist ? 0.8 : 1.0;
      coulombMult     = assist ? 2.0 : 1.0;
      cat2EscapeFrame += dtScale;
    }
    if (coulombScatterEscape || chargedNuclearEscape) {
      // Run real physics: Coulomb scatter or D+D→T+p not-to-scale
      step(frameSpeed() * dtScale);
      lockClusterVelocities();
      if (chargedNuclearEscape) {
        // Ramp displayed KE gradually from 11 → escapeKECap over ~60 frames
        const rampStep = (escapeKECap - 11 * speedScale()) / 60 * frameSpeed() / FRAME_SPEED * dtScale;
        collisionDisplayKE = Math.min(collisionDisplayKE + rampStep, escapeKECap);
      }
    } else {
      for (const p of particles) {
        p.x += p.vx * frameSpeed() * dtScale;
        p.y += p.vy * frameSpeed() * dtScale;
      }
    }
    updateDDToTPDisplay();
    updateCamera();

    // Auto-stop when all particles are off-screen
    const zoomScale = ZOOM_SCALE;
    const cx = canvas.width / 2, cy = canvas.height / 2;
    const margin = PARTICLE_RADIUS * zoomScale * 2;
    const allGone = particles.every(p => {
      const sx = cx + (p.x - cameraSiteX) * zoomScale;
      const sy = cy + (p.y - cameraSiteY) * zoomScale;
      return sx < -margin || sx > canvas.width + margin ||
             sy < -margin || sy > canvas.height + margin;
    });
    if (allGone) {
      strongRangeMult = 1.0; coulombMult = 1.0;
      running = false;
      paused  = false;
      goBtn.textContent = '▶ GO';
      goBtn.classList.remove('running');
      setScrubReplayDisabled(false);
      updatePhaseTimeline();
      draw();
      return;
    }

  // ── COLLISION  (free physics for up to COLLISION_FRAMES) ──────
  } else if (collisionPhase === 'collision') {
    step(frameSpeed() * dtScale);
    collisionFrames += dtScale;
    updateCamera();

    // Cat2: ramp collisionDisplayKE from approach value → peak over CAT2_KE_RAMP_FRAMES.
    // This makes the Strong→KE transfer visible during normal playback (not just scrubbing).
    const rampFrames = effectiveFrames(CAT2_KE_RAMP_FRAMES);
    if (isCategory2() && collisionOnsetKE > 0) {
      const t = Math.min(1.0, collisionFrames / rampFrames);
      collisionDisplayKE  = collisionOnsetKE  + (collisionPeakKE  - collisionOnsetKE)  * t;
      collisionDisplayEIE = collisionOnsetEIE + (collisionPeakEIE - collisionOnsetEIE) * t;
    }

    // P+P and N+N are single particles: the meaningful collision event
    // is the bounce itself, which happens in a few frames. Don't wait
    // for COLLISION_FRAMES — fire escape as soon as they start separating.
    // (Only applies to Category 1 single-particle pairs.)
    const n2 = particles.length, lSz2 = leftClusterSize;
    let fireEscape = (collisionFrames >= effectiveFrames(COLLISION_FRAMES));
    if (!fireEscape && isCategory1() && lSz2 === 1 && n2 - lSz2 === 1) {
      const dx = particles[1].x - particles[0].x;
      const dy = particles[1].y - particles[0].y;
      const d  = Math.sqrt(dx * dx + dy * dy);
      if (d > 0.01) {
        const relV = (particles[1].vx - particles[0].vx) * (dx / d) +
                     (particles[1].vy - particles[0].vy) * (dy / d);
        if (relV >= 0) fireEscape = true;
      }
    }
    // Category 2 early escape: fire as soon as cluster CMs separate (min 5 frames).
    // Prevents D+D (and other Cat2) from visually "hanging" as a fused nucleus
    // while the strong force temporarily traps all particles in a common well.
    if (!fireEscape && isCategory2() && collisionFrames >= effectiveFrames(CAT2_KE_RAMP_FRAMES + 5)) {
      const lSz3 = lSz2, rSz3 = n2 - lSz3;
      let lcx3=0,lcy3=0,rcx3=0,rcy3=0,lvx3=0,lvy3=0,rvx3=0,rvy3=0;
      for (let i=0;     i<lSz3; i++) { lcx3+=particles[i].x; lcy3+=particles[i].y; lvx3+=particles[i].vx; lvy3+=particles[i].vy; }
      for (let i=lSz3;  i<n2;   i++) { rcx3+=particles[i].x; rcy3+=particles[i].y; rvx3+=particles[i].vx; rvy3+=particles[i].vy; }
      lcx3/=lSz3; lcy3/=lSz3; lvx3/=lSz3; lvy3/=lSz3;
      rcx3/=rSz3; rcy3/=rSz3; rvx3/=rSz3; rvy3/=rSz3;
      const cdx3=rcx3-lcx3, cdy3=rcy3-lcy3, cd3=Math.sqrt(cdx3*cdx3+cdy3*cdy3);
      if (cd3>0.01) {
        const relV3=(rvx3-lvx3)*(cdx3/cd3)+(rvy3-lvy3)*(cdy3/cd3);
        if (relV3>=0) fireEscape=true;
      }
    }

    // ── Cat3 (P+N): scripted jiggle before photon fires ──────────
    const isPN = (leftChoice==='p'&&rightChoice==='n') || (leftChoice==='n'&&rightChoice==='p');
    if (isCategory3() && isPN && !photonCaptureFired) {
      pnJiggleFrame += dtScale;
      const cmx  = (particles[0].x + particles[1].x) / 2;
      const cmy  = (particles[0].y + particles[1].y) / 2;
      const cmvx2 = (particles[0].vx + particles[1].vx) / 2;
      const cmvy2 = (particles[0].vy + particles[1].vy) / 2;
      const pIdx = particles[0].type === 'proton' ? 0 : 1;
      const nIdx = 1 - pIdx;
      const minSep = PARTICLE_RADIUS * 2, maxSep = PARTICLE_RADIUS * 2.5;
      const midSep = (minSep + maxSep) / 2;
      const amp    = (maxSep - minSep) / 2;
      const halfSep = (midSep + amp * Math.sin(pnJiggleFrame * 1.8)) / 2;
      const ax = Math.SQRT1_2, ay = Math.SQRT1_2;
      particles[pIdx].x = cmx - ax * halfSep;  particles[pIdx].y = cmy - ay * halfSep;
      particles[nIdx].x = cmx + ax * halfSep;  particles[nIdx].y = cmy + ay * halfSep;
      particles[0].vx = cmvx2; particles[0].vy = cmvy2;
      particles[1].vx = cmvx2; particles[1].vy = cmvy2;
      if (pnJiggleFrame >= effectiveFrames(PN_JIGGLE_FRAMES)) {
        firePhotonCapture();
        collisionPhase  = 'escape';
        escapeStartFrame = phLen();
        // Switch display KE to keOut (nucleus keeps ~initialKE; gamma carries the rest)
        const pnEscEntry = getComboEntry();
        const pnScale    = speedScale();
        collisionDisplayKE = pnEscEntry ? pnEscEntry.keOut * pnScale : initialKE * keVPerSimUnit;
        // EIE stays frozen — single charged product, no inter-cluster Coulomb drop
      }
    } else if (fireEscape) {
      cat2EscapeFrame = 0;  // start counting AFTER frames for physics assist
      escapeStartFrame = phLen();
      const escEntry = getComboEntry();
      const escScale = speedScale();
      if (isCategory1()) {
        fireCategory1Escape(); escapeAnimFrame = 0; collisionPhase = 'escapeAnim';
        collisionDisplayKE = escEntry ? escEntry.keOut * escScale : initialKE * keVPerSimUnit;
        // EIE stays frozen — N is neutral, no inter-cluster Coulomb
      } else if (isCategory2()) {
        fireCategory2Escape(); escapeAnimFrame = 0; collisionPhase = 'escapeAnim';
        if (!scaledEnergy && leftChoice === 'd' && rightChoice === 'd') {
          // D+D (He3+n or T+p): not-to-scale display drops slightly to 10.6
          collisionDisplayKE = 10.6 * escScale / 0.2;
        } else {
          // When to-scale and the combo has a real keV value, use it directly (no speedScale)
          collisionDisplayKE = (scaledEnergy && escEntry?.keOutScaled != null)
            ? escEntry.keOutScaled
            : escEntry ? escEntry.keOut * escScale : collisionPeakKE * 0.88;
        }
        // D+D→T+p: bar chart shows 1/r EIE decay; KE rises correspondingly (no initial spike).
        // Heatmap proton-pair cache was already invalidated in fireDDtoTP.
        if (ddToTPEscape) {
          const _ds = scaledEnergy ? 1 : 0.2;
          // Starting EIE = frozen collision-phase value (already on screen — no jump)
          ddTPEscapeEIE0  = collisionDisplayEIE || 0;
          ddTPEscapeTotal = collisionDisplayKE * _ds + ddTPEscapeEIE0;
          // Record T-p distance at snap geometry; EIE decays as 1/r from here
          let _tcx = 0, _tcy = 0;
          for (let _i = 0; _i < 3; _i++) { _tcx += escapeAnimTargetPos[_i].x; _tcy += escapeAnimTargetPos[_i].y; }
          _tcx /= 3; _tcy /= 3;
          const _pdx = escapeAnimTargetPos[3].x - _tcx, _pdy = escapeAnimTargetPos[3].y - _tcy;
          ddTPEscapeDistRef = Math.max(1, Math.sqrt(_pdx * _pdx + _pdy * _pdy));
        }
      } else if (isCategory3()) {
        if (!photonCaptureFired) firePhotonCapture();
        collisionPhase = 'escape';
        collisionDisplayKE = escEntry ? escEntry.keOut * escScale : initialKE * keVPerSimUnit;
        // EIE stays frozen — single charged product
      }
    }

  // ── APPROACH  (rigid-cluster) ─────────────────────────────────
  } else {
    step(frameSpeed() * dtScale);
    lockClusterVelocities();
    const { lcx, lcy, rcx, rcy } = updateCamera();

    if (!isCoulombOnly() && crossClusterContact()) {
      collisionPhase      = 'collision';
      collisionFrames     = 0;
      collisionStartFrame = phLen();
      const isPN2 = (leftChoice==='p'&&rightChoice==='n') || (leftChoice==='n'&&rightChoice==='p');
      if (isPN2) { pnBound = true; pnJiggleFrame = 0; }
      const colE    = computeEnergy();
      const colEntry = getComboEntry();
      const scale    = speedScale();
      const isDT = (leftChoice === 'd' && rightChoice === 't') || (leftChoice === 't' && rightChoice === 'd');

      // Compute target (peak) display values
      let targetCDKE;
      if (!scaledEnergy && leftChoice === 'd' && rightChoice === 'd') {
        targetCDKE = 11 * scale / 0.2;
      } else if (scaledEnergy && isDT && colEntry?.keInScaled != null) {
        targetCDKE = colEntry.keInScaled;
      } else {
        targetCDKE = colEntry ? colEntry.immediateKE * scale
                              : Math.max(initialKE * keVPerSimUnit, colE.ke * keVPerSimUnit);
      }
      collisionPeakKE = targetCDKE;
      const targetCDEIE = (scaledEnergy && isDT) ? maxApproachEIE * keVPerSimUnit : colE.eie;

      if (isCategory2()) {
        // Cat2 (D-D, D-T, T-T): ramp KE from approach value → peak over CAT2_KE_RAMP_FRAMES.
        // Use the PREVIOUS frame's displayed bar values as the ramp start so the
        // transition is seamless and always upward (pre-strong-force KE < fusion peak).
        const ds  = scaledEnergy ? 1 : 0.2;
        const kv  = scaledEnergy ? keVPerSimUnit : 1;
        const prevFr = phLen() > 0 ? phGet(phLen() - 1) : null;
        const prevBarKE  = prevFr ? prevFr.edisp.ke  : 0;
        const prevBarEIE = prevFr ? prevFr.edisp.eie : colE.eie * kv;
        collisionOnsetKE  = prevBarKE / ds;   // collisionDisplayKE units: bar = prevBarKE ✓
        collisionOnsetEIE = prevBarEIE;        // used directly as eie in getDisplayEnergy
        collisionPeakEIE  = targetCDEIE;
        collisionDisplayKE  = collisionOnsetKE;
        collisionDisplayEIE = collisionOnsetEIE;
      } else {
        collisionDisplayKE  = targetCDKE;
        collisionDisplayEIE = targetCDEIE;
      }
    } else {
      // No nuclear contact yet — track peak EIE for D+T freeze
      const curEIE = computeEnergy().eie;
      if (curEIE > maxApproachEIE) maxApproachEIE = curEIE;
      // Check for Coulomb scatter reversal
      const cdx = rcx - lcx, cdy = rcy - lcy;
      const cdist = Math.sqrt(cdx * cdx + cdy * cdy);
      if (cdist > 0.01) {
        const n = particles.length, lSize = leftClusterSize, rSize = n - lSize;
        let lvx = 0, lvy = 0, rvx = 0, rvy = 0;
        for (let i = 0;     i < lSize; i++) { lvx += particles[i].vx; lvy += particles[i].vy; }
        for (let i = lSize; i < n;     i++) { rvx += particles[i].vx; rvy += particles[i].vy; }
        lvx /= lSize;  lvy /= lSize;
        rvx /= rSize;  rvy /= rSize;
        const relV = (rvx - lvx) * (cdx / cdist) + (rvy - lvy) * (cdy / cdist);
        if (relV >= 0) {
          coulombScatterEscape = true;
          if (cdist > strongCutoff() * 2.5 && relV > approachSpeed * 0.5) {
            collisionPhase      = 'escape';
            collisionStartFrame = phLen();
            escapeStartFrame    = phLen();
          }
        }
      }
    }
  }

  // ── Advance photon every live frame ──────────────────────────
  if (photon) {
    photon.x += photon.vx * dtScale;
    photon.y += photon.vy * dtScale;
    photon.age += dtScale;
    if (photon.age > photon.maxAge) photon = null;
  }

  // ── Auto-stop for photon-capture reactions ────────────────────
  if (collisionPhase === 'escape' && photonCaptureFired && !photon) {
    photonEscapeFrames += dtScale;
    if (photonEscapeFrames > 90) {
      running = false;
      paused  = false;
      goBtn.textContent = '▶ GO';
      goBtn.classList.remove('running');
      setScrubReplayDisabled(false);
      updatePhaseTimeline();
      draw();
      return;
    }
  }

  // ── Record history ─────────────────────────────────────────
  phPush({
    p: particles.map(p => ({ ...p })),
    collisionPhase,
    collisionFrames,
    collisionDisplayKE,
    collisionDisplayEIE,
    maxApproachEIE,
    gammaCarriedEnergy,
    chargedNuclearEscape,
    chargedEscapeEIEBase,
    photon: photon ? { ...photon } : null,
    camX: cameraSiteX, camY: cameraSiteY,
    edisp: getDisplayEnergy(),
  });

  timeSlider.disabled = false;
  // Only update slider range if we're not zoomed in
  if (graphZoomEnd === null) {
    timeSlider.max   = phLen() - 1;
    timeSlider.value = timeSlider.max;
  }
  timeLabelEl.textContent = `${phLen()}`;
  updateFrameCounter(null, phLen());
  updatePhaseTimeline();

  draw();
  animId = requestAnimationFrame(loop);
}

// ============================================================
//  INITIAL RENDER
// ============================================================
applyComboSieOffset();  // seed SIE offset box from table for initial combo
// Note: no draw() here — switchTab() below handles the first render with a
// correctly-sized canvas. Drawing on the default 300×150 canvas causes the
// fusion screen to flash on temp-tab load.

// ============================================================
//  TAB SWITCHING
// ============================================================

function switchTab(name) {
  currentTab = name;
  logAction('Switched to ' + (name === 'fusion' ? 'FUSION' : 'TEMPERATURE') + ' tab');
  document.getElementById('fusionTabBtn').classList.toggle('active', name === 'fusion');
  document.getElementById('tempTabBtn').classList.toggle('active', name === 'temp');
  document.getElementById('fusionControls').style.display = name === 'fusion' ? 'flex' : 'none';
  document.getElementById('tempControls').style.display   = name === 'temp'   ? 'flex' : 'none';
  const v14ColorRow = document.getElementById('v14ColorRow');
  v14ColorRow.style.display = 'flex';
  document.getElementById('scrubBar').style.display       = name === 'fusion' ? ''     : 'none';
  document.getElementById('tempLogoBar').classList.toggle('visible', name === 'temp');
  setScrubReplayDisabled(true);
  // Stop any running animation
  if (tempRAF)   { cancelAnimationFrame(tempRAF);   tempRAF   = null; }
  if (animId)    { cancelAnimationFrame(animId);     animId    = null; }
  if (replayRAF) { cancelAnimationFrame(replayRAF);  replayRAF = null; }
  running = false; paused = false; tempRunning = false; tempPaused = false;
  goBtn.textContent = '▶ GO';
  goBtn.classList.remove('running');
  // Clear playback state (particleHistory, scrubFrame, timeSlider, collisionPhase,
  // photon, escape state) so the time slider doesn't scrub the previous tab's
  // recording after switching tabs. Issue #66.
  resetState();
  // Size canvas first so getTempContainer() gets correct dimensions
  const toolbarH = document.getElementById('toolbar').offsetHeight;
  const scrubH   = document.getElementById('scrubBar').offsetHeight;
  // Show/hide the Separate Fields panel (only on fusion tab)
  document.getElementById('separateFieldsPanel').style.display = name === 'fusion' ? 'flex' : 'none';
  canvas.width        = window.innerWidth;
  canvas.height       = window.innerHeight - toolbarH - scrubH;
  energyGraph.width   = Math.max(1, window.innerWidth - 230 - 112);
  resizeBarChart();
  if (name === 'temp') {
    tempFlashes = [];
    initTempProtons();
    drawTemp();
  } else {
    // Populate default particles on first fusion-tab load so the user sees
    // the starting configuration without having to press Go first.
    if (!particles.length) setupScenario();
    syncScaledEnergyToggle(); syncInputsDisabled();
    if (!running) {
      // One-time JIT pre-warm: run drawHeatmap enough times to push V8 past its
      // TurboFan threshold (~66k loop back-edges) BEFORE the first animation frame.
      // Each draw at initial approach distance exercises ~2,200 Gaussian evaluations;
      // 30 draws = ~66,000 — enough to guarantee TurboFan compiles during this
      // synchronous tab-switch handler rather than stalling animation frame ~5.
      if (!_heatmapJITWarmed && particles.length >= 2) {
        _heatmapJITWarmed = true;
        const _savedEF = showElectricField;
        showElectricField = true;
        _heatmapParticles = null;
        for (let _w = 0; _w < 30; _w++) drawHeatmap();
        showElectricField = _savedEF;
        _heatmapParticles = null;
        hmImageData = null;
      }
      draw();
    }
  }
}

// ============================================================
//  TEMPERATURE TAB — constants & state
// ============================================================
const TEMP_N          = 20;
const TEMP_R          = 24;         // proton radius in temp sim (px)
let   tempCoulomb     = 5e6;        // repulsion strength (1/r^4 law) — tunable via dev slider
let   tempTimeScale   = 1.0;        // slow-motion factor: physics steps per render frame (0.1–1.0)
let   tempFrameAccum  = 0;          // fractional step accumulator for slow-motion
const TEMP_SUBSTEPS   = 4;

let tempProtons  = [];

// Persistent buffers — reused every frame to avoid per-frame allocations (#79, #81)
let _tempAx  = new Float32Array(TEMP_N);  // acceleration buffers for stepTempPhysics
let _tempAy  = new Float32Array(TEMP_N);
let _tempVisX = new Float32Array(TEMP_N); // visual-overlap-clamped positions for drawTemp
let _tempVisY = new Float32Array(TEMP_N);

// Cached container geometry — recomputed only on canvas resize (#80)
const _tempContainer = { cx: 0, cy: 0, rx: 0, ry: 0, cr: 0, _w: -1, _h: -1 };
let tempRAF      = null;
let tempRunning  = false;
let tempPaused   = false;
let tempSpeed    = 1.5;             // target average speed (px/frame)

function tempSliderToSpeed(val) {
  return 0.25 + (val / 100) * 3.375; // 0.25 … 3.625 px/frame  (75% of prior max)
}

function getTempContainer() {
  const W = canvas.width, H = canvas.height;
  if (W !== _tempContainer._w || H !== _tempContainer._h) {
    _tempContainer._w = W; _tempContainer._h = H;
    _tempContainer.rx = Math.min(W * 0.44, H * 0.92);
    _tempContainer.ry = H * 0.46;
    _tempContainer.cr = Math.min(_tempContainer.rx, _tempContainer.ry) * 0.45;
    _tempContainer.cx = W / 2; _tempContainer.cy = H / 2;
  }
  return _tempContainer;
}

function rescaleTempVelocities() {
  const N = tempProtons.length;
  if (!N) return;
  const target = tempSpeed;  // thermostat always targets physical speed; slow-mo is handled by frame accumulator
  let sumV2 = 0;
  for (const p of tempProtons) sumV2 += p.vx * p.vx + p.vy * p.vy;
  const meanV = Math.sqrt(sumV2 / N);
  if (meanV < 1e-6) {
    for (const p of tempProtons) {
      const a = Math.random() * Math.PI * 2;
      p.vx = Math.cos(a) * target; p.vy = Math.sin(a) * target;
    }
  } else {
    const sc = target / meanV;
    for (const p of tempProtons) { p.vx *= sc; p.vy *= sc; }
  }
}

function initTempProtons() {
  const { cx, cy, rx, ry, cr } = getTempContainer();
  const R = TEMP_R, pad = R + 6;
  const irx = rx - pad, iry = ry - pad, icr = Math.max(0, cr - pad);
  const cols = Math.ceil(Math.sqrt(TEMP_N * irx / iry)) + 1;
  const rows = Math.ceil(TEMP_N / cols) + 1;
  const dx   = (irx * 2) / Math.max(cols - 1, 1);
  const dy   = (iry * 2) / Math.max(rows - 1, 1);
  tempProtons = [];
  outer: for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const jx = (Math.random() - 0.5) * dx * 0.25;
      const jy = (Math.random() - 0.5) * dy * 0.25;
      const px = cx - irx + c * dx + jx;
      const py = cy - iry + r * dy + jy;
      // Reject positions outside the inner rounded rect
      const ex = Math.abs(px - cx), ey = Math.abs(py - cy);
      if (ex > irx - icr && ey > iry - icr) {
        const ddx = ex - (irx - icr), ddy = ey - (iry - icr);
        if (ddx * ddx + ddy * ddy > icr * icr) continue;
      } else if (ex > irx || ey > iry) continue;
      const a = Math.random() * Math.PI * 2;
      tempProtons.push({ x: px, y: py, vx: Math.cos(a) * tempSpeed, vy: Math.sin(a) * tempSpeed });
      if (tempProtons.length >= TEMP_N) break outer;
    }
  }
  rescaleTempVelocities();
}

function stepTempPhysics() {
  const { cx, cy, rx, ry, cr } = getTempContainer();
  const N   = tempProtons.length;
  const R   = TEMP_R;
  const sub = TEMP_SUBSTEPS;
  const irx = rx - R, iry = ry - R, icr = Math.max(0, cr - R);

  // Grow acceleration buffers if somehow N exceeds TEMP_N (defensive)
  if (_tempAx.length < N) { _tempAx = new Float32Array(N); _tempAy = new Float32Array(N); }

  for (let s = 0; s < sub; s++) {
    // Compute Coulomb accelerations — reuse persistent buffers
    const ax = _tempAx; ax.fill(0, 0, N);
    const ay = _tempAy; ay.fill(0, 0, N);
    for (let i = 0; i < N; i++) {
      for (let j = i + 1; j < N; j++) {
        const dx = tempProtons[j].x - tempProtons[i].x;
        const dy = tempProtons[j].y - tempProtons[i].y;
        const r2  = Math.max(dx * dx + dy * dy, (R * 2.1) ** 2);
        const r   = Math.sqrt(r2);
        const F   = tempCoulomb / (r2 * r2);   // 1/r^4: very short-range
        const fx  = F * dx / r, fy = F * dy / r;
        ax[i] -= fx; ay[i] -= fy;
        ax[j] += fx; ay[j] += fy;
      }
    }
    // Integrate and bounce off rounded-rect wall
    for (let i = 0; i < N; i++) {
      const p = tempProtons[i];
      p.vx += ax[i] / sub;
      p.vy += ay[i] / sub;
      p.x  += p.vx  / sub;
      p.y  += p.vy  / sub;
      const ex = Math.abs(p.x - cx), ey = Math.abs(p.y - cy);
      const sx = Math.sign(p.x - cx) || 1, sy = Math.sign(p.y - cy) || 1;
      if (ex > irx - icr && ey > iry - icr) {
        // Corner arc region
        const ccx = cx + sx * (irx - icr), ccy = cy + sy * (iry - icr);
        const ddx = p.x - ccx, ddy = p.y - ccy;
        const dist = Math.sqrt(ddx * ddx + ddy * ddy);
        if (dist > icr) {
          p.x = ccx + ddx / dist * icr;
          p.y = ccy + ddy / dist * icr;
          const nnx = ddx / dist, nny = ddy / dist;
          const dot = p.vx * nnx + p.vy * nny;
          if (dot > 0) { p.vx -= 2 * dot * nnx; p.vy -= 2 * dot * nny; }
        }
      } else {
        // Flat edge regions
        if (p.x < cx - irx) { p.x = cx - irx; if (p.vx < 0) p.vx = -p.vx; }
        if (p.x > cx + irx) { p.x = cx + irx; if (p.vx > 0) p.vx = -p.vx; }
        if (p.y < cy - iry) { p.y = cy - iry; if (p.vy < 0) p.vy = -p.vy; }
        if (p.y > cy + iry) { p.y = cy + iry; if (p.vy > 0) p.vy = -p.vy; }
      }
    }

  }
  // Soft thermostat: nudge mean speed toward target each frame
  rescaleTempVelocities();
}

function drawTempProtonAt(x, y) {
  const R = TEMP_R;
  // Flat base circle — solid mid color, soft edge fade (v11 style)
  const baseR = R * 1.1;
  const baseGrad = ctx.createRadialGradient(x, y, 0, x, y, baseR);
  baseGrad.addColorStop(0,    '#ff1a65');
  baseGrad.addColorStop(0.82, '#ff1a65');
  baseGrad.addColorStop(1,    'rgba(0,0,0,0)');
  ctx.fillStyle = baseGrad;
  ctx.beginPath(); ctx.arc(x, y, baseR, 0, Math.PI * 2); ctx.fill();
  // Inner glow — bright centered bloom
  const innerGlow = ctx.createRadialGradient(x, y, 0, x, y, R);
  innerGlow.addColorStop(0,   '#ff80b0');
  innerGlow.addColorStop(0.5, '#ff80b0');
  innerGlow.addColorStop(1,   'rgba(0,0,0,0)');
  ctx.globalAlpha = 0.82;
  ctx.fillStyle = innerGlow;
  ctx.beginPath(); ctx.arc(x, y, R, 0, Math.PI * 2); ctx.fill();
  ctx.globalAlpha = 1;
  // + drawn geometrically — centered, no font metric issues
  const arm   = R * 0.36;
  const thick = R * 0.225;
  ctx.fillStyle = 'rgba(255,255,255,0.88)';
  ctx.fillRect(x - arm,       y - thick / 2, arm * 2, thick);
  ctx.fillRect(x - thick / 2, y - arm,       thick,   arm * 2);
}

function drawTemp() {
  ctx.fillStyle = document.body.classList.contains('screenshot-mode') ? getBgColor() : '#05040f';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const { cx, cy, rx, ry, cr } = getTempContainer();
  // Yellow rounded-rect container
  ctx.save();
  ctx.beginPath();
  ctx.roundRect(cx - rx, cy - ry, rx * 2, ry * 2, cr);
  ctx.fillStyle   = 'rgba(255,215,0,0.04)';
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,215,0,0.8)';
  ctx.lineWidth   = 2;
  ctx.shadowColor = 'rgba(255,215,0,0.9)';
  ctx.shadowBlur  = 20;
  ctx.stroke();
  ctx.restore();

  // Flash glow — fixed size, fades by alpha only (no outward expansion)
  const now = performance.now();
  tempFlashes = tempFlashes.filter(f => {
    const age = now - f.t;
    if (age > 250) return false;
    const alpha = 1 - age / 250;
    const r = TEMP_R * 2.0;  // fixed: covers the contact zone between two protons
    const g = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, r);
    g.addColorStop(0,    `rgba(255,255,255,${(alpha).toFixed(2)})`);
    g.addColorStop(0.15, `rgba(255,255,200,${(alpha * 0.98).toFixed(2)})`);
    g.addColorStop(0.4,  `rgba(255,200,0,${(alpha * 0.85).toFixed(2)})`);
    g.addColorStop(1,    'rgba(255,80,0,0)');
    ctx.save();
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(f.x, f.y, r, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
    return true;
  });

  // Protons — visual positions clamp overlapping pairs to touching distance.
  // Physics positions are untouched so the overlap (and flash) lasts its full natural duration.
  const N = tempProtons.length;
  const diam = TEMP_R * 2;
  if (_tempVisX.length < N) { _tempVisX = new Float32Array(N); _tempVisY = new Float32Array(N); }
  for (let i = 0; i < N; i++) { _tempVisX[i] = tempProtons[i].x + (tempProtons[i]._jx || 0); }
  for (let i = 0; i < N; i++) { _tempVisY[i] = tempProtons[i].y + (tempProtons[i]._jy || 0); }
  const visX = _tempVisX, visY = _tempVisY;
  for (let i = 0; i < N; i++) {
    for (let j = i + 1; j < N; j++) {
      const dx = visX[j] - visX[i], dy = visY[j] - visY[i];
      const d2 = dx * dx + dy * dy;
      if (d2 >= diam * diam || d2 === 0) continue;
      const d = Math.sqrt(d2), push = (diam - d) / 2;
      const nx = dx / d, ny = dy / d;
      visX[i] -= nx * push;  visY[i] -= ny * push;
      visX[j] += nx * push;  visY[j] += ny * push;
    }
  }
  ctx.save();
  ctx.shadowColor = '#ff2d78'; ctx.shadowBlur = 12;
  for (let i = 0; i < N; i++) drawTempProtonAt(visX[i], visY[i]);
  ctx.restore();

  // Total force arrows (drawn on top)
  if (showTotalForce) drawTempForceArrows();
}

let tempFlashes   = [];
let showTotalForce = false;

function detectTempFlashes() {
  const N = tempProtons.length;
  const flashDist = TEMP_R * 2 + 2;  // edge-to-edge within ~2px
  const now = performance.now();
  for (let i = 0; i < N; i++) {
    for (let j = i + 1; j < N; j++) {
      const dx = tempProtons[j].x - tempProtons[i].x;
      const dy = tempProtons[j].y - tempProtons[i].y;
      if (dx * dx + dy * dy < flashDist * flashDist) {
        tempFlashes.push({
          x: (tempProtons[i].x + tempProtons[j].x) * 0.5,
          y: (tempProtons[i].y + tempProtons[j].y) * 0.5,
          t: now,
        });
      }
    }
  }
  if (tempFlashes.length > 80) tempFlashes = tempFlashes.slice(-80);
}

function drawTempForceArrows() {
  const N = tempProtons.length;
  const R = TEMP_R;
  for (let i = 0; i < N; i++) {
    let fxNet = 0, fyNet = 0;
    for (let j = 0; j < N; j++) {
      if (i === j) continue;
      const dx = tempProtons[i].x - tempProtons[j].x;
      const dy = tempProtons[i].y - tempProtons[j].y;
      const r2 = Math.max(dx * dx + dy * dy, (R * 2.1) ** 2);
      const r  = Math.sqrt(r2);
      fxNet += (tempCoulomb / (r2 * r2)) * dx / r;
      fyNet += (tempCoulomb / (r2 * r2)) * dy / r;
    }
    const fMag = Math.sqrt(fxNet * fxNet + fyNet * fyNet);
    if (fMag < 1e-6) continue;
    const scale = Math.min(300, Math.log1p(fMag) * 350);
    const ux = fxNet / fMag, uy = fyNet / fMag;
    const x0 = tempProtons[i].x, y0 = tempProtons[i].y;
    const x1 = x0 + ux * scale, y1 = y0 + uy * scale;
    ctx.save();
    ctx.strokeStyle = 'rgba(100,200,255,0.85)';
    ctx.lineWidth = 4;
    ctx.shadowColor = 'rgba(100,200,255,0.5)';
    ctx.shadowBlur = 6;
    ctx.beginPath(); ctx.moveTo(x0, y0); ctx.lineTo(x1, y1); ctx.stroke();
    // Arrowhead
    const hlen = 10, hwid = 6;
    const bx = x1 - ux * hlen, by = y1 - uy * hlen;
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(bx - uy * hwid, by + ux * hwid);
    ctx.lineTo(bx + uy * hwid, by - ux * hwid);
    ctx.closePath();
    ctx.fillStyle = 'rgba(100,200,255,0.85)';
    ctx.fill();
    ctx.restore();
  }
}

function tempLoop() {
  // Advance physics by tempTimeScale steps per render frame.
  // At 1.0: one step per frame (normal). At 0.1: one step every 10 frames (10× slow-mo).
  // The accumulator carries the fractional remainder across frames.
  tempFrameAccum += tempTimeScale;
  const steps = Math.floor(tempFrameAccum);
  tempFrameAccum -= steps;
  for (let i = 0; i < steps; i++) {
    stepTempPhysics();
    detectTempFlashes();
  }
  drawTemp();
  tempRAF = requestAnimationFrame(tempLoop);
}

// ─── Temperature slider icon canvases ────────────────────────────────────────
function drawTempIcons() {
  function drawIcon(id, lineLen, protonOnRight) {
    const ic = document.getElementById(id);
    if (!ic) return;
    const c = ic.getContext('2d');
    const w = ic.width, h = ic.height;
    const R = 9;
    const pcx = protonOnRight ? w - R - 4 : R + 4;
    const pcy = h / 2;
    c.clearRect(0, 0, w, h);
    // Static speed lines
    const ys     = [h * 0.27, h * 0.5, h * 0.73];
    const scales = [0.65, 1.0, 0.80];
    ys.forEach((y, i) => {
      const len = lineLen * scales[i];
      const x0  = protonOnRight ? pcx - R - len : pcx + R;
      const x1  = protonOnRight ? pcx - R       : pcx + R + len;
      c.save();
      c.strokeStyle = 'rgba(180,180,210,0.25)'; c.lineWidth = 4;
      c.beginPath(); c.moveTo(x0, y); c.lineTo(x1, y); c.stroke();
      c.strokeStyle = 'rgba(210,210,230,0.85)'; c.lineWidth = 1.5;
      c.beginPath(); c.moveTo(x0, y); c.lineTo(x1, y); c.stroke();
      c.restore();
    });
    // Proton
    const g = c.createRadialGradient(pcx, pcy, 0, pcx, pcy, R * 1.1);
    g.addColorStop(0, '#ff80b0'); g.addColorStop(0.55, '#ff1a65'); g.addColorStop(1, 'rgba(0,0,0,0)');
    c.fillStyle = g;
    c.beginPath(); c.arc(pcx, pcy, R * 1.1, 0, Math.PI * 2); c.fill();
    c.save(); c.shadowColor = '#ff2d78'; c.shadowBlur = 8;
    const g2 = c.createRadialGradient(pcx, pcy, 0, pcx, pcy, R * 0.5);
    g2.addColorStop(0, '#fff'); g2.addColorStop(1, 'rgba(255,120,180,0)');
    c.globalAlpha = 0.5; c.fillStyle = g2;
    c.beginPath(); c.arc(pcx, pcy, R * 0.5, 0, Math.PI * 2); c.fill();
    c.restore();
  }
  drawIcon('tempProtonL', 10, true);   // short lines left, proton right
  drawIcon('tempProtonR', 24, false);  // long lines right, proton left — canvas CSS-flipped
}

// ── Dev recording menu (right-click replay button) ───────────────────────────
(function() {
  const menu = document.createElement('div');
  menu.style.cssText = 'position:fixed;display:none;z-index:9999;background:#1a1a2e;border:1px solid rgba(255,255,255,0.2);border-radius:8px;padding:4px 0;min-width:160px;box-shadow:0 4px 16px rgba(0,0,0,0.6);font-family:Lexend,sans-serif;font-size:13px;';
  document.body.appendChild(menu);

  function menuItem(label) {
    const el = document.createElement('div');
    el.textContent = label;
    el.style.cssText = 'padding:8px 16px;cursor:pointer;color:rgba(255,255,255,0.85);white-space:nowrap;';
    el.addEventListener('mouseenter', () => el.style.background = 'rgba(255,255,255,0.08)');
    el.addEventListener('mouseleave', () => el.style.background = '');
    menu.appendChild(el);
    return el;
  }

  const recItem = menuItem('⏺  Export Replay');

  recItem.addEventListener('click', () => {
    menu.style.display = 'none';
    if (!snapshot) return;
    const chunks = [];
    const stream = canvas.captureStream(30);
    const recorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
    recorder.ondataavailable = e => { if (e.data.size) chunks.push(e.data); };
    recorder.onstop = () => {
      const url = URL.createObjectURL(new Blob(chunks, { type: 'video/webm' }));
      const a = document.createElement('a'); a.href = url; a.download = 'replay.webm'; a.click();
      URL.revokeObjectURL(url);
    };
    recorder.start();
    replayBtn.click();
    // Poll replayRAF — doReplay() sets it synchronously above, and replayLoop
    // nulls it on completion. Polling `running` was wrong: doReplay() sets
    // running=false, so `started` was never set and the loop ran forever.
    let started = false;
    requestAnimationFrame(function poll() {
      if (!started && replayRAF !== null) { started = true; }
      if (started && replayRAF === null) { setTimeout(() => recorder.stop(), 300); return; }
      requestAnimationFrame(poll);
    });
  });

  document.getElementById('replayBtn').addEventListener('contextmenu', e => {
    e.preventDefault();
    menu.style.display = 'block';
    menu.style.left = e.clientX + 'px';
    menu.style.top  = e.clientY + 'px';
  });
  document.addEventListener('click', () => menu.style.display = 'none');
})();

function _runPerfBenchmark() {
  const oc = document.createElement('canvas');
  oc.width = 300; oc.height = 300;
  const dc = oc.getContext('2d');
  const R = PARTICLE_RADIUS;
  for (let i = 0; i < 15; i++) {
    const x = 15 + (i % 5) * 40, y = 15 + Math.floor(i / 5) * 40;
    const g = dc.createRadialGradient(x, y, 0, x, y, R);
    g.addColorStop(0, '#ff1a65'); g.addColorStop(1, 'rgba(0,0,0,0)');
    dc.fillStyle = g; dc.beginPath(); dc.arc(x, y, R, 0, Math.PI * 2); dc.fill();
  }
  const t0 = performance.now();
  for (let i = 0; i < 100; i++) {
    const x = 15 + (i % 10) * 27, y = 15 + Math.floor(i / 10) * 27;
    const g1 = dc.createRadialGradient(x, y, 0, x, y, R * 1.1);
    g1.addColorStop(0, '#ff1a65'); g1.addColorStop(0.82, '#ff1a65'); g1.addColorStop(1, 'rgba(0,0,0,0)');
    dc.fillStyle = g1; dc.beginPath(); dc.arc(x, y, R * 1.1, 0, Math.PI * 2); dc.fill();
    const g2 = dc.createRadialGradient(x, y, 0, x, y, R);
    g2.addColorStop(0, '#ff80b0'); g2.addColorStop(0.5, '#ff80b0'); g2.addColorStop(1, 'rgba(0,0,0,0)');
    dc.save(); dc.shadowColor = '#ff80b0'; dc.shadowBlur = 8; dc.globalAlpha = 0.82;
    dc.fillStyle = g2; dc.beginPath(); dc.arc(x, y, R, 0, Math.PI * 2); dc.fill();
    dc.restore(); dc.globalAlpha = 1;
  }
  dc.getImageData(0, 0, 1, 1);
  return performance.now() - t0;
}

(function _startupBenchmark() {
  const ms = _runPerfBenchmark();
  if (ms > 6) {
    const hiOpt = document.querySelector('#qualitySelect option[value="hi-res"]');
    if (hiOpt) hiOpt.remove();
    _applyQuality('simple');
  } else if (ms > 3) {
    _applyQuality('detailed');
  }
}());

document.getElementById('qualitySelect').addEventListener('change', function() {
  _applyQuality(this.value);
});
