// ============================================================
//  GEOMETRY SNAP
//  Snap He-4 to perfect diamond (protons ±r on x-axis,
//  neutrons ±r on y-axis, r = PARTICLE_RADIUS × √2 gives
//  exactly 1-diameter adjacent spacing).
//  Snap T to its CLUSTER_DEFS geometry centred at current CM.
// ============================================================
function snapHe4Geometry(startIdx, endIdx) {
  const count = endIdx - startIdx;
  if (count !== 4) return;
  let cx = 0, cy = 0;
  for (let i = startIdx; i < endIdx; i++) { cx += particles[i].x; cy += particles[i].y; }
  cx /= count; cy /= count;
  const r = PARTICLE_RADIUS * Math.SQRT2;
  const protonIdx = [], neutronIdx = [];
  for (let i = startIdx; i < endIdx; i++) {
    (particles[i].type === 'proton' ? protonIdx : neutronIdx).push(i);
  }
  particles[protonIdx[0]].x  = cx - r;  particles[protonIdx[0]].y  = cy;
  particles[protonIdx[1]].x  = cx + r;  particles[protonIdx[1]].y  = cy;
  particles[neutronIdx[0]].x = cx;       particles[neutronIdx[0]].y = cy - r;
  particles[neutronIdx[1]].x = cx;       particles[neutronIdx[1]].y = cy + r;
}

function snapTGeometry(startIdx, endIdx) {
  const count = endIdx - startIdx;
  if (count !== 3) return;
  let cx = 0, cy = 0;
  for (let i = startIdx; i < endIdx; i++) { cx += particles[i].x; cy += particles[i].y; }
  cx /= count; cy /= count;
  const protonIdx = [], neutronIdx = [];
  for (let i = startIdx; i < endIdx; i++) {
    (particles[i].type === 'proton' ? protonIdx : neutronIdx).push(i);
  }
  const def    = CLUSTER_DEFS.t;
  const defCx  = (def[0].x + def[1].x + def[2].x) / 3;
  const defCy  = (def[0].y + def[1].y + def[2].y) / 3;
  particles[protonIdx[0]].x  = cx + def[0].x - defCx;
  particles[protonIdx[0]].y  = cy + def[0].y - defCy;
  particles[neutronIdx[0]].x = cx + def[1].x - defCx;
  particles[neutronIdx[0]].y = cy + def[1].y - defCy;
  particles[neutronIdx[1]].x = cx + def[2].x - defCx;
  particles[neutronIdx[1]].y = cy + def[2].y - defCy;
}

// ============================================================
//  HE3 GEOMETRY SNAP
//  He3 = 2p + 1n.  Use same triangle shape as T but with
//  2 protons assigned to the first two offset slots.
// ============================================================
function snapHe3Geometry(startIdx, endIdx) {
  const count = endIdx - startIdx;
  if (count !== 3) return;
  let cx = 0, cy = 0;
  for (let i = startIdx; i < endIdx; i++) { cx += particles[i].x; cy += particles[i].y; }
  cx /= count; cy /= count;
  const protonIdx = [], neutronIdx = [];
  for (let i = startIdx; i < endIdx; i++) {
    (particles[i].type === 'proton' ? protonIdx : neutronIdx).push(i);
  }
  const def   = CLUSTER_DEFS.t;
  const defCx = (def[0].x + def[1].x + def[2].x) / 3;
  const defCy = (def[0].y + def[1].y + def[2].y) / 3;
  particles[protonIdx[0]].x  = cx + def[0].x - defCx;
  particles[protonIdx[0]].y  = cy + def[0].y - defCy;
  particles[protonIdx[1]].x  = cx + def[1].x - defCx;
  particles[protonIdx[1]].y  = cy + def[1].y - defCy;
  particles[neutronIdx[0]].x = cx + def[2].x - defCx;
  particles[neutronIdx[0]].y = cy + def[2].y - defCy;
}

// ============================================================
//  CATEGORY HELPERS
// ============================================================
function isCategory1() {
  const l = leftChoice, r = rightChoice;
  return (l==='p' && r==='p') ||
         (l==='n' && r==='n') ||
         (l==='n' && r==='he') || (l==='he' && r==='n') ||
         (l==='n' && r==='t')  || (l==='t'  && r==='n');
}

function isCategory2() {
  const l = leftChoice, r = rightChoice;
  return (l==='d' && r==='t') || (l==='t' && r==='d') ||
         (l==='d' && r==='d') ||
         (l==='t' && r==='t');
}

// P+N→D, P+D→He3, N+D→T, P+T→He4  (fusion + gamma emission)
function isCategory3() {
  const l = leftChoice, r = rightChoice;
  return (l==='p' && r==='n') || (l==='n' && r==='p') ||
         (l==='p' && r==='d') || (l==='d' && r==='p') ||
         (l==='n' && r==='d') || (l==='d' && r==='n') ||
         (l==='p' && r==='t') || (l==='t' && r==='p');
}

// He + anything that has a proton: Coulomb barrier prevents nuclear contact
function isCoulombOnly() {
  const l = leftChoice, r = rightChoice;
  if (l !== 'he' && r !== 'he') return false;
  const other = (l === 'he') ? r : l;
  return other === 'p' || other === 'd' || other === 't' || other === 'he';
}

// True when both clusters carry charge (proton on each side), meaning a
// Coulomb barrier exists.  At low speed the clusters may reverse before
// reaching strong-force range — treat that as a Coulomb scatter, not a
// nuclear collision.
function hasCoulombBarrier() {
  const lHasP = CLUSTER_DEFS[leftChoice].some(p => p.type === 'proton');
  const rHasP = CLUSTER_DEFS[rightChoice].some(p => p.type === 'proton');
  return lHasP && rHasP;
}

// Return true if any left-cluster particle is within strongCutoff() of any
// right-cluster particle — i.e. nuclear contact actually occurred.
function crossClusterContact() {
  const cutoff = strongCutoff();
  const lSize  = leftClusterSize;
  const n      = particles.length;
  for (let i = 0; i < lSize; i++) {
    for (let j = lSize; j < n; j++) {
      const dx = particles[j].x - particles[i].x;
      const dy = particles[j].y - particles[i].y;
      if (dx*dx + dy*dy < cutoff * cutoff) return true;
    }
  }
  return false;
}

// Maximum safe approach speed for Coulomb-only combos.
// Ensures CM kinetic energy < Coulomb barrier at the edge of strong range.
function maxSafeCoulombSpeed() {
  const l = leftChoice, r = rightChoice;
  const PHYS_CLUSTER_MASS = { p:1, n:1, d:2, t:2, he:4 };
  const lMass    = PHYS_CLUSTER_MASS[l] || CLUSTER_DEFS[l].length;
  const rMass    = PHYS_CLUSTER_MASS[r] || CLUSTER_DEFS[r].length;
  const lProtons = CLUSTER_DEFS[l].filter(p => p.type === 'proton').length;
  const rProtons = CLUSTER_DEFS[r].filter(p => p.type === 'proton').length;
  const pairs    = lProtons * rProtons; // inter-cluster proton pairs

  // Both clusters approach at ±approachSpeed; CM vel = (lMass-rMass)/(lMass+rMass)*v
  const total  = lMass + rMass;
  const cmNorm = (lMass - rMass) / total;
  const lRel   = 1 - cmNorm;           // left vel in CM frame (as multiple of v)
  const rRel   = -1 - cmNorm;          // right vel in CM frame
  const keCoeff = 0.5 * lMass * lRel * lRel + 0.5 * rMass * rRel * rRel;

  const barrier = pairs * coulombStrength / strongCutoff();
  return Math.sqrt(barrier / keCoeff) * 0.80; // 20% safety margin
}

// ============================================================
//  SETUP
// ============================================================
function setupScenario() {
  const cx  = canvas.width  / 2;
  const cy  = canvas.height / 2;
  const sep = 155;

  const leftDef  = CLUSTER_DEFS[leftChoice];
  const rightDef = CLUSTER_DEFS[rightChoice];
  leftClusterSize = leftDef.length;

  // T is secretly given the same effective mass as D (2) by scaling each
  // of its 3 particles down to physMass = 2/3, so cluster total = 2.
  const CLUSTER_PHYS_MASS = { p:1, n:1, d:1, t: 2/3, he:1 };
  const lPM = CLUSTER_PHYS_MASS[leftChoice]  || 1;
  const rPM = CLUSTER_PHYS_MASS[rightChoice] || 1;

  particles = [];
  for (const d of leftDef) {
    particles.push({ x: cx - sep + d.x, y: cy + d.y, vx:  approachSpeed, vy: 0, type: d.type, physMass: lPM });
  }
  for (const d of rightDef) {
    particles.push({ x: cx + sep + d.x, y: cy + d.y, vx: -approachSpeed, vy: 0, type: d.type, physMass: rPM });
  }

  // Snap He-4 / T clusters to their escape geometry so the SIE baseline
  // (initialTotal) matches the SIE they will have on exit → exact KE conservation.
  const lSz = leftDef.length, rSz = rightDef.length;
  if (lSz === 4) snapHe4Geometry(0, lSz);
  if (rSz === 4) snapHe4Geometry(lSz, particles.length);
  if (lSz === 3) snapTGeometry(0, lSz);
  if (rSz === 3) snapTGeometry(lSz, particles.length);

  // For Coulomb-only combos (He + charged), mirror the left cluster's internal
  // x-layout so its proton faces right.  This makes D-He and He-D symmetric.
  // Not applied to fusion combos — their barrier distances are calibrated as-is.
  if (isCoulombOnly()) {
    let lcx = 0;
    for (let i = 0; i < lSz; i++) lcx += particles[i].x;
    lcx /= lSz;
    for (let i = 0; i < lSz; i++) particles[i].x = 2 * lcx - particles[i].x;
  }

  const e0  = computeEnergy();
  initialTotal  = e0.total;
  initialKE     = e0.ke;
  keVPerSimUnit = (scaledEnergy && e0.ke > 0) ? speedToKeV(approachSpeed) / e0.ke : 1;
  updateCamera();
}

let snapshot = null;
function takeSnapshot() {
  snapshot = { particles: particles.map(p => ({ ...p })), leftClusterSize };
  setScrubReplayDisabled(false);
}
function restoreSnapshot() {
  if (!snapshot) return;
  particles = snapshot.particles.map(p => ({ ...p }));
  leftClusterSize = snapshot.leftClusterSize;
}

// ============================================================
//  FORCE MODEL
// ============================================================
function strongCutoff() { return PARTICLE_RADIUS * 2 * strongForceRange * strongRangeMult; }

function pairForce(dist, distSq, aType, bType) {
  if (aType === 'gamma' || bType === 'gamma') return 0;
  let force = 0;
  if (aType === 'proton' && bType === 'proton') {
    force += coulombStrength * coulombMult / Math.max(distSq, PARTICLE_RADIUS * PARTICLE_RADIUS);
  }
  const cutoff = strongCutoff();
  if (dist < cutoff) {
    const eqDist = Math.max(cutoff * equilibriumRatio, PARTICLE_RADIUS * 2);
    const span   = cutoff - eqDist;
    const t      = (dist - eqDist) / span;
    force -= t * strongForceStrength;
  }
  return force;
}

// ============================================================
//  PHYSICS STEP  (forces + substep Euler + hard-sphere)
// ============================================================
function step(dt) {
  const n     = particles.length;
  const subDt = dt / SUBSTEPS;

  // Precompute effective mass once per particle (constant within step)
  const masses = new Float32Array(n);
  for (let i = 0; i < n; i++) masses[i] = particles[i].physMass || 1;

  for (let sub = 0; sub < SUBSTEPS; sub++) {
    for (let i = 0; i < n; i++) {
      for (let j = i + 1; j < n; j++) {
        const a = particles[i], b = particles[j];
        const dx = b.x - a.x, dy = b.y - a.y;
        const distSq = dx * dx + dy * dy;
        if (!coulombScatterEscape && distSq > COULOMB_CUTOFF_SQ) continue;
        const dist   = Math.sqrt(distSq);
        if (dist < 0.01) continue;
        const force = pairForce(dist, distSq, a.type, b.type);
        const fx = force * (dx / dist), fy = force * (dy / dist);
        const ma = masses[i], mb = masses[j];
        a.vx -= fx * subDt / ma;  a.vy -= fy * subDt / ma;
        b.vx += fx * subDt / mb;  b.vy += fy * subDt / mb;
      }
    }
    for (let i = 0; i < n; i++) {
      particles[i].x += particles[i].vx * subDt;
      particles[i].y += particles[i].vy * subDt;
    }
    // Hard-sphere
    const minSep = PARTICLE_RADIUS * 2;
    for (let i = 0; i < n; i++) {
      for (let j = i + 1; j < n; j++) {
        const a = particles[i], b = particles[j];
        let dx = b.x - a.x, dy = b.y - a.y;
        const dSq = dx * dx + dy * dy;
        if (dSq >= minSep * minSep) continue;
        let d = Math.sqrt(dSq);
        if (d < 0.001) { dx = 1; dy = 0; d = 0.001; }
        const nx = dx / d, ny = dy / d;
        const overlap = minSep - d;
        a.x -= nx * overlap * 0.5;  a.y -= ny * overlap * 0.5;
        b.x += nx * overlap * 0.5;  b.y += ny * overlap * 0.5;
        const dvx = b.vx - a.vx, dvy = b.vy - a.vy;
        const dvDotN = dvx * nx + dvy * ny;
        if (dvDotN < 0) {
          a.vx += dvDotN * nx;  a.vy += dvDotN * ny;
          b.vx -= dvDotN * nx;  b.vy -= dvDotN * ny;
        }
      }
    }
  }
}

// ============================================================
//  RIGID CLUSTER LOCK
//  After step(), snap all particles in each cluster to that
//  cluster's CM velocity — prevents inter-cluster forces from
//  causing internal oscillation during approach.
// ============================================================
function lockClusterVelocities() {
  const n = particles.length, lSize = leftClusterSize;
  let lvx=0, lvy=0, ltm=0, rvx=0, rvy=0, rtm=0;
  for (let i = 0;     i < lSize; i++) { const m=particles[i].physMass||1; lvx+=particles[i].vx*m; lvy+=particles[i].vy*m; ltm+=m; }
  for (let i = lSize; i < n;     i++) { const m=particles[i].physMass||1; rvx+=particles[i].vx*m; rvy+=particles[i].vy*m; rtm+=m; }
  lvx /= ltm;  lvy /= ltm;
  rvx /= rtm;  rvy /= rtm;
  for (let i = 0;     i < lSize; i++) { particles[i].vx = lvx; particles[i].vy = lvy; }
  for (let i = lSize; i < n;     i++) { particles[i].vx = rvx; particles[i].vy = rvy; }
}

// ============================================================
//  CAMERA  — geometric midpoint between cluster centroids
// ============================================================
function updateCamera() {
  const n = particles.length, lSize = leftClusterSize;
  let lcx = 0, lcy = 0, rcx = 0, rcy = 0, lCnt = 0, rCnt = 0;
  for (let i = 0; i < lSize; i++) { lcx += particles[i].x; lcy += particles[i].y; lCnt++; }
  for (let i = lSize; i < n; i++) { rcx += particles[i].x; rcy += particles[i].y; rCnt++; }
  if (lCnt > 0) { lcx /= lCnt; lcy /= lCnt; }
  if (rCnt > 0) { rcx /= rCnt; rcy /= rCnt; }
  else          { rcx = lcx;   rcy = lcy;   }

  // After photon capture fires, use photon (while alive) as the second camera anchor
  // so the camera tracks the midpoint between nucleus and photon.
  // VIEW_OFFSET_X biases the camera to the right of the actual midpoint so the
  // simulation is rendered to the left of canvas center (clear of the bar-chart
  // panel on the right). 100 world units × zoomScale 1.5 = 150 screen px.
  const VIEW_OFFSET_X = 100;
  if (photonCaptureFired) {
    const px = photon ? photon.x : rcx;
    const py = photon ? photon.y : rcy;
    // Camera midpoint between nucleus CM (lcx/lcy) and photon position
    cameraSiteX = (lcx + px) / 2 + VIEW_OFFSET_X;
    cameraSiteY = (lcy + py) / 2;
  } else {
    cameraSiteX = (lcx + rcx) / 2 + VIEW_OFFSET_X;
    cameraSiteY = (lcy + rcy) / 2;
  }
  return { lcx, lcy, rcx, rcy };
}

// ============================================================
//  ENERGY COMPUTATION
//  KE in CM frame (mass = 1 per nucleon), plus pairwise EIE/SIE.
// ============================================================
function computeEnergy() {
  const phys = particles;
  const n = phys.length;
  if (n === 0) return { ke: 0, eie: 0, sie: 0, total: 0 };
  let cmvx = 0, cmvy = 0, totalM = 0;
  for (const p of phys) { const m=p.physMass||1; cmvx += p.vx*m; cmvy += p.vy*m; totalM += m; }
  cmvx /= totalM;  cmvy /= totalM;
  let ke = 0;
  for (const p of phys) {
    const m = p.physMass || 1;
    const rvx = p.vx - cmvx, rvy = p.vy - cmvy;
    ke += 0.5 * m * (rvx * rvx + rvy * rvy);
  }
  let eie = 0, sie = 0;
  const cutoff = strongCutoff();
  for (let i = 0; i < n; i++) {
    for (let j = i + 1; j < n; j++) {
      const a = phys[i], b = phys[j];
      const dx = b.x - a.x, dy = b.y - a.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist === 0) continue;
      if (a.type === 'proton' && b.type === 'proton') {
        eie += coulombStrength / Math.max(dist, PARTICLE_RADIUS);
      }
      if (dist < cutoff) {
        const eqDist = Math.max(cutoff * equilibriumRatio, PARTICLE_RADIUS * 2);
        const span   = cutoff - eqDist;
        if (span > 0) {
          const dr = dist - eqDist;
          sie += strongForceStrength / (2 * span) * (dr * dr - span * span);
        }
      }
    }
  }
  return { ke, eie, sie, total: ke + eie + sie };
}

// Compute SIE for an array of {x,y} positions (used for escape KE budget).
function computeSIEForPositions(positions) {
  const cutoff = strongCutoff();
  const eqDist = Math.max(cutoff * equilibriumRatio, PARTICLE_RADIUS * 2);
  const span   = cutoff - eqDist;
  if (span <= 0) return 0;
  let sie = 0;
  for (let i = 0; i < positions.length; i++) {
    for (let j = i + 1; j < positions.length; j++) {
      const dx   = positions[i].x - positions[j].x;
      const dy   = positions[i].y - positions[j].y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < cutoff) {
        const dr = dist - eqDist;
        sie += strongForceStrength / (2 * span) * (dr * dr - span * span);
      }
    }
  }
  return sie;
}

// ============================================================
//  CATEGORY 1 ESCAPE
//
//  Same products exit with a random new trajectory.
//  KE budget: initialTotal − SIE_at_target (≈ initial KE since
//  clusters exit in the same geometry as they started).
//
//  For N+He4 / N+T: snap multi-particle cluster, teleport the
//  lone neutron outside the strong cutoff so inter-cluster SIE
//  is zero at the escape start, matching the baseline.
//
//  Lerp animation runs over ESCAPE_ANIM_FRAMES frames: positions
//  slide from the end-of-collision state to the clean geometry,
//  while velocities are applied immediately.
// ============================================================
function fireCategory1Escape() {
  const n     = particles.length;
  const lSize = leftClusterSize;
  const rSize = n - lSize;

  // ── Save collision-end positions as lerp start ──────────────
  escapeAnimStartPos = particles.map(p => ({ x: p.x, y: p.y }));

  // ── Apply snap / teleport to find target positions ──────────
  // (Temporarily modifies particles.x/y — will be restored below.)
  const isNHe = (lSize === 1 && rSize === 4) || (lSize === 4 && rSize === 1);
  const isNT  = (lSize === 1 && rSize === 3) || (lSize === 3 && rSize === 1);

  if (isNHe) {
    const heStart = (lSize === 4) ? 0 : lSize;
    const heEnd   = (lSize === 4) ? lSize : n;
    const nIdx    = (lSize === 1) ? 0 : lSize;

    snapHe4Geometry(heStart, heEnd);

    let hcx = 0, hcy = 0;
    for (let i = heStart; i < heEnd; i++) { hcx += particles[i].x; hcy += particles[i].y; }
    hcx /= 4;  hcy /= 4;

    // Teleport N outside strong-force range
    const ndx = particles[nIdx].x - hcx, ndy = particles[nIdx].y - hcy;
    const ndist = Math.sqrt(ndx * ndx + ndy * ndy);
    const nnx = ndist > 0.01 ? ndx / ndist : 1;
    const nny = ndist > 0.01 ? ndy / ndist : 0;
    const safeDist = strongCutoff() * 1.15 + PARTICLE_RADIUS;
    particles[nIdx].x = hcx + nnx * safeDist;
    particles[nIdx].y = hcy + nny * safeDist;

  } else if (isNT) {
    const tStart = (lSize === 3) ? 0 : lSize;
    const tEnd   = (lSize === 3) ? lSize : n;
    const nIdx   = (lSize === 1) ? 0 : lSize;

    snapTGeometry(tStart, tEnd);

    let tcx = 0, tcy = 0;
    for (let i = tStart; i < tEnd; i++) { tcx += particles[i].x; tcy += particles[i].y; }
    tcx /= 3;  tcy /= 3;

    const ndx = particles[nIdx].x - tcx, ndy = particles[nIdx].y - tcy;
    const ndist = Math.sqrt(ndx * ndx + ndy * ndy);
    const nnx = ndist > 0.01 ? ndx / ndist : 1;
    const nny = ndist > 0.01 ? ndy / ndist : 0;
    const safeDist = strongCutoff() * 1.15 + PARTICLE_RADIUS;
    particles[nIdx].x = tcx + nnx * safeDist;
    particles[nIdx].y = tcy + nny * safeDist;

  } else {
    // P+P or N+N: separate to just outside strong-force range
    let lcx = 0, lcy = 0, rcx = 0, rcy = 0;
    for (let i = 0;     i < lSize; i++) { lcx += particles[i].x; lcy += particles[i].y; }
    for (let i = lSize; i < n;     i++) { rcx += particles[i].x; rcy += particles[i].y; }
    lcx /= lSize;  lcy /= lSize;
    rcx /= rSize;  rcy /= rSize;
    const edx = rcx - lcx, edy = rcy - lcy;
    const edist = Math.sqrt(edx * edx + edy * edy);
    const enx = edx / edist, eny = edy / edist;
    const safeSep = Math.max(edist, strongCutoff() * 1.1 + PARTICLE_RADIUS * 2);
    const emx = (lcx + rcx) / 2, emy = (lcy + rcy) / 2;
    particles[0].x = emx - enx * safeSep / 2;  particles[0].y = emy - eny * safeSep / 2;
    particles[lSize].x = emx + enx * safeSep / 2;  particles[lSize].y = emy + eny * safeSep / 2;
  }

  // ── SIE at target positions (≈ intra-cluster SIE only) ──────
  const targetSIE = computeEnergy().sie;

  // ── Save target positions, then restore start positions ─────
  escapeAnimTargetPos = particles.map(p => ({ x: p.x, y: p.y }));
  for (let i = 0; i < n; i++) {
    particles[i].x = escapeAnimStartPos[i].x;
    particles[i].y = escapeAnimStartPos[i].y;
  }

  // ── Compute escape velocities ────────────────────────────────
  // Positions have been restored; velocities still reflect collision-end
  // physics. Save them as the lerp start. Pick a random scatter direction
  // and save that as the lerp target. The escapeAnim phase will smoothly
  // rotate cluster velocities from collision-end to escape over 5 frames,
  // so there is no abrupt mid-flight turn even though the angle is random.

  // Cluster CM velocities at end of collision (lerp start)
  let lvx = 0, lvy = 0, rvx = 0, rvy = 0;
  for (let i = 0;     i < lSize; i++) { lvx += particles[i].vx; lvy += particles[i].vy; }
  for (let i = lSize; i < n;     i++) { rvx += particles[i].vx; rvy += particles[i].vy; }
  lvx /= lSize;  lvy /= lSize;
  rvx /= rSize;  rvy /= rSize;
  escapeAnimStartVel = { lv: { vx: lvx, vy: lvy }, rv: { vx: rvx, vy: rvy } };

  // System CM velocity (conserved)
  const cmvx = (lSize * lvx + rSize * rvx) / n;
  const cmvy = (lSize * lvy + rSize * rvy) / n;

  // CM-frame KE budget: use the initial KE directly so exit KE = entry KE.
  // Using initialTotal − targetSIE would be wrong for He-4 (which has internal
  // EIE from its proton pair) — that EIE would end up added to escape KE.
  const targetCmKE = Math.max(0, initialKE);
  const vl = Math.sqrt(2 * targetCmKE * rSize / (lSize * n));

  // Random scatter direction: backscatter ±30° for P+P/N+N, ±90° otherwise
  let slcx = 0, slcy = 0, srcx = 0, srcy = 0;
  for (let i = 0;     i < lSize; i++) { slcx += escapeAnimStartPos[i].x; slcy += escapeAnimStartPos[i].y; }
  for (let i = lSize; i < n;     i++) { srcx += escapeAnimStartPos[i].x; srcy += escapeAnimStartPos[i].y; }
  slcx /= lSize;  slcy /= lSize;
  srcx /= rSize;  srcy /= rSize;
  const sdx = srcx - slcx, sdy = srcy - slcy;
  const sdist = Math.sqrt(sdx * sdx + sdy * sdy);
  const snx = sdist > 0.01 ? sdx / sdist : 1;
  const sny = sdist > 0.01 ? sdy / sdist : 0;
  const backAngle = Math.atan2(-sny, -snx);
  const scatterRange = (lSize === 1 && rSize === 1) ? Math.PI / 6 : Math.PI / 2;
  const theta = backAngle + (Math.random() - 0.5) * 2 * scatterRange;
  const cosT = Math.cos(theta), sinT = Math.sin(theta);

  const newLvx = cmvx + vl * cosT;
  const newLvy = cmvy + vl * sinT;
  const newRvx = cmvx - (lSize / rSize) * vl * cosT;
  const newRvy = cmvy - (lSize / rSize) * vl * sinT;

  // Velocity starts at escape speed immediately — no ramp-up during escapeAnim.
  // Position still lerps from collision positions to snapped geometry, so the
  // visual is one smooth motion (no "separate then shoot" two-phase look).
  escapeAnimTargetVel = { lv: { vx: newLvx, vy: newLvy }, rv: { vx: newRvx, vy: newRvy } };
  escapeAnimStartVel  = { lv: { vx: newLvx, vy: newLvy }, rv: { vx: newRvx, vy: newRvy } };
}

// ============================================================
//  CATEGORY 2 ESCAPE
//
//  Fusion reactions: products carry 5× the initial CM KE,
//  sourced from reduced SIE when nucleons rebind into a more
//  tightly bound nucleus.
//
//  Products are always: He4+N (D-T), He3+N or T+P (D-D),
//  He4+2N (T-T).  Particles are physically rearranged into the
//  product order so the existing two-cluster escape anim works
//  unchanged: cluster 0..leftClusterSize-1 = heavy product,
//  the rest = light product(s).
// ============================================================

// Shared velocity setup for all Cat-2 reactions.
// Called after escapeAnimStartPos and particles[] are in their
// new (post-rearrange/type-change) order, positions restored
// to collision-end, leftClusterSize updated to newLSize.
function applyCategory2Velocities(newLSize, newRSize, overrideTargetKE = null) {
  const n = newLSize + newRSize;

  // System CM velocity (momentum conserved)
  let totVx = 0, totVy = 0;
  for (let i = 0; i < n; i++) { totVx += particles[i].vx; totVy += particles[i].vy; }
  const cmvx = totVx / n, cmvy = totVy / n;

  // CM velocities of the two product clusters at collision-end (lerp start)
  let lvx = 0, lvy = 0, rvx = 0, rvy = 0;
  for (let i = 0;        i < newLSize; i++) { lvx += particles[i].vx; lvy += particles[i].vy; }
  for (let i = newLSize; i < n;        i++) { rvx += particles[i].vx; rvy += particles[i].vy; }
  lvx /= newLSize;  lvy /= newLSize;
  rvx /= newRSize;  rvy /= newRSize;
  escapeAnimStartVel = { lv: { vx: lvx, vy: lvy }, rv: { vx: rvx, vy: rvy } };

  // Default: 5× initial KE in CM frame. D+T uses collisionPeakKE budget (tiny reduction).
  const targetCmKE = overrideTargetKE !== null ? overrideTargetKE : 5 * Math.max(0, initialKE);
  // v_left in CM frame so that KE = ½ newLSize v_l² + ½ newRSize v_r²
  // with momentum conservation → v_r = -(newLSize/newRSize) v_l
  const vl = Math.sqrt(2 * targetCmKE * newRSize / (newLSize * n));

  // Random scatter: uniform over all angles (full 2π, not just backscatter).
  // Then guarantee the right cluster moves away from the left cluster using
  // the intended separation direction from escapeAnimTargetPos.
  const theta = Math.random() * 2 * Math.PI;
  let cosT = Math.cos(theta), sinT = Math.sin(theta);

  if (escapeAnimTargetPos) {
    // Compute intended separation: right target CM minus left target CM
    let tlcx=0, tlcy=0, trcx=0, trcy=0;
    for (let i=0;        i<newLSize; i++) { tlcx+=escapeAnimTargetPos[i].x; tlcy+=escapeAnimTargetPos[i].y; }
    for (let i=newLSize; i<n;        i++) { trcx+=escapeAnimTargetPos[i].x; trcy+=escapeAnimTargetPos[i].y; }
    tlcx/=newLSize; tlcy/=newLSize;
    trcx/=newRSize; trcy/=newRSize;
    const sdx=trcx-tlcx, sdy=trcy-tlcy, sdist=Math.sqrt(sdx*sdx+sdy*sdy);
    if (sdist > 0.01) {
      const snx=sdx/sdist, sny=sdy/sdist;
      // Right cluster's CM-frame velocity = -(newLSize/newRSize)*vl*(cosT,sinT).
      // It must have a positive dot product with (snx,sny) i.e. -(cosT*snx+sinT*sny)>0
      // → cosT*snx+sinT*sny < 0. If not, flip theta by π.
      if (cosT * snx + sinT * sny >= 0) { cosT = -cosT; sinT = -sinT; }
    }
  }

  const newLvx = cmvx + vl * cosT;
  const newLvy = cmvy + vl * sinT;
  const newRvx = cmvx - (newLSize / newRSize) * vl * cosT;
  const newRvy = cmvy - (newLSize / newRSize) * vl * sinT;

  escapeAnimTargetVel = { lv: { vx: newLvx, vy: newLvy }, rv: { vx: newRvx, vy: newRvy } };
  escapeAnimStartVel  = { lv: { vx: newLvx, vy: newLvy }, rv: { vx: newRvx, vy: newRvy } };
}

// Helper: teleport a single particle (idx) outside He/T cluster CM
function teleportOutside(idx, clusterStart, clusterEnd) {
  let ccx = 0, ccy = 0;
  const sz = clusterEnd - clusterStart;
  for (let i = clusterStart; i < clusterEnd; i++) { ccx += particles[i].x; ccy += particles[i].y; }
  ccx /= sz; ccy /= sz;
  const dx = particles[idx].x - ccx, dy = particles[idx].y - ccy;
  const dist = Math.sqrt(dx*dx + dy*dy);
  const nx = dist > 0.01 ? dx/dist : 1;
  const ny = dist > 0.01 ? dy/dist : 0;
  const safeDist = strongCutoff() * 1.15 + PARTICLE_RADIUS;
  particles[idx].x = ccx + nx * safeDist;
  particles[idx].y = ccy + ny * safeDist;
}

// D+T → He4 + N
function fireDTEscape(targetKE = null) {
  // d+t: [D_p, D_n, T_p, T_n, T_n] = [p,n,p,n,n] → He4=[0-3], N=[4] ✓
  // t+d: [T_p, T_n, T_n, D_p, D_n] = [p,n,n,p,n]
  //   → reorder to [T_p, T_n, D_p, D_n, T_n2] = [p,n,p,n,n]
  if (leftChoice === 't') {
    particles = [particles[0], particles[1], particles[3], particles[4], particles[2]];
  }
  leftClusterSize = 4;
  escapeAnimStartPos = particles.map(p => ({ x: p.x, y: p.y }));

  snapHe4Geometry(0, 4);
  teleportOutside(4, 0, 4);

  escapeAnimTargetPos = particles.map(p => ({ x: p.x, y: p.y }));
  for (let i = 0; i < 5; i++) { particles[i].x = escapeAnimStartPos[i].x; particles[i].y = escapeAnimStartPos[i].y; }
  applyCategory2Velocities(4, 1, targetKE);
}

// D+D → He3 + N  (2p+1n heavy, 1n light)
function fireDDtoHe3N(targetKE = null) {
  // [D1_p, D1_n, D2_p, D2_n] = [p,n,p,n]
  // He3=[0,1,2]=[p,n,p]=2p+1n ✓,  N=[3]=n ✓
  leftClusterSize = 3;
  escapeAnimStartPos = particles.map(p => ({ x: p.x, y: p.y }));

  snapHe3Geometry(0, 3);
  teleportOutside(3, 0, 3);

  escapeAnimTargetPos = particles.map(p => ({ x: p.x, y: p.y }));
  for (let i = 0; i < 4; i++) { particles[i].x = escapeAnimStartPos[i].x; particles[i].y = escapeAnimStartPos[i].y; }
  applyCategory2Velocities(3, 1, targetKE !== null ? targetKE * 2.5 : null);
}

// D+D → T + P  (1p+2n heavy, 1p light)
function fireDDtoTP(targetKE = null) {
  // [D1_p, D1_n, D2_p, D2_n] = [p,n,p,n]
  // Swap types so T=[0-2]=[p,n,n] and P=[3]=p
  particles[2].type = 'neutron';
  particles[3].type = 'proton';
  leftClusterSize = 3;
  escapeAnimStartPos = particles.map(p => ({ x: p.x, y: p.y }));

  snapTGeometry(0, 3);
  teleportOutside(3, 0, 3);

  escapeAnimTargetPos = particles.map(p => ({ x: p.x, y: p.y }));
  for (let i = 0; i < 4; i++) { particles[i].x = escapeAnimStartPos[i].x; particles[i].y = escapeAnimStartPos[i].y; }
  // 3.5× initial KE for a more visible departure; bar chart uses 1/r EIE formula (ddToTPEscape)
  // which reads actual T-p distance, so the shape stays the same — just plays out faster.
  applyCategory2Velocities(3, 1, targetKE !== null ? targetKE * 3.5 : null);
  ddToTPEscape = true;
  // fireDDtoTP mutates particle types in-place (idx 2: proton→neutron, idx 3: neutron→proton)
  // without changing the particles array reference, so the heatmap proton-pair cache is stale.
  // Null it out so drawHeatmap() rebuilds with the correct proton list [idx 0, idx 3],
  // showing the electric field between T's proton and the free proton as they coast apart.
  _heatmapParticles = null;
}

// T+T → He4 + 2N  (3-body, full 2D momentum conservation)
function fireTTEscape(targetKE = null) {
  // [T1_p, T1_n, T1_n, T2_p, T2_n, T2_n] = [p,n,n,p,n,n]
  // He4=[0-3]=[p,n,n,p]=2p+2n ✓,  N1=[4]=n, N2=[5]=n ✓
  leftClusterSize = 4;
  escapeAnimStartPos = particles.map(p => ({ x: p.x, y: p.y }));

  snapHe4Geometry(0, 4);

  let hcx = 0, hcy = 0;
  for (let i = 0; i < 4; i++) { hcx += particles[i].x; hcy += particles[i].y; }
  hcx /= 4; hcy /= 4;

  // Both neutrons start at the same position (their midpoint) — they travel
  // together and spread apart gradually via diverging velocities added below.
  const nmx = (particles[4].x + particles[5].x) / 2 - hcx;
  const nmy = (particles[4].y + particles[5].y) / 2 - hcy;
  const nmd = Math.sqrt(nmx*nmx + nmy*nmy);
  const nnx = nmd > 0.01 ? nmx/nmd : 1;
  const nny = nmd > 0.01 ? nmy/nmd : 0;
  const safeDist = strongCutoff() * 1.15 + PARTICLE_RADIUS;
  const nx0 = hcx + nnx * safeDist;
  const ny0 = hcy + nny * safeDist;
  // Offset neutrons ±2 radii perpendicular so they're clearly two distinct particles
  // from the very start of the escape animation.
  const perpX2 = -nny, perpY2 = nnx;  // unit perpendicular to (nnx, nny)
  particles[4].x = nx0 + perpX2 * PARTICLE_RADIUS * 2;  particles[4].y = ny0 + perpY2 * PARTICLE_RADIUS * 2;
  particles[5].x = nx0 - perpX2 * PARTICLE_RADIUS * 2;  particles[5].y = ny0 - perpY2 * PARTICLE_RADIUS * 2;

  escapeAnimTargetPos = particles.map(p => ({ x: p.x, y: p.y }));
  for (let i = 0; i < 6; i++) { particles[i].x = escapeAnimStartPos[i].x; particles[i].y = escapeAnimStartPos[i].y; }

  // Record start velocities per-particle for the lerp
  escapeAnimStartVel = { perParticle: particles.map(p => ({ vx: p.vx, vy: p.vy })) };

  // ── 3-body kinematics in system CM frame ─────────────────────
  // Total mass = 6 (each nucleon = 1); He4 mass = 4, N mass = 1 each.
  const n = 6;
  let totVx = 0, totVy = 0;
  for (let i = 0; i < n; i++) { totVx += particles[i].vx; totVy += particles[i].vy; }
  const cmvx = totVx / n, cmvy = totVy / n;

  // Scale up 2.5× so neutrons visibly zip away — bar chart uses frozen collisionDisplayKE,
  // so this only affects the visual escape speed, not what's shown on the chart.
  const KE_cm = (targetKE !== null ? targetKE : 5 * Math.max(0, initialKE)) * 2.5;

  // He4 gets 12–22% of KE_cm. Clamping away from zero prevents He4 from barely moving
  // (which happens when K_He4 ≈ 0, forcing both neutrons to carry nearly all momentum
  // while He4 drifts off-screen too slowly). Upper bound 22% keeps ≥ 34% for neutrons'
  // relative KE so they spread apart visibly.
  const K_He4  = (0.12 + Math.random() * 0.10) * KE_cm;
  // He4 CM-frame speed: KE_He4 = ½·4·v4² = 2·v4²  →  v4 = √(K_He4/2)
  const v4_cm  = Math.sqrt(K_He4 / 2);
  const theta  = Math.random() * 2 * Math.PI;

  // Neutron-pair CM velocity in system CM frame = −p_He4 / m_N_total = −4·v4·dir / 2
  const v_nc_x = -2 * v4_cm * Math.cos(theta);
  const v_nc_y = -2 * v4_cm * Math.sin(theta);

  // Neutrons travel as a pair: both get the pair's CM velocity, plus a tiny
  // perpendicular spread (±18° from pair direction) so they gradually diverge
  // as they fly — distance between them grows proportionally to distance traveled.
  const He4vx = cmvx + v4_cm * Math.cos(theta);
  const He4vy = cmvy + v4_cm * Math.sin(theta);

  const ncSpeed = Math.sqrt(v_nc_x * v_nc_x + v_nc_y * v_nc_y);
  // Perpendicular unit vector to neutron-pair CM direction
  const ncLen = ncSpeed > 0.001 ? ncSpeed : 1;
  const perpX =  v_nc_y / ncLen;
  const perpY = -v_nc_x / ncLen;
  // Spread = 35° half-angle → tan(35°) ≈ 0.70 of CM speed — wide enough to look like
  // two clearly diverging neutrons, not just a tightly bunched pair.
  const spreadV = ncSpeed * 0.70;

  const N1vx = cmvx + v_nc_x + perpX * spreadV;
  const N1vy = cmvy + v_nc_y + perpY * spreadV;
  const N2vx = cmvx + v_nc_x - perpX * spreadV;
  const N2vy = cmvy + v_nc_y - perpY * spreadV;

  const targetVels = [];
  for (let i = 0; i < 4; i++) targetVels.push({ vx: He4vx, vy: He4vy });
  targetVels.push({ vx: N1vx, vy: N1vy });
  targetVels.push({ vx: N2vx, vy: N2vy });
  escapeAnimTargetVel = { perParticle: targetVels };
  escapeAnimStartVel  = { perParticle: targetVels.map(v => ({ vx: v.vx, vy: v.vy })) };
}

function fireCategory2Escape() {
  const cat2Entry = getComboEntry();
  const cat2KE    = cat2Entry ? cat2Entry.keOut * speedScale() : null;
  const l = leftChoice, r = rightChoice;
  if ((l==='d' && r==='t') || (l==='t' && r==='d')) {
    fireDTEscape(cat2KE);
  } else if (l==='d' && r==='d') {
    fireDDtoHe3N(cat2KE);
  } else if (l==='t' && r==='t') {
    fireTTEscape(cat2KE);
  }
}

// ============================================================
//  CATEGORY 3 ESCAPE  —  photon capture (purple ribbon γ)
//
//  Returns the CLUSTER_DEFS entry for the product nucleus.
// ============================================================
function getProductDef() {
  const l = leftChoice, r = rightChoice;
  if ((l==='p'&&r==='n') || (l==='n'&&r==='p')) return CLUSTER_DEFS.d;
  if ((l==='p'&&r==='d') || (l==='d'&&r==='p')) return [
    { type:'proton',  x:-10, y:-6 },
    { type:'proton',  x: 10, y:-6 },
    { type:'neutron', x:   0, y:12 },
  ];
  if ((l==='n'&&r==='d') || (l==='d'&&r==='n')) return CLUSTER_DEFS.t;
  if ((l==='p'&&r==='t') || (l==='t'&&r==='p')) return CLUSTER_DEFS.he;
  return CLUSTER_DEFS.d; // fallback
}

function firePhotonCapture() {
  photonCaptureFired = true;

  const n = particles.length;
  let sumVx = 0, sumVy = 0, sumX = 0, sumY = 0;
  for (const p of particles) { sumVx += p.vx; sumVy += p.vy; sumX += p.x; sumY += p.y; }
  const cmvx = sumVx / n, cmvy = sumVy / n;
  const pcx = sumX / n, pcy = sumY / n;

  // Photon fires in a random direction; nucleus recoils opposite.
  const theta = Math.random() * 2 * Math.PI;
  const pnx = Math.cos(theta), pny = Math.sin(theta);
  const pvx = cmvx - pnx * approachSpeed;
  const pvy = cmvy - pny * approachSpeed;

  // Snap positions to product geometry centered on system CM
  const productDef = getProductDef();
  const sortedIdx = [...Array(n).keys()].sort((a, b) =>
    (particles[a].type === 'proton' ? 0 : 1) - (particles[b].type === 'proton' ? 0 : 1));
  const sortedDef = [...productDef].sort((a, b) =>
    (a.type === 'proton' ? 0 : 1) - (b.type === 'proton' ? 0 : 1));
  let defCx = 0, defCy = 0;
  for (const d of sortedDef) { defCx += d.x; defCy += d.y; }
  defCx /= n; defCy /= n;

  for (let i = 0; i < n; i++) {
    const pi = sortedIdx[i];
    particles[pi].x  = pcx + (sortedDef[i].x - defCx);
    particles[pi].y  = pcy + (sortedDef[i].y - defCy);
    particles[pi].vx = pvx;
    particles[pi].vy = pvy;
  }

  photon = { x: pcx, y: pcy, vx: pnx * PHOTON_SPEED, vy: pny * PHOTON_SPEED,
             age: 0, maxAge: PHOTON_MAX_AGE };

  // Record gamma energy from table — total bar drops by this amount.
  const pcEntry = getComboEntry();
  gammaCarriedEnergy = pcEntry ? pcEntry.gammaKE * speedScale() : 50 * speedScale();
}

// ============================================================
//  PHOTON RENDERING  —  purple ribbon trail + radial glow
// ============================================================
function drawPhoton() {
  if (!photon) return;
  const fade = Math.max(0, 1 - photon.age / photon.maxAge);
  const sp = Math.sqrt(photon.vx * photon.vx + photon.vy * photon.vy);
  if (sp < 0.01) return;
  const nx = photon.vx / sp, ny = photon.vy / sp;
  const trailLen = 50;
  const tailX = photon.x - nx * trailLen;
  const tailY = photon.y - ny * trailLen;

  const trail = ctx.createLinearGradient(tailX, tailY, photon.x, photon.y);
  trail.addColorStop(0,    `rgba(120,0,220,0)`);
  trail.addColorStop(0.45, `rgba(155,30,255,${(fade * 0.45).toFixed(3)})`);
  trail.addColorStop(1,    `rgba(220,100,255,${fade.toFixed(3)})`);
  ctx.strokeStyle = trail;
  ctx.lineWidth = 11 * fade;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(tailX, tailY);
  ctx.lineTo(photon.x, photon.y);
  ctx.stroke();

  const glow = ctx.createRadialGradient(photon.x, photon.y, 0, photon.x, photon.y, 22);
  glow.addColorStop(0,    `rgba(255,230,255,${fade.toFixed(3)})`);
  glow.addColorStop(0.35, `rgba(210,65,255,${(fade * 0.9).toFixed(3)})`);
  glow.addColorStop(1,    `rgba(100,0,180,0)`);
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(photon.x, photon.y, 22, 0, Math.PI * 2);
  ctx.fill();
  ctx.lineCap = 'butt';
}

// ============================================================
//  COLORMAPS
// ============================================================
function buildColorstops(stops, out) {
  for (let i = 0; i < 256; i++) {
    const t  = i / 255;
    let s0 = stops[0], s1 = stops[1];
    for (let s = 0; s < stops.length - 1; s++) {
      if (t >= stops[s].t && t <= stops[s + 1].t) { s0 = stops[s]; s1 = stops[s + 1]; break; }
    }
    const f   = (t - s0.t) / (s1.t - s0.t);
    const idx = i * 4;
    out[idx]     = s0.r + (s1.r - s0.r) * f;
    out[idx + 1] = s0.g + (s1.g - s0.g) * f;
    out[idx + 2] = s0.b + (s1.b - s0.b) * f;
    out[idx + 3] = s0.a + (s1.a - s0.a) * f;
  }
}

const COLORMAP = new Uint8Array(256 * 4);
buildColorstops([
  { t: 0.0,  r: 0,   g: 0,   b: 0,   a: 0   },
  { t: 0.12, r: 10,  g: 35,  b: 170, a: 140 },
  { t: 0.4,  r: 25,  g: 85,  b: 235, a: 210 },
  { t: 0.7,  r: 70,  g: 165, b: 255, a: 245 },
  { t: 1.0,  r: 210, g: 238, b: 255, a: 255 },
], COLORMAP);

const STRONG_COLORMAP = new Uint8Array(256 * 4);
buildColorstops([
  { t: 0.0,  r: 0,   g: 0,   b: 0,   a: 0   },
  { t: 0.12, r: 160, g: 45,  b: 0,   a: 140 },
  { t: 0.4,  r: 240, g: 110, b: 10,  a: 210 },
  { t: 0.7,  r: 255, g: 185, b: 70,  a: 245 },
  { t: 1.0,  r: 255, g: 238, b: 210, a: 255 },
], STRONG_COLORMAP);

// ============================================================
// ============================================================
//  SHARED HEATMAP RENDERER
//  mode 'eie': Coulomb field — pairs use additive accumulation,
//              sigma shaped by (1 + sin), no spread extension.
//  mode 'sie': strong field — pairs use max accumulation,
//              sigma shaped by spread*(1 + 2*sin), extended bbox.
// ============================================================
function drawFieldHeatmap(pairs, colormap, mode) {
  if (pairs.length === 0) return;

  const fullW = canvas.width, fullH = canvas.height;
  const scale = _quality === 'simple' ? 0.15 : 0.25;
  const w = Math.ceil(fullW * scale), h = Math.ceil(fullH * scale);
  const invScale = 1 / scale;
  const cxH = fullW / 2, cyH = fullH / 2;
  const zoomScale = ZOOM_SCALE;
  const midX = cameraSiteX ?? canvas.width  / 2;
  const midY = cameraSiteY ?? canvas.height / 2;

  if (hmCanvas.width !== w || hmCanvas.height !== h) {
    hmCanvas.width = w; hmCanvas.height = h;
    hmImageData = null;  // invalidate on resize
  }
  if (!hmImageData) hmImageData = hmCtx.createImageData(w, h);
  const imageData = hmImageData;
  const data      = imageData.data;
  data.fill(0);  // clear previous frame (pixels below threshold aren't written)
  const isEIE     = mode === 'eie';

  for (let py = 0; py < h; py++) {
    const worldY = midY + (py * invScale - cyH) / zoomScale;
    for (let px = 0; px < w; px++) {
      const worldX = midX + (px * invScale - cxH) / zoomScale;
      let total = 0;
      for (const p of pairs) {
        const rx   = worldX - p.ax, ry = worldY - p.ay;
        const para = rx * p.ux + ry * p.uy;
        let e1, e2, t, sigmaT;
        if (isEIE) {
          e1     = Math.max(0, Math.min(1, para / 8));
          e2     = Math.max(0, Math.min(1, (p.dist - para) / 8));
          t      = para / p.dist;
          sigmaT = p.sigma * (1 + Math.sin(Math.PI * t));
        } else {
          const margin  = (p.spread - 1) / 2 * p.dist;
          const extDist = p.dist * p.spread;
          const paraExt = para + margin;
          e1     = Math.max(0, Math.min(1, paraExt / 8));
          e2     = Math.max(0, Math.min(1, (extDist - paraExt) / 8));
          t      = paraExt / extDist;
          sigmaT = p.sigma * p.spread * (1 + 2 * Math.sin(Math.PI * t));
        }
        const endFade = e1 * e2;
        if (endFade <= 0) continue;
        const perpSq = Math.max(0, rx * rx + ry * ry - para * para);
        if (perpSq > p.cullSq) continue;
        const val = p.mag * Math.exp(-perpSq / (2 * sigmaT * sigmaT)) * endFade;
        if (isEIE) { total += val; } else { total = Math.max(total, val); }
        if (total >= 1/3) break;
      }
      if (total > 0.002) {
        const magnitude = Math.min(1, total * 3.0);
        const ci  = (magnitude * 255) | 0;
        const di  = (py * w + px) * 4;
        const ci4 = ci * 4;
        data[di]     = colormap[ci4];
        data[di + 1] = colormap[ci4 + 1];
        data[di + 2] = colormap[ci4 + 2];
        data[di + 3] = colormap[ci4 + 3];
      }
    }
  }
  hmCtx.putImageData(imageData, 0, 0);
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';
  ctx.drawImage(hmCanvas, 0, 0, fullW, fullH);
}

// ============================================================
//  EIE HEATMAP  (Coulomb field, proton-proton pairs)
// ============================================================
function drawHeatmap() {
  if (particles !== _heatmapParticles) {
    _heatmapParticles = particles;
    _hmEiePairs = null;
    _hmSiePairs = null;
  }
  if (_hmEiePairs === null) {
    const protonList = particles.filter(p => p.type === 'proton');
    _hmEiePairs = { protonList };
  }
  const protonList = _hmEiePairs.protonList;
  if (protonList.length < 2) return;

  const refEnergy = coulombStrength / (PARTICLE_RADIUS * 2);
  const logRef    = Math.log(2);
  const pairs     = [];
  for (let i = 0; i < protonList.length; i++) {
    for (let j = i + 1; j < protonList.length; j++) {
      const a = protonList[i], b = protonList[j];
      const dx = b.x - a.x, dy = b.y - a.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 0.01) continue;
      const energy   = coulombStrength / dist;
      const sigma    = Math.max(3.5, 28 / Math.sqrt(dist));
      const distFade = Math.exp(-dist / 350);
      const mag      = Math.min(1, Math.log(1 + energy / refEnergy) / logRef) * distFade;
      const cullSq   = 16 * (sigma * 2) * (sigma * 2);
      pairs.push({ ax: a.x, ay: a.y, ux: dx / dist, uy: dy / dist, dist, sigma, mag, cullSq });
    }
  }
  pairs.sort((a, b) => b.mag - a.mag);
  drawFieldHeatmap(pairs, COLORMAP, 'eie');
}

// ============================================================
//  SIE HEATMAP  (strong nuclear field, all nucleon pairs)
// ============================================================
function drawStrongHeatmap() {
  if (particles !== _heatmapParticles) {
    _heatmapParticles = particles;
    _hmEiePairs = null;
    _hmSiePairs = null;
  }
  if (_hmSiePairs === null) {
    _hmSiePairs = { nucleonIndices: particles.map((_, i) => i).filter(i => particles[i].type !== 'gamma') };
  }
  const n = particles.length;
  if (n < 2) return;

  const cutoff     = strongCutoff();
  const eqDist     = Math.max(cutoff * equilibriumRatio, PARTICLE_RADIUS * 2);
  const span       = cutoff - eqDist;
  if (span <= 0) return;
  const maxBinding = strongForceStrength * span / 2;

  const nucleonIndices = _hmSiePairs.nucleonIndices;
  const pairs = [];
  for (let ii = 0; ii < nucleonIndices.length; ii++) {
    const i = nucleonIndices[ii];
    for (let jj = ii + 1; jj < nucleonIndices.length; jj++) {
      const j = nucleonIndices[jj];
      const a = particles[i], b = particles[j];
      const dx = b.x - a.x, dy = b.y - a.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist === 0 || dist >= cutoff) continue;
      const dr     = dist - eqDist;
      const energy = strongForceStrength / (2 * span) * (dr * dr - span * span);
      const mag    = Math.min(1, Math.abs(energy) / maxBinding);
      const sigma  = Math.max(0.375, 0.0875 * dist);
      const spread = 1.6;
      const cullSq = 16 * (sigma * spread * 3) * (sigma * spread * 3);
      pairs.push({ ax: a.x, ay: a.y, ux: dx / dist, uy: dy / dist, dist, sigma, mag, spread, cullSq });
    }
  }
  pairs.sort((a, b) => b.mag - a.mag);
  drawFieldHeatmap(pairs, STRONG_COLORMAP, 'sie');
}

// ============================================================
//  BAR CHART
//
//  SIE is DERIVED from initialTotal to guarantee the Total bar
//  stays perfectly flat throughout all phases:
//    displaySIE = initialTotal − KE − EIE
//
//  This means KE and EIE are computed from actual physics; SIE
//  is whatever is needed to make the total add up.  During
//  approach / collision they all genuinely vary; the total
//  stays constant by construction.
// ============================================================
// Convert a value to a fraction [0,1] of chart height — linear or log.
function fmtKeV(keV) {
  if (keV >= 1000) return Math.round(keV) + ' keV';
  if (keV >= 10)   return parseFloat(keV.toPrecision(3)) + ' keV';
  return parseFloat(keV.toPrecision(2)) + ' keV';
}

function valToFrac(v, maxVal, useLog) {
  if (!useLog) return Math.max(0, v / maxVal);
  if (v <= 0) return 0;
  return Math.log(v + 1) / Math.log(maxVal + 1);
}

// Returns a nice round tick interval for the given value range.
function niceTickStep(range) {
  const candidates = [1, 2, 5, 10, 20, 25, 50, 100, 200, 250, 500, 1000];
  for (const s of candidates) {
    const n = Math.floor(range / s);
    if (n >= 3 && n <= 8) return s;
  }
  return Math.max(1, Math.round(range / 5));
}

function drawBarChart() {
  const ctx = barCtx;          // draw on overlay canvas, not the main sim canvas
  const W  = 320;
  const H  = barChartCanvas.height;
  const gx = 0;
  const gy = 0;

  ctx.clearRect(0, 0, W, H);
  const LIGHT = document.body.classList.contains('screenshot-mode');

  ctx.save();

  // Panel background
  ctx.fillStyle = LIGHT ? 'rgba(255,255,255,0.96)' : 'rgba(4,3,20,0.88)';
  ctx.fillRect(gx, gy, W, H);

  // Left border glow
  ctx.save();
  ctx.shadowColor = LIGHT ? 'rgba(0,0,0,0)' : 'rgba(0,200,255,0.4)'; ctx.shadowBlur = LIGHT ? 0 : 12;
  ctx.strokeStyle = LIGHT ? 'rgba(0,0,0,0.20)' : 'rgba(0,180,255,0.25)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(gx, gy); ctx.lineTo(gx, gy + H); ctx.stroke();
  ctx.restore();

  const noData = particles.length === 0;
  const { ke: displayKE, eie: displayEIE, sie: displaySIE, ie: displayIE } = noData
    ? { ke: 0, eie: 0, sie: 0, ie: 0 }
    : getDisplayEnergy();

  const bars = splitIE
    ? [
        { label: 'Energy of Motion', value: displayKE,  color: '#ff2060', glow: 'rgba(255,20,80,0.9)'   },
        { label: 'Electric',         value: displayEIE, color: '#00e5ff', glow: 'rgba(0,220,255,0.9)',   dashed: true },
        { label: 'Nuclear',          value: displaySIE, color: '#ff8040', glow: 'rgba(255,128,64,0.9)',  dashed: true },
      ]
    : [
        { label: 'Energy of Motion', value: displayKE,  color: '#ff2060', glow: 'rgba(255,20,80,0.9)'   },
        { label: 'Energy in Fields', value: displayIE,  color: '#7b6fff', glow: 'rgba(120,100,255,0.9)', dashed: true },
      ];

  if (LIGHT) {
    bars.forEach(b => {
      b.glow = 'rgba(0,0,0,0)';
      if      (b.label === 'Energy of Motion') b.color = '#222';
      else if (b.label === 'Energy in Fields') b.color = '#666';
      else if (b.label === 'Electric')         b.color = '#555';
      else if (b.label === 'Nuclear')          b.color = '#999';
    });
  }

  // Layout — no Y-axis margin needed when not showing to scale
  const yAxisW   = scaledEnergy ? 42 : 10;
  const padR     = 10;    // right padding
  const labelH   = 62;    // height of bar text labels below baseline
  const controlH = 8;
  const titleH   = 36;    // room for phase title at top
  const chartH   = H - labelH - controlH - titleH;
  const baseline = gy + H - labelH - controlH;
  const chartTop = gy + titleH;
  const chartX   = gx + yAxisW;
  const chartW   = W - yAxisW - padR;
  const comboEntry = getComboEntry();
  // When showing to scale: ratchet scaledAutoRange up from current bar values (starts at 1.5 keV)
  if (scaledEnergy && !barScaleDrag && !noData) {
    scaledAutoRange = Math.max(scaledAutoRange, displayKE);
  }
  const maxVal   = scaledEnergy
    ? (barYRangeScaled ?? scaledAutoRange)
    : barYRange;

  // ── Horizontal gridlines — dynamic count, fixed spacing in energy units ──
  // gridFrac = 24/maxVal (no cap): spacing shrinks when zoomed out → more lines fill
  // the chart; spacing grows when zoomed in → fewer lines, more spread out.
  // Default (maxVal=24): gridFrac=1, spacing=chartH/5, exactly 5 lines — same as before.
  const gridFrac   = scaledEnergy ? 1 : (24 / maxVal);
  const gridSpacing = (chartH / 5) * gridFrac;           // px between lines
  const gridCount   = scaledEnergy ? 5
    : Math.min(Math.ceil(chartH / Math.max(gridSpacing, 1)), 25);
  ctx.save();
  for (let i = 0; i <= gridCount; i++) {
    const py = baseline - i * gridSpacing;
    if (i > 0 && py < chartTop - 2) break;
    const isBaseline = i === 0;
    const a2 = currentAccent2RGB;
    ctx.strokeStyle = isBaseline
      ? (LIGHT ? 'rgba(0,0,0,0.55)' : `rgba(${a2},0.7)`)
      : (LIGHT ? 'rgba(0,0,0,0.15)' : `rgba(${a2},0.2)`);
    ctx.lineWidth   = isBaseline ? 2 : 1.5;
    if (isBaseline) {
      ctx.shadowColor = LIGHT ? 'rgba(0,0,0,0)' : `rgba(${a2},1.0)`;
      ctx.shadowBlur  = LIGHT ? 0 : 8;
    } else { ctx.shadowBlur = 0; }
    ctx.beginPath(); ctx.moveTo(gx, py); ctx.lineTo(gx + W, py); ctx.stroke();
    // Y-axis keV label (scaled mode only, skip baseline)
    if (scaledEnergy && i > 0) {
      const tickVal = (i / gridCount) * maxVal;
      ctx.save();
      ctx.shadowBlur = 0;
      ctx.fillStyle  = LIGHT ? 'rgba(0,0,0,0.5)' : 'rgba(180,180,220,0.55)';
      ctx.font       = '9px Lexend, sans-serif';
      ctx.textAlign  = 'right';
      ctx.textBaseline = 'middle';
      ctx.fillText(fmtKeV(tickVal), chartX - 3, py);
      ctx.restore();
    }
  }
  ctx.restore();

  if (scaledEnergy) {
    // Drag-to-rescale affordance
    ctx.save();
    ctx.fillStyle = LIGHT
      ? (barScaleDrag ? 'rgba(0,0,0,0.7)' : 'rgba(0,0,0,0.4)')
      : (barScaleDrag ? 'rgba(0,200,255,0.7)' : 'rgba(0,200,255,0.28)');
    ctx.font      = '10px Lexend, sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('⇕ drag scale', gx + 4, chartTop + 13);
    ctx.restore();
  }

  // ── Bars ──────────────────────────────────────────────────────
  const barW = chartW / bars.length;
  ctx.textAlign = 'center';

  bars.forEach((bar, i) => {
    const barPx  = valToFrac(bar.value, maxVal, false) * chartH;
    const x      = chartX + i * barW + barW * 0.1;
    const bw     = barW * 0.8;
    const barTop = baseline - barPx;

    if (!noData && barPx > 0) {
      const rectY = bar.value >= 0 ? barTop : baseline;
      const rectH = barPx;
      const r     = Math.min(6, bw / 2, rectH / 2);

      // Dim fill
      ctx.save();
      ctx.fillStyle   = bar.color;
      ctx.globalAlpha = 0.22;
      ctx.beginPath(); ctx.roundRect(x, rectY, bw, rectH, [r, r, 2, 2]); ctx.fill();
      ctx.restore();

      // Outer glow
      ctx.save();
      if (bar.dashed) ctx.setLineDash([5, 3]);
      ctx.shadowColor = bar.glow; ctx.shadowBlur = 22;
      ctx.strokeStyle = bar.color; ctx.lineWidth = 3; ctx.globalAlpha = 0.5;
      ctx.beginPath(); ctx.roundRect(x, rectY, bw, rectH, [r, r, 2, 2]); ctx.stroke();
      ctx.restore();

      // Crisp neon outline
      ctx.save();
      if (bar.dashed) ctx.setLineDash([5, 3]);
      ctx.shadowColor = bar.glow; ctx.shadowBlur = 6;
      ctx.strokeStyle = bar.color; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.roundRect(x, rectY, bw, rectH, [r, r, 2, 2]); ctx.stroke();
      ctx.restore();

      // Value label (only when showing to scale)
      if (scaledEnergy) {
        const valStr = (i === 0 && collisionPhase === 'approach')
          ? speedToKeV(approachSpeed) + ' keV'
          : fmtKeV(bar.value);
        const clipped = barTop < chartTop;  // bar taller than chart area
        ctx.save();
        ctx.shadowColor = bar.glow; ctx.shadowBlur = 6;
        ctx.fillStyle   = bar.color;
        ctx.font        = 'bold 13px Lexend, sans-serif';
        ctx.textAlign   = 'center';
        if (clipped) {
          // Draw value inside the bar near the top
          ctx.fillText(valStr, x + bw / 2, chartTop + 14);
        } else {
          ctx.fillText(valStr, x + bw / 2, barTop - 4);
        }
        ctx.restore();
      }
    }

    // Label below baseline — three lines
    ctx.save();
    ctx.shadowColor = bar.glow; ctx.shadowBlur = 6;
    ctx.fillStyle   = bar.color;
    ctx.font        = 'bold 18px Lexend, sans-serif';
    const words = bar.label.split(' ');
    // For negative bars: show value just above the label
    if (scaledEnergy && bar.value < 0) {
      ctx.font = 'bold 15px Lexend, sans-serif';
      ctx.fillText(fmtKeV(bar.value), x + bw / 2, baseline + 3);
      ctx.font = 'bold 18px Lexend, sans-serif';
    }
    ctx.fillText(words.slice(0, 2).join(' '), x + bw / 2, baseline + 22);
    ctx.fillText(words[2] || '',              x + bw / 2, baseline + 39);
    if (words[3]) ctx.fillText(words[3],      x + bw / 2, baseline + 56);
    ctx.restore();
  });

  // ── Shared "Energy in Fields" label spanning both field bars (splitIE only) ──
  if (splitIE) {
    const x1 = chartX + 1 * barW + barW * 0.1;  // left edge of EIE bar
    const x2 = chartX + 2 * barW + barW * 0.9;  // right edge of SIE bar
    const centerX = (x1 + x2) / 2;
    ctx.save();
    ctx.shadowColor = LIGHT ? 'rgba(0,0,0,0)' : 'rgba(180,140,255,0.7)'; ctx.shadowBlur = LIGHT ? 0 : 8;
    ctx.fillStyle   = LIGHT ? '#000' : 'rgba(180,140,255,0.85)';
    ctx.font        = 'bold 18px Lexend, sans-serif';
    ctx.textAlign   = 'center';
    ctx.fillText('Energy in Fields', centerX, baseline + 50);
    ctx.restore();
  }

  if (noData) { ctx.restore(); return; }

  // ── Phase label ───────────────────────────────────────────────
  const phaseColors = {
    approach:    '#00e5ff',
    collision:   '#ff2060',
    escapeAnim:  '#00ff88',
    escape:      '#00ff88',
  };
  let phaseLabel = { approach: 'Before', collision: 'During', escapeAnim: 'After', escape: 'After' }[collisionPhase] || '';
  if (coulombScatterEscape) phaseLabel = 'After';
  const pCol = LIGHT ? '#000' : (phaseColors[collisionPhase] || 'rgba(0,200,255,0.5)');
  ctx.save();
  ctx.shadowColor = LIGHT ? 'rgba(0,0,0,0)' : pCol; ctx.shadowBlur = LIGHT ? 0 : 16;
  ctx.fillStyle   = pCol;
  ctx.font        = 'bold 15px Lexend, sans-serif';
  ctx.textAlign   = 'center';
  ctx.fillText(phaseLabel, gx + W / 2, gy + 22);
  ctx.restore();

  ctx.restore();
}

// ============================================================
//  DISPLAY ENERGY  (same values shown in bar chart)
// ============================================================
function getDisplayEnergy() {
  const ds  = scaledEnergy ? 1 : 0.2;
  const e   = computeEnergy();
  // During approach (no collision table values yet), scale sim units → keV for display.
  // During collision phases, collisionDisplayKE is already in display units.
  const kv  = scaledEnergy ? keVPerSimUnit : 1;
  const heCount  = (leftChoice === 'he' ? 1 : 0) + (rightChoice === 'he' ? 1 : 0);
  const heOffset = heCount === 2 ? 25 : heCount === 1 ? 10 : 0;
  const ke  = collisionDisplayKE !== null
    ? (chargedNuclearEscape ? collisionDisplayKE : collisionDisplayKE * ds)
    : e.ke * kv;
  const eieRaw = chargedNuclearEscape
    ? Math.max(0, chargedEscapeEIEBase - (collisionDisplayKE - 11 * speedScale()))
    : (collisionPhase !== 'approach' && collisionDisplayEIE !== null)
      ? collisionDisplayEIE : e.eie * kv;
  const eie = Math.max(0, eieRaw - heOffset);
  const tot = initialTotal + sieOffset - gammaCarriedEnergy * ds - heOffset;
  const sie = tot - Math.max(0, ke) - eie;
  const ie  = eie + sie;
  return { ke: Math.max(0, ke), eie: Math.max(0, eie), sie, ie, tot };
}

function updateEnergyPct() {
  const { ke, ie, tot } = getDisplayEnergy();
  const kePct = tot > 0 ? Math.round(ke  / tot * 100) : 0;
  const iePct = tot > 0 ? Math.round(ie  / tot * 100) : 0;
  document.getElementById('energyPctKE').textContent = kePct + '%';
  document.getElementById('energyPctIE').textContent = iePct + '%';
}

// ============================================================
//  ENERGY LINE GRAPH  (drawn on #energyGraph canvas)
// ============================================================
function drawEnergyGraph() {
  const W = energyGraph.width, H = energyGraph.height;
  egCtx.clearRect(0, 0, W, H);

  const LIGHT = document.body.classList.contains('screenshot-mode');
  const _gridCol     = LIGHT ? 'rgba(0,0,0,0.12)' : 'rgba(255,255,255,0.05)';
  const _ieCol       = LIGHT ? '#777'             : '#7b6fff';
  const _ieGlow      = LIGHT ? 'rgba(0,0,0,0)'    : 'rgba(120,100,255,0.9)';
  const _keCol       = LIGHT ? '#000'             : '#ff3a6e';
  const _keGlow      = LIGHT ? 'rgba(0,0,0,0)'    : 'rgba(255,45,100,0.9)';
  const _cursorCol   = LIGHT ? 'rgba(0,0,0,0.75)' : 'rgba(255,255,255,0.55)';
  const _cursorGlow  = LIGHT ? 'rgba(0,0,0,0)'    : 'rgba(255,255,255,0.6)';
  const _selFill     = LIGHT ? 'rgba(0,0,0,0.08)' : 'rgba(120,100,255,0.12)';
  const _selStroke   = LIGHT ? 'rgba(0,0,0,0.4)'  : 'rgba(120,100,255,0.6)';
  const _selGlow     = LIGHT ? 'rgba(0,0,0,0)'    : 'rgba(120,100,255,0.8)';

  const n = phLen();
  if (n < 2) return;

  // Zoom window (frame indices)
  const zStart = Math.max(0, graphZoomStart);
  const zEnd   = Math.min(n - 1, graphZoomEnd ?? n - 1);
  const zLen   = zEnd - zStart;
  if (zLen < 1) return;

  // Autoscale Y over visible window
  let maxY = 0;
  for (let i = zStart; i <= zEnd; i++) {
    const d = phGet(i).edisp || {};
    const topVal = Math.max(d.tot || 0, d.ke || 0, d.ie || 0, d.eie || 0, d.sie || 0);
    if (topVal > maxY) maxY = topVal;
  }
  if (maxY <= 0) maxY = 1;
  maxY *= 1.1;

  // Faint horizontal grid lines
  egCtx.strokeStyle = _gridCol;
  egCtx.lineWidth = 1;
  for (let i = 1; i <= 3; i++) {
    const y = H - (i / 4) * H;
    egCtx.beginPath(); egCtx.moveTo(0, y); egCtx.lineTo(W, y); egCtx.stroke();
  }

  const cur = scrubFrame >= 0 ? scrubFrame : n - 1;
  // Offset by half the slider thumb width (5px) so the cursor line tracks
  // directly above the slider thumb center rather than the raw canvas edge.
  const thumbHalf = 5;
  const splitX = zLen > 0 ? thumbHalf + ((cur - zStart) / zLen) * (W - thumbHalf * 2) : W - thumbHalf;

  function buildPath(getValue) {
    const path = new Path2D();
    for (let i = zStart; i <= zEnd; i++) {
      const x = ((i - zStart) / zLen) * W;
      const v = getValue(phGet(i));
      const y = H - (v / maxY) * H - 5;
      if (i === zStart) path.moveTo(x, y); else path.lineTo(x, y);
    }
    return path;
  }

  function plotNeonLine(color, glowColor, getValue, dash = []) {
    const path = buildPath(getValue);

    // Wide halo
    egCtx.save();
    egCtx.setLineDash(dash);
    egCtx.strokeStyle = glowColor;
    egCtx.lineWidth = 7;
    egCtx.globalAlpha = 0.18;
    egCtx.stroke(path);
    egCtx.restore();

    // Mid glow
    egCtx.save();
    egCtx.setLineDash(dash);
    egCtx.shadowColor  = glowColor;
    egCtx.shadowBlur   = 8;
    egCtx.strokeStyle  = color;
    egCtx.lineWidth    = 2.5;
    egCtx.globalAlpha  = 0.7;
    egCtx.stroke(path);
    egCtx.restore();

    // Crisp bright line — past (full brightness) vs future (dimmed)
    egCtx.save();
    egCtx.setLineDash(dash);
    egCtx.rect(0, 0, splitX, H);
    egCtx.clip();
    egCtx.shadowColor = glowColor; egCtx.shadowBlur = 6;
    egCtx.strokeStyle = color; egCtx.lineWidth = 1.8; egCtx.globalAlpha = 1.0;
    egCtx.stroke(path);
    egCtx.restore();

    egCtx.save();
    egCtx.setLineDash(dash);
    egCtx.rect(splitX, 0, W - splitX, H);
    egCtx.clip();
    egCtx.strokeStyle = color; egCtx.lineWidth = 1.8; egCtx.globalAlpha = 0.35;
    egCtx.stroke(path);
    egCtx.restore();
  }

  // Line graph always shows combined IE (splitIE only affects bar charts)
  plotNeonLine(_ieCol, _ieGlow, f => (f.edisp || {}).ie || 0, [5, 4]);
  plotNeonLine(_keCol, _keGlow, f => (f.edisp || {}).ke || 0);

  // Drag-to-zoom selection overlay
  if (egDragStartPx !== null && egDragCurPx !== null) {
    const x0 = Math.min(egDragStartPx, egDragCurPx);
    const x1 = Math.max(egDragStartPx, egDragCurPx);
    egCtx.fillStyle = _selFill;
    egCtx.fillRect(x0, 0, x1 - x0, H);
    egCtx.save();
    egCtx.shadowColor = _selGlow; egCtx.shadowBlur = LIGHT ? 0 : 4;
    egCtx.strokeStyle = _selStroke; egCtx.lineWidth = 1;
    egCtx.strokeRect(x0, 0, x1 - x0, H);
    egCtx.restore();
  }

  // Cursor line
  if (cur >= zStart && cur <= zEnd) {
    egCtx.save();
    egCtx.shadowColor = _cursorGlow; egCtx.shadowBlur = LIGHT ? 0 : 6;
    egCtx.strokeStyle = _cursorCol; egCtx.lineWidth = 1;
    egCtx.beginPath(); egCtx.moveTo(splitX, 0); egCtx.lineTo(splitX, H); egCtx.stroke();
    egCtx.restore();
  }

}

// ============================================================
//  DRAW
// ============================================================
function draw() {
  const LIGHT = document.body.classList.contains('screenshot-mode');
  if (LIGHT) {
    ctx.fillStyle = getBgColor();
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  } else {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
  }

  const midX      = cameraSiteX ?? canvas.width  / 2;
  const midY      = cameraSiteY ?? canvas.height / 2;
  const zoomScale = ZOOM_SCALE;
  const cx        = canvas.width  / 2;
  const cy        = canvas.height / 2;

  if (particles.length >= 2) {
    if (showElectricField) drawHeatmap();
    if (showStrongField)   drawStrongHeatmap();
  }

  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(zoomScale, zoomScale);
  ctx.translate(-midX, -midY);

  drawPhoton();

  for (const p of particles) {
    if (p.type === 'gamma') continue;
    const R        = PARTICLE_RADIUS;
    const isProton = p.type === 'proton';
    const mid      = isProton ? '#ff1a65' : '#70707f';
    const core     = isProton ? '#ff80b0' : '#b0b0c4';
    const jx = p.x + (p._jx || 0);
    const jy = p.y + (p._jy || 0);

    // Outer halo — soft fade
    const baseGrad = ctx.createRadialGradient(jx, jy, 0, jx, jy, R * 1.1);
    baseGrad.addColorStop(0,    mid);
    baseGrad.addColorStop(0.82, mid);
    baseGrad.addColorStop(1,    'rgba(0,0,0,0)');
    ctx.fillStyle = baseGrad;
    ctx.beginPath(); ctx.arc(jx, jy, R * 1.1, 0, Math.PI * 2); ctx.fill();

    // Inner glow with neon shadow
    const innerGlow = ctx.createRadialGradient(jx, jy, 0, jx, jy, R);
    innerGlow.addColorStop(0,   core);
    innerGlow.addColorStop(0.5, core);
    innerGlow.addColorStop(1,   'rgba(0,0,0,0)');
    ctx.save();
    ctx.shadowColor = core;
    ctx.shadowBlur  = 8;
    ctx.globalAlpha = 0.82;
    ctx.fillStyle   = innerGlow;
    ctx.beginPath(); ctx.arc(jx, jy, R, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
    ctx.globalAlpha = 1;

    // + label on protons only
    if (isProton) {
      ctx.fillStyle      = 'rgba(255,255,255,0.88)';
      ctx.font           = 'bold 11px Lexend, sans-serif';
      ctx.textAlign      = 'center';
      ctx.textBaseline   = 'middle';
      ctx.fillText('+', jx, jy + 1);
    }
  }

  ctx.restore();
  drawBarChart();
  drawEnergyGraph();
  updateEnergyPct();

}

// ============================================================
//  RENDER HISTORICAL FRAME  (scrubber)
// ============================================================
function renderFrame(idx) {
  const frame = phGet(idx);
  if (!frame) return;
  const liveP       = particles, livePhase = collisionPhase;
  const liveCDKE    = collisionDisplayKE;
  const liveCDEIE   = collisionDisplayEIE;
  const liveCF      = collisionFrames;
  const liveGCE     = gammaCarriedEnergy;
  const liveCNE     = chargedNuclearEscape;
  const liveCEEB    = chargedEscapeEIEBase;
  const liveCamX    = cameraSiteX, liveCamY = cameraSiteY;
  const livePhoton  = photon;
  const liveMAEIE   = maxApproachEIE;
  particles            = frame.p;
  collisionPhase       = frame.collisionPhase || 'approach';
  collisionFrames      = frame.collisionFrames ?? 999;
  collisionDisplayKE   = frame.collisionDisplayKE ?? null;
  collisionDisplayEIE  = frame.collisionDisplayEIE ?? null;
  maxApproachEIE       = frame.maxApproachEIE      ?? 0;
  gammaCarriedEnergy   = frame.gammaCarriedEnergy  ?? 0;
  chargedNuclearEscape = frame.chargedNuclearEscape ?? false;
  chargedEscapeEIEBase = frame.chargedEscapeEIEBase ?? 0;
  photon               = frame.photon || null;
  if (frame.camX !== undefined) { cameraSiteX = frame.camX; cameraSiteY = frame.camY; }
  draw();
  particles            = liveP;
  collisionPhase       = livePhase;
  collisionFrames      = liveCF;
  collisionDisplayKE   = liveCDKE;
  collisionDisplayEIE  = liveCDEIE;
  maxApproachEIE       = liveMAEIE;
  gammaCarriedEnergy   = liveGCE;
  chargedNuclearEscape = liveCNE;
  chargedEscapeEIEBase = liveCEEB;
  photon               = livePhoton;
  cameraSiteX          = liveCamX;  cameraSiteY = liveCamY;
}

    goBtn.textContent = '▶ GO';
    goBtn.classList.remove('running');
    setScrubReplayDisabled(false);
    return;
  }
  if (running) {
    // Pause
    running = false;
    paused  = true;
    cancelAnimationFrame(animId);
    goBtn.textContent = '▶ GO';
    goBtn.classList.remove('running');
    logAction('Paused (FUSION)');

    logAction('Resumed (FUSION)');

    else setupScenario();
    simHasStarted = true; syncScaledEnergyToggle(); syncInputsDisabled();

    running    = true;

// ============================================================
//  REPLAY
// ============================================================
function setScrubReplayDisabled(val) {
  replayBtn.disabled = val;
  document.getElementById('scrubReplayBtn').disabled = val;
}

function doReplay() {
  if (!phLen()) return;
  // Stop live sim and any existing replay
  running = false; paused = false;
  if (animId)    { cancelAnimationFrame(animId);    animId    = null; }
  if (replayRAF) { cancelAnimationFrame(replayRAF); replayRAF = null; }
  // Start playback from frame 0
  scrubFrame = 0;
  replayAccum = 0;
  timeSlider.value = 0;
  goBtn.textContent = '❙ ❙';
  goBtn.classList.add('running');
  setScrubReplayDisabled(true);
  function replayLoop() {
    // Replay rate normalizes out the recording speed so the slider feels consistent:
    // frameSpeed() / recordingFrameSpeed = 1.0 when slider matches recording position,
    // > 1 when replaying faster than recorded (skips frames), < 1 for slow-motion.
    const recFS = recordingFrameSpeed || frameSpeed();
    replayAccum += Math.max(0.05, frameSpeed() / recFS);
    const steps = Math.floor(replayAccum);
    replayAccum -= steps;
    scrubFrame = Math.min(scrubFrame + steps, phLen() - 1);
    if (scrubFrame >= phLen() - 1) {
      scrubFrame = -1;
      timeSlider.value = Math.max(0, phLen() - 1);
      goBtn.textContent = '▶ GO';
      goBtn.classList.remove('running');
      setScrubReplayDisabled(false);
      replayRAF = null;
      return;
    }
    timeSlider.value = scrubFrame;
    renderFrame(scrubFrame);
    replayRAF = requestAnimationFrame(replayLoop);
  }
  replayRAF = requestAnimationFrame(replayLoop);
}
replayBtn.addEventListener('click', doReplay);
document.getElementById('scrubReplayBtn').addEventListener('click', doReplay);

// ============================================================
//  PHASE TIMELINE
// ============================================================
const phaseTimeline   = document.getElementById('phaseTimeline');
const segApproach     = document.getElementById('phaseSeg-approach');
const segCollision    = document.getElementById('phaseSeg-collision');
const segEscape       = document.getElementById('phaseSeg-escape');

function updatePhaseTimeline() {
  const total = phLen();

  const reactionComplete = escapeStartFrame >= 0 && !running && !paused;

  // Hide everything until reaction is fully done — just show the plain approach bar.
  if (!reactionComplete) {
    if (segApproach.style.display  !== 'flex') segApproach.style.display  = 'flex';
    if (segApproach.style.flex     !== '1')    segApproach.style.flex     = '1';
    if (segApproach.style.fontSize !== '0px')  segApproach.style.fontSize = '0px';
    if (segApproach.style.opacity  !== '1')    segApproach.style.opacity  = '1';
    if (segCollision.style.display !== 'none') segCollision.style.display = 'none';
    if (segEscape.style.display    !== 'none') segEscape.style.display    = 'none';
    return;
  }

  // Full phase boundaries
  const approachEnd  = collisionStartFrame;
  const collisionEnd = escapeStartFrame >= 0 ? escapeStartFrame : total;
  const escapeEnd    = total;

  // Zoom window
  const zStart = graphZoomStart;
  const zEnd   = (graphZoomEnd ?? (total - 1)) + 1;

  const clamp = (a, b) => Math.max(0, Math.min(b, zEnd) - Math.max(a, zStart));
  const visApproach  = clamp(0,           approachEnd);
  const visCollision = clamp(approachEnd, collisionEnd);
  const visEscape    = clamp(collisionEnd, escapeEnd);
  const visTotal     = visApproach + visCollision + visEscape;

  const curPhase = collisionPhase === 'approach' ? 'approach'
                 : (collisionPhase === 'collision') ? 'collision' : 'escape';

  const setSegment = (el, frames, phaseKey) => {
    if (frames <= 0) { if (el.style.display !== 'none') el.style.display = 'none'; return; }
    const newFlex = String(frames);
    const newSize = reactionComplete ? Math.max(6, Math.min(11, (frames / visTotal) * 90)) + 'px' : '0px';
    const newOp   = phaseKey === curPhase ? '1' : '0.35';
    if (el.style.display   !== 'flex')    el.style.display   = 'flex';
    if (el.style.flex      !== newFlex)   el.style.flex      = newFlex;
    if (el.style.fontSize  !== newSize)   el.style.fontSize  = newSize;
    if (el.style.opacity   !== newOp)     el.style.opacity   = newOp;
  };

  setSegment(segApproach,  visApproach,  'approach');
  setSegment(segCollision, visCollision, 'collision');
  setSegment(segEscape,    visEscape,    'escape');
}

// ============================================================
//  GRAPH ZOOM HELPERS
// ============================================================
function applyGraphZoom(start, end) {
  const n = phLen();
  graphZoomStart = Math.max(0, start);
  graphZoomEnd   = (end === null || end >= n - 1) ? null : Math.min(n - 1, end);
  const zEnd = graphZoomEnd ?? (n - 1);
  timeSlider.min = graphZoomStart;
  timeSlider.max = zEnd;
  // Clamp scrubFrame into visible window
  if (scrubFrame >= 0) {
    scrubFrame = Math.max(graphZoomStart, Math.min(zEnd, scrubFrame));
    timeSlider.value = scrubFrame;
  } else {
    timeSlider.value = zEnd;
  }
  updatePhaseTimeline();
  if (!running) draw();
  updateGraphBtn();
}

function resetGraphZoom() {
  graphZoomStart = 0;
  graphZoomEnd   = null;
  const n = phLen();
  timeSlider.min = 0;
  timeSlider.max = Math.max(0, n - 1);
  timeSlider.value = scrubFrame >= 0 ? scrubFrame : Math.max(0, n - 1);
  updatePhaseTimeline();
  if (!running) draw();
  updateGraphBtn();
}

// Drag-to-zoom events on energyGraph
energyGraph.addEventListener('mousedown', e => {
  if (!phLen()) return;
  egDragStartPx = e.offsetX;
  egDragCurPx   = e.offsetX;
  e.preventDefault();
});
energyGraph.addEventListener('mousemove', e => {
  if (egDragStartPx === null) return;
  egDragCurPx = e.offsetX;
  if (!running) draw();
});
energyGraph.addEventListener('mouseup', e => {
  if (egDragStartPx === null) return;
  const x0 = Math.min(egDragStartPx, e.offsetX);
  const x1 = Math.max(egDragStartPx, e.offsetX);
  egDragStartPx = null;
  egDragCurPx   = null;
  const W = energyGraph.width;
  const n = phLen();
  if (n < 2 || x1 - x0 < 4) { if (!running) draw(); return; } // too small = ignore
  // Map pixel range to frame indices within current zoom
  const zStart = graphZoomStart;
  const zEnd   = graphZoomEnd ?? (n - 1);
  const zLen   = zEnd - zStart;
  const fStart = Math.round(zStart + (x0 / W) * zLen);
  const fEnd   = Math.round(zStart + (x1 / W) * zLen);
  if (fEnd - fStart < 2) { if (!running) draw(); return; }
  applyGraphZoom(fStart, fEnd);
});
energyGraph.addEventListener('mouseleave', e => {
  if (egDragStartPx !== null) {
    egDragStartPx = null; egDragCurPx = null;
    if (!running) draw();
  }
});

const pselIcons    = Array.from(document.querySelectorAll('.psel-icon'));
const pselTriggers = Array.from(document.querySelectorAll('.pwheel-trigger'));

// Compute He-4 bounding extents once — used as the universal nucleon scale reference
// so all cluster icons have the same nucleon size regardless of how many particles they contain.
const _he4halo = PARTICLE_RADIUS * 1.35;
const _he4def  = CLUSTER_DEFS['he'];
const _he4cmx  = _he4def.reduce((s, p) => s + p.x, 0) / _he4def.length;
const _he4cmy  = _he4def.reduce((s, p) => s + p.y, 0) / _he4def.length;
let _he4maxX   = _he4halo, _he4maxY = _he4halo;
for (const p of _he4def) {
  _he4maxX = Math.max(_he4maxX, Math.abs(p.x - _he4cmx) + _he4halo);
  _he4maxY = Math.max(_he4maxY, Math.abs(p.y - _he4cmy) + _he4halo);
}

// Maps each cluster key to [mainText, superscriptText]
const CLUSTER_LABEL = { p: 'H', n: 'N', d: 'H-2', t: 'H-3', he: 'He-4' };

function drawClusterIcon(canvas) {
  const W   = canvas.width, H = canvas.height;
  const ic  = canvas.getContext('2d');
  const key = canvas.dataset.key;
  const def = CLUSTER_DEFS[key];
  if (!def) return;

  ic.clearRect(0, 0, W, H);

  // For slider icons (small, no room for label) use the full width for the image
  const isSlider = canvas.classList.contains('pslider-icon');
  const imgW = isSlider ? W : H;  // image occupies a square H×H on the left

  // Centre on visual mean position
  const cmx = def.reduce((s, p) => s + p.x, 0) / def.length;
  const cmy = def.reduce((s, p) => s + p.y, 0) / def.length;

  // Use He-4 as the scale reference so all nucleons are the same visual size
  const PAD   = 3;
  const scale = Math.min((imgW / 2 - PAD) / _he4maxX, (H / 2 - PAD) / _he4maxY);
  const R     = PARTICLE_RADIUS * scale;

  for (const p of def) {
    const jx = imgW / 2 + (p.x - cmx) * scale + (p._jx || 0) * scale;
    const jy = H / 2    + (p.y - cmy) * scale + (p._jy || 0) * scale;
    const isProton = p.type === 'proton';
    const mid  = isProton ? '#ff1a65' : '#70707f';
    const core = isProton ? '#ff80b0' : '#b0b0c4';

    const baseGrad = ic.createRadialGradient(jx, jy, 0, jx, jy, R * 1.1);
    baseGrad.addColorStop(0,    mid);
    baseGrad.addColorStop(0.82, mid);
    baseGrad.addColorStop(1,    'rgba(0,0,0,0)');
    ic.fillStyle = baseGrad;
    ic.beginPath(); ic.arc(jx, jy, R * 1.1, 0, Math.PI * 2); ic.fill();

    const innerGlow = ic.createRadialGradient(jx, jy, 0, jx, jy, R);
    innerGlow.addColorStop(0,   core);
    innerGlow.addColorStop(0.5, core);
    innerGlow.addColorStop(1,   'rgba(0,0,0,0)');
    ic.save();
    ic.shadowColor = core;
    ic.shadowBlur  = 5;
    ic.globalAlpha = 0.82;
    ic.fillStyle   = innerGlow;
    ic.beginPath(); ic.arc(jx, jy, R, 0, Math.PI * 2); ic.fill();
    ic.restore();
    ic.globalAlpha = 1;

    if (isProton) {
      ic.fillStyle    = 'rgba(255,255,255,0.88)';
      ic.font         = `bold ${Math.round(R * 1.1)}px Lexend, sans-serif`;
      ic.textAlign    = 'center';
      ic.textBaseline = 'middle';
      ic.fillText('+', jx, jy + 0.5);
    }
  }

  // Label drawn in the right portion of the canvas
  if (!isSlider && CLUSTER_LABEL[key]) {
    const label = CLUSTER_LABEL[key];
    const fontSize = 17;
    const LIGHT = document.body.classList.contains('screenshot-mode');
    ic.font = `bold ${fontSize}px Lexend, sans-serif`;
    ic.fillStyle    = LIGHT ? 'rgba(0,0,0,0.85)' : 'rgba(255,255,255,0.82)';
    ic.textAlign    = 'center';
    ic.textBaseline = 'middle';
    ic.fillText(label, imgW + (W - imgW) / 2, H / 2);
  }
}

function drawSpeedLines() {
  ['speedLinesL', 'speedLinesR'].forEach(id => {
    const canvas = document.getElementById(id);
    if (!canvas) return;
    const c = canvas.getContext('2d');
    const w = canvas.width, h = canvas.height;
    const slider = document.getElementById('fusionSpeedSlider');
    const t = (parseFloat(slider.value) - parseFloat(slider.min))
            / (parseFloat(slider.max) - parseFloat(slider.min));
    c.clearRect(0, 0, w, h);
    const maxLen = w - 2;
    const scales = [0.65, 1.0, 0.80];
    const ys     = [h * 0.28, h * 0.5, h * 0.72];
    scales.forEach((scale, i) => {
      const len = (0.18 + 0.82 * t) * maxLen * scale;
      const x = w - len, y = Math.round(ys[i]);
      c.save();
      c.strokeStyle = 'rgba(180,180,210,0.25)';
      c.lineWidth = 4;
      c.beginPath(); c.moveTo(x, y); c.lineTo(w, y); c.stroke();
      c.strokeStyle = 'rgba(210,210,230,0.85)';
      c.lineWidth = 1.5;
      c.beginPath(); c.moveTo(x, y); c.lineTo(w, y); c.stroke();
      c.restore();
    });
  });
}
