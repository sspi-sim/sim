<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fusion Digital Model</title>
<link rel="icon" type="image/png" href="images/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ── Variables ─────────────────────────────────────────────────────────── */
  :root {
    --accent1:      #ff2d78;
    --accent1-dim:  rgba(255,45,120,0.22);
    --accent1-glow: rgba(255,45,120,0.55);
    --accent2:      #1a6eff;
    --accent2-dim:  rgba(26,110,255,0.18);
    --accent2-glow: rgba(26,110,255,0.45);
    --ui-bg:        rgba(8,6,24,0.72);
    --ui-border:    rgba(255,255,255,0.07);
    --text-dim:     rgba(220,215,255,0.55);
    --text-bright:  rgba(240,235,255,0.92);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #05040f;
    color: var(--text-bright);
    font-family: 'Lexend', sans-serif;
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  button, input, select { font-family: 'Lexend', sans-serif; }

  /* ── Toolbar ───────────────────────────────────────────────────────────── */
  #toolbar {
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 10px 20px 12px;
    background: var(--ui-bg);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border-bottom: 1px solid var(--ui-border);
    box-shadow: 0 4px 24px rgba(0,0,0,0.55);
    z-index: 10;
    flex-shrink: 0;
  }

  #toolbar h1 {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent1);
    text-shadow: 0 0 8px var(--accent1-glow), 0 0 20px var(--accent1-dim);
    margin-right: 4px;
    white-space: nowrap;
  }

  /* ── Buttons ───────────────────────────────────────────────────────────── */
  .btn {
    padding: 4px 14px;
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 8px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    background: transparent;
    color: rgba(255,255,255,0.18);
    box-shadow: none;
    text-shadow: none;
    white-space: nowrap;
    font-family: inherit;
  }
  .btn:hover { color: rgba(255,255,255,0.38); border-color: rgba(255,255,255,0.12); }

  /* ▶ idle — accent2 themed */
  #goBtn {
    border-color: var(--accent2);
    color: rgba(255,255,255,0.5);
    background: var(--accent2-dim);
    box-shadow:
      inset 0 0 6px var(--accent2-dim),
      0 0 2px var(--accent2),
      0 0 8px var(--accent2),
      0 0 18px var(--accent2-glow),
      0 0 40px var(--accent2-dim),
      0 0 70px var(--accent2-dim);
    text-shadow:
      0 0 4px rgba(255,255,255,0.5),
      0 0 10px var(--accent2),
      0 0 22px var(--accent2-glow),
      0 0 44px var(--accent2-dim);
    display: flex; align-items: center; justify-content: center;
  }
  #goBtn:hover { background: var(--accent2-glow); }

  /* Clear — accent2 themed */
  #clearBtn {
    border-color: var(--accent2);
    color: rgba(255,255,255,0.5);
    background: var(--accent2-dim);
    box-shadow:
      inset 0 0 6px var(--accent2-dim),
      0 0 2px var(--accent2),
      0 0 8px var(--accent2),
      0 0 18px var(--accent2-glow),
      0 0 40px var(--accent2-dim);
    text-shadow:
      0 0 4px rgba(255,255,255,0.5),
      0 0 10px var(--accent2),
      0 0 22px var(--accent2-glow);
  }
  #clearBtn:hover { background: var(--accent2-glow); }

  /* ❙ ❙ running — red */
  #goBtn.running {
    border-color: #ff4040; color: rgba(255,255,255,0.5); background: rgba(255,40,40,0.15);
    box-shadow:
      inset 0 0 6px rgba(255,40,40,0.2),
      0 0 2px #ff4040, 0 0 8px #ff4040,
      0 0 18px rgba(255,40,40,0.5), 0 0 40px rgba(255,40,40,0.2);
    text-shadow: 0 0 4px rgba(255,255,255,0.5), 0 0 10px #ff4040, 0 0 22px rgba(255,80,80,0.6);
  }
  #goBtn.running:hover { background: rgba(255,40,40,0.3); }

  #goBtn, #replayBtn { font-size: 24px; letter-spacing: 0; padding: 7px 0; width: 90px; line-height: 1; }
  #clearBtn { font-size: 11px; padding: 4px 14px; width: 100%; }

  /* ↺ replay — red */
  #replayBtn {
    border-color: #ff4040;
    color: rgba(255,255,255,0.5);
    background: rgba(255,40,40,0.15);
    box-shadow:
      inset 0 0 6px rgba(255,40,40,0.2),
      0 0 2px #ff4040, 0 0 8px #ff4040,
      0 0 18px rgba(255,40,40,0.5), 0 0 40px rgba(255,40,40,0.2);
    text-shadow: 0 0 4px rgba(255,255,255,0.5), 0 0 10px #ff4040, 0 0 22px rgba(255,80,80,0.6);
  }
  #replayBtn:hover { background: rgba(255,40,40,0.3); }
  #replayBtn:disabled {
    border-color: rgba(255,255,255,0.06); color: rgba(255,255,255,0.12);
    background: transparent; box-shadow: none; text-shadow: none; cursor: not-allowed;
  }

  /* ── Tab bar ───────────────────────────────────────────────────────────── */
  #tabBar { display: flex; gap: 8px; padding-bottom: 2px; }
  a.tab-btn { text-decoration: none; cursor: pointer; }
  /* ── Tab-style title label (matches v11 tab styling) ─────────────────────── */
  .tab-btn {
    padding: 4px 14px;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 8px;
    color: rgba(255,255,255,0.18);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: default;
    white-space: nowrap;
    transition: all 0.2s;
    box-shadow: none;
    text-shadow: none;
    font-family: inherit;
  }
  .tab-btn.active {
    color: #e8e4ff;
    border-color: #7b6fff;
    background: rgba(123,111,255,0.12);
    box-shadow:
      inset 0 0 6px rgba(123,111,255,0.15),
      0 0 2px #7b6fff, 0 0 8px #7b6fff,
      0 0 18px rgba(123,111,255,0.5),
      0 0 40px rgba(123,111,255,0.2),
      0 0 70px rgba(123,111,255,0.1);
    text-shadow:
      0 0 4px #e8e4ff,
      0 0 10px #7b6fff,
      0 0 22px rgba(123,111,255,0.5),
      0 0 44px rgba(123,111,255,0.2);
  }

  /* ── Particle selector ─────────────────────────────────────────────────────── */
  .ctrl-box-pink {
    display: flex;
    flex-direction: column;
    align-self: stretch;
    gap: 7px;
    background: rgba(255,45,120,0.07);
    border: 1px solid rgba(255,45,120,0.22);
    border-radius: 12px;
    padding: 10px 18px;
    min-width: 260px;
    position: relative;
  }
  .ctrl-box-label {
    position: absolute;
    bottom: 100%;
    margin-bottom: 3px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    line-height: 1;
    pointer-events: none;
  }
  .ctrl-box-label-pink {
    right: 14px;
    color: rgba(255,45,120,0.8);
    text-shadow: 0 0 6px rgba(255,45,120,0.6), 0 0 16px rgba(255,45,120,0.3);
  }
  .ctrl-box-label-blue {
    left: 14px;
    color: var(--accent2);
    opacity: 0.8;
    text-shadow: 0 0 6px var(--accent2-glow), 0 0 16px var(--accent2-dim);
  }
  .ctrl-box-blue {
    display: flex;
    flex-direction: column;
    align-self: stretch;
    gap: 10px;
    background: var(--accent2-dim);
    border: 1px solid var(--accent2);
    border-radius: 12px;
    padding: 10px 16px;
    position: relative;
  }
  .ctrl-box-blue input[type="range"] { width: 140px; }
  .ctrl-box-blue .slider-icon { font-size: 28px; }
  .ctrl-box-blue .toggle-label { font-size: 12px; gap: 6px; }
  .slider-icon {
    display: inline-flex; align-items: center; justify-content: center;
    width: 28px; height: 28px; flex-shrink: 0;
    user-select: none;
    filter:
      brightness(0) invert(1)
      blur(0.75px)
      opacity(0.7)
      drop-shadow(0 0 5px var(--accent2))
      drop-shadow(0 0 14px var(--accent2))
      drop-shadow(0 0 28px var(--accent2-glow))
      drop-shadow(0 0 50px var(--accent2-glow))
      drop-shadow(0 0 80px var(--accent2-glow));
  }
  .slider-icon { font-size: 22px; }

  .pwheel {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }
  .pwheel-trigger {
    border: 1px solid rgba(255,45,120,0.40);
    background: rgba(255,45,120,0.10);
    box-shadow: 0 0 8px rgba(255,45,120,0.18);
  }
  .pwheel-drop {
    position: absolute;
    top: calc(100% + 5px);
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    gap: 3px;
    padding: 5px;
    background: rgba(8,6,24,0.97);
    border: 1px solid rgba(255,45,120,0.28);
    border-radius: 10px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s, transform 0.15s;
    transform: translateX(-50%) translateY(-4px);
    z-index: 100;
  }
  .pwheel.open .pwheel-drop {
    opacity: 1;
    pointer-events: auto;
    transform: translateX(-50%) translateY(0);
  }
  .psel-icon {
    cursor: pointer;
    border-radius: 7px;
    border: 1px solid transparent;
    background: transparent;
    display: block;
    transition: border-color 0.1s, background 0.1s;
  }
  .psel-icon:hover { border-color: rgba(255,45,120,0.35); background: rgba(255,45,120,0.08); }
  .pslider-icon, .pslider-icon:hover { border-color: transparent !important; background: transparent !important; box-shadow: none !important; border-radius: 0; }
  .psel-icon.selected {
    border-color: rgba(255,45,120,0.65);
    background: rgba(255,45,120,0.15);
  }

  #fullTimelineBtn {
    padding: 4px 12px;
    border: 1px solid var(--accent2);
    border-radius: 8px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    background: var(--accent2-dim);
    color: rgba(255,255,255,0.5);
    font-family: 'Lexend', sans-serif;
    flex: 1;
    min-width: unset;
    white-space: normal;
    text-align: center;
    box-shadow:
      inset 0 0 6px var(--accent2-dim),
      0 0 2px var(--accent2), 0 0 8px var(--accent2),
      0 0 18px var(--accent2-glow), 0 0 40px var(--accent2-dim);
    text-shadow: 0 0 4px rgba(255,255,255,0.5), 0 0 10px var(--accent2);
    transition: all 0.2s;
  }
  #fullTimelineBtn:hover { background: var(--accent2-glow); }
  #separateFieldsLabel {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    box-sizing: border-box;
    padding: 6px 18px;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-family: 'Lexend', sans-serif;
    color: rgba(255,255,255,0.5);
    text-shadow: 0 0 4px rgba(255,255,255,0.5), 0 0 10px var(--accent2);
    cursor: pointer;
    white-space: nowrap;
  }
  #separateFieldsLabel input[type="checkbox"] {
    -webkit-appearance: none;
    appearance: none;
    width: 22px;
    height: 22px;
    flex-shrink: 0;
    cursor: pointer;
    background: rgba(6,4,24,0.92);
    border: 2px solid var(--accent2);
    border-radius: 5px;
    box-shadow:
      inset 0 0 6px rgba(26,110,255,0.15),
      0 0 4px var(--accent2),
      0 0 10px var(--accent2-glow),
      0 0 22px rgba(26,110,255,0.2);
    transition: box-shadow 0.2s, background 0.2s;
    position: relative;
  }
  #separateFieldsLabel input[type="checkbox"]:checked {
    background: rgba(26,110,255,0.25);
    box-shadow:
      inset 0 0 8px rgba(26,110,255,0.4),
      0 0 6px var(--accent2),
      0 0 16px var(--accent2),
      0 0 32px var(--accent2-glow);
  }
  #separateFieldsLabel input[type="checkbox"]::after {
    content: '';
    display: none;
    position: absolute;
    left: 5px; top: 1px;
    width: 7px; height: 12px;
    border: 2.5px solid #fff;
    border-top: none;
    border-left: none;
    transform: rotate(45deg);
    filter: drop-shadow(0 0 3px var(--accent2));
  }
  #separateFieldsLabel input[type="checkbox"]:checked::after { display: block; }

  /* ── Selects ───────────────────────────────────────────────────────────── */
  select {
    background: rgba(10,8,30,0.8);
    color: var(--text-bright);
    border: 1px solid rgba(26,110,255,0.35);
    border-radius: 6px;
    padding: 3px 8px;
    font-size: 11px;
    font-family: inherit;
    cursor: pointer;
    box-shadow: 0 0 6px var(--accent2-dim);
    outline: none;
  }
  select:focus { border-color: var(--accent2); box-shadow: 0 0 8px var(--accent2-glow); }

  /* ── Sliders ───────────────────────────────────────────────────────────── */
  input[type="range"] {
    -webkit-appearance: none; appearance: none;
    height: 4px;
    border-radius: 3px;
    background: rgba(255,255,255,0.10);
    box-shadow: 0 0 4px var(--accent2), 0 0 12px var(--accent2-glow), 0 0 28px var(--accent2-dim);
    outline: none;
    cursor: pointer;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 10px; height: 24px;
    border-radius: 3px;
    background: var(--accent2);
    border: none;
    box-shadow: 0 0 3px var(--accent2), 0 0 10px var(--accent2-glow), 0 0 24px var(--accent2-dim);
    cursor: grab; transition: box-shadow 0.15s;
  }
  input[type="range"]::-webkit-slider-thumb:active { cursor: grabbing; }
  input[type="range"]::-moz-range-thumb {
    width: 10px; height: 24px; border-radius: 3px;
    background: var(--accent2); border: none;
    box-shadow: 0 0 3px var(--accent2), 0 0 10px var(--accent2-glow);
    cursor: grab;
  }
  input[type="range"]:disabled { opacity: 0.25; cursor: not-allowed; }

  /* ── Toggle / label ────────────────────────────────────────────────────── */
  .toggle-label {
    font-size: 10px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 5px;
    cursor: pointer;
    white-space: nowrap;
    user-select: none;
  }
  .toggle-label input[type="checkbox"] { accent-color: var(--accent1); }

  .slider-group {
    display: flex; align-items: center; gap: 6px;
  }
  .slider-group label {
    font-size: 10px; color: var(--text-dim); white-space: nowrap; letter-spacing: 0.5px;
  }
  .slider-group label span {
    display: inline-block; min-width: 3em; text-align: right;
    color: var(--accent2); text-shadow: 0 0 5px var(--accent2-glow);
  }
  .slider-group input[type="range"] { width: 72px; }

  /* ── Canvas wrap ───────────────────────────────────────────────────────── */
  #canvasWrap {
    flex: 1;
    position: relative;
    min-height: 0;
    overflow: hidden;
    background: #05040f;
  }
  #canvas { display: block; cursor: default; }

  /* ── Scrub bar ─────────────────────────────────────────────────────────── */
  #scrubBar {
    background: rgba(6,4,20,0.95);
    border-top: 1px solid var(--ui-border);
    box-shadow: 0 -1px 0 var(--accent1-dim), 0 -4px 20px rgba(0,0,0,0.5);
    display: flex;
    flex-direction: row;
    flex-shrink: 0;
  }

  #scrubLeft {
    flex: 1; min-width: 0;
    display: flex; flex-direction: column;
    justify-content: center;
    gap: 4px;
    padding: 6px 0 6px 8px;
  }

  #energyGraphBox {
    display: none;
    border: 1px solid rgba(26,110,255,0.35);
    border-radius: 8px 8px 0 0;
    background: rgba(26,110,255,0.06);
    overflow: hidden;
  }
  #energyGraphBox.visible { display: block; }
  #energyGraph {
    display: block; width: 100%; height: 150px;
    border-bottom: 1px solid var(--ui-border);
    cursor: crosshair;
  }

  #phaseTimeline {
    display: flex; align-items: stretch;
    height: 18px; margin: 0;
    border-radius: 0; overflow: hidden; gap: 0;
  }
  #phaseTimeline .phase-seg {
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 800; letter-spacing: 0.08em;
    overflow: hidden; white-space: nowrap; min-width: 0; transition: opacity 0.15s;
    text-shadow: 0 0 8px currentColor;
  }

  #scrubRow {
    display: flex;
    align-items: center;
    height: 55px;
    padding: 0;
  }
  #timeSlider { flex: 1; display: block; width: 100%; margin: 0; padding: 0; box-sizing: border-box; height: 8px; }

  #scrubLeftPanel {
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    flex-shrink: 0;
    width: 112px;
    border-right: 1px solid var(--ui-border);
  }
  #scrubGraphKey {
    display: none;
    flex-direction: column;
    gap: 6px;
    flex: 1;
    justify-content: center;
    padding: 0 8px;
    font-size: 14px;
    font-weight: 700;
    line-height: 1.25;
    letter-spacing: 0.02em;
  }
  #scrubGraphKey.visible { display: flex; }
  #scrubControls {
    display: flex;
    align-items: center;
    gap: 8px;
    height: 80px;
    padding: 0 8px;
    flex-shrink: 0;
  }
  /* Mini replay in scrub bar — same red, default small size */
  #scrubReplayBtn {
    font-size: 32px;
    border-color: #ff4040;
    color: rgba(255,255,255,0.5);
    background: rgba(255,40,40,0.15);
    box-shadow:
      inset 0 0 4px rgba(255,40,40,0.2),
      0 0 2px #ff4040,
      0 0 6px #ff4040,
      0 0 14px rgba(255,40,40,0.4);
    text-shadow: 0 0 4px rgba(255,255,255,0.5), 0 0 8px #ff4040;
    padding: 4px 8px;
  }
  #scrubReplayBtn:hover { background: rgba(255,40,40,0.3); }
  #scrubReplayBtn:disabled {
    background: transparent;
    border-color: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.18);
    box-shadow: none;
    text-shadow: none;
    cursor: not-allowed;
  }
  #scrubRight {
    width: 270px; flex-shrink: 0;
    border-left: 1px solid var(--ui-border);
    display: flex; flex-direction: column;
  }
  #scrubPercents {
    display: none;
    flex: 1;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 8px 12px;
    font-size: 22px;
    font-weight: 700;
    line-height: 1;
  }
  #scrubPercents.visible { display: flex; }
  #scrubButtons {
    display: flex;
    align-items: center;
    gap: 8px;
    height: 80px;
    padding: 0 12px;
    flex-shrink: 0;
    margin-top: auto;
  }
  #tempLogoBar {
    display: none;
    position: fixed;
    bottom: 0px; right: -74px;
    width: 270px; height: 80px;
    z-index: 10;
    align-items: center;
    justify-content: center;
  }
  #tempLogoBar.visible { display: flex; }
  #energyPctDisplay {
    display: flex;
    gap: 10px;
    justify-content: center;
    font-size: 22px;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 2px;
  }
  #energyPctNote {
    font-size: 12px;
    color: #ff3a6e;
    text-align: center;
    letter-spacing: 0.02em;
    margin-bottom: 6px;
  }
  #egZoomHint {
    font-size: 12px;
    color: var(--text-dim);
    text-align: center;
    line-height: 1.4;
    max-width: 140px;
  }


  /* dev: white background for screenshots */
  #qualitySelect {
    background: rgba(10,8,20,0.5); color: rgba(255,255,255,0.18);
    border: 1px solid rgba(255,255,255,0.04); border-radius: 4px;
    padding: 2px 4px; font-size: 12px; font-family: inherit; cursor: pointer;
  }
  #qualitySelect:focus { outline: 1px solid rgba(255,100,100,0.4); }
  #qualitySelect:hover { color: rgba(255,255,255,0.55); border-color: rgba(255,255,255,0.18); }
  .theme-btn {
    width: 18px; height: 18px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.12);
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    flex-shrink: 0;
    box-shadow: none;
    padding: 0;
  }
  .theme-btn:hover { transform: scale(1.2); box-shadow: 0 0 8px rgba(255,255,255,0.3); }
  .theme-btn.active { border-color: rgba(255,255,255,0.55); box-shadow: 0 0 6px rgba(255,255,255,0.4), 0 0 14px rgba(255,255,255,0.15); }
  #themeLight { background: #fff; }
  #v14ThemeA  { background: #1a6eff; }
  #v14ThemeB  { background: #bd00ff; }
  #v14ThemeC  { background: #00f5e0; }
  #v14ThemeLight { background: #fff; }

<body>

<script>
// Active tab — declared first so every function can read it safely.
let currentTab = 'fusion';

// ── Action log (for bug reports) ─────────────────────────────────────────────
const actionLog = [];
function logAction(msg) {
  actionLog.push(msg);
  if (actionLog.length > 25) actionLog.shift();
}

// ============================================================
//  DOM REFERENCES
// ============================================================
const canvas         = document.getElementById('canvas');
const ctx            = canvas.getContext('2d');
const barChartCanvas = document.getElementById('barChartCanvas');
const barCtx         = barChartCanvas.getContext('2d');
const goBtn       = document.getElementById('goBtn');
const replayBtn   = document.getElementById('replayBtn');
const timeSlider  = document.getElementById('timeSlider');
const timeLabelEl    = { textContent: '' }; // timeLabel element removed; stub to avoid errors
const frameCounterEl = document.getElementById('frameCounter');
function updateFrameCounter(current, total) {
  frameCounterEl.textContent = current != null ? `${current} / ${total}` : total;
}
const energyGraph = document.getElementById('energyGraph');
const egCtx       = energyGraph.getContext('2d');

// ============================================================
//  PHYSICS CONSTANTS
// ============================================================
const PARTICLE_RADIUS     = 10;
const SUBSTEPS            = 20;
const strongForceStrength = 4;
const strongForceRange    = 2.0;   // fixed — no slider
let   strongRangeMult     = 1.0;   // temporary reduction during Cat2 collision onset
let   coulombMult         = 1.0;   // temporary boost during Cat2 collision onset
const equilibriumRatio    = 0.35;

// Timing
const COLLISION_FRAMES    = 15;    // max frames of collision phase
const ESCAPE_ANIM_FRAMES  = 5;     // frames to lerp into escape geometry
const FRAME_SPEED         = 1.5;   // dt per frame
const CAT2_KE_RAMP_FRAMES = 4;     // collision frames over which Cat2 KE ramps to peak

// View
const ZOOM_SCALE = 1.5;            // canvas zoom; hardcoded in draw(), heatmap, auto-stop check

// Photon capture (Cat3)
const PHOTON_SPEED    = 18;        // px per frame
const PHOTON_MAX_AGE  = 90;        // frames until fully faded
const PN_JIGGLE_FRAMES = 12;       // P+N scripted jiggle before photon fires

// ============================================================
//  ENERGY TABLE  (values at approachSpeed = 2.0; scale by (speed/2)²)
//  immediateKE: displayed KE at collision onset
//  keOut:       displayed KE during escape
//  gammaKE:     energy carried away by photon (Cat 3 only)
//  sieOffset:   SIE bar visual offset, set at input selection
// ============================================================
// Keys are canonical: [a, b].sort().join('+') — getComboEntry() normalises on lookup.
const COMBO_TABLE = {
  // Cat 1 — elastic, no binding
  'n+n':   { sieOffset: 100, immediateKE: 54, keOut:  4, gammaKE:  0 },
  'he+n':  { sieOffset: 100, immediateKE: 60, keOut: 10, gammaKE:  0 },
  'n+t':   { sieOffset: 100, immediateKE: 58, keOut:  8, gammaKE:  0 },
  // Cat 2 — productive fusion
  'd+t':   { sieOffset: 184, sieOffsetUnscaled: 184, immediateKE: 120, keOut: 118, keInScaled: 17600, keOutScaled: 16700, sieOffsetScaled: 18000, gammaKE:  0 },
  'd+d':   { sieOffset: 100, sieOffsetUnscaled: 100, immediateKE: 20, keOut: 18, gammaKE:  0 },
  't+t':   { sieOffset: 258, sieOffsetUnscaled: 258, immediateKE: 47, keOut: 41, gammaKE:  0 },
  // Cat 3 — gamma emission
  'n+p':   { sieOffset: 100, immediateKE: 54, keOut:  4, gammaKE: 50 },
  'd+p':   { sieOffset: 100, immediateKE: 56, keOut:  6, gammaKE: 50 },
  'p+t':   { sieOffset: 150, immediateKE: 58, keOut:  8, gammaKE: 50 },
  'd+n':   { sieOffset: 100, immediateKE: 56, keOut:  6, gammaKE: 50 },
  // Cat 4 — Coulomb only (KE display uses actual physics)
  'p+p':   { sieOffset:   0 },
  'he+p':  { sieOffset: 250 },
  'd+he':  { sieOffset: 270 },
  'he+t':  { sieOffset: 350 },
  'he+he': { sieOffset: 460 },
};

function getComboEntry() {
  const key = [leftChoice, rightChoice].sort().join('+');
  return COMBO_TABLE[key] || null;
}

// KE values in the table are at speed 2.0; scale by (speed/2)²
function speedScale() { return (approachSpeed / 2.0) ** 2; }

// ============================================================
//  MUTABLE PARAMETERS  (slider-controlled)
// ============================================================
let coulombStrength = 400;
const COULOMB_CUTOFF_SQ = (PARTICLE_RADIUS * 40) ** 2;  // Skip pairs beyond this distance
let approachSpeed   = 1.15;

// ============================================================
//  SIMULATION STATE
// ============================================================
let particles  = [];
let running    = false;
let _quality   = 'hi-res';  // 'hi-res' | 'detailed' | 'simple'
let paused     = false;
let animId     = null;

// ── Perf / lag detection ──────────────────────────────────────────────────────
let _lastLoopT = 0;   // RAF timestamp of previous loop() call; 0 = not yet set
let replayRAF   = null;
let replayAccum = 0;    // fractional frame accumulator for speed-controlled playback

// ============================================================
//  HISTORY & SCRUBBER
// ============================================================
const MAX_HISTORY = 4000;
// Ring buffer — O(1) push, no shift().
const _phBuf   = new Array(MAX_HISTORY);
let   _phStart = 0;   // index of oldest entry
let   _phLen   = 0;
function phGet(i)    { return _phBuf[(_phStart + i) % MAX_HISTORY]; }
function phLen()     { return _phLen; }
function phReset()   { _phStart = 0; _phLen = 0; }
function phPush(fr)  {
  if (_phLen < MAX_HISTORY) { _phBuf[(_phStart + _phLen) % MAX_HISTORY] = fr; _phLen++; }
  else { _phBuf[_phStart] = fr; _phStart = (_phStart + 1) % MAX_HISTORY; }
}
let scrubFrame = -1;

// ============================================================

const CLUSTER_DEFS = {
  'p':  [{ type:'proton',  x:0,   y:0   }],
  'n':  [{ type:'neutron', x:0,   y:0   }],
  'd':  [{ type:'proton',  x:-9,  y:-5  }, { type:'neutron', x:9,   y:5   }],
  't':  [{ type:'proton',  x:-9,  y:-5  }, { type:'neutron', x:9,   y:5   }, { type:'neutron', x:9,   y:-15 }],
  'he': [{ type:'proton',  x:-13, y:-8  }, { type:'neutron', x:8,   y:-13 }, { type:'proton',  x:13,  y:8   }, { type:'neutron', x:-8,  y:13  }],
};

let rightChoice     = 't';
let leftClusterSize = 1;
