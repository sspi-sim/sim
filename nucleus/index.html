      const len = scale(mag);
      if (len < 1) return;
      drawArrowOnCtx(forcePanelCtx, sppx + (vec.x/mag) * sPR, sppy + (vec.y/mag) * sPR, vec.x/mag, vec.y/mag, len, color, 3);
    };
    const cSum = sum(coulombVecs), sSum = sum(strongVecs);
    drawNet(cSum, ELEC_ARROW_COLOR);
    if (!currentTabIsProton) drawNet(sSum, STRONG_ARROW_COLOR);
  }

  // Draw particle on top of arrows
  const baseR2 = sPR * 1.1;
  const baseGrad2 = forcePanelCtx.createRadialGradient(sppx, sppy, 0, sppx, sppy, baseR2);
  if (isProton) {
    baseGrad2.addColorStop(0, t.protonMid); baseGrad2.addColorStop(0.82, t.protonMid); baseGrad2.addColorStop(1, 'rgba(0,0,0,0)');
  } else {
    baseGrad2.addColorStop(0, t.neutronMid); baseGrad2.addColorStop(0.82, t.neutronMid); baseGrad2.addColorStop(1, 'rgba(0,0,0,0)');
  }
  forcePanelCtx.fillStyle = baseGrad2;
  forcePanelCtx.beginPath(); forcePanelCtx.arc(sppx, sppy, baseR2, 0, Math.PI * 2); forcePanelCtx.fill();
  const innerGlow2 = forcePanelCtx.createRadialGradient(sppx, sppy, 0, sppx, sppy, sPR);
  const coreCol2 = isProton ? t.protonCore : t.neutronCore;
  innerGlow2.addColorStop(0, coreCol2); innerGlow2.addColorStop(0.5, coreCol2); innerGlow2.addColorStop(1, 'rgba(0,0,0,0)');
  forcePanelCtx.globalAlpha = 0.82;
  forcePanelCtx.fillStyle = innerGlow2;
  forcePanelCtx.beginPath(); forcePanelCtx.arc(sppx, sppy, sPR, 0, Math.PI * 2); forcePanelCtx.fill();
  forcePanelCtx.globalAlpha = 1;
  forcePanelCtx.font = `bold ${Math.max(10, sPR * 1.1) + 3}px Lexend, sans-serif`;
  forcePanelCtx.textAlign = 'center'; forcePanelCtx.textBaseline = 'middle';
  const __selLab = __spLabels[selectedParticle];
  if (__selLab) {
    forcePanelCtx.fillStyle = isProtonLabel(__selLab) ? PROTON_LABEL_COLOR : NEUTRON_LABEL_COLOR;
    forcePanelCtx.fillText(__selLab, sppx, sppy + 1);
  } else if (isProton) {
    forcePanelCtx.fillStyle = 'rgba(255,255,255,0.88)';
    forcePanelCtx.fillText('+', sppx, sppy + 1);
  }
  forcePanelCtx.restore();
}

// ============================================================
//  MAIN DRAW
//  Render order (back to front):
//    1. Coulomb field visualization (ribbon or cloud)
//    2. All particle bodies
//
//  Everything is drawn inside a centered zoom transform so the
//  zoom slider scales visuals without touching physics coordinates.
// ============================================================
// Camera offset (screen pixels) — shifts the zoom pivot so the biggest cluster
// is centered in the available space (left of force panel horizontally, full canvas vertically).
let camX = 0, camY = 0;

// Compute camX/camY instantly (no lerp). Uses findBiggestCluster() which already exists.
function updateCam() {
  const cluster = particles.length > 0 ? findBiggestCluster() : [];
  if (cluster.length === 0) { camX = 0; camY = 0; return; }

  let cx = 0, cy = 0;
  for (const p of cluster) { cx += p.x; cy += p.y; }
  cx /= cluster.length; cy /= cluster.length;

  const fpW = (arrowMode > 0) ? _forcePanelWidth : 0;
  const availW = canvas.width - fpW;
  const toolbarH   = document.getElementById('toolbar').offsetHeight;
  const visibleCy  = toolbarH + (canvas.height - toolbarH) / 2;
  camX = availW / 2 - (zoom * (cx - canvas.width  / 2) + canvas.width  / 2);
  camY = visibleCy  - (zoom * (cy - canvas.height / 2) + canvas.height / 2);
}

function draw() {
  const _lagDrawT0 = performance.now();
  const LIGHT = document.body.classList.contains('screenshot-mode');
  if (LIGHT) {
    ctx.fillStyle = document.getElementById('bgColorPicker').value || '#ffffff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  } else {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
  }

  // Heatmaps render in screen space before the zoom transform.
  if ((showElectricField || showStrongField) && particles.length >= 2) drawCombinedHeatmap();

  // Centered zoom with camera offset
  const _cx = canvas.width / 2, _cy = canvas.height / 2;
  ctx.save();
  ctx.translate(_cx + camX, _cy + camY);
  ctx.scale(zoom, zoom);
  ctx.translate(-_cx, -_cy);

  ensureJitter();
  const __labels = getParticleLabels();
  for (let i = 0; i < particles.length; i++) {
    const p = particles[i];
    const isProton = p.type === 'proton';
    const jx = jitter[i] ? jitter[i].x : 0;
    const jy = jitter[i] ? jitter[i].y : 0;
    const px = p.x + jx, py = p.y + jy;

    // Unstable neutron: pulsing red glow
    if (p.unstable && currentTab === 'nucleus') {
      const now = performance.now();
      let timerProgress = 0;
      if (quantumTimerStartAt !== null && quantumEjectAt !== null) {
        timerProgress = Math.min(1, (now - quantumTimerStartAt) / (quantumEjectAt - quantumTimerStartAt));
      }
      const pulse  = 0.5 + 0.5 * Math.sin(now / 180);
      const glowR  = PARTICLE_RADIUS + 5 + pulse * 3 + timerProgress * 10;
      const alpha  = 0.35 + timerProgress * 0.55 + pulse * 0.1;
      const glow   = ctx.createRadialGradient(px, py, PARTICLE_RADIUS * 0.4, px, py, glowR);
      glow.addColorStop(0, `rgba(255,60,40,${Math.min(1, alpha).toFixed(2)})`);
      glow.addColorStop(1, 'rgba(255,0,0,0)');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(px, py, glowR, 0, Math.PI * 2);
      ctx.fill();
    }

    const t = currentTheme;

    // Flat base circle — solid mid color, soft edge fade
    const baseR = PARTICLE_RADIUS * 1.1;
    const baseGrad = ctx.createRadialGradient(px, py, 0, px, py, baseR);
    if (isProton) {
      baseGrad.addColorStop(0,    t.protonMid);
      baseGrad.addColorStop(0.82, t.protonMid);
      baseGrad.addColorStop(1,    'rgba(0,0,0,0)');
    } else {
      baseGrad.addColorStop(0,    t.neutronMid);
      baseGrad.addColorStop(0.82, t.neutronMid);
      baseGrad.addColorStop(1,    'rgba(0,0,0,0)');
    }
    ctx.fillStyle = baseGrad;
    ctx.beginPath();
    ctx.arc(px, py, baseR, 0, Math.PI * 2);
    ctx.fill();

    // Inner glow — bright centered bloom, fades outward
    const innerGlow = ctx.createRadialGradient(px, py, 0, px, py, PARTICLE_RADIUS);
    const coreColor = isProton ? t.protonCore : t.neutronCore;
    innerGlow.addColorStop(0,   coreColor);
    innerGlow.addColorStop(0.5, coreColor);
    innerGlow.addColorStop(1,   'rgba(0,0,0,0)');
    ctx.globalAlpha = 0.82;
    ctx.fillStyle = innerGlow;
    ctx.beginPath();
    ctx.arc(px, py, PARTICLE_RADIUS, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;

    // Label
    ctx.font = 'bold 11px Lexend, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const __lab = __labels[i];
    if (__lab) {
      ctx.fillStyle = isProtonLabel(__lab) ? PROTON_LABEL_COLOR : NEUTRON_LABEL_COLOR;
      ctx.fillText(__lab, px, py + 1);
    } else if (isProton) {
      ctx.fillStyle = 'rgba(255,255,255,0.88)';
      ctx.fillText('+', px, py + 1);
    }
  }

  // Selection rings — drawn after all particles so they're never covered
  for (let i = 0; i < particles.length; i++) {
    const p = particles[i];
    const jx = jitter[i] ? jitter[i].x : 0;
    const jy = jitter[i] ? jitter[i].y : 0;
    const px = p.x + jx, py = p.y + jy;
    const inGroup = groupSelectMode && selectedGroup.includes(i);
    if (inGroup || (!groupSelectMode && i === selectedParticle && arrowMode > 0)) {
      ctx.beginPath();
      ctx.arc(px, py, PARTICLE_RADIUS + 6, 0, Math.PI * 2);
      ctx.strokeStyle = inGroup ? 'rgba(100,220,255,0.7)' : currentTheme.accent2;
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }
  }

  // Ejection flashes — fixed position at ejection site
  if (currentTab === 'nucleus') {
    const now = performance.now();
    quantumFlashes = quantumFlashes.filter(f => {
      const age = now - f.startTime;
      if (age > 350) return false;
      const t = age / 350;
      const r = PARTICLE_RADIUS + t * PARTICLE_RADIUS * 3;
      ctx.beginPath();
      ctx.arc(f.x, f.y, r, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(255,180,80,${(1 - t).toFixed(2)})`;
      ctx.lineWidth = 3 * (1 - t);
      ctx.stroke();
      return true;
    });
  }

  // Rubber-band selection box (drawn in world space, before restore)
  if (groupSelectMode && selBox) {
    const bx = Math.min(selBox.x1, selBox.x2), by = Math.min(selBox.y1, selBox.y2);
    const bw = Math.abs(selBox.x2 - selBox.x1), bh = Math.abs(selBox.y2 - selBox.y1);
    ctx.fillStyle = 'rgba(100,220,255,0.08)';
    ctx.fillRect(bx, by, bw, bh);
    ctx.strokeStyle = 'rgba(100,220,255,0.75)';
    ctx.lineWidth = 1 / zoom;
    ctx.setLineDash([5 / zoom, 4 / zoom]);
    ctx.strokeRect(bx, by, bw, bh);
    ctx.setLineDash([]);
  }

  ctx.restore();
  drawForcePanel();

  // ── Lag EMA: measure actual draw time ──
  { const _dt = performance.now() - _lagDrawT0;
    _lagEma = _lagEma * 0.9 + _dt * 0.1;
    const det = _lagEma > 40;
    _lagDetected = det;
  }
}

// ============================================================
//  TIME SCRUBBER
// ============================================================
function renderFrame(idx) {
  const frame = _histGet(idx);
  if (!frame) return;
  const savedParticles       = particles;
  const savedDragging        = dragging;
  const savedFlashes         = quantumFlashes;
  const savedSelectedParticle = selectedParticle;
  const savedSelectedGroup   = selectedGroup.slice();
  particles = _restoreParticles(frame);
  dragging  = null;
  quantumFlashes = [];
  // Match live behavior: when centerTracking is on, recenter the camera on the
  // historical frame's biggest cluster so the clump stays put during replay /
  // time-slider scrubbing instead of being frozen at the last live camera pos.
  if (centerTracking) updateCam();
  draw();
  _cachedBiggestCluster = null; // particles changed; cache is stale
  updateStats();
  particles        = savedParticles;
  dragging         = savedDragging;
  quantumFlashes   = savedFlashes;
  selectedParticle = savedSelectedParticle;
  selectedGroup    = savedSelectedGroup;
  _cachedBiggestCluster = null; // restored to live particles; invalidate again
}

timeSlider.addEventListener('input', () => {
  // Stop any running animation so the user can scrub freely
  if (running || replaying) {
    running = false;
    replaying = false;
    cancelAnimationFrame(animId);
    goBtn.textContent = '▶ GO';
    goBtn.classList.remove('running');
  }
  replayLocked = true;
  const val = parseInt(timeSlider.value);
  scrubFrame = val;
  updateFrameCounter(val + 1, _histLen);
  renderFrame(val);
});

// ============================================================
//  ANIMATION LOOP
//  Three modes:
//    replaying  — auto-advance scrubFrame through recorded history
//    scrubFrame >= 0 — user is scrubbing; prevents live history from advancing
//                      (scrubFrame is set by the time-slider input handler)
//    live physics — step sim, record history, auto-stop when empty
// ============================================================
function loop() {
  if (!running) return;

  // ── Frame throttle when lag detected (EMA measured in draw()) ──
  _lagSkip++;
  if (_lagDetected && _lagSkip % 4 !== 0) { animId = requestAnimationFrame(loop); return; }

  // ── Replay mode: play back recorded history automatically ──
  if (replaying) {
    // Timestamp-based sync: advance to whichever recorded frame matches how much
    // real time has passed since replay started, scaled by the speed slider.
    // This guarantees 1:1 wall-clock speed regardless of live vs replay frame rate.
    const _now = performance.now();
    if (!_replayWallStart) _replayWallStart = _now;  // latch on first call
    const _elapsed = (_now - _replayWallStart) * (speed / recordedSpeed);
    // Seek forward to the latest frame whose recorded timestamp ≤ elapsed
    while (scrubFrame + 1 < _histLen) {
      const nextT = _histGet(scrubFrame + 1).t - _replaySimStart;
      if (nextT > _elapsed) break;
      scrubFrame++;
    }
    if (scrubFrame >= _histLen - 1) {
      // Reached end of recording — stop
      running = false;
      replaying = false;
      goBtn.textContent = '▶ GO';
      goBtn.classList.remove('running');
      timeSlider.value = scrubFrame;
      updateFrameCounter(scrubFrame + 1, _histLen);
      renderFrame(scrubFrame);
      return;
    }
    timeSlider.value = scrubFrame;
    updateFrameCounter(scrubFrame + 1, _histLen);
    renderFrame(scrubFrame);
    animId = requestAnimationFrame(loop);
    return;
  }

  // Auto-stop when history is full so the beginning is never overwritten.
  // Check here, before any physics runs, so pressing Go on a full buffer
  // is a no-op rather than silently eroding the oldest frame each time.
  if (_histLen >= MAX_HISTORY) {
    running = false;
    goBtn.textContent = '▶ GO';
    goBtn.classList.remove('running');
    if (timeSlider.disabled) timeSlider.disabled = false;
    return;
  }

  // ── Live physics ──
  loopFrame++;
  applyBiggestClusterStability();
  updateQuantumStability();
  if (centerTracking) updateCam();
  step(speed);
  computeEnergy();
  updateStats();

  _histPush(_snapshotParticles(particles));

  if (timeSlider.disabled !== false) timeSlider.disabled = false;
  const _newMax = String(_histLen - 1);
  if (timeSlider.max !== _newMax) timeSlider.max = _newMax;
  if (timeSlider.value !== _newMax) timeSlider.value = _newMax;
  updateFrameCounter(null, _histLen);

  draw();

  // Remove particles that have left the visible screen by more than 30%.
  // Threshold is in screen space so zoom level determines how far particles
  // travel in physics coords before being culled.
  {
    const cx = canvas.width / 2, cy = canvas.height / 2;
    const mw   = canvas.width  * 0.3;
    const mh   = canvas.height * 0.3;
    const mhDn = mh * 2.0;   // 2× margin before culling particles that exit downward
    if (currentTab === 'nucleus') {
      // Never remove bound (non-ejected) nucleus particles even if they drift off-screen.
      // Only allocate a new array when at least one ejected particle is actually out of bounds.
      const hasOutOfBounds = particles.some(p => {
        if (!p.ejected) return false;
        const sx = zoom * (p.x - cx) + cx;
        const sy = zoom * (p.y - cy) + cy;
        return !(sx > -mw && sx < canvas.width + mw && sy > -mh && sy < canvas.height + mhDn);
      });
      if (hasOutOfBounds) {
        particles = particles.filter(p => {
          if (!p.ejected) return true;
          const sx = zoom * (p.x - cx) + cx;
          const sy = zoom * (p.y - cy) + cy;
          return sx > -mw && sx < canvas.width  + mw &&
                 sy > -mh && sy < canvas.height + mhDn;
        });
      }
    } else {
      const kept = [];
      let newDragging = null;
      for (let i = 0; i < particles.length; i++) {
        const p = particles[i];
        const sx = zoom * (p.x - cx) + cx;
        const sy = zoom * (p.y - cy) + cy;
        if (sx > -mw && sx < canvas.width  + mw &&
            sy > -mh && sy < canvas.height + mhDn) {
          if (i === dragging) newDragging = kept.length;
          kept.push(p);
        }
      }
      particles = kept;
      dragging  = newDragging;
    }
  }

  // Auto-stop when all particles have escaped off-screen
  if (particles.length === 0) {
    running = false;
    goBtn.textContent = '▶ GO';
    goBtn.classList.remove('running');
    return;
  }

  animId = requestAnimationFrame(loop);
}

// ============================================================
//  THEME SWITCHER
//
//  Three themes — protons always hot pink (accent1).
//  accent2 = UI label / slider color ("letters").
//  Neutron colors vary per theme.
//
//  currentThemeKey is serialised into captureSimState() so
//  notepad playback can faithfully restore the visual theme.
// ============================================================
const THEMES = {
  // A: Blue labels + grey neutrons  (matches :root CSS defaults)
  A: {
    accent1:'#ff2d78', accent1dim:'rgba(255,45,120,0.25)', accent1glow:'rgba(255,45,120,0.55)',
    accent2:'#1a6eff', accent2dim:'rgba(26,110,255,0.18)',  accent2glow:'rgba(26,110,255,0.45)',
    uibg:'rgba(8,6,24,0.38)', uiborder:'rgba(255,255,255,0.07)',
    textdim:'rgba(220,215,255,0.55)', textbright:'rgba(240,235,255,0.92)',
    speck:'rgba(180,130,255,0.35)',
    protonCore:'#ff80b0', protonMid:'#ff1a65', protonEdge:'#7a0030',
    neutronCore:'#b0b0c4', neutronMid:'#70707f', neutronEdge:'#383848',
    bg:'#05040f',
  },
  // B: Purple labels + purple neutrons
  B: {
    accent1:'#ff2d78', accent1dim:'rgba(255,45,120,0.22)', accent1glow:'rgba(255,45,120,0.5)',
    accent2:'#bd00ff', accent2dim:'rgba(189,0,255,0.18)',  accent2glow:'rgba(189,0,255,0.42)',
    uibg:'rgba(8,4,22,0.42)', uiborder:'rgba(189,0,255,0.14)',
    textdim:'rgba(230,200,255,0.52)', textbright:'rgba(248,232,255,0.92)',
    speck:'rgba(180,60,240,0.28)',
    protonCore:'#ff80b0', protonMid:'#ff1a65', protonEdge:'#7a0030',
    neutronCore:'#b0b0c4', neutronMid:'#70707f', neutronEdge:'#383848',
    bg:'#05030f',
  },
  // C: Teal labels + blue neutrons
  C: {
    accent1:'#ff2d78', accent1dim:'rgba(255,45,120,0.22)', accent1glow:'rgba(255,45,120,0.5)',
    accent2:'#00f5e0', accent2dim:'rgba(0,245,224,0.15)',  accent2glow:'rgba(0,245,224,0.4)',
    uibg:'rgba(6,4,20,0.40)', uiborder:'rgba(255,45,120,0.12)',
    textdim:'rgba(220,210,255,0.52)', textbright:'rgba(245,235,255,0.92)',
    speck:'rgba(200,100,200,0.28)',
    protonCore:'#ff80b0', protonMid:'#ff1a65', protonEdge:'#7a0030',
    neutronCore:'#b0b0c4', neutronMid:'#70707f', neutronEdge:'#383848',
    bg:'#04030e',
  },
};
let currentTheme = THEMES.A;
let currentThemeKey = 'A';   // serialised into sim state JSON

// ============================================================
//  PARTICLE ICON RENDERER — live animated, matches the sim exactly
//  Uses PARTICLE_RADIUS * default zoom (2) for same apparent size.
// ============================================================
const iconJitter = {
  proton:  { x: 0, y: 0 },
  neutron: { x: 0, y: 0 },
};

function drawParticleIcon(canvas, type) {
  const c = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  const R  = PARTICLE_RADIUS * 1.5; // sized to fit 40×40 icon canvas without clipping
  const cx = w / 2, cy = h / 2;
  const t  = currentTheme;
  const isProton = type === 'proton';
  const jit = iconJitter[type];
  const px = cx + jit.x, py = cy + jit.y;

  c.clearRect(0, 0, w, h);

  // Flat base circle — solid mid color, soft edge fade (matches main draw)
  const baseR    = R * 1.1;
  const baseGrad = c.createRadialGradient(px, py, 0, px, py, baseR);
  const mid = isProton ? t.protonMid : t.neutronMid;
  baseGrad.addColorStop(0,    mid);
  baseGrad.addColorStop(0.82, mid);
  baseGrad.addColorStop(1,    'rgba(0,0,0,0)');
  c.fillStyle = baseGrad;
  c.beginPath(); c.arc(px, py, baseR, 0, Math.PI * 2); c.fill();

  // Inner glow — bright centered bloom
  const innerGlow = c.createRadialGradient(px, py, 0, px, py, R);
  const core = isProton ? t.protonCore : t.neutronCore;
  innerGlow.addColorStop(0,   core);
  innerGlow.addColorStop(0.5, core);
  innerGlow.addColorStop(1,   'rgba(0,0,0,0)');
  c.globalAlpha = 0.82;
  c.fillStyle = innerGlow;
  c.beginPath(); c.arc(px, py, R, 0, Math.PI * 2); c.fill();
  c.globalAlpha = 1;

  // + drawn geometrically — mathematically centered, no font metric issues
  if (isProton) {
    const arm   = R * 0.36;
    const thick = R * 0.225;
    c.fillStyle = 'rgba(255,255,255,0.88)';
    c.fillRect(px - arm,    py - thick / 2, arm * 2, thick); // horizontal
    c.fillRect(px - thick / 2, py - arm,    thick, arm * 2); // vertical
  }
}

// Icon animation loop — runs independently; picks up theme changes automatically
function iconAnimLoop() {
  for (const key of ['proton', 'neutron']) {
    const j = iconJitter[key];
    j.x += (Math.random() - 0.5) * 0.7;
    j.y += (Math.random() - 0.5) * 0.7;
    j.x *= 0.78;
    j.y *= 0.78;
  }
  if (protonIconCanvas)  drawParticleIcon(protonIconCanvas,  'proton');
  if (neutronIconCanvas) drawParticleIcon(neutronIconCanvas, 'neutron');
  requestAnimationFrame(iconAnimLoop);
}

function applyTheme(key) {
  const t = THEMES[key];
  currentTheme = t;
  currentThemeKey = key;
  const r = document.documentElement.style;
  r.setProperty('--accent1',      t.accent1);
  r.setProperty('--accent1-dim',  t.accent1dim);
  r.setProperty('--accent1-glow', t.accent1glow);
  r.setProperty('--accent2',      t.accent2);
  r.setProperty('--accent2-dim',  t.accent2dim);
  r.setProperty('--accent2-glow', t.accent2glow);
  r.setProperty('--ui-bg',        t.uibg);
  r.setProperty('--ui-border',    t.uiborder);
  r.setProperty('--text-dim',     t.textdim);
  r.setProperty('--text-bright',  t.textbright);
  r.setProperty('--speck-color',   t.speck);
  r.setProperty('--neutron-core',  t.neutronCore);
  r.setProperty('--neutron-mid',   t.neutronMid);
  r.setProperty('--neutron-edge',  t.neutronEdge);
  r.setProperty('--page-bg', t.bg);
  document.body.style.background = t.bg;
  document.body.classList.remove('screenshot-mode');
  document.getElementById('themeLight').classList.remove('active');
  document.querySelectorAll('.theme-btn:not(#themeLight)').forEach(b => b.classList.remove('active'));
  document.getElementById('theme'+key).classList.add('active');
  document.body.classList.toggle('theme-teal', key === 'C');
  if (!running) draw();
}
document.getElementById('themeA').addEventListener('click', () => applyTheme('A'));
document.getElementById('themeB').addEventListener('click', () => applyTheme('B'));
document.getElementById('themeC').addEventListener('click', () => applyTheme('C'));
document.getElementById('bgColorPicker').addEventListener('input', function() {
  document.documentElement.style.setProperty('--bg-color', this.value);
  if (!running) draw();
});
document.getElementById('themeLight').addEventListener('click', () => {
  const on = document.body.classList.toggle('screenshot-mode');
  document.getElementById('themeLight').classList.toggle('active', on);
  if (!running) draw();
});
// Per-particle jitter offsets — must be declared before applyTheme('A') calls draw()
let jitter = [];

// Initialise CSS vars from Theme A (matches :root defaults, keeps everything in sync)
applyTheme('A');

// ============================================================
//  BACKGROUND SPECKS  (drifting ambient particles)
// ============================================================
const NUM_SPECKS = 16;
const specks = Array.from({ length: NUM_SPECKS }, () => {
  const speed = 15 + Math.random() * 15;
  const angle = Math.random() * Math.PI * 2;
  return {
    x:  Math.random() * window.innerWidth,
    y:  Math.random() * window.innerHeight,
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed,
    len: 18 + Math.random() * 55,   // longer trail
    w:   0.5 + Math.random() * 0.9,
    a:   0.18 + Math.random() * 0.38,
  };
});

function updateSpecks() {
  const W = canvas.width, H = canvas.height;
  for (const s of specks) {
    s.x += s.vx; s.y += s.vy;
    if (s.x < -60) s.x = W + 60;
    else if (s.x > W + 60) s.x = -60;
    if (s.y < -60) s.y = H + 60;
    else if (s.y > H + 60) s.y = -60;
  }
}

function drawSpecks() {
  const speckColor = currentTheme.speck;
  for (const s of specks) {
    const base = speckColor.replace(/[\d.]+\)$/, `${s.a.toFixed(2)})`);
    // Draw as motion-blur line: tail behind, bright head
    const tx = s.x - s.vx / Math.hypot(s.vx, s.vy) * s.len;
    const ty = s.y - s.vy / Math.hypot(s.vx, s.vy) * s.len;
    const grad = ctx.createLinearGradient(tx, ty, s.x, s.y);
    grad.addColorStop(0, speckColor.replace(/[\d.]+\)$/, '0)'));
    grad.addColorStop(1, base);
    ctx.beginPath();
    ctx.moveTo(tx, ty);
    ctx.lineTo(s.x, s.y);
    ctx.strokeStyle = grad;
    ctx.lineWidth = s.w;
    ctx.stroke();
  }
}

// Per-particle jitter offsets (applied only when stopped)
// (declaration moved above applyTheme call to avoid TDZ crash)
function ensureJitter() {
  while (jitter.length < particles.length) jitter.push({ x: 0, y: 0 });
  if (jitter.length > particles.length) jitter.length = particles.length;
}
function updateJitter() {
  // When live particles are gone but a historical frame is displayed, size jitter
  // to the historical frame so replayed particles can still jitter.
  const targetLen = (particles.length === 0 && scrubFrame >= 0 && _histLen > 0)
    ? (_histGet(scrubFrame)?.n ?? 0)
    : particles.length;
  while (jitter.length < targetLen) jitter.push({ x: 0, y: 0 });
  if (jitter.length > targetLen) jitter.length = targetLen;
  for (let i = 0; i < jitter.length; i++) {
    jitter[i].x += (Math.random() - 0.5) * 0.7;
    jitter[i].y += (Math.random() - 0.5) * 0.7;
    jitter[i].x *= 0.78;
    jitter[i].y *= 0.78;
  }
}

// ============================================================
// ============================================================
//  PARTICLE GRAIN TEXTURE
//  Small offscreen canvas refreshed every frame; drawn with
//  'overlay' blend clipped to each particle circle.
// ============================================================
const GRAIN_SIZE = 64;
const grainBuf = document.createElement('canvas');
grainBuf.width = grainBuf.height = GRAIN_SIZE;
const grainBufCtx = grainBuf.getContext('2d');
// Cached ImageData — allocated once; reused every frame to avoid ~16 KB/frame GC pressure.
let _grainImgData = grainBufCtx.createImageData(GRAIN_SIZE, GRAIN_SIZE);

function refreshParticleGrain() {
  const d = _grainImgData.data;
  for (let i = 0; i < d.length; i += 4) {
    const v = (Math.random() * 255) | 0;
    d[i] = d[i+1] = d[i+2] = v;
    d[i+3] = (Math.random() * 210) | 0;  // dense — up to 82% opaque
  }
  grainBufCtx.putImageData(_grainImgData, 0, 0);
}

function drawParticleGrain(cx, cy) {
  ctx.save();
  ctx.globalCompositeOperation = 'overlay';
  ctx.globalAlpha = 0.45;
  const s = GRAIN_SIZE;
  ctx.drawImage(grainBuf, cx - s / 2, cy - s / 2, s, s);
  ctx.restore();
}

// ============================================================
//  CRT NOISE + SCANLINE OVERLAY
// ============================================================
let noiseCanvas = null, noiseCtx = null, noiseFrame = 0;

function initNoise() {
  noiseCanvas = document.createElement('canvas');
  noiseCanvas.width  = 256;
  noiseCanvas.height = 256;
  noiseCtx = noiseCanvas.getContext('2d');
}
initNoise();

// Two noise canvases — alternate each frame for denser churn
let noiseCanvas2 = document.createElement('canvas');
noiseCanvas2.width = noiseCanvas2.height = 256;
const noiseCtx2 = noiseCanvas2.getContext('2d');

function updateNoise() {
  // Fill whichever buffer is "next" — both get updated every 2 frames each
  const target = noiseFrame % 2 === 0 ? noiseCtx : noiseCtx2;
  const id = target.createImageData(256, 256);
  const d  = id.data;
  for (let i = 0; i < d.length; i += 4) {
    // denser: ~65% of pixels get a value, brighter range
    if (Math.random() > 0.35) {
      const v = Math.floor(Math.random() * 200 + 30);
      d[i] = d[i+1] = d[i+2] = v;
      d[i+3] = Math.floor(Math.random() * 80 + 15);
    }
  }
  target.putImageData(id, 0, 0);
}

function drawCRT() {
  const W = canvas.width, H = canvas.height;
  const now = performance.now();

  // Flicker: slow swell + occasional sharp dropout
  const slowFlicker  = 0.80 + 0.20 * (0.5 + 0.5 * Math.sin(now * 0.0009 + Math.sin(now * 0.00021) * 4));
  const twitch       = Math.random() > 0.978 ? 0.2 + Math.random() * 0.5 : 1.0;
  const flickerMult  = slowFlicker * twitch;

  ctx.save();

  // Layer 1: base noise tile (screen blend — brightens without washing out)
  ctx.globalCompositeOperation = 'screen';
  ctx.globalAlpha = 0.13 * flickerMult;
  const src = noiseFrame % 2 === 0 ? noiseCanvas : noiseCanvas2;
  for (let x = 0; x < W; x += 256) {
    for (let y = 0; y < H; y += 256) ctx.drawImage(src, x, y);
  }

  // Layer 2: second noise pass at slight offset for texture depth
  ctx.globalAlpha = 0.07 * flickerMult;
  const src2 = noiseFrame % 2 === 0 ? noiseCanvas2 : noiseCanvas;
  for (let x = 0; x < W; x += 256) {
    for (let y = 0; y < H; y += 256) ctx.drawImage(src2, x + 32, y + 32);
  }

  // Layer 3: scanlines
  ctx.globalAlpha = 0.055 * flickerMult;
  ctx.fillStyle = '#000';
  for (let y = 0; y < H; y += 3) ctx.fillRect(0, y, W, 1);

  ctx.restore();
}

// ============================================================
//  AMBIENT LOOP  (always-on: specks + jitter, even when stopped)
// ============================================================
let ambientId = null;
let _ambientDrawSkip = 0;
function ambientLoop() {
  noiseFrame++;
  updateJitter(); // always update every RAF so jitter state stays smooth
  if (!running) {
    // Throttle idle redraws to ~15 fps (every 4th RAF) — full canvas repaint
    // (incl. heatmaps) is expensive; jitter is imperceptible above ~12 fps.
    _ambientDrawSkip = (_ambientDrawSkip + 1) % 4;
    if (_ambientDrawSkip === 0) {
      if (scrubFrame >= 0) {
        renderFrame(scrubFrame);
      } else {
        draw();
      }
    }
  }
  ambientId = requestAnimationFrame(ambientLoop);
}
ambientLoop();
iconAnimLoop();

// ── Hash-driven tab routing (applyHash is the ONLY source of truth) ──
// Re-establishes a known baseline UI before applying the per-hash branch
// so back/forward through hashes never accumulates stale mutations.
// Bound to both init and `hashchange` so URL navigation always updates the
// UI (issue #37).
function applyHash() {
  const tabA = document.getElementById('tabA');
  // Baseline: both tabs visible and clickable, default Tab A label.
  document.getElementById('tabB').style.display = '';
  tabA.textContent = 'Protons';
  tabA.style.pointerEvents = '';

  if (location.hash === '#nucleus' || location.hash === '#stability') {
    applyTab(false);
    neutronSlider.value = 2;
    placeNucleus(2, 2);
    updateCam();
  } else if (location.hash === '#protons') {
    document.getElementById('tabB').style.display = 'none';
    tabA.textContent = 'PROTONS';
    tabA.style.pointerEvents = 'none';
    applyTab(true);
  } else {
    applyTab(true);
  }
}
applyHash();
window.addEventListener('hashchange', applyHash);

// Apply force mode AFTER tab is set so currentTabIsProton is correct.
// setForceModeActive calls draw() itself when !running, so no extra draw() needed here.
setForceModeActive(arrowMode);

// ── Dev recording menu (right-click replay button) ───────────────────────────
(function() {
  const menu = document.createElement('div');
  menu.style.cssText = 'position:fixed;display:none;z-index:9999;background:#1a1a2e;border:1px solid rgba(255,255,255,0.2);border-radius:8px;padding:4px 0;min-width:160px;box-shadow:0 4px 16px rgba(0,0,0,0.6);font-family:Lexend,sans-serif;font-size:13px;';
  document.body.appendChild(menu);

  function menuItem(label) {
    const el = document.createElement('div');
    el.textContent = label;
    el.style.cssText = 'padding:8px 16px;cursor:pointer;color:rgba(255,255,255,0.85);white-space:nowrap;';
    el.addEventListener('mouseenter', () => el.style.background = 'rgba(255,255,255,0.08)');
    el.addEventListener('mouseleave', () => el.style.background = '');
    menu.appendChild(el);
    return el;
  }

  const recItem = menuItem('⏺  Export Replay');

  recItem.addEventListener('click', () => {
    menu.style.display = 'none';
    if (!_histLen) return;
    const chunks = [];
    const stream = canvas.captureStream(30);
    const recorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
    recorder.ondataavailable = e => { if (e.data.size) chunks.push(e.data); };
    recorder.onstop = () => {
      const url = URL.createObjectURL(new Blob(chunks, { type: 'video/webm' }));
      const a = document.createElement('a'); a.href = url; a.download = 'replay.webm'; a.click();
      URL.revokeObjectURL(url);
    };
    recorder.start();
    doReplay();
    let started = false;
    requestAnimationFrame(function poll() {
      if (!started && replaying) { started = true; }
      if (started && !replaying) { setTimeout(() => recorder.stop(), 200); return; }
      requestAnimationFrame(poll);
    });
  });

  document.getElementById('replayBtn').addEventListener('contextmenu', e => {
    e.preventDefault();
    menu.style.display = 'block';
    menu.style.left = e.clientX + 'px';
    menu.style.top  = e.clientY + 'px';
  });
  document.addEventListener('click', () => menu.style.display = 'none');
})();

// ── Quality selector ─────────────────────────────────────────────────────────
function _applyQuality(level) {
  _quality = level;
  const el = document.getElementById('qualitySelect');
  if (el) el.value = level;
}

function _runPerfBenchmark() {
  const oc = document.createElement('canvas');
  oc.width = 300; oc.height = 300;
  const dc = oc.getContext('2d');
  const R = PARTICLE_RADIUS;
  for (let i = 0; i < 15; i++) {
    const x = 15 + (i % 5) * 40, y = 15 + Math.floor(i / 5) * 40;
    const g = dc.createRadialGradient(x, y, 0, x, y, R);
    g.addColorStop(0, '#ff1a65'); g.addColorStop(1, 'rgba(0,0,0,0)');
    dc.fillStyle = g; dc.beginPath(); dc.arc(x, y, R, 0, Math.PI * 2); dc.fill();
  }
  const t0 = performance.now();
  for (let i = 0; i < 100; i++) {
    const x = 15 + (i % 10) * 27, y = 15 + Math.floor(i / 10) * 27;
    const g1 = dc.createRadialGradient(x, y, 0, x, y, R * 1.1);
    g1.addColorStop(0, '#ff1a65'); g1.addColorStop(0.82, '#ff1a65'); g1.addColorStop(1, 'rgba(0,0,0,0)');
    dc.fillStyle = g1; dc.beginPath(); dc.arc(x, y, R * 1.1, 0, Math.PI * 2); dc.fill();
    const g2 = dc.createRadialGradient(x, y, 0, x, y, R);
    g2.addColorStop(0, '#ff80b0'); g2.addColorStop(0.5, '#ff80b0'); g2.addColorStop(1, 'rgba(0,0,0,0)');
    dc.save(); dc.shadowColor = '#ff80b0'; dc.shadowBlur = 8; dc.globalAlpha = 0.82;
    dc.fillStyle = g2; dc.beginPath(); dc.arc(x, y, R, 0, Math.PI * 2); dc.fill();
    dc.restore(); dc.globalAlpha = 1;
  }
  dc.getImageData(0, 0, 1, 1);
  return performance.now() - t0;
}

(function _startupBenchmark() {
  const ms = _runPerfBenchmark();
  if (ms > 6) {
    const hiOpt = document.querySelector('#qualitySelect option[value="hi-res"]');
    if (hiOpt) hiOpt.remove();
    _applyQuality('simple');
  } else if (ms > 3) {
    _applyQuality('detailed');
  }
}());

document.getElementById('qualitySelect').addEventListener('change', function() {
  _applyQuality(this.value);
});

// ── Bug report button ─────────────────────────────────────────────────────
function getBugState() {
  return {
    sim:              'v11',
    tab:              currentTab,
    strongForce:      strongForceStrength,
    strongRange:      strongForceRange,
    zoom:             +zoom.toFixed(3),
    camX:             Math.round(camX),
    camY:             Math.round(camY),
    running,
    arrowMode:        typeof arrowMode !== 'undefined' ? arrowMode : null,
    showElecField:    document.getElementById('electricFieldToggle')?.checked,
    showStrongField:  document.getElementById('strongFieldToggle')?.checked,
    particleCount:    particles.length,
    particles: particles.map(p => ({
      t: p.type, x: Math.round(p.x), y: Math.round(p.y),
      vx: +p.vx.toFixed(3), vy: +p.vy.toFixed(3),
    })),
    actionLog: actionLog.slice(),
  };
}
document.getElementById('bugReportBtn').addEventListener('click', e => {
  e.preventDefault();
  const state = encodeURIComponent(JSON.stringify(getBugState()));
  const url   = `https://ghostoutfit.github.io/protons/dev/bug-report.html?sim=nucleus&sourceUrl=${encodeURIComponent(location.href)}&state=${state}`;
  document.getElementById('bugModalFrame').src = url;
  document.getElementById('bugModal').style.display = 'flex';
});
function closeBugModal() {
  document.getElementById('bugModal').style.display = 'none';
  document.getElementById('bugModalFrame').src = 'about:blank';
}
document.getElementById('bugModal').addEventListener('click', e => {
  if (e.target === document.getElementById('bugModal')) closeBugModal();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && document.getElementById('bugModal').style.display === 'flex') closeBugModal();
});
</script>

(function() {
  const IMG_W = 1150, IMG_H = 820;
  function positionAllHotspots() {
    const container = document.getElementById('allTitleContainer');
    const hotspots  = document.getElementById('allHotspots');
    if (!container || !hotspots) return;
    const cw = container.clientWidth, ch = container.clientHeight;
    const scale = Math.min(cw / IMG_W, ch / IMG_H);
    const dw = IMG_W * scale, dh = IMG_H * scale;
    const dx = (cw - dw) / 2, dy = (ch - dh) / 2;
    hotspots.style.left   = dx + 'px';
    hotspots.style.top    = dy + 'px';
    hotspots.style.width  = dw + 'px';
    hotspots.style.height = dh + 'px';

  document.getElementById('allTitle').addEventListener('load', positionAllHotspots);
  window.addEventListener('resize', positionAllHotspots);

  function applyAllHash() {
    const show = location.hash === '#all';
    document.getElementById('allModal').style.display = show ? 'block' : 'none';

  window.addEventListener('hashchange', applyAllHash);

})();
