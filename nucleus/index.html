<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Protons Nucleus Digital Model</title>
<link rel="icon" type="image/png" href="images/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ========================================
     THEME VARIABLES  (default: Synthwave)
     ======================================== */
  :root {
    --accent1:      #ff2d78;
    --accent1-dim:  rgba(255,45,120,0.25);
    --accent1-glow: rgba(255,45,120,0.55);
    --accent2:      #1a6eff;
    --accent2-dim:  rgba(26,110,255,0.18);
    --accent2-glow: rgba(26,110,255,0.45);
    --ui-bg:        rgba(8, 6, 24, 0.38);
    --ui-border:    rgba(255,255,255,0.07);
    --text-dim:     rgba(220,215,255,0.55);
    --text-bright:  rgba(240,235,255,0.92);
    --speck-color:  rgba(180,130,255,0.35);
    --neutron-core: #b0b0c4;
    --neutron-mid:  #70707f;
    --neutron-edge: #383848;
  }

  /* ========================================
     RESET & BASE
     ======================================== */
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #05040f;
    color: var(--text-bright);
    font-family: 'Lexend', sans-serif;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
  }
  button, input, select, textarea {
    font-family: 'Lexend', sans-serif;
  }

  /* ========================================
     FULL-VIEWPORT CANVAS
     ======================================== */
  #main {
    position: fixed;
    top: 0; left: 0; right: 0;
    bottom: 76px;  /* stop above scrubBar so the slider receives events */
    z-index: 0;
  }

  #canvas {
    display: block;
    cursor: default;
  }

  /* ========================================
     TOOLBAR — floating glass overlay
     ======================================== */
  #toolbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 10;
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 10px 20px 10px;
    background: var(--ui-bg);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }

  .toolbar-row {
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }

  #toolbar h1 {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--accent1);
    margin-right: 6px;
    white-space: nowrap;
    text-shadow: 0 0 12px var(--accent1-glow);
  }

  /* ========================================
     SCRUB BAR — floating glass overlay at bottom
     ======================================== */
  #scrubBar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 10;
    height: 76px;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 103px 0 16px;
    background: var(--ui-bg);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border-top: 1px solid var(--ui-border);
    box-shadow: 0 -1px 0 var(--accent1-dim), 0 -4px 20px rgba(0,0,0,0.5);
  }
  #scrubBar .scrub-label {
    font-size: 11px;
    color: var(--text-dim);
    white-space: nowrap;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  #timeSlider {
    flex: 1;
    height: 6px;
    accent-color: var(--accent1);
    cursor: pointer;
    opacity: 0.8;
  }
  #timeSlider:disabled { opacity: 0.18; cursor: not-allowed; }

  /* ========================================
     PARTICLE FRAMES — borderless glass
     ======================================== */
  .particle-frame {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--ui-border);
    border-radius: 10px;
    box-shadow: 0 0 10px var(--accent1-dim), inset 0 0 8px rgba(0,0,0,0.3);
    padding: 7px 14px 9px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }

  .particle-frame-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    color: var(--text-dim);
    text-transform: uppercase;
    text-align: center;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ========================================
     PARTICLE ICONS — canvas-drawn to match the sim exactly
     ======================================== */
  .particle-icon-canvas {
    display: block;
    flex-shrink: 0;
  }

  .particle-frame-controls {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  /* ========================================
     BUTTONS — full neon sign treatment
     Inactive base: dead tube. Active variants: full tube + bloom.
     ======================================== */
  .btn {
    padding: 4px 14px;
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 8px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    background: transparent;
    color: rgba(255,255,255,0.18);
    box-shadow: none;
    text-shadow: none;
    white-space: nowrap;
  }
  .btn:hover {
    color: rgba(255,255,255,0.38);
    border-color: rgba(255,255,255,0.12);
  }

  /* accent1 neon (pink) — particle add, btn-neon1 */
  .btn-neon1,
  .particle-add-btn,
  #neutronDecBtn,
  #neutronIncBtn {
    border-color: var(--accent1);
    color: rgba(255,255,255,0.5);
    background: var(--accent1-dim);
    box-shadow:
      inset 0 0 6px var(--accent1-dim),
      0 0 2px var(--accent1),
      0 0 8px var(--accent1),
      0 0 18px var(--accent1-glow),
      0 0 40px var(--accent1-dim),
      0 0 70px var(--accent1-dim);
    text-shadow:
      0 0 4px rgba(255,255,255,0.5),
      0 0 10px var(--accent1),
      0 0 22px var(--accent1-glow),
      0 0 44px var(--accent1-dim);
  }
  .btn-neon1:hover,
  .particle-add-btn:hover,
  #neutronDecBtn:hover,
  #neutronIncBtn:hover {
    background: var(--accent1-glow);
    color: rgba(255,255,255,0.5);
    box-shadow:
      inset 0 0 10px var(--accent1-glow),
      0 0 4px var(--accent1),
      0 0 14px var(--accent1),
      0 0 28px var(--accent1-glow),
      0 0 60px var(--accent1-dim),
      0 0 100px var(--accent1-dim);
  }

  /* accent2 neon (cyan/violet) — btn-neon2 only */
  .btn-neon2 {
    border-color: var(--accent2);
    color: rgba(255,255,255,0.5);
    background: var(--accent2-dim);
    box-shadow:
      inset 0 0 6px var(--accent2-dim),
      0 0 2px var(--accent2),
      0 0 8px var(--accent2),
      0 0 18px var(--accent2-glow),
      0 0 40px var(--accent2-dim),
      0 0 70px var(--accent2-dim);
    text-shadow:
      0 0 4px rgba(255,255,255,0.5),
      0 0 10px var(--accent2),
      0 0 22px var(--accent2-glow),
      0 0 44px var(--accent2-dim);
  }
  .btn-neon2:hover {
    background: var(--accent2-glow);
    color: rgba(255,255,255,0.5);
    box-shadow:
      inset 0 0 10px var(--accent2-glow),
      0 0 4px var(--accent2),
      0 0 14px var(--accent2),
      0 0 28px var(--accent2-glow),
      0 0 60px var(--accent2-dim),
      0 0 100px var(--accent2-dim);
  }

  /* Go idle (▶) — accent2 themed */
  #goBtn {
    border-color: var(--accent2);
    color: rgba(255,255,255,0.5);
    background: var(--accent2-dim);
    box-shadow:
      inset 0 0 6px var(--accent2-dim),
      0 0 2px var(--accent2),
      0 0 8px var(--accent2),
      0 0 18px var(--accent2-glow),
      0 0 40px var(--accent2-dim),
      0 0 70px var(--accent2-dim);
    text-shadow:
      0 0 4px rgba(255,255,255,0.5),
      0 0 10px var(--accent2),
      0 0 22px var(--accent2-glow),
      0 0 44px var(--accent2-dim);
    display: flex; align-items: center; justify-content: center;
  }
  #goBtn:hover { background: var(--accent2-glow); }
  /* Go running (❙ ❙) — red */
  #goBtn.running {
    border-color: #ff4040;
    color: rgba(255,255,255,0.5);
    background: rgba(255,40,40,0.15);
    box-shadow:
      inset 0 0 6px rgba(255,40,40,0.2),
      0 0 2px #ff4040,
      0 0 8px #ff4040,
      0 0 18px rgba(255,40,40,0.5),
      0 0 40px rgba(255,40,40,0.2);
    text-shadow: 0 0 4px rgba(255,255,255,0.5), 0 0 10px #ff4040, 0 0 22px rgba(255,80,80,0.6);
  }
  #goBtn.running:hover { background: rgba(255,40,40,0.3); }

  /* Clear — accent2 themed */
  #clearBtn {
    border-color: var(--accent2);
    color: rgba(255,255,255,0.5);
    background: var(--accent2-dim);
    box-shadow:
      inset 0 0 6px var(--accent2-dim),
      0 0 2px var(--accent2),
      0 0 8px var(--accent2),
      0 0 18px var(--accent2-glow),
      0 0 40px var(--accent2-dim);
    text-shadow:
      0 0 4px rgba(255,255,255,0.5),
      0 0 10px var(--accent2),
      0 0 22px var(--accent2-glow);
  }
  #clearBtn:hover { background: var(--accent2-glow); }

  /* Replay — same red as Stop */
  #replayBtn {
    border-color: #ff4040;
    color: rgba(255,255,255,0.5);
    background: rgba(255,40,40,0.15);
    box-shadow:
      inset 0 0 6px rgba(255,40,40,0.2),
      0 0 2px #ff4040,
      0 0 8px #ff4040,
      0 0 18px rgba(255,40,40,0.5),
      0 0 40px rgba(255,40,40,0.2);
    text-shadow: 0 0 4px rgba(255,255,255,0.5), 0 0 10px #ff4040, 0 0 22px rgba(255,80,80,0.6);
  }
  #replayBtn:hover { background: rgba(255,40,40,0.3); }
  #replayBtn:disabled {
    background: transparent;
    border-color: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.18);
    box-shadow: none;
    text-shadow: none;
    cursor: not-allowed;
  }

  /* Mini replay in scrub bar */
  #scrubReplayBtn {
    font-size: 32px;
    border-color: #ff4040;
    color: rgba(255,255,255,0.5);
    background: rgba(255,40,40,0.15);
    box-shadow:
      inset 0 0 4px rgba(255,40,40,0.2),
      0 0 2px #ff4040,
      0 0 8px rgba(255,40,40,0.5),
      0 0 14px rgba(255,40,40,0.4);
    text-shadow: 0 0 4px rgba(255,255,255,0.5), 0 0 8px #ff4040;
  }
  #scrubReplayBtn:hover { background: rgba(255,40,40,0.3); }
  #scrubReplayBtn:disabled {
    background: transparent;
    border-color: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.18);
    box-shadow: none;
    text-shadow: none;
    cursor: not-allowed;
  }


  /* Go / Replay — squished symbol buttons */
  #goBtn, #replayBtn { font-size: 24px; letter-spacing: 0; padding: 7px 0; width: 90px; line-height: 1; }

  /* Neutron slider — grey to distinguish from sim speed/zoom */
  #neutronSlider {
    box-shadow: 0 0 4px rgba(160,160,185,0.35), 0 0 10px rgba(160,160,185,0.15);
  }
  #neutronSlider::-webkit-slider-thumb {
    background: #9090a8;
    box-shadow: 0 0 3px #9090a8, 0 0 8px rgba(150,150,180,0.5), 0 0 18px rgba(150,150,180,0.2);
  }
  #neutronSlider::-moz-range-thumb {
    background: #9090a8;
    box-shadow: 0 0 3px #9090a8, 0 0 8px rgba(150,150,180,0.5);
  }

  /* ========================================
     CTRL BOXES — pink and blue bordered panels
     ======================================== */
  .ctrl-box-pink {
    display: flex; align-items: center; align-self: stretch;
    gap: 14px; padding: 10px 16px;
    background: rgba(255,45,120,0.07);
    border: 1px solid rgba(255,45,120,0.22);
    border-radius: 12px;
    position: relative;
  }
  .ctrl-box-blue {
    display: flex; align-items: center; align-self: stretch;
    gap: 18px; padding: 10px 16px;
    background: var(--accent2-dim);
    border: 1px solid var(--accent2);
    border-radius: 12px;
    position: relative;
  }
  .ctrl-box-label {
    position: absolute;
    bottom: 100%;
    margin-bottom: 3px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    line-height: 1;
    pointer-events: none;
  }
  .ctrl-box-label-pink {
    right: 14px;
    color: rgba(255,45,120,0.8);
    text-shadow: 0 0 6px rgba(255,45,120,0.6), 0 0 16px rgba(255,45,120,0.3);
  }
  .ctrl-box-label-blue {
    left: 14px;
    color: var(--accent2);
    opacity: 0.8;
    text-shadow: 0 0 6px var(--accent2-glow), 0 0 16px var(--accent2-dim);
  }
  .ctrl-box-blue input[type="range"] { width: 150px; }
  .ctrl-box-blue .slider-icon { font-size: 28px; }
  .ctrl-box-blue .toggle-label { font-size: 13px; gap: 6px; }
  .ctrl-box-blue .awheel-item { font-size: 13px; padding: 5px 14px; }

  /* ========================================
     SLIDERS — neon tube aesthetic
     Track: dim line with a faint glow
     Thumb: thin bright pill with bloom shadow
     ======================================== */
  /* Periodic table element buttons (nucleus tab only) */
  .element-btn {
    position: relative;
    width: 38px;
    height: 47px;
    padding: 0;
    border: 1px solid var(--accent1);
    border-radius: 5px;
    background: var(--accent1-dim);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    text-transform: none;
    box-shadow:
      inset 0 0 6px var(--accent1-dim),
      0 0 2px var(--accent1),
      0 0 8px var(--accent1),
      0 0 18px var(--accent1-glow),
      0 0 40px var(--accent1-dim);
    transition: all 0.2s;
  }
  .element-btn:hover {
    background: var(--accent1-glow);
    box-shadow:
      inset 0 0 10px var(--accent1-glow),
      0 0 4px var(--accent1),
      0 0 14px var(--accent1),
      0 0 28px var(--accent1-glow),
      0 0 60px var(--accent1-dim);
  }
  .element-btn .el-num {
    position: absolute;
    top: 3px;
    left: 4px;
    font-size: 12px;
    font-family: 'Lexend', sans-serif;
    font-weight: 400;
    line-height: 1;
    color: rgba(255,255,255,0.55);
    text-shadow: none;
    letter-spacing: 0;
  }
  .element-btn .el-sym {
    font-size: 15px;
    font-weight: 700;
    color: rgba(255,255,255,0.85);
    text-shadow:
      0 0 4px rgba(255,255,255,0.5),
      0 0 10px var(--accent1),
      0 0 22px var(--accent1-glow);
    letter-spacing: 0;
    line-height: 1;
    margin-top: 10px;
  }

  #particleBtns .particle-add-btn {
    width: 38px;
    height: 47px;
    padding: 0;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0;
    border-radius: 5px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(255,255,255,0.85);
    text-shadow:
      0 0 4px rgba(255,255,255,0.5),
      0 0 10px var(--accent1),
      0 0 22px var(--accent1-glow);
  }

  .neutron-slider-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1;
  }
  .neutron-slider-wrap #neutronSlider {
    flex: 1;
    min-width: 0;
  }

  .neutron-slider-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--accent2);
    text-shadow: 0 0 6px var(--accent2-glow);
    min-width: 2em;
    font-variant-numeric: tabular-nums;
  }

  /* Shared track style for all range inputs */
  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    height: 5px;
    border-radius: 3px;
    background: rgba(255,255,255,0.10);
    box-shadow:
      0 0 4px var(--accent2),
      0 0 12px var(--accent2-glow),
      0 0 28px var(--accent2-dim);
    outline: none;
    cursor: pointer;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 10px;
    height: 26px;
    border-radius: 3px;
    background: var(--accent2);
    border: none;
    box-shadow:
      0 0 3px var(--accent2),
      0 0 10px var(--accent2-glow),
      0 0 24px var(--accent2-dim),
      0 0 44px var(--accent2-dim);
    cursor: grab;
    transition: box-shadow 0.15s;
  }
  input[type="range"]::-webkit-slider-thumb:active {
    cursor: grabbing;
    box-shadow:
      0 0 4px var(--accent2),
      0 0 18px var(--accent2-glow),
      0 0 40px var(--accent2-dim),
      0 0 70px var(--accent2-dim);
  }
  input[type="range"]::-moz-range-thumb {
    width: 10px; height: 26px;
    border-radius: 3px;
    background: var(--accent2);
    border: none;
    box-shadow: 0 0 3px var(--accent2), 0 0 10px var(--accent2-glow), 0 0 24px var(--accent2-dim);
    cursor: grab;
  }

  #neutronSlider { width: auto; }

  /* ========================================
     SLIDER GROUPS & TOGGLES
     ======================================== */
  .slider-group {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .slider-group label {
    font-size: 10px;
    color: var(--text-dim);
    white-space: nowrap;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0px;
  }
  .slider-group label span {
    display: inline-block;
    min-width: 3em;
    text-align: right;
    color: var(--accent2);
    text-shadow: 0 0 5px var(--accent2-glow);
  }
  .slider-group input[type="range"] { width: 72px; }

  .toggle-label {
    font-size: 10px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 5px;
    cursor: pointer;
    white-space: nowrap;
  }
  .toggle-label input[type="checkbox"] { accent-color: var(--accent1); }

  /* ========================================
     SLIDER ICONS (turtle / rabbit / magnifier)
     ======================================== */
  .slider-icon {
    font-size: 23px;
    line-height: 1;
    user-select: none;
    filter:
      brightness(0) invert(1)
      blur(0.75px)
      opacity(0.7)
      drop-shadow(0 0 5px var(--accent2))
      drop-shadow(0 0 14px var(--accent2))
      drop-shadow(0 0 28px var(--accent2-glow))
      drop-shadow(0 0 50px var(--accent2-glow))
      drop-shadow(0 0 80px var(--accent2-glow));
  }

  /* ========================================
     FIELD TOGGLE LABELS — neon text treatment
     ======================================== */
  .field-label-electric {
    color: #46a5ff;
    text-shadow:
      0 0 4px #46a5ff,
      0 0 10px rgba(70,165,255,0.5),
      0 0 22px rgba(70,165,255,0.2);
  }
  .field-label-strong {
    color: #ffb946;
    text-shadow:
      0 0 4px #ffb946,
      0 0 10px rgba(255,185,70,0.5),
      0 0 22px rgba(255,185,70,0.2);
  }

  /* ========================================
     FORCE MODE BUTTONS — always-visible, gray/blue
     ======================================== */
  .force-mode-btn {
    display: block;
    padding: 3px 11px;
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 5px;
    background: transparent;
    color: rgba(255,255,255,0.25);
    font-size: 14px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    white-space: nowrap;
    letter-spacing: 0.4px;
    transition: color 0.12s, border-color 0.12s, background 0.12s;
  }
  .force-mode-btn:hover:not(.active) {
    color: rgba(255,255,255,0.55);
    border-color: rgba(255,255,255,0.28);
  }
  .force-mode-btn.active {
    color: var(--accent2);
    border-color: var(--accent2);
    background: var(--accent2-dim);
    box-shadow: 0 0 6px var(--accent2-glow);
    text-shadow: 0 0 8px var(--accent2-glow);
  }
  .force-mode-btn.show-forces-large {
    /* Default (blue/purple themes): solid filled */
    background: var(--accent2);
    color: rgba(255,255,255,0.95);
    border-color: var(--accent2);
    box-shadow: 0 0 10px var(--accent2-glow);
    text-shadow: none;
    padding: 28px 11px;
    width: 100%;
  }
  /* Teal theme: use highlighted active look instead of solid fill */
  body.theme-teal .force-mode-btn.show-forces-large {
    background: var(--accent2-dim);
    color: var(--accent2);
    box-shadow: 0 0 6px var(--accent2-glow);
    text-shadow: 0 0 8px var(--accent2-glow);
  }

  /* ========================================
     FORCE PANEL — right-side overlay
     ======================================== */
  #forcePanel {
    display: none;
    position: fixed;
    right: 0;
    top: 200px;
    border-radius: 12px 0 0 12px;
    width: 480px;
    background: rgba(8,6,24,0.90);
    border: 1px solid var(--accent2);
    border-radius: 12px;
    z-index: 15;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    padding: 10px 10px 8px;
    box-shadow: 0 0 24px var(--accent2-dim);
    cursor: grab;

<script>
// ============================================================
//  DOM ELEMENT REFERENCES
// ============================================================
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const goBtn = document.getElementById('goBtn');
const replayBtn = document.getElementById('replayBtn');
const scrubReplayBtn = document.getElementById('scrubReplayBtn');
const frameCounterEl = document.getElementById('frameCounter');
function updateFrameCounter(current, total) {
  frameCounterEl.textContent = current != null ? `${current} / ${total}` : total;
}
const speedSlider = document.getElementById('speedSlider');
const zoomSlider  = document.getElementById('zoomSlider');
const statProtons = document.getElementById('statProtons');
const statNeutrons = document.getElementById('statNeutrons');
const timeSlider  = document.getElementById('timeSlider');
const protonIconCanvas  = document.getElementById('protonIconCanvas');
const neutronIconCanvas = document.getElementById('neutronIconCanvas');

// ============================================================
//  SIMULATION STATE
//  All mutable state lives here. Particles are plain objects:
//  { x, y, vx, vy, type: 'proton'|'neutron' }
// ============================================================
let particles = [];
let running = false;
let _quality = 'hi-res';  // 'hi-res' | 'detailed' | 'simple'
let animId = null;

// ── Perf / lag detection ──────────────────────────────────────────────────────
let _lagEma = 0, _lagDetected = false, _lagSkip = 0;
let speed = 1.5;  // Internal dt per frame (display speed = speed * 2)
let recordedSpeed = 1.5;  // speed at which the current recording was made; used to normalise replay rate
let replayLocked = false; // true once user enters replay/scrub mode; Go no longer re-engages live recording

// ---- Time scrubber ----
const MAX_HISTORY = 4000;
// Ring buffer for particle history (fixes O(n) shift and per-frame object allocation).
// Each slot holds {n, data: Float32Array} where data = [x,y,vx,vy,type(0/1), ...] per particle.
const _histBuf = new Array(MAX_HISTORY);
let _histHead = 0;   // index of the oldest entry in _histBuf
let _histLen  = 0;   // number of valid entries
// Compact helpers so call sites can use a particleHistory-like API:
// particleHistory.length  → _histLen
// particleHistory[idx]    → _histGet(idx)   (0 = oldest)
// particleHistory.push()  → _histPush(frame)
// particleHistory = []    → _histReset()
function _histGet(idx) { return _histBuf[(_histHead + idx) % MAX_HISTORY]; }
function _histReset() { _histHead = 0; _histLen = 0; }
function _histPush(frame) {
  if (_histLen < MAX_HISTORY) {
    _histBuf[(_histHead + _histLen) % MAX_HISTORY] = frame;
    _histLen++;
  } else {
    // Buffer full: overwrite oldest slot and advance head
    _histBuf[_histHead] = frame;
    _histHead = (_histHead + 1) % MAX_HISTORY;
  }
}
// Snapshot helpers: serialize particles to a compact typed buffer (avoids N object allocations per frame).
const HIST_FIELDS = 5; // x, y, vx, vy, type(0=proton,1=neutron)
function _snapshotParticles(ps) {
  const n = ps.length;
  const data = new Float32Array(n * HIST_FIELDS);
  for (let i = 0; i < n; i++) {
    const p = ps[i], o = i * HIST_FIELDS;
    data[o]   = p.x;
    data[o+1] = p.y;
    data[o+2] = p.vx;
    data[o+3] = p.vy;
    data[o+4] = p.type === 'proton' ? 0 : 1;
  }
  return { n, data, t: performance.now() };  // wall-clock time for timestamp-based replay
}
function _restoreParticles(frame) {
  const { n, data } = frame;
  const ps = new Array(n);
  for (let i = 0; i < n; i++) {
    const o = i * HIST_FIELDS;
    ps[i] = { x: data[o], y: data[o+1], vx: data[o+2], vy: data[o+3],
               type: data[o+4] === 0 ? 'proton' : 'neutron' };
  }
  return ps;
}
let scrubFrame = -1;
let replaying = false;  // true while auto-playing back recorded history

function maxStableNeutrons(z) {
  if (z <= 0) return 0;
  return NUCLEUS_TABLE[z] ? NUCLEUS_TABLE[z].maxN : Math.floor(z * 1.5);
}
function minStableNeutrons(z) {
  if (z <= 0) return 0;
  return NUCLEUS_TABLE[z] ? NUCLEUS_TABLE[z].minN : 0;
}

const QUANTUM_ESCAPE_SPEED = 4.0;  // px/frame for ejected neutron
const COHESION_K = 0.004;          // Spring constant toward cluster CM (Quantum tab only)
let quantumEjectAt      = null;    // performance.now() when next ejection fires
let quantumTimerStartAt = null;    // when current timer began
let loopFrame           = 0;       // increments each live physics frame
let stabilityCheckFrame = null;    // loopFrame value at which to re-evaluate biggest cluster
let quantumFlashes      = [];      // [{x,y,startTime}] brief ejection flashes

function ejectDelayRange(excessRatio) {
  if (excessRatio >= 4) return [ 20,  50];
  if (excessRatio >= 3) return [ 50, 100];
  if (excessRatio >= 2) return [100, 200];
  if (excessRatio >= 1) return [200, 400];
  return                       [400, 800];
}

function ejectCount(excessRatio) {
  if (excessRatio >= 4) return 4;
  if (excessRatio >= 3) return 3;
  if (excessRatio >= 2) return 2;
  return 1;
}

function updateQuantumStability() {
  if (currentTab !== 'nucleus') return;

  for (const p of particles) {
    if (!p.ejected) { p.unstable = false; p.strongScale = 1.0; }
  }

  // Evaluate each cluster independently; cache each cluster's CM on its particles
  // so step() can apply the cohesion spring without re-clustering every substep.
  const clusters = findAllClusters();
  for (const cluster of clusters) {
    let cmx = 0, cmy = 0;
    for (const p of cluster) { cmx += p.x; cmy += p.y; }
    cmx /= cluster.length; cmy /= cluster.length;
    for (const p of cluster) { p.clusterCmx = cmx; p.clusterCmy = cmy; }
  }

  let maxExcessRatio = 0;
  const unstableClusters = [];

  for (const cluster of clusters) {
    const Z       = cluster.filter(p => p.type === 'proton').length;
    const neutrons = cluster.filter(p => p.type === 'neutron');
    const excess  = neutrons.length - maxStableNeutrons(Z);
    if (excess <= 0) continue;

    const excessRatio = Z > 0 ? excess / Z : excess;
    if (excessRatio > maxExcessRatio) maxExcessRatio = excessRatio;

    let cx = 0, cy = 0;
    for (const p of cluster) { cx += p.x; cy += p.y; }
    cx /= cluster.length; cy /= cluster.length;

    const protons = cluster.filter(p => p.type === 'proton');
    const sorted = neutrons.map(p => {
      let nearestDist = Infinity;
      for (const pr of protons) {
        const d = Math.hypot(p.x - pr.x, p.y - pr.y);
        if (d < nearestDist) nearestDist = d;
      }
      if (!isFinite(nearestDist)) nearestDist = Math.hypot(p.x - cx, p.y - cy);
      return { p, d: nearestDist };
    }).sort((a, b) => b.d - a.d);

    for (let i = 0; i < excess; i++) {
      sorted[i].p.unstable    = true;
      sorted[i].p.strongScale = 0.2;
    }

    unstableClusters.push({ cluster, sorted, excess, excessRatio, cx, cy });
  }

  if (unstableClusters.length === 0) {
    quantumEjectAt = quantumTimerStartAt = null;
    return;
  }

  const now = performance.now();
  if (quantumEjectAt === null) {
    const [lo, hi] = ejectDelayRange(maxExcessRatio);
    quantumTimerStartAt = now;
    quantumEjectAt      = now + lo + Math.random() * (hi - lo);
  } else if (now >= quantumEjectAt) {
    // Eject from every unstable cluster simultaneously
    for (const { cluster, sorted, excessRatio, cx, cy } of unstableClusters) {
      const count   = Math.min(ejectCount(excessRatio), sorted.length);
      const targets = sorted.slice(0, count).map(s => s.p);
      let totalRecoilVx = 0, totalRecoilVy = 0;

      for (const target of targets) {
        const dx = target.x - cx, dy = target.y - cy;
        const d  = Math.sqrt(dx * dx + dy * dy);
        const nx = d > 0.01 ? dx / d : Math.random() * 2 - 1;
        const ny = d > 0.01 ? dy / d : Math.random() * 2 - 1;
        target.vx = nx * QUANTUM_ESCAPE_SPEED;
        target.vy = ny * QUANTUM_ESCAPE_SPEED;
        target.ejected = true; target.unstable = false; target.strongScale = 0;
        delete target.clusterCmx; delete target.clusterCmy;
        totalRecoilVx -= target.vx; totalRecoilVy -= target.vy;
        quantumFlashes.push({ x: target.x, y: target.y, startTime: now });
      }

      const remaining = cluster.filter(p => !p.ejected);
      if (remaining.length > 0) {
        const rvx = totalRecoilVx / remaining.length;
        const rvy = totalRecoilVy / remaining.length;
        for (const p of remaining) { p.vx += rvx; p.vy += rvy; }
      }
    }
    quantumEjectAt = quantumTimerStartAt = null;
  }
}

// Cached result of findBiggestCluster() — set by applyBiggestClusterStability() each
// frame so updateStats() can reuse it without a second O(n²) traversal (issue #44).
let _cachedBiggestCluster = null;

// Watch the biggest cluster; if N < minN for its Z, drop strong force to the
// table value and re-evaluate after 5 frames to let loose particles drift away.
function applyBiggestClusterStability() {
  if (currentTab !== 'nucleus') return;

  if (stabilityCheckFrame !== null) {
    if (loopFrame < stabilityCheckFrame) return;
    stabilityCheckFrame = null;
  }

  const cluster = findBiggestCluster();
  _cachedBiggestCluster = cluster;
  if (cluster.length === 0) return;

  const Z = cluster.filter(p => p.type === 'proton').length;
  const N = cluster.filter(p => p.type === 'neutron').length;
  const row = NUCLEUS_TABLE[Z];
  if (!row) return;

  if (N < row.minN) {
    strongForceStrength = row.strong;
    stabilityCheckFrame = loopFrame + 5;
  } else if (N <= row.maxN) {
    // Stable isotope range — snap strong force to 1
    if (strongForceStrength !== 1) strongForceStrength = 1;
  } else if (strongForceStrength !== strongForceBaseline) {
    strongForceStrength = strongForceBaseline;
  }
}

// ============================================================
//  PARTICLE HELPERS: create, position, hit-test
// ============================================================
function createParticle(x, y, type) {
  return { x, y, vx: 0, vy: 0, type: type || 'proton' };
}

function getCanvasPos(e) {
  const rect = canvas.getBoundingClientRect();
  const sx = e.clientX - rect.left;
  const sy = e.clientY - rect.top;
  // Invert the centered zoom + camera transform applied in draw()
  const cx = canvas.width / 2;
  const cy = canvas.height / 2;
  return { x: (sx - camX - cx) / zoom + cx, y: (sy - camY - cy) / zoom + cy };
}

function findParticleAt(x, y) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    const dx = p.x - x;
    const dy = p.y - y;
    if (dx * dx + dy * dy <= (PARTICLE_RADIUS + 4) * (PARTICLE_RADIUS + 4)) {  // +4px hit margin
      return i;
    }
  }
  return -1;
}

// ============================================================
//  OVERLAP RESOLUTION
//  Iterative position-correction pass: push overlapping pairs
//  apart by half the overlap distance, up to 10 iterations.
//  Used after placing or adding particles, not during physics
//  (the physics step handles collisions with its own constraint).
// ============================================================
function separateOverlaps() {
  const minSep = PARTICLE_RADIUS * 2;
  for (let iter = 0; iter < 10; iter++) {
    let moved = false;
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const a = particles[i];
        const b = particles[j];
        let dx = b.x - a.x;
        let dy = b.y - a.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < minSep && dist > 0) {
          const overlap = (minSep - dist) / 2;
          const nx = dx / dist;
          const ny = dy / dist;
          a.x -= nx * overlap;
          a.y -= ny * overlap;
          b.x += nx * overlap;
          b.y += ny * overlap;
          moved = true;
        } else if (dist === 0) {
          b.x += (Math.random() - 0.5) * minSep;
          b.y += (Math.random() - 0.5) * minSep;
          moved = true;
        }
      }
    }
    if (!moved) break;
  }
}

// ============================================================
//  CANVAS MOUSE EVENTS
//  mousedown  — start dragging an existing particle (or deselect)
//  mousemove  — drag particle / initiate bucket drag once threshold met
//  mouseup    — drop particle; delete if released over trash can
//  click      — place a new particle of the selected type on empty space
//  didDrag flag prevents click from firing after a drag release
// ============================================================
let didDrag = false;
canvas.addEventListener('mousedown', (e) => {
  const pos = getCanvasPos(e);
  didDrag = false;
  const idx = findParticleAt(pos.x, pos.y);
  if (idx >= 0) {
    // Hovering a particle — drag it regardless of mode
    dragging = idx;
    dragOffsetX = particles[idx].x - pos.x;
    dragOffsetY = particles[idx].y - pos.y;
    // Only kill velocity immediately when the sim is running — grabbing a
    // moving particle should stop it. When paused, a click is just selection;
    // velocity is zeroed by mousemove only if the user actually drags.
    if (running) { particles[idx].vx = 0; particles[idx].vy = 0; }
    canvas.style.cursor = 'grabbing';
    if (!groupSelectMode) { selectedParticle = idx; }
    if (!running) draw();
  } else if (groupSelectMode) {
    // Empty space in group mode — start rubber-band selection
    selBox = { x1: pos.x, y1: pos.y, x2: pos.x, y2: pos.y };
  } else {
    selectedParticle = null;
    if (!running) draw();
  }
});

let _lastCursorCheck = 0;
window.addEventListener('mousemove', (e) => {
  const pos = getCanvasPos(e);
  if (dragging !== null) {
    // Dragging a particle — works in both modes; always process drag events
    const p = particles[dragging];
    didDrag = true;
    p.x = pos.x + dragOffsetX;
    p.y = pos.y + dragOffsetY;
    p.vx = 0;
    p.vy = 0;
    if (!running) { computeEnergy(); draw(); }
    return;
  }
  if (groupSelectMode) {
    if (selBox) {
      selBox.x2 = pos.x; selBox.y2 = pos.y;
      didDrag = true;
      if (!running) draw();
    }
    // Throttle cursor-update scan to ~60fps
    const _now = Date.now();
    if (_now - _lastCursorCheck >= 16) {
      _lastCursorCheck = _now;
      const hover = findParticleAt(pos.x, pos.y);
      canvas.style.cursor = hover >= 0 ? 'grab' : 'crosshair';
    }
    return;
  }
  // Throttle cursor-update scan to ~60fps
  const _now = Date.now();
  if (_now - _lastCursorCheck < 16) return;
  _lastCursorCheck = _now;
  const hover = findParticleAt(pos.x, pos.y);
  canvas.style.cursor = hover >= 0 ? 'grab' : 'default';
});

window.addEventListener('mouseup', (e) => {
  if (dragging !== null) {
    separateOverlaps();
    if (!running) { computeEnergy(); draw(); }
    dragging = null;
    const pos = getCanvasPos(e);
    const hover = findParticleAt(pos.x, pos.y);
    canvas.style.cursor = groupSelectMode ? (hover >= 0 ? 'grab' : 'crosshair') : (hover >= 0 ? 'grab' : 'default');
    return;
  }
  if (groupSelectMode && selBox) {
    const minX = Math.min(selBox.x1, selBox.x2), maxX = Math.max(selBox.x1, selBox.x2);
    const minY = Math.min(selBox.y1, selBox.y2), maxY = Math.max(selBox.y1, selBox.y2);
    if ((maxX - minX) > 5 || (maxY - minY) > 5) {
      selectedGroup = [];
      for (let i = 0; i < particles.length; i++) {
        const p = particles[i];
        if (p.x >= minX && p.x <= maxX && p.y >= minY && p.y <= maxY) selectedGroup.push(i);
      }
    } else {
      selectedGroup = [];  // click without meaningful drag = clear
    }
    selBox = null;
    if (!running) draw();
  }
});

// ============================================================
//  PACKED CLUSTER BUILDER
//  Returns an array of { x, y, type } in a hex close-packed
//  arrangement centered on (0, 0).  Particles are placed at
//  touching distance (2 * PARTICLE_RADIUS) from their neighbors.
//
//  Proton assignment — farthest-point greedy:
//    1. Seed the first proton at the outermost position.
//    2. Each subsequent proton goes to the open slot whose
//       minimum distance to any already-placed proton is largest.
//  This maximises the spread of positive charge across the cluster.
// ============================================================
function buildPackedCluster(numProtons, numNeutrons, spacing = PARTICLE_RADIUS * 2) {
  if (numProtons + numNeutrons === 0) return [];

  const D    = spacing;               // 1 diameter — fine grid spacing
  const rowH = D * Math.sqrt(3) / 2;
  const jitter = () => (Math.random() - 0.5) * D * 0.3;

  // Generate a large fine hex grid (enough for all particles plus room for proton spacing)
  const span = Math.ceil(Math.sqrt(numProtons * 4 + numNeutrons)) + 4;
  const grid = [];
  for (let row = -span; row <= span; row++) {
    const xOff = (Math.abs(row) % 2 === 1) ? D / 2 : 0;
    for (let col = -span; col <= span; col++) {
      const x = col * D + xOff + jitter();
      const y = row * rowH + jitter();
      grid.push({ x, y, dist2: x * x + y * y });
    }
  }
  grid.sort((a, b) => a.dist2 - b.dist2);

  // Step 1: pick proton slots — innermost positions at least 1.5 diameters apart.
  const protonMinDist2 = (D * 1.0) * (D * 1.0);
  const protonSlots = [];
  const usedIdx = new Set();
  for (let i = 0; i < grid.length && protonSlots.length < numProtons; i++) {
    let tooClose = false;
    for (const pp of protonSlots) {
      const dx = grid[i].x - pp.x, dy = grid[i].y - pp.y;
      if (dx * dx + dy * dy < protonMinDist2) { tooClose = true; break; }
    }
    if (!tooClose) { protonSlots.push(grid[i]); usedIdx.add(i); }
  }

  // Step 2: pick neutron slots — innermost positions not already used by protons.
  const neutronSlots = [];
  for (let i = 0; i < grid.length && neutronSlots.length < numNeutrons; i++) {
    if (!usedIdx.has(i)) neutronSlots.push(grid[i]);
  }

  return [
    ...protonSlots.map(p => ({ x: p.x, y: p.y, type: 'proton'  })),
    ...neutronSlots.map(p => ({ x: p.x, y: p.y, type: 'neutron' })),
  ];
}

// ============================================================
//  RANDOM PROTON PLACER (Tab A)
//  Poisson-disk rejection sampling: each proton is placed at a
//  random position in a disk, retrying until it is farther than
//  minDist from every already-placed proton.  minDist is set well
//  above the strong-force cutoff so no interactions start.
// ============================================================
function buildRandomProtons(n) {
  if (n === 0) return [];
  const minDist = strongCutoff() * 1.023;        // clear margin above strong range
  const radius  = minDist * Math.sqrt(n) * 0.85; // disk sized for n non-overlapping protons
  const placed  = [];

  for (let i = 0; i < n; i++) {
    let best = null, bestMinD = -1;
    const attempts = 300;
    for (let a = 0; a < attempts; a++) {
      // Uniform random point inside disk
      const angle = Math.random() * 2 * Math.PI;
      const r     = Math.sqrt(Math.random()) * radius;
      const x = r * Math.cos(angle), y = r * Math.sin(angle);

      let minD = Infinity;
      for (const p of placed) {
        const dx = p.x - x, dy = p.y - y;
        const d  = Math.sqrt(dx * dx + dy * dy);
        if (d < minD) minD = d;
      }
      if (placed.length === 0 || minD >= minDist) { best = { x, y }; break; }
      if (minD > bestMinD) { bestMinD = minD; best = { x, y }; }
    }
    placed.push(best);
  }
  return placed.map(p => ({ x: p.x, y: p.y, type: 'proton' }));
}

function placeCluster(numProtons, numNeutrons, spacing) {
  resetSim();

  const toolbarH = document.getElementById('toolbar').offsetHeight;
  const cx = canvas.width / 2, cy = toolbarH + (canvas.height - toolbarH) / 2;
  const cluster = buildPackedCluster(numProtons, numNeutrons, spacing);
  for (const p of cluster) particles.push(createParticle(cx + p.x, cy + p.y, p.type));
  updateStats();
  computeEnergy();
  draw();
}

function selectRightmostProton() {
  if (!currentTabIsProton || particles.length === 0) return;
  let best = -1, bestX = -Infinity;
  for (let i = 0; i < particles.length; i++) {
    if (particles[i].x > bestX) { bestX = particles[i].x; best = i; }
  }
  selectedParticle = best;
}

function placeProtons(n) {

  }
});

function doReplay() {
  if (!_histLen) return;
  // Reset lag state so replay starts with the same frame-rate baseline as recording did.
  _lagEma = 0; _lagDetected = false; _lagSkip = 0;
  loop._replayT0 = null; loop._replayPrev = null;
  // Snap current slider values so replay uses whatever zoom/speed are set now
  applySpeedSlider();
  zoom = parseInt(zoomSlider.value) / 10;
  cancelAnimationFrame(animId);
  running = false;
  replaying = false;
  scrubFrame = 0;
  timeSlider.value = 0;
  renderFrame(0);
  // Auto-play through recorded history using timestamp-based sync.
  // _replayWallStart is set on the first loop() call so renderFrame(0) above
  // doesn't eat into elapsed time.
  replayLocked = true;
  replayAccum = 0;
  _replayWallStart = 0;
  _replaySimStart  = _histGet(0).t;
  replaying = true;
  running = true;
  goBtn.textContent = '❙ ❙';
  goBtn.classList.add('running');
  animId = requestAnimationFrame(loop);
}

function findAllClusters() {
  const active = particles.filter(p => !p.ejected);
  if (active.length === 0) return [];
  const threshold = strongCutoff() * 1.5;
  const visited = new Array(active.length).fill(false);
  const clusters = [];
  for (let i = 0; i < active.length; i++) {
    if (visited[i]) continue;
    const cluster = [];
    const queue = [i];
    visited[i] = true;
    while (queue.length) {
      const idx = queue.shift();
      cluster.push(active[idx]);
      for (let j = 0; j < active.length; j++) {
        if (visited[j]) continue;
        const dx = active[idx].x - active[j].x;
        const dy = active[idx].y - active[j].y;
        if (dx * dx + dy * dy <= threshold * threshold) {
          visited[j] = true;
          queue.push(j);
        }
      }
    }
    clusters.push(cluster);
  }
  return clusters;
}

function findBiggestCluster() {
  return findAllClusters().reduce((best, c) => c.length > best.length ? c : best, []);
}

function updateStats() {

// ============================================================
//  FORCE MODEL
//  Two forces act between particles:
//
//  Coulomb repulsion (proton-proton only):
//    F = coulombStrength / r²  (softened: r clamped to PARTICLE_RADIUS)
//
//  Strong nuclear force (all pairs within cutoff):
//    F = -strongForceStrength  (constant attraction, no r-dependence)
//    Cutoff = PARTICLE_RADIUS * 2 * strongForceRange
//
//  The combination creates a potential well: particles repel at long
//  range (protons), attract strongly once close, and can bind into
//  nuclei when kinetic energy is low enough to stay in the well.
// ============================================================
function strongCutoff() {
  return PARTICLE_RADIUS * 2 * strongForceRange;
}

// Returns net force magnitude along the axis between two particles.
// Positive = repulsive (pushes apart), negative = attractive (pulls together).
function pairForce(dist, distSq, aType, bType, strongScale) {
  let force = 0;
  // Coulomb: only between protons (1/r² with softening to prevent blow-up)
  if (aType === 'proton' && bType === 'proton') {
    const softDistSq = Math.max(distSq, PARTICLE_RADIUS * PARTICLE_RADIUS);
    force += coulombStrength / softDistSq;
  }
  // Strong nuclear force: constant attraction within cutoff, no repulsive core.
  // Nucleus-tab only — the proton tab is a Coulomb-only world.
  if (!currentTabIsProton) {
    const cutoff = strongCutoff();
    if (dist < cutoff) {
      force -= strongForceStrength * (strongScale ?? 1.0);
    }
  }
  return force;
}

// ============================================================
//  ENERGY COMPUTATION
//  Computes true kinetic and potential energy from particle state,
//  then applies display transformations before writing to the UI
//  and energy history.
//
//  KE = Σ ½mv²  (unit mass, so just ½v²)
//  IE = Coulomb potential + Strong potential
//
//  Potential integrals match the force model:
//    Coulomb: V = K/r  (softened)
//    Strong:  V = -S*(cutoff - r)  (linear well, zero at cutoff)
// ============================================================
function computeEnergy() {
  let kinetic = 0;
  let eiePotential = 0;  // Coulomb (electric) potential energy
  let siePotential = 0;  // Strong nuclear potential energy
  const n = particles.length;

  for (let i = 0; i < n; i++) {
    const p = particles[i];
    kinetic += 0.5 * (p.vx * p.vx + p.vy * p.vy);  // KE = ½mv² (unit mass)
  }

  const cutoff = strongCutoff();
  const includeStrong = !currentTabIsProton;  // proton tab has no strong force
  for (let i = 0; i < n; i++) {
    for (let j = i + 1; j < n; j++) {
      const dx = particles[j].x - particles[i].x;
      const dy = particles[j].y - particles[i].y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist > 0) {
        // Coulomb potential: between protons only (with softening)
        if (particles[i].type === 'proton' && particles[j].type === 'proton') {
          const softDist = Math.max(dist, PARTICLE_RADIUS);
          eiePotential += coulombStrength / softDist;
        }
        // Strong force potential: V = -S * (cutoff - r), zero at cutoff, deepens linearly inward
        if (includeStrong && dist < cutoff) {
          siePotential -= strongForceStrength * (cutoff - dist);
        }
      }
    }
  }
  const potential = eiePotential + siePotential;

  // Update inline energy display in toolbar

  return { kinetic, potential };  // Return true values for callers that need them
}

// ============================================================
//  PHYSICS STEP
//  Called once per animation frame with dt = speed.
//  Internally subdivides into SUBSTEPS for accuracy.
//
//  Each substep:
//    1. Compute pairwise forces → accumulate into velocities
//    2. Let dragged particle exert force without being pushed
//    3. Integrate positions (symplectic Euler: v first, then x)
//    4. Hard-sphere constraint: push apart any overlapping pairs
//       and exchange their approaching normal velocities
//
//  After all substeps:
//    5. Apply damping (currently disabled: damping = 1.0)
//    6. Antispin: clamp cluster angular velocity if enabled
// ============================================================
function step(dt) {
  const n = particles.length;
  const subDt = dt / SUBSTEPS;  // Per-substep timestep

  // Hoist tab check + per-particle strongScale out of the N²×SUBSTEPS inner loop.
  // strongScale is set by updateQuantumStability() once per frame before step(), so
  // it's constant for the entire step() call.
  const isNucleus = !currentTabIsProton;
  const strongScales = new Float32Array(n);
  if (isNucleus) {
    for (let i = 0; i < n; i++) strongScales[i] = particles[i].strongScale ?? 1;
  }

  for (let sub = 0; sub < SUBSTEPS; sub++) {
    // 1. Compute pairwise forces
    for (let i = 0; i < n; i++) {
      if (i === dragging) continue;
      for (let j = i + 1; j < n; j++) {
        if (j === dragging) continue;
        const a = particles[i];
        const b = particles[j];
        if (a.ejected || b.ejected) continue;
        const dx = b.x - a.x;
        const dy = b.y - a.y;
        const distSq = dx * dx + dy * dy;
        if (distSq > COULOMB_CUTOFF_SQ) continue;  // Too far for any meaningful force
        const dist = Math.sqrt(distSq);
        if (dist < 0.01) continue;  // Skip coincident particles
        const ss = isNucleus ? Math.min(strongScales[i], strongScales[j]) : 1;
        const force = pairForce(dist, distSq, a.type, b.type, ss);
        const fx = force * (dx / dist);
        const fy = force * (dy / dist);
        a.vx -= fx * subDt;
        a.vy -= fy * subDt;
        b.vx += fx * subDt;
        b.vy += fy * subDt;
      }
    }


    // Cohesion: gentle spring toward each particle's cluster CM (nucleus tab)
    if (isNucleus) {
      for (let i = 0; i < n; i++) {
        if (i === dragging) continue;
        const p = particles[i];
        if (p.ejected || p.clusterCmx === undefined) continue;
        const dx = p.clusterCmx - p.x;
        const dy = p.clusterCmy - p.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 0.01) continue;
        const f = COHESION_K * dist;
        p.vx += (dx / dist) * f * subDt;
        p.vy += (dy / dist) * f * subDt;
      }
    }

    // 2. Dragged particle still exerts force on others (but is not itself pushed)
    if (dragging !== null) {
      const d = particles[dragging];
      for (let j = 0; j < n; j++) {
        if (j === dragging) continue;
        const b = particles[j];
        const dx = b.x - d.x;
        const dy = b.y - d.y;
        const distSq = dx * dx + dy * dy;
        const dist = Math.sqrt(distSq);
        if (dist < 0.01) continue;
        const force = pairForce(dist, distSq, d.type, b.type);
        const fx = force * (dx / dist);
        const fy = force * (dy / dist);
        b.vx += fx * subDt;
        b.vy += fy * subDt;
      }
    }

    // 3. Integrate positions (symplectic Euler: velocity already updated above)
    for (let i = 0; i < n; i++) {
      if (i === dragging) continue;
      const p = particles[i];
      p.x += p.vx * subDt;
      p.y += p.vy * subDt;
    }

    // 4. Hard-sphere constraint: resolve any remaining overlaps.
    //    Force softening caps—but doesn't eliminate—overlap at high speed.
    //    Position correction: push overlapping centers apart by full overlap.
    //    Velocity correction: only when particles are approaching (dvDotN < 0)
    //    — swap the normal velocity component (equal-mass elastic collision).
    //    If one particle is being dragged, only the free particle is corrected.
    const minSep = PARTICLE_RADIUS * 2;
    for (let i = 0; i < n; i++) {
      for (let j = i + 1; j < n; j++) {
        const a = particles[i];
        const b = particles[j];
        if (a.ejected || b.ejected) continue;
        let dx = b.x - a.x;
        let dy = b.y - a.y;
        const dSq = dx * dx + dy * dy;
        if (dSq >= minSep * minSep) continue;
        let d = Math.sqrt(dSq);
        if (d < 0.001) { dx = 1; dy = 0; d = 0.001; }
        const nx = dx / d;
        const ny = dy / d;
        const overlap = minSep - d;
        const aFixed = (i === dragging);
        const bFixed = (j === dragging);

        // Position correction
        if (aFixed && !bFixed) {
          b.x += nx * overlap; b.y += ny * overlap;
        } else if (bFixed && !aFixed) {
          a.x -= nx * overlap; a.y -= ny * overlap;
        } else if (!aFixed && !bFixed) {
          a.x -= nx * overlap * 0.5; a.y -= ny * overlap * 0.5;
          b.x += nx * overlap * 0.5; b.y += ny * overlap * 0.5;
        }

        // Inelastic velocity correction: zero out approaching velocity
        // (the strong force handles the rebound; this is just a safety net)
        const dvx = b.vx - a.vx;
        const dvy = b.vy - a.vy;
        const dvDotN = dvx * nx + dvy * ny;
        if (dvDotN < 0) {  // approaching
          const half = dvDotN * 0.5;
          if (aFixed) {
            b.vx -= dvDotN * nx; b.vy -= dvDotN * ny;
          } else if (bFixed) {
            a.vx += dvDotN * nx; a.vy += dvDotN * ny;
          } else {
            a.vx += half * nx; a.vy += half * ny;
            b.vx -= half * nx; b.vy -= half * ny;
          }
        }
      }
    }
  }  // end substep loop

  // 5. Damping: multiply all velocities by damping factor once per frame.
  //    Currently disabled (damping = 1.0) so energy is conserved.
  if (damping < 1.0) {
    for (let i = 0; i < n; i++) {
      if (i === dragging) continue;
      particles[i].vx *= damping;
      particles[i].vy *= damping;
    }
  }

  // 6. Antispin: suppress runaway rotation in bound clusters.
  //    Without this, the strong force can pump angular momentum into a
  //    nucleus over time and it will spin up indefinitely.
  //    Algorithm:
  //      a) Build adjacency list: particles within strongCutoff are "bonded"
  //      b) Flood-fill to find connected clusters of 3+ particles
  //      c) For each cluster: compute CM, angular momentum L, moment I
  //         → omega = L / I  (angular velocity)
  //      d) Only subtract the excess beyond MAX_OMEGA (1 rev/sim-s),
  //         leaving a small allowed spin so clusters still feel natural.
  //    MAX_OMEGA scales with speed so the allowed spin is speed-invariant.
  if (antispin && n >= 3) {
    const cutoffSpin = strongCutoff();
    const cutoffSpinSq = cutoffSpin * cutoffSpin;

    // Build adjacency list
    const adj = new Array(n);
    for (let i = 0; i < n; i++) adj[i] = [];
    for (let i = 0; i < n; i++) {
      for (let j = i + 1; j < n; j++) {
        const dx = particles[j].x - particles[i].x;
        const dy = particles[j].y - particles[i].y;
        if (dx * dx + dy * dy < cutoffSpinSq) {
          adj[i].push(j);
          adj[j].push(i);
        }
      }
    }

    // Flood-fill to find connected clusters
    const visited = new Uint8Array(n);
    for (let seed = 0; seed < n; seed++) {
      if (visited[seed]) continue;
      if (adj[seed].length === 0) { visited[seed] = 1; continue; }
      const cluster = [seed];
      visited[seed] = 1;
      let head = 0;
      while (head < cluster.length) {
        const cur = cluster[head++];
        for (let k = 0; k < adj[cur].length; k++) {
          const nb = adj[cur][k];
          if (!visited[nb]) { visited[nb] = 1; cluster.push(nb); }
        }
      }

      if (cluster.length < 3) continue;

      // Center of mass position and velocity
      let cmx = 0, cmy = 0, cvx = 0, cvy = 0;
      for (let k = 0; k < cluster.length; k++) {
        const p = particles[cluster[k]];
        cmx += p.x; cmy += p.y; cvx += p.vx; cvy += p.vy;
      }
      cmx /= cluster.length; cmy /= cluster.length;
      cvx /= cluster.length; cvy /= cluster.length;

      // Angular momentum L and moment of inertia I about center of mass
      let L = 0, I = 0;
      for (let k = 0; k < cluster.length; k++) {
        const p = particles[cluster[k]];
        const rx = p.x - cmx, ry = p.y - cmy;
        const vxr = p.vx - cvx, vyr = p.vy - cvy;
        L += rx * vyr - ry * vxr;
        I += rx * rx + ry * ry;
      }
      if (I < 0.001) continue;

      // omega in rad/subDt. MAX_OMEGA = 1 rev per sim-second at 60fps,
      // scaled by speed so the visual spin rate is consistent across speeds.
      // removeOmega is only the excess — spins within the cap are untouched.
      const omega = L / I;
      const MAX_OMEGA = 2 * Math.PI * speed / (60 * SUBSTEPS);  // 1 rev/sim-s, scales with speed
      const removeOmega = Math.sign(omega) * Math.max(0, Math.abs(omega) - MAX_OMEGA);
      for (let k = 0; k < cluster.length; k++) {
        if (cluster[k] === dragging) continue;
        const p = particles[cluster[k]];
        const rx = p.x - cmx, ry = p.y - cmy;
        p.vx -= -removeOmega * ry;
        p.vy -=  removeOmega * rx;
      }
    }
  }
}

// ============================================================
//  COLORMAP
//  Pre-baked 256-entry RGBA lookup table mapping energy density
//  [0, 1] to a blue-white gradient (transparent at zero, opaque
//  near-white at max). Used by the Coulomb heatmap renderer.
// ============================================================
function buildColorstops(stops, out) {
  for (let i = 0; i < 256; i++) {
    const t = i / 255;
    let s0 = stops[0], s1 = stops[1];
    for (let s = 0; s < stops.length - 1; s++) {
      if (t >= stops[s].t && t <= stops[s + 1].t) { s0 = stops[s]; s1 = stops[s + 1]; break; }
    }
    const f = (t - s0.t) / (s1.t - s0.t);
    const idx = i * 4;
    out[idx]     = s0.r + (s1.r - s0.r) * f;
    out[idx + 1] = s0.g + (s1.g - s0.g) * f;
    out[idx + 2] = s0.b + (s1.b - s0.b) * f;
    out[idx + 3] = s0.a + (s1.a - s0.a) * f;
  }
}

const COLORMAP = new Uint8Array(256 * 4);
buildColorstops([
  { t: 0.0,  r: 0,   g: 0,   b: 0,   a: 0   },
  { t: 0.12, r: 10,  g: 35,  b: 170, a: 140 },
  { t: 0.4,  r: 25,  g: 85,  b: 235, a: 210 },
  { t: 0.7,  r: 70,  g: 165, b: 255, a: 245 },
  { t: 1.0,  r: 210, g: 238, b: 255, a: 255 },
], COLORMAP);

const STRONG_COLORMAP = new Uint8Array(256 * 4);
buildColorstops([
  { t: 0.0,  r: 0,   g: 0,   b: 0,   a: 0   },
  { t: 0.12, r: 160, g: 45,  b: 0,   a: 140 },
  { t: 0.4,  r: 240, g: 110, b: 10,  a: 210 },
  { t: 0.7,  r: 255, g: 185, b: 70,  a: 245 },
  { t: 1.0,  r: 255, g: 238, b: 210, a: 255 },
], STRONG_COLORMAP);

// ============================================================
//  COMBINED HEATMAP
//  Single pixel loop computes both electric (blue) and strong
//  (orange) fields. Results are composited into hmComposite at
//  full resolution. When running, the composite is reused every
//  other frame (heatmap every 2 frames — imperceptible at the
//  blurred quarter-resolution the maps are rendered at).
// ============================================================
function drawCombinedHeatmap() {
  const fullW = canvas.width, fullH = canvas.height;
  const scale = _quality === 'simple' ? 0.08 : _quality === 'detailed' ? 0.15 : 0.25;
  const w = Math.ceil(fullW * scale), h = Math.ceil(fullH * scale);

  hmFrameCounter++;

  // Build electric pairs (proton-proton only)
  const elecPairs = [];
  if (showElectricField) {
    const refEnergy = coulombStrength / (PARTICLE_RADIUS * 2);
    const logRef = Math.log(2);
    const protonList = particles.filter(p => p.type === 'proton');
    for (let i = 0; i < protonList.length; i++) {
      for (let j = i + 1; j < protonList.length; j++) {
        const a = protonList[i], b = protonList[j];
        const dx = b.x - a.x, dy = b.y - a.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 0.01) continue;
        const energy = coulombStrength / dist;
        const sigma = Math.max(3.5, 28 / Math.sqrt(dist));
        const distFade = Math.exp(-dist / 350);
        const mag = Math.min(1, Math.log(1 + energy / refEnergy) / logRef) * distFade;
        const cullSq = 16 * (sigma * 2) * (sigma * 2);
        elecPairs.push({ ax: a.x, ay: a.y, ux: dx / dist, uy: dy / dist, dist, sigma, mag, cullSq });
      }
    }
  }
  elecPairs.sort((a, b) => b.mag - a.mag);

  // Build strong pairs (all nucleons within cutoff)
  const strongPairs = [];
  if (showStrongField) {
    const cutoff = strongCutoff();
    const eqDist = Math.max(cutoff * equilibriumRatio, PARTICLE_RADIUS * 2);
    const span = cutoff - eqDist;
    if (span > 0) {
      const maxBinding = strongForceStrength * span / 2;
      const n = particles.length;
      for (let i = 0; i < n; i++) {
        for (let j = i + 1; j < n; j++) {
          const a = particles[i], b = particles[j];
          const dx = b.x - a.x, dy = b.y - a.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist === 0 || dist >= cutoff) continue;
          const dr = dist - eqDist;
          const energy = strongForceStrength / (2 * span) * (dr * dr - span * span);
          const mag = Math.min(1, Math.abs(energy) / maxBinding);
          const sigma = Math.max(0.375, 0.0875 * dist);
          const spread = 1.6;
          const cullSq = 16 * (sigma * spread * 3) * (sigma * spread * 3);
          strongPairs.push({ ax: a.x, ay: a.y, ux: dx / dist, uy: dy / dist, dist, sigma, mag, spread, cullSq });
        }
      }
    }
  }
  strongPairs.sort((a, b) => b.mag - a.mag);

  if (elecPairs.length === 0 && strongPairs.length === 0) {
    hmComposite.width = 0;
    return;
  }

  ensureHmBuffers(w, h);
  if (elecPairs.length   > 0) hmDataElec.fill(0);
  if (strongPairs.length > 0) hmDataStrong.fill(0);

  const invScale = 1 / scale;
  const cxH = fullW / 2, cyH = fullH / 2;

  // Single pixel loop — computes both fields at once
  for (let py = 0; py < h; py++) {
    const worldY = (py * invScale - cyH - camY) / zoom + cyH;
    for (let px = 0; px < w; px++) {
      const worldX = (px * invScale - cxH - camX) / zoom + cxH;
      const di = (py * w + px) * 4;

      // Electric field
      if (elecPairs.length > 0) {
        let total = 0;
        for (let k = 0; k < elecPairs.length; k++) {
          const p = elecPairs[k];
          const rx = worldX - p.ax, ry = worldY - p.ay;
          const para = rx * p.ux + ry * p.uy;
          const e1 = para > 0 ? Math.min(1, para / 8) : 0;
          const e2 = para < p.dist ? Math.min(1, (p.dist - para) / 8) : 0;
          const endFade = e1 * e2;
          if (endFade <= 0) continue;
          const perpSq = Math.max(0, rx * rx + ry * ry - para * para);
          if (perpSq > p.cullSq) continue;
          const t = para / p.dist;
          const sigmaT = p.sigma * (1 + Math.sin(Math.PI * t));
          total += p.mag * Math.exp(-perpSq / (2 * sigmaT * sigmaT)) * endFade;
          if (total >= 1/3) break;
        }
        if (total > 0.002) {
          const ci = (Math.min(255, (total * 3.0 * 255) | 0));
          const ci4 = ci * 4;
          hmDataElec[di]     = COLORMAP[ci4];
          hmDataElec[di + 1] = COLORMAP[ci4 + 1];
          hmDataElec[di + 2] = COLORMAP[ci4 + 2];
          hmDataElec[di + 3] = COLORMAP[ci4 + 3];
        }
      }

      // Strong field
      if (strongPairs.length > 0) {
        let total = 0;
        for (let k = 0; k < strongPairs.length; k++) {
          const p = strongPairs[k];
          const rx = worldX - p.ax, ry = worldY - p.ay;
          const para = rx * p.ux + ry * p.uy;
          const margin = (p.spread - 1) / 2 * p.dist;
          const extDist = p.dist * p.spread;
          const paraExt = para + margin;
          const e1 = paraExt > 0 ? Math.min(1, paraExt / 8) : 0;
          const e2 = paraExt < extDist ? Math.min(1, (extDist - paraExt) / 8) : 0;
          const endFade = e1 * e2;
          if (endFade <= 0) continue;
          const perpSq = Math.max(0, rx * rx + ry * ry - para * para);
          if (perpSq > p.cullSq) continue;
          const t = paraExt / extDist;
          const sigmaT = p.sigma * p.spread * (1 + 2 * Math.sin(Math.PI * t));
          const val = p.mag * Math.exp(-perpSq / (2 * sigmaT * sigmaT)) * endFade;
          if (val > total) total = val;
          if (total >= 1/3) break;
        }
        if (total > 0.002) {
          const ci = (Math.min(255, (total * 3.0 * 255) | 0));
          const ci4 = ci * 4;
          hmDataStrong[di]     = STRONG_COLORMAP[ci4];
          hmDataStrong[di + 1] = STRONG_COLORMAP[ci4 + 1];
          hmDataStrong[di + 2] = STRONG_COLORMAP[ci4 + 2];
          hmDataStrong[di + 3] = STRONG_COLORMAP[ci4 + 3];
        }
      }
    }
  }

  // Composite both layers into hmComposite at full resolution
  if (hmComposite.width !== fullW || hmComposite.height !== fullH) {
    hmComposite.width = fullW; hmComposite.height = fullH;
  }
  hmcCtx.clearRect(0, 0, fullW, fullH);
  hmcCtx.imageSmoothingEnabled = true;
  hmcCtx.imageSmoothingQuality = 'high';
  if (elecPairs.length > 0) {
    hmCtx.putImageData(hmImgElec, 0, 0);
    hmcCtx.drawImage(hmCanvas, 0, 0, fullW, fullH);
  }
  if (strongPairs.length > 0) {
    hmCtx.putImageData(hmImgStrong, 0, 0);
    hmcCtx.drawImage(hmCanvas, 0, 0, fullW, fullH);
  }

  ctx.drawImage(hmComposite, 0, 0);
}


// ============================================================
//  FORCE ARROW RENDERING
// ============================================================
const ELEC_ARROW_COLOR   = 'rgba(70,165,255,0.88)';   // electric field blue
const STRONG_ARROW_COLOR = 'rgba(255,185,70,0.88)';    // strong field orange

// ---- Particle labels for "All Forces" mode ----
// Letters A,B,C,… on every proton; numbers 1,2,3,… on every neutron within
// strongCutoff() of the selected particle. Empty string otherwise. Active only
// when arrowMode === 1 (All Forces), in single-particle selection mode, on the
// proton tab (any count) or the nucleus tab with ≤10 protons.
function getParticleLabels() {
  const N = particles.length;
  const labels = new Array(N).fill('');
  if (arrowMode !== 1 || groupSelectMode) return labels;
  let protonCount = 0;
  for (let i = 0; i < N; i++) if (particles[i].type === 'proton') protonCount++;
  if (protonCount > 10) return labels;
  let pIdx = 0;
  for (let i = 0; i < N; i++) {
    if (particles[i].type === 'proton') {
      labels[i] = String.fromCharCode(65 + pIdx); // A, B, …, Z
      pIdx++;
    }
  }
  if (selectedParticle !== null && selectedParticle < N) {
    const sel = particles[selectedParticle];
    const cutoff = strongCutoff();
    const cutoffSq = cutoff * cutoff;
    let nIdx = 0;
    for (let i = 0; i < N; i++) {
      if (i === selectedParticle) continue;
      if (particles[i].type !== 'neutron') continue;
      const dx = particles[i].x - sel.x;
      const dy = particles[i].y - sel.y;
      if (dx * dx + dy * dy < cutoffSq) {
        nIdx++;
        labels[i] = String(nIdx);
      }
    }
  }
  return labels;
}

// Draw a label just past an arrow's tip so the user can see which other
// particle is the source of that force arrow. Proton letters render in light
// pink so they read as "from a proton" at a glance; neutron numbers stay white.
const PROTON_LABEL_COLOR  = '#ffb6c1';
const NEUTRON_LABEL_COLOR = 'rgba(255,255,255,0.95)';
function isProtonLabel(label) { return /^[A-Z]/.test(label); }
function drawLabelAt(c, lx, ly, label) {
  const LIGHT = document.body.classList.contains('screenshot-mode');
  c.save();
  c.font = 'bold 14px Lexend, sans-serif';
  c.textAlign = 'center';
  c.textBaseline = 'middle';
  if (LIGHT) {
    c.fillStyle = '#000';
    c.fillText(label, lx, ly);
  } else {
    c.shadowColor = 'rgba(0,0,0,0.9)';
    c.shadowBlur = 4;
    c.fillStyle = isProtonLabel(label) ? PROTON_LABEL_COLOR : NEUTRON_LABEL_COLOR;
    c.fillText(label, lx, ly);
  }
  c.restore();
}
function drawArrowLabel(c, fromX, fromY, nx, ny, len, label) {
  if (!label || len < 6) return;
  drawLabelAt(c, fromX + nx * len * 0.5 + (-ny) * 9, fromY + ny * len * 0.5 + nx * 9, label);
}

function drawArrowOnCtx(c, fromX, fromY, nx, ny, len, color, lw = 2) {
  if (len < 1) return;
  const midX = fromX + nx * len * 0.5, midY = fromY + ny * len * 0.5;
  const tipX = fromX + nx * len,       tipY = fromY + ny * len;
  const HEAD = Math.max(5, len * 0.18);
  const perpX = -ny, perpY = nx;
  const baseX = tipX - nx * HEAD, baseY = tipY - ny * HEAD;
  c.strokeStyle = color; c.fillStyle = color;
  c.save();
  c.shadowColor = color; c.shadowBlur = 8;
  c.lineWidth = lw; c.globalAlpha = 0.88; c.lineCap = 'round';
  c.beginPath(); c.moveTo(fromX, fromY);
  c.quadraticCurveTo(midX, midY, baseX, baseY);
  c.stroke();
  c.beginPath();
  c.moveTo(tipX, tipY);
  c.lineTo(baseX + perpX * 8, baseY + perpY * 8);
  c.lineTo(baseX - perpX * 8, baseY - perpY * 8);
  c.closePath(); c.fill();
  c.restore();
  c.globalAlpha = 1; c.lineCap = 'butt';
}

const forcePanelEl  = document.getElementById('forcePanel');
const forcePanelCv  = document.getElementById('forcePanelCanvas');
const forcePanelCtx = forcePanelCv.getContext('2d');
// Cached force-panel width — read at init and after each resize, to avoid
// forcing a synchronous layout inside updateCam() which runs every frame.
let _forcePanelWidth = forcePanelEl.offsetWidth;
let fpZoom = 1.0;
let _fpAutoScaleSel = null;

// ---- Force panel resize ----
let _fpResize = null;
document.querySelectorAll('.fp-rh').forEach(h => {
  h.addEventListener('mousedown', e => {
    e.stopPropagation();
    const rect = forcePanelEl.getBoundingClientRect();
    forcePanelEl.style.width  = rect.width  + 'px';
    forcePanelEl.style.height = rect.height + 'px';
    _fpResize = { dir: h.dataset.dir, sx: e.clientX, sy: e.clientY,
                  ow: rect.width, oh: rect.height };
  });
});

window.addEventListener('mousemove', e => {
  if (!_fpResize) return;
  const { dir, sx, sy, ow, oh } = _fpResize;
  const dx = e.clientX - sx, dy = e.clientY - sy;
  let w = ow, h = oh;
  // Panel is pinned right:0 so only left-edge and vertical handles resize width/height
  if (dir.includes('w') || dir.includes('e')) w = Math.max(140, Math.min(canvas.width,  ow - dx));
  if (dir.includes('s')) h = Math.max(140, Math.min(canvas.height, oh + dy));
  if (dir.includes('n')) h = Math.max(140, Math.min(canvas.height, oh - dy));
  forcePanelEl.style.width  = w + 'px';
  forcePanelEl.style.height = h + 'px';
  _forcePanelWidth = w;
  // Resize canvas to fill panel minus header
  const keyH = document.getElementById('forcePanelKey').offsetHeight;
  const cw = Math.max(80, (w - 20)) | 0;
  const ch = Math.max(80, (h - keyH - 26)) | 0;
  if (forcePanelCv.width !== cw || forcePanelCv.height !== ch) {
    forcePanelCv.width = cw;
    forcePanelCv.height = ch;
    drawForcePanel();
  }
});

window.addEventListener('mouseup', () => { _fpResize = null; });

document.getElementById('fpZoomSlider').addEventListener('input', function() {
  fpZoom = parseFloat(this.value);
});

function drawForcePanel() {
  if (arrowMode === 0) { forcePanelEl.style.display = 'none'; return; }
  forcePanelEl.style.display = 'block';
  const _fpw = forcePanelEl.offsetWidth;
  if (_fpw > 0 && _fpw !== _forcePanelWidth) _forcePanelWidth = _fpw;
  // Sync canvas WIDTH to panel every frame so right-aligned text is correct before any drag.
  // Height is NOT synced here — doing so creates a feedback loop (canvas height → panel taller → repeat).
  if (_fpw > 0) {
    const _cw = Math.max(80, (_fpw - 20)) | 0;
    if (forcePanelCv.width !== _cw) forcePanelCv.width = _cw;
  }

  const W = forcePanelCv.width, H = forcePanelCv.height;
  const cx = W / 2, cy = H / 2;
  const MAX_LEN = 36;
  const refDist = PARTICLE_RADIUS * 2;

  // Center on largest cluster (world coords)
  const _clust = particles.length > 0 ? findBiggestCluster() : [];
  const clusterCx = _clust.length ? _clust.reduce((s,p)=>s+p.x,0)/_clust.length : canvas.width/2;
  const clusterCy = _clust.length ? _clust.reduce((s,p)=>s+p.y,0)/_clust.length : canvas.height/2;

  // Deselect particles that have flown >50% off-canvas
  const _cw = canvas.width, _ch = canvas.height;
  const _offScreen = p => p.x < -_cw*0.5 || p.x > _cw*1.5 || p.y < -_ch*0.5 || p.y > _ch*1.5;
  if (selectedParticle !== null && selectedParticle < particles.length && _offScreen(particles[selectedParticle])) {
    selectedParticle = null;
  }
  if (selectedGroup.length > 0) {
    selectedGroup = selectedGroup.filter(i => i < particles.length && !_offScreen(particles[i]));
  }

  // Autoscale fpZoom when selection or mode changes; user can then drag slider to override
  const _selKey = (groupSelectMode ? 'g' : 's' + arrowMode) + ':' + (groupSelectMode ? selectedGroup.join(',') : selectedParticle);
  if (_selKey !== _fpAutoScaleSel) {
    _fpAutoScaleSel = _selKey;
    const _avail = Math.min(W, H) / 2 - 16;
    if (!groupSelectMode && arrowMode === 1) {
      // Single, All forces: particle at 80% of main canvas apparent size
      fpZoom = Math.max(0.1, Math.min(2.2, zoom * 0.8));
      document.getElementById('fpZoomSlider').value = fpZoom;
    } else if (!groupSelectMode && arrowMode === 2 && selectedParticle !== null && selectedParticle < particles.length) {
      // Single, Total force: autoscale based on actual net arrow magnitudes
      const _pi = particles[selectedParticle];
      const _cut = strongCutoff();
      let _cFx = 0, _cFy = 0, _sFx = 0, _sFy = 0;
      for (let _j = 0; _j < particles.length; _j++) {
        if (_j === selectedParticle) continue;
        const _pj = particles[_j];
        const _dx = _pi.x - _pj.x, _dy = _pi.y - _pj.y;
        const _d = Math.sqrt(_dx*_dx + _dy*_dy);
        if (_d === 0) continue;
        const _nx = _dx/_d, _ny = _dy/_d;
        if (_pi.type === 'proton' && _pj.type === 'proton') {
          const _l = MAX_LEN * (refDist / Math.max(_d, refDist)) * 2.4;
          _cFx += _nx * _l; _cFy += _ny * _l;
        }
        if (!currentTabIsProton && _d < _cut) {
